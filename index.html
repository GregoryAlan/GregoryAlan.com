<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gregory Alan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="boot-screen"></div>
<div class="terminal" id="terminal" style="display: none">
    <div id="motd"></div>

    <div id="output"></div>

    <div class="input-line">
        <span class="prompt" id="prompt">guest@gregoryalan.com:~$</span>
        <textarea id="input" autocomplete="off" autofocus spellcheck="false" rows="1"></textarea>
    </div>
</div>

<script src="js/glitch.js"></script>
<script src="js/kernel.js"></script>
<script src="js/shell.js"></script>
<script src="js/terminal.js"></script>
<script src="js/cmd/core.js"></script>
<script src="js/cmd/unix.js"></script>
<script src="js/cmd/bin-tools.js"></script>
<script src="js/cmd/v2.js"></script>
<script src="hunts/the-signal.js"></script>
<script src="hunts/greg-corp.js"></script>
<script src="js/versions.js"></script>
<script>
// Boot init — apply version, render MOTD, then boot or restore
const currentVersion = Kernel.hunt.getVersion();
applyVersion(currentVersion);
renderMOTD();
Terminal.updatePrompt();
Terminal.init();

for (const hunt of Object.values(Kernel.hunt._registry)) {
    if (hunt.restore) hunt.restore(Kernel.hunt);
}

Terminal.el.input.disabled = true;

if (Kernel.session.get('bootDone')) {
    Terminal.el.bootScreen.style.display = 'none';
    Terminal.el.terminal.style.display = '';
    Terminal.el.input.disabled = false;
    Terminal.el.input.focus();
} else {
    Terminal.runBootSequence().then(() => {
        Terminal.el.input.disabled = false;
        Terminal.el.input.focus();
    });
}
</script>
</body>
</html>
