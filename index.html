<script>
// Boot init — prefetch manifests, apply version, render MOTD, then boot or restore
(async function boot() {
    // Pre-fetch all content manifests in parallel
    await ManifestLoader.prefetch(MANIFEST_URLS);

    const currentVersion = Kernel.driver.getVersion();
    applyVersion(currentVersion);
    renderMOTD();
    Terminal.updatePrompt();
    Terminal.init();

    for (const drv of Object.values(Kernel.driver._registry)) {
        if (drv.restore) drv.restore(Kernel.driver);
    }

    Terminal.el.input.disabled = true;

    if (Kernel.session.get('bootDone')) {
        Terminal.el.bootScreen.style.display = 'none';
        Terminal.el.terminal.style.display = '';
        Terminal.el.input.disabled = false;
        Terminal.el.input.focus();
    } else {
        Terminal.runBootSequence().then(() => {
            Terminal.el.input.disabled = false;
            Terminal.el.input.focus();
        });
    }
})();
</script>
