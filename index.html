<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gregory Alan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="boot-screen"></div>
<div class="terminal" id="terminal" style="display: none">
    <div id="motd"></div>

    <div id="output"></div>

    <div class="input-line">
        <span class="prompt" id="prompt">guest@gregoryalan.com:~$</span>
        <textarea id="input" autocomplete="off" autofocus spellcheck="false" rows="1"></textarea>
    </div>
</div>

<script src="js/glitch.js"></script>
<script src="js/terminal.js"></script>
<script src="js/bin-tools.js"></script>
<script src="js/v2-commands.js"></script>
<script src="hunts/the-signal.js"></script>
<script src="js/versions.js"></script>
<script>
// Boot init — apply version, render MOTD, then boot or restore
const currentVersion = huntState.getVersion();
applyVersion(currentVersion);
renderMOTD();
updatePrompt();

if (huntState.flags.contact) {
    runGlitchEffect('scanlines', { persistent: true });
    document.body.style.backgroundColor = '#0a0d0a';
}

input.disabled = true;

if (sessionStorage.getItem('bootDone')) {
    bootScreen.style.display = 'none';
    terminal.style.display = '';
    input.disabled = false;
    input.focus();
} else {
    runBootSequence().then(() => {
        input.disabled = false;
        input.focus();
    });
}
</script>
</body>
</html>
