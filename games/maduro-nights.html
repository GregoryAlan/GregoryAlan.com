/* Maduro Nights - Main Stylesheet */
/* Session 3: Mobile support added */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: 'Courier New', monospace;
    /* Session 3: Prevent mobile browser behaviors */
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

#gameCanvas {
    display: block;
    margin: 0 auto;
    background-color: #111;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    /* Session 3: Prevent canvas touch behaviors */
    touch-action: none;
}

/* Prevent text selection on canvas */
#gameCanvas {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* Disable pull-to-refresh on mobile */
body {
    overscroll-behavior: none;
}

/* Session 3: Mobile portrait mode is now the default for touch devices */

/* Game container for portrait mode layout */
#gameContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    height: 100%;
}

/* Control canvas for portrait mode Game Boy-style controls */
#controlCanvas {
    display: none;
    background-color: #1a1a24;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

/* Session 3: Mobile-specific adjustments */
@media screen and (max-width: 1024px) and (pointer: coarse) {
    /* Ensure canvas fills available space on touch devices */
    #gameCanvas {
        max-width: 100vw;
        max-height: 100vh;
    }
}

/* Portrait mode on mobile: show control canvas */
@media screen and (orientation: portrait) and (pointer: coarse) {
    #controlCanvas {
        display: block;
        width: 100%;
    }
}
    </style>

// Maduro Nights - Event Bus
// Global event system for decoupled communication between systems

class EventBus {
    constructor() {
        this.listeners = new Map();
    }

    /**
     * Subscribe to an event
     * @param {string} event - Event name
     * @param {Function} handler - Callback function
     * @returns {Function} Unsubscribe function
     */
    on(event, handler) {
        if (!this.listeners.has(event)) {
            this.listeners.set(event, new Set());
        }
        this.listeners.get(event).add(handler);

        // Return unsubscribe function
        return () => this.off(event, handler);
    }

    /**
     * Subscribe to an event once
     * @param {string} event - Event name
     * @param {Function} handler - Callback function
     */
    once(event, handler) {
        const wrapper = (data) => {
            this.off(event, wrapper);
            handler(data);
        };
        this.on(event, wrapper);
    }

    /**
     * Unsubscribe from an event
     * @param {string} event - Event name
     * @param {Function} handler - Callback function
     */
    off(event, handler) {
        if (this.listeners.has(event)) {
            this.listeners.get(event).delete(handler);
        }
    }

    /**
     * Emit an event
     * @param {string} event - Event name
     * @param {*} data - Data to pass to handlers
     */
    emit(event, data) {
        if (this.listeners.has(event)) {
            this.listeners.get(event).forEach(handler => {
                try {
                    handler(data);
                } catch (error) {
                    console.error(`Error in event handler for ${event}:`, error);
                }
            });
        }
    }

    /**
     * Clear all listeners for an event or all events
     * @param {string} [event] - Optional event name
     */
    clear(event) {
        if (event) {
            this.listeners.delete(event);
        } else {
            this.listeners.clear();
        }
    }
}

// Maduro Nights - Renderer
// Canvas 2D rendering with programmatic sprite drawing
// Session 2: Vision cone rendering and alert state indicators
// Session 4: Attack animations and enhanced state indicators
// Session 6: Metal Gear NES-style pixel art upgrade

// Transparent pixel constant for pixel art arrays
const _ = null;

class Renderer {
    constructor(canvas, ctx) {
        this.canvas = canvas;
        this.ctx = ctx;

        // Pre-render sprites to offscreen canvases for performance
        this.spriteCache = new Map();

        // Pixel size (1 = true pixel rendering for detailed 32x32 sprites)
        this.pixelSize = 1;

        // Animation frame tracking
        this.animFrame = 0;
        this.lastAnimTime = 0;

        this.initSprites();
    }

    /**
     * Initialize all programmatic sprites
     */
    initSprites() {
        this.createPlayerSprites();       // Metal Gear style Snake
        this.createGuardSprites();        // Military soldier style
        this.createTileSprites();         // Industrial environment
        this.createAlertIndicators();     // Session 2
        this.createEnvironmentSprites();  // Session 5: Doors, cover, keys
        this.createObjectiveMarker();     // Session 5
        this.createEliteGuardSprites();   // Session 8: Elite guards
        this.createBossSprites();         // Session 8: Boss sprites
        this.createProjectileSprites();   // Session 8: Tranquilizer dart
    }

    /**
     * Create an offscreen canvas for sprite caching
     * @param {number} width
     * @param {number} height
     * @returns {HTMLCanvasElement}
     */
    createOffscreenCanvas(width, height) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        return canvas;
    }

    /**
     * Draw a single "pixel" block (NES-style chunky pixel)
     * @param {CanvasRenderingContext2D} ctx
     * @param {number} x - Grid x position
     * @param {number} y - Grid y position
     * @param {string} color - Fill color
     */
    drawPixel(ctx, x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * this.pixelSize, y * this.pixelSize, this.pixelSize, this.pixelSize);
    }

    /**
     * Draw a sprite from a pixel art array
     * @param {CanvasRenderingContext2D} ctx
     * @param {string[][]} pixels - 2D array of color codes (null = transparent)
     * @param {number} offsetX - X offset in pixels
     * @param {number} offsetY - Y offset in pixels
     */
    drawPixelArt(ctx, pixels, offsetX = 0, offsetY = 0) {
        for (let y = 0; y < pixels.length; y++) {
            for (let x = 0; x < pixels[y].length; x++) {
                const color = pixels[y][x];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        offsetX + x * this.pixelSize,
                        offsetY + y * this.pixelSize,
                        this.pixelSize,
                        this.pixelSize
                    );
                }
            }
        }
    }

    /**

    createGateSprites(floorCanvas) {
        const tileSize = CONSTANTS.TILE.SIZE;

        // Gate colors
        const GB = CONSTANTS.COLORS.GATE_BAR;        // Bar main
        const GD = CONSTANTS.COLORS.GATE_BAR_DARK;   // Bar shadow
        const GK = CONSTANTS.COLORS.GATE_KEYSLOT;    // Keyslot gold
        const GH = CONSTANTS.COLORS.GATE_KEYSLOT_HOLE; // Keyhole dark
        const GH2 = '#3a3020';  // Keyhole lighter
        const GB2 = '#6a3a1a';  // Bar highlight
        const FL = CONSTANTS.COLORS.FLOOR;           // Floor for open gate

        // Gate bar section - vertical rusty metal bars - 32x32
        const gateBarCanvas = this.createOffscreenCanvas(tileSize, tileSize);
        const gateBarCtx = gateBarCanvas.getContext('2d');
        gateBarCtx.drawImage(floorCanvas, 0, 0);

        // Draw 4 vertical bars spanning the tile
        for (let barX = 2; barX < 32; barX += 8) {
            // Bar shadow
            gateBarCtx.fillStyle = GD;
            gateBarCtx.fillRect(barX + 4, 0, 2, 32);
            // Bar main body
            gateBarCtx.fillStyle = GB;
            gateBarCtx.fillRect(barX, 0, 4, 32);
            // Bar highlight
            gateBarCtx.fillStyle = GB2;
            gateBarCtx.fillRect(barX, 0, 1, 32);
            // Rust spots (pixel details)
            gateBarCtx.fillStyle = GD;
            gateBarCtx.fillRect(barX + 1, 4, 2, 2);
            gateBarCtx.fillRect(barX + 2, 14, 1, 3);
            gateBarCtx.fillRect(barX + 1, 24, 2, 2);
        }
        // Horizontal crossbars
        gateBarCtx.fillStyle = GD;
        gateBarCtx.fillRect(0, 6, 32, 3);
        gateBarCtx.fillRect(0, 23, 32, 3);
        gateBarCtx.fillStyle = GB;
        gateBarCtx.fillRect(0, 7, 32, 2);

        gateKeyslotCtx.drawImage(floorCanvas, 0, 0);

            gateKeyslotCtx.fillRect(barX, 0, 1, 32);

        for (let barX = 26; barX < 32; barX += 8) {
            gateKeyslotCtx.fillStyle = GD;
            gateKeyslotCtx.fillRect(barX + 4, 0, 2, 32);
            gateKeyslotCtx.fillStyle = GB;
            gateKeyslotCtx.fillRect(barX, 0, 4, 32);
            gateKeyslotCtx.fillStyle = GB2;
            gateKeyslotCtx.fillRect(barX, 0, 1, 32);

        // Central keyslot panel
        gateKeyslotCtx.fillStyle = '#2a2a2a';
        gateKeyslotCtx.fillRect(8, 4, 16, 24);
        gateKeyslotCtx.fillStyle = GK;
        gateKeyslotCtx.fillRect(9, 5, 14, 22);

        gateKeyslotCtx.fillRect(14, 18, 4, 4);
        gateKeyslotCtx.fillStyle = '#cc1010';
        gateKeyslotCtx.fillRect(15, 19, 2, 2);

            [_, _, _, _, G1, G1, Y1, Y1, Y1, Y3, Y3, Y3, Y3, Y3, Y3, Y1, Y1, Y1, G1, G1, _, _, _, _],
            [_, _, _, _, _, G1, G1, Y1, Y1, Y1, Y3, Y3, Y3, Y3, Y1, Y1, Y1, G1, G1, _, _, _, _, _],
            [_, _, _, _, _, _, G1, G1, Y1, Y1, Y1, Y3, Y3, Y1, Y1, Y1, G1, G1, _, _, _, _, _, _],
            [_, _, _, _, _, _, _, G1, G1, Y1, Y1, Y1, Y1, Y1, Y1, G1, G1, _, _, _, _, _, _, _],
            [_, _, _, _, _, _, _, _, G1, G1, Y1, Y1, Y1, Y1, G1, G1, _, _, _, _, _, _, _, _],
            [_, _, _, _, _, _, _, _, _, G1, G1, Y1, Y1, G1, G1, _, _, _, _, _, _, _, _, _],
            [_, _, _, _, _, _, _, _, _, _, G1, G1, G1, G1, _, _, _, _, _, _, _, _, _, _],
        ];
        this.drawPixelArt(ctx, markerPixels, 0, 0);

        this.spriteCache.set('objective_marker', canvas);
    }

    /**
     * Clear the canvas
     */
    clear() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    }

    /**
     * Render the tilemap
     * @param {Tilemap} tilemap
     * @param {boolean} extractionActive - Session 5: Whether extraction is available
     */
    renderTilemap(tilemap, extractionActive = true) {
        const tileSize = CONSTANTS.TILE.SIZE;
        const map = tilemap.getMap();
        const TYPES = CONSTANTS.TILE.TYPES;

        for (let y = 0; y < map.length; y++) {
            for (let x = 0; x < map[y].length; x++) {
                const tileType = map[y][x];
                let sprite;

                switch (tileType) {
                    case TYPES.WALL:
                        sprite = this.spriteCache.get('wall');
                        break;
                    case TYPES.EXTRACTION_ZONE:
                        // Session 5: Show locked extraction if not active
                        sprite = extractionActive ?
                            this.spriteCache.get('extraction') :
                            this.spriteCache.get('extraction_locked');
                        break;
                    // Session 5: New tile types
                    case TYPES.DOOR_CLOSED:
                        sprite = this.spriteCache.get('door_closed');
                        break;
                    case TYPES.DOOR_OPEN:
                        sprite = this.spriteCache.get('door_open');
                        break;
                    case TYPES.DOOR_LOCKED:
                        sprite = this.spriteCache.get('door_locked');
                        break;
                    case TYPES.COVER_CRATE:
                        sprite = this.spriteCache.get('cover_crate');
                        break;
                    case TYPES.COVER_DESK:
                        sprite = this.spriteCache.get('cover_desk');
                        break;
                    case TYPES.KEY_ITEM:
                        sprite = this.spriteCache.get('key_item');
                        break;
                    case TYPES.OBJECTIVE_TARGET:
                        sprite = this.spriteCache.get('objective_target');
                        break;
                    // Session 8: Gate tiles
                    case TYPES.GATE_BAR:
                        sprite = this.spriteCache.get('gate_bar');
                        break;
                    case TYPES.GATE_KEYSLOT:
                        sprite = this.spriteCache.get('gate_keyslot');
                        break;
                    case TYPES.GATE_OPEN:
                        sprite = this.spriteCache.get('gate_open');
                        break;
                    // Session 7: Security system tiles
                    case TYPES.CAMERA:
                        sprite = this.spriteCache.get('camera');
                        break;
                    case TYPES.ALARM_PANEL:
                        sprite = this.spriteCache.get('alarm_panel');
                        break;
                    case TYPES.ALARM_PANEL_DISABLED:
                        sprite = this.spriteCache.get('alarm_panel_disabled');
                        break;
                    // Session 8: Tranquilizer gun item
                    case TYPES.TRANQ_GUN_ITEM:
                        sprite = this.spriteCache.get('tranq_gun_item');
                        break;
                    default:
                        sprite = this.spriteCache.get('floor');
                }

                if (sprite) {
                    this.ctx.drawImage(sprite, x * tileSize, y * tileSize);
                }
            }
        }

        // Animate extraction zone pulse (only if active)
        if (extractionActive) {
            this.renderExtractionPulse(tilemap);
        }

        // Session 5: Animate keys with subtle pulse
        this.renderKeyPulse(tilemap);
    }

    /**
     * Session 5/6: Render pulsing effect on key items - 8-bit style
     * @param {Tilemap} tilemap
     */
    renderKeyPulse(tilemap) {
        const tileSize = CONSTANTS.TILE.SIZE;
        const map = tilemap.getMap();
        const p = this.pixelSize;
        const pulse = Math.floor((Math.sin(Date.now() / 400) + 1) * 2); // 0-3 for stepped animation

        for (let y = 0; y < map.length; y++) {
            for (let x = 0; x < map[y].length; x++) {
                if (map[y][x] === CONSTANTS.TILE.TYPES.KEY_ITEM) {
                    const cx = x * tileSize + tileSize / 2;
                    const cy = y * tileSize + tileSize / 2;

                    // Draw pixelated glow rings
                    this.ctx.fillStyle = 'rgba(255, 255, 0, 0.2)';
                    const radius = 4 + pulse;
                    for (let px = -radius; px <= radius; px++) {
                        for (let py = -radius; py <= radius; py++) {
                            const dist = Math.abs(px) + Math.abs(py); // Manhattan distance for diamond shape
                            if (dist === radius || dist === radius - 1) {
                                this.ctx.fillRect(
                                    cx + px * p - p / 2,
                                    cy + py * p - p / 2,
                                    p, p
                                );
                            }
                        }
                    }
                }
            }
        }
    }

    /**
     * Session 5: Render objective marker above target position
     * @param {Object} objective - Current objective with position
     */
    renderObjectiveMarker(objective) {
        if (!objective || !objective.position) return;
        if (objective.type === CONSTANTS.OBJECTIVES.TYPES.REACH_EXTRACTION) return; // Don't show for extraction

        const marker = this.spriteCache.get('objective_marker');
        if (!marker) return;

        const tileSize = CONSTANTS.TILE.SIZE;
        const worldX = objective.position.x * tileSize + tileSize / 2;
        const worldY = objective.position.y * tileSize;

        // Floating animation
        const float = Math.sin(Date.now() / 300) * 4;

        // Center the 24x24 marker above the tile
        this.ctx.drawImage(marker, worldX - 12, worldY - 32 + float);
    }

    /**
     * Render pulsing effect on extraction zones - Military helipad style
     * Features: Corner beacon flashing, subtle landing light glow
     * @param {Tilemap} tilemap
     */
    renderExtractionPulse(tilemap) {
        const tileSize = CONSTANTS.TILE.SIZE;
        const map = tilemap.getMap();
        const p = this.pixelSize;
        const time = Date.now();

        // Beacon flash cycle - alternating corners (military strobe effect)
        const beaconPhase = Math.floor(time / 300) % 4;
        // Glow intensity for smooth pulsing
        const glowIntensity = (Math.sin(time / 400) + 1) / 2; // 0 to 1

        for (let y = 0; y < map.length; y++) {
            for (let x = 0; x < map[y].length; x++) {
                if (map[y][x] === CONSTANTS.TILE.TYPES.EXTRACTION_ZONE) {
                    const tx = x * tileSize;
                    const ty = y * tileSize;

                    // Corner beacon positions (3x3 pixels each)
                    const beaconSize = 3 * p;
                    const corners = [
                        { x: tx, y: ty },                                    // Top-left
                        { x: tx + tileSize - beaconSize, y: ty },           // Top-right
                        { x: tx, y: ty + tileSize - beaconSize },           // Bottom-left
                        { x: tx + tileSize - beaconSize, y: ty + tileSize - beaconSize } // Bottom-right
                    ];

                    // Draw flashing corner beacons (2 opposite corners flash together)
                    corners.forEach((corner, i) => {
                        // Corners 0,3 flash together, corners 1,2 flash together
                        const isActive = (beaconPhase < 2) ? (i === 0 || i === 3) : (i === 1 || i === 2);

                        if (isActive) {
                            // Bright beacon
                            this.ctx.fillStyle = '#60ff60';
                            this.ctx.fillRect(corner.x, corner.y, beaconSize, beaconSize);
                            // Hot center
                            this.ctx.fillStyle = '#ffffff';
                            this.ctx.fillRect(corner.x + p, corner.y + p, p, p);
                        } else {
                            // Dim beacon (standby)
                            this.ctx.fillStyle = '#206020';
                            this.ctx.fillRect(corner.x, corner.y, beaconSize, beaconSize);
                        }
                    });

                    // Subtle inner glow effect (landing zone active indicator)
                    const glowAlpha = 0.15 + glowIntensity * 0.15;
                    this.ctx.fillStyle = `rgba(64, 255, 64, ${glowAlpha})`;
                    this.ctx.fillRect(tx + 4 * p, ty + 4 * p, tileSize - 8 * p, tileSize - 8 * p);
                }
            }
        }
    }

    /**
     * Render the player
     * @param {Player} player
     */
    renderPlayer(player) {
        // Session 4: Don't render if dead
        if (player.isDead) return;

        // Session 8: Choose sprite based on movement mode AND facing direction
        const stance = player.isCrouching && player.isCrouching() ? 'player_crouch' : 'player';
        const facing = player.getFacing ? player.getFacing() : 'down';
        const spriteName = `${stance}_${facing}`;
        const sprite = this.spriteCache.get(spriteName);

        if (sprite) {
            const x = player.x - CONSTANTS.PLAYER.SIZE / 2;
            const y = player.y - CONSTANTS.PLAYER.SIZE / 2;

            this.ctx.save();

            // Session 4: Invincibility flash effect
            if (player.isInvincible && player.isInvincible()) {
                if (Math.floor(Date.now() / 80) % 2 === 0) {
                    this.ctx.globalAlpha = 0.5;
                }
            }

            // Session 2: Visual feedback for running (slight scale effect)
            if (player.isRunning && player.isRunning()) {
                this.ctx.translate(player.x, player.y);
                const runPulse = 1 + Math.sin(Date.now() / 100) * 0.05;
                this.ctx.scale(runPulse, runPulse);
                this.ctx.drawImage(sprite, -CONSTANTS.PLAYER.SIZE / 2, -CONSTANTS.PLAYER.SIZE / 2);
            } else {
                this.ctx.drawImage(sprite, x, y);
            }

            this.ctx.restore();

            // Session 4: Render attack effect
            if (player.isAttacking) {
                this.renderPlayerAttack(player);
            }

            // Session 8: Render shotgun if player has upgrade
            if (player.hasShotgun && player.hasShotgun()) {
                this.renderPlayerShotgun(player);
            }
        }
    }

    /**
     * Session 4/6: Render player attack visual effect - knife thrust
     * @param {Player} player
     */
    renderPlayerAttack(player) {
        const attackRange = CONSTANTS.COMBAT.PLAYER.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        const facing = player.getFacing();
        const p = this.pixelSize;

        this.ctx.save();
        this.ctx.translate(player.x, player.y);

        // Rotate based on facing direction
        switch (facing) {
            case 'right': this.ctx.rotate(0); break;
            case 'down': this.ctx.rotate(Math.PI / 2); break;
            case 'left': this.ctx.rotate(Math.PI); break;
            case 'up': this.ctx.rotate(-Math.PI / 2); break;
        }

        // Knife thrust animation - extends out and retracts
        const progress = 1 - (player.attackTimer / CONSTANTS.COMBAT.PLAYER.ATTACK_DURATION);
        // Quick thrust out, slower retract
        const thrustDist = progress < 0.4
            ? (progress / 0.4) * attackRange * 0.8
            : (1 - (progress - 0.4) / 0.6) * attackRange * 0.8;

        const knifeLength = 12;
        const knifeWidth = 4;
        const handleLength = 4;

        // Offset from player center
        const baseX = 6;

        // Draw knife handle (brown)
        this.ctx.fillStyle = '#8B4513';
        this.ctx.fillRect(baseX + thrustDist - handleLength, -p, handleLength, p * 2);

        // Draw knife blade (silver/white gradient effect)
        this.ctx.fillStyle = '#c0c0c0';
        this.ctx.fillRect(baseX + thrustDist, -knifeWidth / 2, knifeLength - 2, knifeWidth);

        // Blade highlight
        this.ctx.fillStyle = '#ffffff';
        this.ctx.fillRect(baseX + thrustDist, -knifeWidth / 2, knifeLength - 2, p);

        // Blade tip (pointed)
        this.ctx.fillStyle = '#d0d0d0';
        this.ctx.beginPath();
        this.ctx.moveTo(baseX + thrustDist + knifeLength - 2, -knifeWidth / 2);
        this.ctx.lineTo(baseX + thrustDist + knifeLength + 4, 0);
        this.ctx.lineTo(baseX + thrustDist + knifeLength - 2, knifeWidth / 2);
        this.ctx.closePath();
        this.ctx.fill();

        // Tip highlight
        this.ctx.fillStyle = '#ffffff';
        this.ctx.beginPath();
        this.ctx.moveTo(baseX + thrustDist + knifeLength - 2, -knifeWidth / 2);
        this.ctx.lineTo(baseX + thrustDist + knifeLength + 2, -1);
        this.ctx.lineTo(baseX + thrustDist + knifeLength - 2, 0);
        this.ctx.closePath();
        this.ctx.fill();

        this.ctx.restore();
    }

    /**
     * Session 8: Render player's shotgun (held weapon) and muzzle flash
     * @param {Player} player
     */
    renderPlayerShotgun(player) {
        const facing = player.getFacing();
        const p = this.pixelSize;

        this.ctx.save();
        this.ctx.translate(player.x, player.y);

        // Rotate based on facing direction
        switch (facing) {
            case 'right': this.ctx.rotate(0); break;
            case 'down': this.ctx.rotate(Math.PI / 2); break;
            case 'left': this.ctx.rotate(Math.PI); break;
            case 'up': this.ctx.rotate(-Math.PI / 2); break;
        }

        // Shotgun dimensions
        const stockLength = 10;
        const bodyLength = 16;
        const barrelLength = 12;
        const totalLength = stockLength + bodyLength + barrelLength;
        const shotgunHeight = 6;

        // Position offset from player center
        const baseX = 8;
        const baseY = -3;

        // Draw stock (brown wood)
        this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_STOCK;
        this.ctx.fillRect(baseX - stockLength, baseY, stockLength, shotgunHeight);

        // Stock grip detail
        this.ctx.fillStyle = '#4a3020';
        this.ctx.fillRect(baseX - stockLength + 2, baseY + 1, 2, shotgunHeight - 2);

        // Draw body (dark grey metal)
        this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_BODY;
        this.ctx.fillRect(baseX, baseY, bodyLength, shotgunHeight);

        // Body highlight
        this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_HIGHLIGHT;
        this.ctx.fillRect(baseX, baseY, bodyLength, p);

        // Draw barrel (darker)
        this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_BARREL;
        this.ctx.fillRect(baseX + bodyLength, baseY + 1, barrelLength, shotgunHeight - 2);

        // Barrel highlight
        this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_HIGHLIGHT;
        this.ctx.fillRect(baseX + bodyLength, baseY + 1, barrelLength, p);

        // Barrel muzzle (end)
        this.ctx.fillStyle = '#1a1a2a';
        this.ctx.fillRect(baseX + bodyLength + barrelLength - 2, baseY + 1, 2, shotgunHeight - 2);

        // Session 8: Muzzle flash effect when firing
        if (player.isFiringShotgun) {
            const flashProgress = player.shotgunTimer / CONSTANTS.SHOTGUN.MUZZLE_FLASH_DURATION;
            const flashSize = 20 * flashProgress;
            const muzzleX = baseX + totalLength;
            const muzzleY = baseY + shotgunHeight / 2;

            // Draw muzzle flash
            this.ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_MUZZLE_FLASH;
            this.ctx.globalAlpha = flashProgress * 0.9;

            // Main flash
            this.ctx.beginPath();
            this.ctx.moveTo(muzzleX, muzzleY);
            this.ctx.lineTo(muzzleX + flashSize * 1.5, muzzleY - flashSize * 0.3);
            this.ctx.lineTo(muzzleX + flashSize * 1.8, muzzleY);
            this.ctx.lineTo(muzzleX + flashSize * 1.5, muzzleY + flashSize * 0.3);
            this.ctx.closePath();
            this.ctx.fill();

            // Inner bright flash
            this.ctx.fillStyle = '#ffffff';
            this.ctx.globalAlpha = flashProgress;
            this.ctx.beginPath();
            this.ctx.arc(muzzleX + 2, muzzleY, flashSize * 0.4, 0, Math.PI * 2);
            this.ctx.fill();

            this.ctx.globalAlpha = 1;
        }

        this.ctx.restore();
    }

    /**
     * Session 8: Render shotgun pellet spread (called from game for active pellets)
     * @param {Object} data - { x, y, pellets, progress, range }
     */
    renderShotgunPellets(data) {
        if (!data || !data.pellets) return;

        const ctx = this.ctx;
        const tileSize = CONSTANTS.TILE.SIZE;
        const pelletSize = CONSTANTS.SHOTGUN.PELLET_SIZE;
        const maxRange = data.range * tileSize;

        ctx.save();

        data.pellets.forEach((pellet) => {
            // Calculate current pellet position based on progress
            const dist = data.progress * maxRange;
            const pelletX = data.x + pellet.dx * dist;
            const pelletY = data.y + pellet.dy * dist;

            // Draw pellet trail
            ctx.strokeStyle = CONSTANTS.COLORS.SHOTGUN_TRAIL;
            ctx.lineWidth = 2;
            ctx.beginPath();
            const trailLength = Math.min(dist, 20);
            ctx.moveTo(pelletX - pellet.dx * trailLength, pelletY - pellet.dy * trailLength);
            ctx.lineTo(pelletX, pelletY);
            ctx.stroke();

            // Draw pellet
            ctx.fillStyle = CONSTANTS.COLORS.SHOTGUN_PELLET;
            ctx.beginPath();
            ctx.arc(pelletX, pelletY, pelletSize / 2, 0, Math.PI * 2);
            ctx.fill();

            // Bright center
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(pelletX, pelletY, pelletSize / 4, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.restore();
    }

    /**
     * Render a guard
     * @param {Guard} guard
     */
    renderGuard(guard) {
        const size = CONSTANTS.GUARD.SIZE;
        // Session 8: Choose sprite based on facing direction
        const facing = guard.facing || 'down';
        const sprite = this.spriteCache.get(`guard_${facing}`);

        if (sprite) {
            // Session 8: Render sleeping guards rotated (lying down)
            if (guard.isSleeping) {
                this.ctx.save();
                this.ctx.translate(guard.x, guard.y);
                this.ctx.rotate(Math.PI / 2); // Rotate 90 degrees (lying down)
                this.ctx.globalAlpha = 0.8;
                this.ctx.drawImage(sprite, -size / 2, -size / 2);
                this.ctx.restore();

                // Render sleep ZZZ effect
                this.renderGuardSleepEffect(guard);
                return; // Don't render state indicators for sleeping guards
            }

            const x = guard.x - size / 2;
            const y = guard.y - size / 2;
            this.ctx.drawImage(sprite, x, y);
        }

        // Session 2: Render alert state indicators
        this.renderGuardStateIndicator(guard);
    }

    /**
     * Session 8: Render elite guard
     * @param {EliteGuard} elite
     */
    renderEliteGuard(elite) {
        const size = CONSTANTS.ELITE_GUARD.SIZE;
        // Session 8: Choose sprite based on facing direction
        const facing = elite.facing || 'down';
        const sprite = this.spriteCache.get(`elite_guard_${facing}`);

        if (sprite) {
            // Session 8: Render sleeping elite guards rotated (lying down)
            if (elite.isSleeping) {
                this.ctx.save();
                this.ctx.translate(elite.x, elite.y);
                this.ctx.rotate(Math.PI / 2); // Rotate 90 degrees (lying down)
                this.ctx.globalAlpha = 0.8;
                this.ctx.drawImage(sprite, -size / 2, -size / 2);
                this.ctx.restore();

                // Render sleep ZZZ effect
                this.renderGuardSleepEffect(elite);
                return; // Don't render state indicators for sleeping guards
            }

            const x = elite.x - size / 2;
            const y = elite.y - size / 2;
            this.ctx.drawImage(sprite, x, y);
        }

        // Render alert state indicators (same as regular guard)
        this.renderGuardStateIndicator(elite);
    }

    /**
     * Session 8: Render sleeping ZZZ effect for guards
     * @param {Guard|EliteGuard} guard
     */
    renderGuardSleepEffect(guard) {
        const size = guard.isElite ? CONSTANTS.ELITE_GUARD.SIZE : CONSTANTS.GUARD.SIZE;
        const time = Date.now() / 500;

        this.ctx.fillStyle = CONSTANTS.COLORS.MADURO_ZZZ || '#88ccff';
        this.ctx.font = 'bold 12px monospace';
        this.ctx.textAlign = 'center';

        // Animated ZZZ floating upward
        const baseX = guard.x + size / 2;
        const baseY = guard.y - size / 2 - 5;

        // Three Z's at different heights/phases
        for (let i = 0; i < 3; i++) {
            const offset = (time + i * 0.5) % 2;
            const alpha = 1 - offset * 0.5;
            const yOffset = offset * 12;

            this.ctx.globalAlpha = alpha;
            this.ctx.fillText('Z', baseX + i * 6, baseY - yOffset);
        }

        this.ctx.globalAlpha = 1.0;
    }

    /**
     * Session 8: Render boss entity
     * @param {Boss} boss
     */
    renderBoss(boss) {
        // Determine which sprite to use based on boss type and facing direction
        const facing = boss.facing || 'down';
        const spriteKey = boss.isFinalBoss ? `boss_maduro_${facing}` : `boss_captain_${facing}`;
        const sprite = this.spriteCache.get(spriteKey);
        const size = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
        const x = boss.x - size / 2;
        const y = boss.y - size / 2;

        if (sprite) {
            // Session 8: Apply sleeping effect (rotate and overlay)
            if (boss.isSleeping) {
                this.ctx.save();
                this.ctx.translate(boss.x, boss.y);
                this.ctx.rotate(Math.PI / 2); // Rotate 90 degrees (lying down)
                this.ctx.globalAlpha = 0.8;
                this.ctx.drawImage(sprite, -size / 2, -size / 2);
                this.ctx.restore();

                // Blue sleeping overlay
                this.ctx.fillStyle = CONSTANTS.COLORS.MADURO_SLEEPING_OVERLAY;
                this.ctx.fillRect(x, y, size, size);
            } else {
                this.ctx.drawImage(sprite, x, y);
            }
        }

        // Session 8: Render sleep ZZZ effect if sleeping
        if (boss.isSleeping) {
            this.renderSleepEffect(boss);
        } else {
            // Render boss health bar (only if not sleeping)
            this.renderBossHealthBar(boss);

            // Render stun effect if stunned
            if (boss.isStunned) {
                this.renderStunEffect(boss);
            }

            // Render phase indicator for Maduro
            if (boss.isFinalBoss && boss.phase > 1) {
                this.renderPhaseIndicator(boss);
            }
        }

        // Session 8: Render drag indicator if being dragged
        if (boss.isBeingDragged) {
            this.renderDragIndicator(boss);
        }
    }

    /**
     * Session 8: Render sleeping ZZZ effect
     * @param {Object} boss
     */
    renderSleepEffect(boss) {
        const size = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
        const time = Date.now() / 500;

        this.ctx.fillStyle = CONSTANTS.COLORS.MADURO_ZZZ;
        this.ctx.font = 'bold 14px monospace';
        this.ctx.textAlign = 'center';

        // Animated ZZZ floating upward
        const baseX = boss.x + size / 2;
        const baseY = boss.y - size / 2 - 10;

        // Three Z's at different heights/phases
        for (let i = 0; i < 3; i++) {
            const offset = (time + i * 0.5) % 2;
            const alpha = 1 - offset * 0.5;
            const yOffset = offset * 15;

            this.ctx.globalAlpha = alpha;
            this.ctx.fillText('Z', baseX + i * 8, baseY - yOffset);
        }

        this.ctx.globalAlpha = 1;
        this.ctx.textAlign = 'left';

        // "SLEEPING" label
        this.ctx.fillStyle = '#80c0ff';
        this.ctx.font = '10px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('SLEEPING', boss.x, boss.y - size / 2 - 25);
        this.ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render drag indicator showing player is dragging the boss
     * @param {Object} boss
     */
    renderDragIndicator(boss) {
        const size = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;

        // Pulsing drag indicator
        const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;

        this.ctx.strokeStyle = `rgba(255, 255, 100, ${pulse})`;
        this.ctx.lineWidth = 3;
        this.ctx.setLineDash([5, 5]);
        this.ctx.strokeRect(
            boss.x - size / 2 - 4,
            boss.y - size / 2 - 4,
            size + 8,
            size + 8
        );
        this.ctx.setLineDash([]);

        // "DRAGGING" label
        this.ctx.fillStyle = '#ffff80';
        this.ctx.font = 'bold 10px monospace';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('DRAGGING', boss.x, boss.y + size / 2 + 15);
        this.ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render boss health bar above boss
     * @param {Boss} boss
     */
    renderBossHealthBar(boss) {
        const size = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
        const maxHealth = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.MAX_HEALTH : CONSTANTS.BOSS.CAPTAIN.MAX_HEALTH;
        const currentHealth = boss.health;

        const barWidth = size + 16;
        const barHeight = 6;
        const x = boss.x - barWidth / 2;
        const y = boss.y - size / 2 - 14;

        // Background
        this.ctx.fillStyle = '#333';
        this.ctx.fillRect(x, y, barWidth, barHeight);

        // Health fill
        const healthPercent = Math.max(0, currentHealth / maxHealth);
        const healthColor = healthPercent > 0.5 ? CONSTANTS.COLORS.BOSS_HEALTH :
                           healthPercent > 0.25 ? '#ff8800' : '#ff0000';
        this.ctx.fillStyle = healthColor;
        this.ctx.fillRect(x, y, barWidth * healthPercent, barHeight);

        // Border
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = 1;
        this.ctx.strokeRect(x, y, barWidth, barHeight);

        // Boss name label
        this.ctx.fillStyle = '#fff';
        this.ctx.font = '10px monospace';
        this.ctx.textAlign = 'center';
        const name = boss.isFinalBoss ? 'MADURO' : 'CAPTAIN';
        this.ctx.fillText(name, boss.x, y - 4);
        this.ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render stun effect around stunned boss
     * @param {Boss} boss
     */
    renderStunEffect(boss) {
        const size = boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
        const time = Date.now() / 100;

        // Draw spinning stars around boss
        this.ctx.strokeStyle = '#ffff00';
        this.ctx.lineWidth = 2;

        for (let i = 0; i < 3; i++) {
            const angle = time + (i * Math.PI * 2 / 3);
            const radius = size / 2 + 8;
            const starX = boss.x + Math.cos(angle) * radius;
            const starY = boss.y - size / 4 + Math.sin(angle) * radius * 0.5;

            // Draw small star
            this.ctx.beginPath();
            this.ctx.moveTo(starX - 3, starY);
            this.ctx.lineTo(starX + 3, starY);
            this.ctx.moveTo(starX, starY - 3);
            this.ctx.lineTo(starX, starY + 3);
            this.ctx.stroke();
        }
    }

    /**
     * Session 8: Render phase indicator for Maduro (enraged glow)
     * @param {MaduroBoss} boss
     */
    renderPhaseIndicator(boss) {
        const size = CONSTANTS.BOSS.MADURO.SIZE;

        // Enraged glow effect in phase 3
        if (boss.phase >= 3) {
            const pulseAlpha = 0.3 + Math.sin(Date.now() / 100) * 0.2;
            this.ctx.fillStyle = `rgba(255, 0, 0, ${pulseAlpha})`;
            this.ctx.beginPath();
            this.ctx.arc(boss.x, boss.y, size / 2 + 10, 0, Math.PI * 2);
            this.ctx.fill();
        }
    }

    /**
     * Session 8: Render projectile (tranquilizer dart or boss knife)
     * @param {Projectile} projectile
     */
    renderProjectile(projectile) {
        const spriteKey = projectile.owner === 'player' ? 'tranquilizerDart' : 'bossKnife';
        const sprite = this.spriteCache.get(spriteKey);

        if (sprite) {
            // Calculate rotation angle from direction
            const angle = Math.atan2(projectile.dy, projectile.dx);

            this.ctx.save();
            this.ctx.translate(projectile.x, projectile.y);
            this.ctx.rotate(angle);
            this.ctx.drawImage(sprite, -sprite.width / 2, -sprite.height / 2);
            this.ctx.restore();
        } else {
            // Fallback: simple circle
            this.ctx.fillStyle = projectile.owner === 'player' ?
                CONSTANTS.COLORS.TRANQUILIZER_DART : CONSTANTS.COLORS.BOSS_KNIFE;
            this.ctx.beginPath();
            this.ctx.arc(projectile.x, projectile.y, 4, 0, Math.PI * 2);
            this.ctx.fill();
        }
    }

    /**
     * Session 2/4: Render guard alert state indicator (?, !)
     * Session 4: Added INVESTIGATING state handling
     * @param {Guard} guard
     */
    renderGuardStateIndicator(guard) {
        const state = guard.getState();
        const GUARD_STATES = CONSTANTS.GUARD.STATES;
        // Indicators are 16x24, center horizontally over guard
        const indicatorOffsetX = -8;
        const indicatorOffsetY = -CONSTANTS.GUARD.SIZE - 28;

        if (state === GUARD_STATES.SUSPICIOUS || state === GUARD_STATES.INVESTIGATING) {
            const sprite = this.spriteCache.get('suspicious');
            if (sprite) {
                // Bob up and down when suspicious
                const bob = Math.sin(Date.now() / 200) * 2;
                this.ctx.drawImage(
                    sprite,
                    guard.x + indicatorOffsetX,
                    guard.y + indicatorOffsetY + bob
                );
            }
            // Also render suspicion meter
            this.renderSuspicionMeter(guard);
        } else if (state === GUARD_STATES.ALERT) {
            const sprite = this.spriteCache.get('alert');
            if (sprite) {
                // Flash effect when fully alert
                const flash = Math.sin(Date.now() / 100) > 0;
                if (flash) {
                    this.ctx.drawImage(
                        sprite,
                        guard.x + indicatorOffsetX,
                        guard.y + indicatorOffsetY
                    );
                }
            }
        }
    }

    /**
     * Session 2: Render suspicion meter above guard
     * @param {Guard} guard
     */
    renderSuspicionMeter(guard) {
        const suspicion = guard.getSuspicion();
        if (suspicion <= 0) return;

        const meterWidth = 32;
        const meterHeight = 4;
        const x = guard.x - meterWidth / 2;
        // Position above the indicator (indicator is at -GUARD.SIZE - 28, height 24)
        const y = guard.y - CONSTANTS.GUARD.SIZE - 56;

        // Background
        this.ctx.fillStyle = CONSTANTS.COLORS.SUSPICION_METER_BG;
        this.ctx.fillRect(x, y, meterWidth, meterHeight);

        // Fill based on suspicion level
        this.ctx.fillStyle = CONSTANTS.COLORS.SUSPICION_METER_FILL;
        this.ctx.fillRect(x, y, meterWidth * suspicion, meterHeight);

        // Border
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = 1;
        this.ctx.strokeRect(x, y, meterWidth, meterHeight);
    }

    /**
     * Session 2/4: Render guard vision cone
     * Session 4: Added INVESTIGATING state handling
     * @param {Guard} guard
     * @param {boolean} debug - If true, always show. If false, only show during detection
     */
    renderVisionCone(guard, debug = false) {
        const params = guard.getVisionConeParams();
        const state = guard.getState();
        const GUARD_STATES = CONSTANTS.GUARD.STATES;

        // Determine color based on state
        let color;
        if (state === GUARD_STATES.ALERT) {
            color = CONSTANTS.COLORS.VISION_CONE_ALERT;
        } else if (state === GUARD_STATES.SUSPICIOUS || state === GUARD_STATES.INVESTIGATING) {
            color = CONSTANTS.COLORS.VISION_CONE_SUSPICIOUS;
        } else {
            color = CONSTANTS.COLORS.VISION_CONE;
        }

        // Only show in debug mode when UNAWARE, or always when suspicious/alert/investigating
        if (!debug && state === GUARD_STATES.UNAWARE) {
            return;
        }

        this.ctx.save();
        this.ctx.translate(guard.x, guard.y);

        // Draw vision cone as a pie slice
        this.ctx.beginPath();
        this.ctx.moveTo(0, 0);
        this.ctx.arc(
            0, 0,
            params.range,
            params.facingAngle - params.angle / 2,
            params.facingAngle + params.angle / 2
        );
        this.ctx.closePath();

        this.ctx.fillStyle = color;
        this.ctx.fill();

        // Add edge lines for visibility
        this.ctx.strokeStyle = color.replace(/[\d.]+\)$/, '0.5)'); // Slightly more visible edge
        this.ctx.lineWidth = 1;
        this.ctx.stroke();

        this.ctx.restore();
    }

    /**
     * Session 7: Render camera vision cone
     * @param {Camera} camera
     * @param {boolean} debug - If true, always show. Otherwise only when detecting
     */
    renderCameraVisionCone(camera, debug = false) {
        // Don't render if disabled
        if (camera.isDisabled()) return;

        const coneData = camera.getVisionConeData();

        // Determine color based on state
        let color;
        if (coneData.state === CONSTANTS.CAMERA.STATES.TRIGGERED) {
            color = CONSTANTS.COLORS.CAMERA_VISION_TRIGGERED;
        } else {
            color = CONSTANTS.COLORS.CAMERA_VISION;
        }

        // Only show in debug mode when not detecting, always show when triggered
        if (!debug && coneData.state !== CONSTANTS.CAMERA.STATES.TRIGGERED) {
            return;
        }

        this.ctx.save();
        this.ctx.translate(coneData.x, coneData.y);

        // Draw vision cone as a pie slice
        this.ctx.beginPath();
        this.ctx.moveTo(0, 0);
        this.ctx.arc(
            0, 0,
            coneData.range,
            coneData.angle - coneData.coneAngle / 2,
            coneData.angle + coneData.coneAngle / 2
        );
        this.ctx.closePath();

        this.ctx.fillStyle = color;
        this.ctx.fill();

        // Add edge lines for visibility
        this.ctx.strokeStyle = color.replace(/[\d.]+\)$/, '0.5)');
        this.ctx.lineWidth = 1;
        this.ctx.stroke();

        this.ctx.restore();
    }

    /**
     * Session 8: Render facing direction indicator for Situational Awareness upgrade
     * Draws a subtle dotted line showing which way an enemy is facing
     * @param {number} x - Entity center X position
     * @param {number} y - Entity center Y position
     * @param {number} facingAngle - Direction in radians
     * @param {string} type - 'guard', 'camera', 'elite', or 'boss'
     */
    renderFacingIndicator(x, y, facingAngle, type = 'guard') {
        const tileSize = CONSTANTS.TILE.SIZE;

        // Dotted line properties - barely visible indicator
        const lineLength = tileSize * 0.6;
        const offset = tileSize * 0.4;  // Start line slightly away from center

        // Color based on entity type - subtle for difficulty
        let color;
        switch (type) {
            case 'camera':
                color = 'rgba(255, 100, 100, 0.4)';  // Reddish for cameras
                break;
            case 'elite':
            case 'boss':
                color = 'rgba(255, 180, 0, 0.22)';   // Orange for elites/boss
                break;
            default:
                color = 'rgba(255, 255, 100, 0.22)'; // Yellow for regular guards
        }

        this.ctx.save();
        this.ctx.translate(x, y);
        this.ctx.rotate(facingAngle);

        // Draw dotted line - subtle but visible
        this.ctx.beginPath();
        this.ctx.moveTo(offset, 0);
        this.ctx.lineTo(offset + lineLength, 0);
        this.ctx.strokeStyle = color;
        this.ctx.lineWidth = 2;
        this.ctx.setLineDash([4, 4]);  // Dotted pattern: 4px dash, 4px gap
        this.ctx.stroke();
        this.ctx.setLineDash([]);  // Reset dash pattern

        this.ctx.restore();
    }

    /**
     * Session 8: Render camera facing indicator for Situational Awareness upgrade
     * @param {Camera} camera
     */
    renderCameraFacingIndicator(camera) {
        if (camera.isDisabled()) return;

        const coneData = camera.getVisionConeData();
        this.renderFacingIndicator(coneData.x, coneData.y, coneData.angle, 'camera');
    }

    /**
     * Session 7: Render camera entity sprite
     * Cameras are rendered as entities since they can be destroyed
     * @param {Camera} camera
     */
    renderCamera(camera) {
        const sprite = camera.isDisabled()
            ? this.spriteCache.get('camera_disabled')
            : this.spriteCache.get('camera');

        if (sprite) {
            // Draw camera sprite centered on position
            this.ctx.drawImage(
                sprite,
                camera.x - CONSTANTS.CAMERA.SIZE / 2,
                camera.y - CONSTANTS.CAMERA.SIZE / 2
            );
        }
    }

    /**
     * Render guard detection radius (debug - legacy)
     * @param {Guard} guard
     */
    renderDetectionRadius(guard) {
        const radius = CONSTANTS.GUARD.DETECTION_RADIUS * CONSTANTS.TILE.SIZE;

        this.ctx.beginPath();
        this.ctx.arc(guard.x, guard.y, radius, 0, Math.PI * 2);
        this.ctx.fillStyle = CONSTANTS.COLORS.DEBUG_DETECTION;
        this.ctx.fill();
    }

    /**
     * Session 4: Render player noise radius in debug mode
     * Shows how far sound travels based on movement mode
     * @param {Player} player
     * @param {boolean} debug - Only render if debug mode is enabled
     */
    renderNoiseRadius(player, debug) {
        if (!debug || !player.isMoving()) return;

        const noiseRadius = player.getNoiseRadius() * CONSTANTS.TILE.SIZE;
        if (noiseRadius <= 0) return;

        const mode = player.getMovementMode();
        const color = CONSTANTS.SOUND.COLORS[mode] || CONSTANTS.SOUND.COLORS.WALK;

        this.ctx.beginPath();
        this.ctx.arc(player.x, player.y, noiseRadius, 0, Math.PI * 2);
        this.ctx.fillStyle = color;
        this.ctx.fill();

        // Add a subtle border for better visibility
        this.ctx.strokeStyle = color.replace(/[\d.]+\)$/, '0.5)');
        this.ctx.lineWidth = 1;
        this.ctx.stroke();
    }

    /**
     * Session 2: Render movement mode indicator
     * @param {Player} player
     */
    renderMovementModeIndicator(player) {
        if (!player.getMovementMode) return;

        const mode = player.getMovementMode();
        const x = 10;
        const y = this.canvas.height - 30;

        this.ctx.font = '12px monospace';
        this.ctx.textAlign = 'left';

        // Background
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        this.ctx.fillRect(x - 2, y - 12, 60, 16);

        // Mode text with color
        switch (mode) {
            case 'CROUCH':
                this.ctx.fillStyle = '#88ccff';
                break;
            case 'RUN':
                this.ctx.fillStyle = '#ffaa44';
                break;
            default:
                this.ctx.fillStyle = '#ffffff';
        }
        this.ctx.fillText(mode, x, y);
    }
}

<script>
// Maduro Nights - Input Handler
// Keyboard and touch input processing
// Session 3: Integrated touch controls support

class InputHandler {
    constructor() {
        // Key states: pressed (just pressed), held (still down), released (just released)
        this.keys = new Map();
        this.previousKeys = new Map();

        // Action states (abstracted from raw keys)
        this.actions = new Map();
        this.previousActions = new Map();

        // Session 4: Track actions that were just pressed this frame
        // This is set in onKeyDown and cleared in update()
        this.justPressedActions = new Set();

        // Session 3: Touch controls reference (set by game)
        this.touchControls = null;

        // Session 4: Touch state tracking for press detection
        this.previousTouchState = new Map();

        // Setup event listeners
        this.setupKeyboard();
    }

    /**
     * Session 3: Set touch controls reference
     * @param {TouchControls} touchControls
     */
    setTouchControls(touchControls) {
        this.touchControls = touchControls;
    }

    /**
     * Setup keyboard event listeners
     */
    setupKeyboard() {
        window.addEventListener('keydown', (e) => this.onKeyDown(e));
        window.addEventListener('keyup', (e) => this.onKeyUp(e));

        // Prevent default for game keys
        window.addEventListener('keydown', (e) => {
            const action = CONSTANTS.KEY_BINDINGS[e.code];
            if (action) {
                e.preventDefault();
            }
        });
    }

    /**
     * Handle key down events
     * @param {KeyboardEvent} e
     */
    onKeyDown(e) {
        // Debug: log key events
        console.log('Key pressed:', e.code, e.key);

        // Only mark as "just pressed" if key wasn't already held
        const wasHeld = this.keys.get(e.code);
        this.keys.set(e.code, true);

        // Map to action
        const action = CONSTANTS.KEY_BINDINGS[e.code];
        if (action) {
            // Session 4: Track "just pressed" for press detection
            if (!wasHeld) {
                this.justPressedActions.add(action);
            }
            this.actions.set(action, true);

            // Emit immediate action events for one-shot actions
            if (action === CONSTANTS.ACTIONS.PAUSE ||
                action === CONSTANTS.ACTIONS.DEBUG ||
                action === CONSTANTS.ACTIONS.INTERACT ||
                action === CONSTANTS.ACTIONS.DEBUG_SKIP_LEVEL ||
                action === CONSTANTS.ACTIONS.SWITCH_WEAPON ||
                action === CONSTANTS.ACTIONS.OPEN_SHOP) {
                if (!wasHeld) {
                    eventBus.emit(EVENTS.INPUT_ACTION, action);

                    // Special handling for debug toggle
                    if (action === CONSTANTS.ACTIONS.DEBUG) {
                        eventBus.emit(EVENTS.DEBUG_TOGGLE);
                    }
                }
            }
        }
    }

    /**
     * Handle key up events
     * @param {KeyboardEvent} e
     */
    onKeyUp(e) {
        this.keys.set(e.code, false);

        // Map to action
        const action = CONSTANTS.KEY_BINDINGS[e.code];
        if (action) {
            // Check if any other key for this action is still held
            let stillHeld = false;
            for (const [key, actionName] of Object.entries(CONSTANTS.KEY_BINDINGS)) {
                if (actionName === action && key !== e.code && this.keys.get(key)) {
                    stillHeld = true;
                    break;
                }
            }
            if (!stillHeld) {
                this.actions.set(action, false);
            }
        }
    }

    /**
     * Update input state (call once per frame)
     * IMPORTANT: Call this at the END of the frame, after all input checks
     */
    update() {
        // Store previous state for press/release detection
        this.previousKeys = new Map(this.keys);
        this.previousActions = new Map(this.actions);

        // Session 4: Clear "just pressed" actions - they've been consumed this frame
        this.justPressedActions.clear();

        // Session 4: Track touch state for press detection (for next frame)
        if (this.touchControls) {
            const currentTouchState = new Map();
            Object.values(CONSTANTS.ACTIONS).forEach(action => {
                currentTouchState.set(action, this.touchControls.isActionHeld(action));
            });
            this.previousTouchState = currentTouchState;
        }
    }

    /**
     * Check if an action is currently held
     * @param {string} action
     * @returns {boolean}
     */
    isActionHeld(action) {
        // Session 3: Check both keyboard and touch input
        const keyboardHeld = this.actions.get(action) || false;
        const touchHeld = this.touchControls?.isActionHeld(action) || false;
        return keyboardHeld || touchHeld;
    }

    /**
     * Check if an action was just pressed this frame
     * Session 4: Now checks both keyboard and touch input
     * @param {string} action
     * @returns {boolean}
     */
    isActionPressed(action) {
        // Session 4: Use justPressedActions set (populated in onKeyDown)
        const keyboardPressed = this.justPressedActions.has(action);

        // Session 4: Check touch press (current held, previous not held)
        const touchCurrentlyHeld = this.touchControls?.isActionHeld(action) || false;
        const touchPreviouslyHeld = this.previousTouchState?.get(action) || false;
        const touchPressed = touchCurrentlyHeld && !touchPreviouslyHeld;

        return keyboardPressed || touchPressed;
    }

    /**
     * Check if an action was just released this frame
     * @param {string} action
     * @returns {boolean}
     */
    isActionReleased(action) {
        return !this.actions.get(action) && this.previousActions.get(action);
    }

    /**
     * Get movement direction as a vector
     * @returns {{x: number, y: number}}
     */
    getMovementDirection() {
        let x = 0;
        let y = 0;

        if (this.isActionHeld(CONSTANTS.ACTIONS.MOVE_LEFT)) x -= 1;
        if (this.isActionHeld(CONSTANTS.ACTIONS.MOVE_RIGHT)) x += 1;
        if (this.isActionHeld(CONSTANTS.ACTIONS.MOVE_UP)) y -= 1;
        if (this.isActionHeld(CONSTANTS.ACTIONS.MOVE_DOWN)) y += 1;

        // Normalize diagonal movement
        if (x !== 0 && y !== 0) {
            const length = Math.sqrt(x * x + y * y);
            x /= length;
            y /= length;
        }

        return { x, y };
    }

    /**
     * Check if any movement key is held
     * @returns {boolean}
     */
    isMoving() {
        return this.isActionHeld(CONSTANTS.ACTIONS.MOVE_LEFT) ||
               this.isActionHeld(CONSTANTS.ACTIONS.MOVE_RIGHT) ||
               this.isActionHeld(CONSTANTS.ACTIONS.MOVE_UP) ||
               this.isActionHeld(CONSTANTS.ACTIONS.MOVE_DOWN);
    }

    // Session 3: Touch input integrated via setTouchControls()
    // Session 4: Touch press detection added for attack/interact buttons
}

// Session 4: Added Attack and Interact buttons
// Session 5: SNES-style 4-button diamond layout, modern retro handheld aesthetic

class TouchControls {

        this.canvas = gameCanvas;
        this.controlCanvas = controlCanvas;
        this.controlCtx = controlCanvas ? controlCanvas.getContext('2d') : null;
        this.enabled = false;

        // Touch state for each control
        this.touchState = {
            up: false,
            down: false,
            left: false,
            right: false,
            // SNES-style button states (A, B, X, Y)
            buttonA: false,    // Right - Attack
            buttonB: false,    // Bottom - Crouch/Sneak
            buttonX: false,    // Top - Run/Sprint
            buttonY: false,    // Left - Interact
            // Session 8: SELECT and START buttons (Game Boy style)
            buttonSelect: false,  // Select - Switch Weapon
            buttonStart: false,   // Start - Start game / Pause
            // Legacy mappings for compatibility
            crouch: false,
            attack: false,
            interact: false
        };

        // Active touches tracking
        this.activeTouches = new Map();

        // Layout mode
        this.isPortraitMode = false;
        this.controlAreaHeight = 0;

        // Control positions (will be set on layout update)
        this.dpadCenter = { x: 0, y: 0 };
        this.dpadRadius = 60;
        this.dpadInnerRadius = 20;

        this.buttons = [];
        this.buttonRadius = 30;

        // Modern retro handheld colors (Analogue Pocket / Miyoo Mini inspired)
        this.colors = {

            shellBg: '#1a1a22',              // Deep charcoal background
            shellMid: '#252530',             // Mid-tone panel
