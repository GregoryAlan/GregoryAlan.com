<script>
// Maduro Nights - Procedural Level Generator
// Session 7: Room-based procedural generation with corridors
// Session 7 Update: All levels now procedurally generated, improved door placement

class LevelGenerator {
    constructor() {
        // Default level dimensions - larger for more open areas
        this.width = 32;
        this.height = 24;

        // Room generation parameters - bigger rooms for open feel
        this.minRoomSize = 6;
        this.maxRoomSize = 12;
        this.minRooms = 4;
        this.maxRooms = 6;

        // Corridor parameters - width must allow for gate placement (2-4 tiles with walls on sides)
        this.corridorWidth = 2;

        // Tile types shortcut
        this.FLOOR = CONSTANTS.TILE.TYPES.FLOOR;
        this.WALL = CONSTANTS.TILE.TYPES.WALL;
        this.EXIT = CONSTANTS.TILE.TYPES.EXTRACTION_ZONE;
        this.DOOR = CONSTANTS.TILE.TYPES.DOOR_CLOSED;
        this.COVER = CONSTANTS.TILE.TYPES.COVER_CRATE;
        this.DESK = CONSTANTS.TILE.TYPES.COVER_DESK;
        this.TARGET = CONSTANTS.TILE.TYPES.OBJECTIVE_TARGET;
        this.KEY = CONSTANTS.TILE.TYPES.KEY_ITEM;
        this.LOCKED = CONSTANTS.TILE.TYPES.DOOR_LOCKED;
        // Session 8: Gate system
        this.GATE_BAR = CONSTANTS.TILE.TYPES.GATE_BAR;
        this.GATE_KEYSLOT = CONSTANTS.TILE.TYPES.GATE_KEYSLOT;
        this.GATE_OPEN = CONSTANTS.TILE.TYPES.GATE_OPEN;
        // Session 7: Security systems
        this.CAMERA = CONSTANTS.TILE.TYPES.CAMERA;
        this.ALARM_PANEL = CONSTANTS.TILE.TYPES.ALARM_PANEL;
    }

    /**
     * Generate a procedural level
     * @param {number} levelNum - Level number (1-5), affects difficulty
     * @returns {Object} Level data compatible with LevelManager format
     */
    generate(levelNum) {
        // Scale parameters based on level number
        const difficulty = Math.min(levelNum, 5);
        this.adjustDifficultyParams(difficulty);

        // Initialize map with walls
        const map = this.createEmptyMap();

        // Generate rooms
        const rooms = this.generateRooms();

        // Carve rooms into map (full floor)
        rooms.forEach(room => this.carveRoom(map, room));

        // Connect rooms with wide corridors
        this.connectRooms(map, rooms);

        // Add cover objects
        this.addCover(map, rooms, difficulty);

        // Determine player start (first room)
        const startRoom = rooms[0];
        const playerStart = this.getRandomFloorInRoom(startRoom);

        // Determine extraction zone (last room, far from start)
        const endRoom = rooms[rooms.length - 1];
        const extractionPos = this.placeExtractionZone(map, endRoom);

        // Place objective target (in a middle room)
        const targetRoom = rooms[Math.floor(rooms.length / 2)];
        const targetPos = this.placeObjective(map, targetRoom);

        // Session 8: Add gates that span room entrances
        // Number of gates: 1-2 for easier levels, 2-3 for harder levels
        const numGates = Math.min(3, 1 + Math.floor(difficulty / 2));
        const gates = this.placeGates(map, rooms, startRoom, numGates);

        // Generate guards with patrol routes
        const guards = this.generateGuards(rooms, difficulty, playerStart);

        // Session 7: Generate cameras and alarm panels
        const cameras = this.generateCameras(map, rooms, difficulty, startRoom);
        const alarmPanels = this.placeAlarmPanels(map, rooms, difficulty, startRoom);

        // Build objectives array
        const objectives = this.buildObjectives(targetPos, extractionPos);

        // Generate level name
        const levelNames = [
            'Perimeter Breach',
            'Infiltration',
            'Deep Cover',
            'Black Site',
            'Final Extraction'
        ];

        // Session 8: Generate elite guards (levels 3+)
        const eliteGuards = this.generateEliteGuards(rooms, difficulty, playerStart, guards);

        // Session 8: Generate boss for level 4 and 5
        const boss = this.generateBoss(levelNum, endRoom, rooms);

        // Session 8: Place tranquilizer ammo pickups
        const tranquilizerPickups = this.placeTranquilizerAmmo(map, rooms, difficulty, startRoom);

        // Session 8: Place tranquilizer gun on levels 4 and 5 (boss levels)
        // Required on level 5 to capture Maduro, optional on level 4
        let tranqGunPos = null;
        if (levelNum >= 4) {
            tranqGunPos = this.placeTranquilizerGun(map, rooms, startRoom);
        }

        return {
            name: `Level ${levelNum}: ${levelNames[levelNum - 1] || 'Unknown Sector'}`,
            difficulty: difficulty,
            map: map,
            playerStart: playerStart,
            guards: guards,
            objectives: objectives,
            gates: gates,
            cover: [],
            keys: [],
            // Session 7: Security systems
            cameras: cameras,
            alarmPanels: alarmPanels,
            // Session 8: Elite guards and bosses
            eliteGuards: eliteGuards,
            boss: boss,
            tranquilizerPickups: tranquilizerPickups,
            tranqGunPos: tranqGunPos,  // Session 8: Tranquilizer gun position (level 5 only)
            // Session 7: Mark as procedurally generated
            isGenerated: true,
            rooms: rooms // Store rooms for potential debugging
        };
    }

    /**
     * Adjust generation parameters based on difficulty
     * @param {number} difficulty - 1-5
     */
    adjustDifficultyParams(difficulty) {
        // Slightly more rooms as difficulty increases, but keep them open
        this.minRooms = 4 + Math.floor(difficulty / 3);
        this.maxRooms = 5 + Math.floor(difficulty / 2);

        // Keep rooms large even at higher difficulties for open gameplay
        this.minRoomSize = 6;
        this.maxRoomSize = Math.max(10, 12 - Math.floor(difficulty / 3));
    }

    /**
     * Create empty map filled with walls
     * @returns {number[][]}
     */
    createEmptyMap() {
        const map = [];
        for (let y = 0; y < this.height; y++) {
            const row = [];
            for (let x = 0; x < this.width; x++) {
                row.push(this.WALL);
            }
            map.push(row);
        }
        return map;
    }

    /**
     * Generate non-overlapping rooms
     * @returns {Array} Array of room objects { x, y, width, height, centerX, centerY }
     */
    generateRooms() {
        const rooms = [];
        const numRooms = this.randomInt(this.minRooms, this.maxRooms);
        const maxAttempts = 100;

        for (let i = 0; i < numRooms; i++) {
            let attempts = 0;
            let placed = false;

            while (!placed && attempts < maxAttempts) {
                attempts++;

                // Random room dimensions
                const roomWidth = this.randomInt(this.minRoomSize, this.maxRoomSize);
                const roomHeight = this.randomInt(this.minRoomSize, this.maxRoomSize);

                // Random position (leave 1 tile border for walls)
                const x = this.randomInt(2, this.width - roomWidth - 2);
                const y = this.randomInt(2, this.height - roomHeight - 2);

                const newRoom = {
                    x: x,
                    y: y,
                    width: roomWidth,
                    height: roomHeight,
                    centerX: Math.floor(x + roomWidth / 2),
                    centerY: Math.floor(y + roomHeight / 2)
                };

                // Check for overlap with existing rooms (allow rooms to touch/merge)
                let overlaps = false;
                for (const room of rooms) {
                    if (this.roomsOverlap(newRoom, room, 0)) {
                        overlaps = true;
                        break;
                    }
                }

                if (!overlaps) {
                    rooms.push(newRoom);
                    placed = true;
                }
            }
        }

        // Sort rooms by distance from top-left for consistent player start
        rooms.sort((a, b) => (a.x + a.y) - (b.x + b.y));

        return rooms;
    }

    /**
     * Check if two rooms overlap (with padding)
     * @param {Object} r1 - First room
     * @param {Object} r2 - Second room
     * @param {number} padding - Minimum space between rooms
     * @returns {boolean}
     */
    roomsOverlap(r1, r2, padding = 0) {
        return !(
            r1.x + r1.width + padding < r2.x ||
            r2.x + r2.width + padding < r1.x ||
            r1.y + r1.height + padding < r2.y ||
            r2.y + r2.height + padding < r1.y
        );
    }

    /**
     * Carve a room into the map (fill with floor)
     * @param {number[][]} map
     * @param {Object} room
     */
    carveRoom(map, room) {
        for (let y = room.y; y < room.y + room.height; y++) {
            for (let x = room.x; x < room.x + room.width; x++) {
                if (this.inBounds(x, y)) {
                    map[y][x] = this.FLOOR;
                }
            }
        }
    }

    /**
     * Connect all rooms with L-shaped corridors
     * @param {number[][]} map
     * @param {Array} rooms
     */
    connectRooms(map, rooms) {
        // Connect each room to the next one in sequence
        for (let i = 0; i < rooms.length - 1; i++) {
            const room1 = rooms[i];
            const room2 = rooms[i + 1];
            this.carveCorridor(map, room1.centerX, room1.centerY, room2.centerX, room2.centerY);
        }

        // Add some extra connections for more interesting layouts
        if (rooms.length > 3) {
            const midIndex = Math.floor(rooms.length / 2);
            this.carveCorridor(map, rooms[0].centerX, rooms[0].centerY,
                             rooms[midIndex].centerX, rooms[midIndex].centerY);
        }
    }

    /**
     * Carve an L-shaped corridor between two points
     * @param {number[][]} map
     * @param {number} x1
     * @param {number} y1
     * @param {number} x2
     * @param {number} y2
     */
    carveCorridor(map, x1, y1, x2, y2) {
        // Randomly choose horizontal-first or vertical-first
        if (Math.random() < 0.5) {
            this.carveHorizontalCorridor(map, x1, x2, y1);
            this.carveVerticalCorridor(map, y1, y2, x2);
        } else {
            this.carveVerticalCorridor(map, y1, y2, x1);
            this.carveHorizontalCorridor(map, x1, x2, y2);
        }
    }

    /**
     * Carve horizontal corridor (2 tiles wide)
     * @param {number[][]} map
     * @param {number} x1
     * @param {number} x2
     * @param {number} y
     */
    carveHorizontalCorridor(map, x1, x2, y) {
        const startX = Math.min(x1, x2);
        const endX = Math.max(x1, x2);

        for (let x = startX; x <= endX; x++) {
            for (let dy = 0; dy < this.corridorWidth; dy++) {
                if (this.inBounds(x, y + dy)) {
                    map[y + dy][x] = this.FLOOR;
                }
            }
        }
    }

    /**
     * Carve vertical corridor (2 tiles wide)
     * @param {number[][]} map
     * @param {number} y1
     * @param {number} y2
     * @param {number} x
     */
    carveVerticalCorridor(map, y1, y2, x) {
        const startY = Math.min(y1, y2);
        const endY = Math.max(y1, y2);

        for (let y = startY; y <= endY; y++) {
            for (let dx = 0; dx < this.corridorWidth; dx++) {
                if (this.inBounds(x + dx, y)) {
                    map[y][x + dx] = this.FLOOR;
                }
            }
        }
    }

    /**
     * Session 8: Place gates at corridor chokepoints with keys
     * Gates block passage until player collects the corresponding key
     * Keys are always placed in rooms accessible BEFORE the gate (between player start and gate)
     * @param {number[][]} map
     * @param {Array} rooms
     * @param {Object} startRoom - Player's starting room (don't place gates here)
     * @param {number} numGates - Number of gates to place
     * @returns {Array} Array of gate data for game state tracking
     */
    placeGates(map, rooms, startRoom, numGates) {
        const gates = [];

        // Find all valid chokepoints on the map (corridor sections with walls on sides)
        const chokepoints = this.findAllChokepoints(map, startRoom);

        console.log(`[LevelGenerator] Found ${chokepoints.length} chokepoints for gates, need ${numGates}`);

        // Shuffle and pick the requested number
        chokepoints.sort(() => Math.random() - 0.5);

        const usedPositions = new Set();

        for (let i = 0; i < numGates && i < chokepoints.length; i++) {
            const gateInfo = chokepoints[i];

            // Skip if too close to another gate
            let tooClose = false;
            for (const pos of usedPositions) {
                const dist = Math.abs(gateInfo.keyslotPos.x - pos.x) + Math.abs(gateInfo.keyslotPos.y - pos.y);
                if (dist < 8) {
                    tooClose = true;
                    break;
                }
            }
            if (tooClose) continue;

            // Find rooms that are accessible from start WITHOUT crossing this gate
            // These are valid rooms to place the key in
            const accessibleRooms = this.findRoomsAccessibleBeforeGate(map, rooms, startRoom, gateInfo);

            if (accessibleRooms.length === 0) {
                // No accessible rooms found - skip this gate location
                console.log(`[LevelGenerator] Skipping gate at (${gateInfo.keyslotPos.x}, ${gateInfo.keyslotPos.y}) - no accessible rooms for key`);
                continue;
            }

            // Place the gate on the map
            this.placeGateOnMap(map, gateInfo);
            usedPositions.add(gateInfo.keyslotPos);

            // Place key in a random accessible room (prefer rooms closer to start)
            const keyRoom = accessibleRooms[this.randomInt(0, Math.min(accessibleRooms.length - 1, 1))];
            const keyPos = this.findValidKeyPosition(map, keyRoom);
            map[keyPos.y][keyPos.x] = this.KEY;

            gates.push({
                id: `gate_${i}`,
                tiles: gateInfo.tiles,
                keyslotPos: gateInfo.keyslotPos,
                keyPos: keyPos,
                isOpen: false
            });

            console.log(`[LevelGenerator] Placed gate ${i} at (${gateInfo.keyslotPos.x}, ${gateInfo.keyslotPos.y}), key at (${keyPos.x}, ${keyPos.y}) in accessible room`);
        }

        console.log(`[LevelGenerator] Successfully placed ${gates.length} gates`);
        return gates;
    }

    /**
     * Find all rooms accessible from the start room WITHOUT crossing a specific gate
     * Uses flood fill from the start room, treating gate tiles as walls
     * @param {number[][]} map - The map array
     * @param {Array} rooms - All rooms
     * @param {Object} startRoom - The starting room
     * @param {Object} gateInfo - The gate to treat as blocked
     * @returns {Array} Array of accessible room objects
     */
    findRoomsAccessibleBeforeGate(map, rooms, startRoom, gateInfo) {
        // Create a set of gate tile positions to treat as blocked
        const gateTiles = new Set();
        for (const tile of gateInfo.tiles) {
            gateTiles.add(`${tile.x},${tile.y}`);
        }

        // Flood fill from start room center to find all accessible floor tiles
        const accessibleTiles = new Set();
        const queue = [{ x: startRoom.centerX, y: startRoom.centerY }];
        const visited = new Set();
        visited.add(`${startRoom.centerX},${startRoom.centerY}`);

        while (queue.length > 0) {
            const pos = queue.shift();

            // Skip if this is a gate tile (treat as blocked)
            if (gateTiles.has(`${pos.x},${pos.y}`)) {
                continue;
            }

            // Check if tile is walkable
            if (!this.inBounds(pos.x, pos.y)) continue;
            const tile = map[pos.y][pos.x];
            if (!this.isWalkableTile(tile)) continue;

            // Mark as accessible
            accessibleTiles.add(`${pos.x},${pos.y}`);

            // Check all 4 neighbors
            const neighbors = [
                { x: pos.x - 1, y: pos.y },
                { x: pos.x + 1, y: pos.y },
                { x: pos.x, y: pos.y - 1 },
                { x: pos.x, y: pos.y + 1 }
            ];

            for (const neighbor of neighbors) {
                const key = `${neighbor.x},${neighbor.y}`;
                if (!visited.has(key)) {
                    visited.add(key);
                    queue.push(neighbor);
                }
            }
        }

        // Find which rooms have accessible tiles
        const accessibleRooms = [];
        for (const room of rooms) {
            // Check if any tile in the room is accessible
            for (let y = room.y; y < room.y + room.height; y++) {
                for (let x = room.x; x < room.x + room.width; x++) {
                    if (accessibleTiles.has(`${x},${y}`)) {
                        accessibleRooms.push(room);
                        break;
                    }
                }
                if (accessibleRooms[accessibleRooms.length - 1] === room) break;
            }
        }

        return accessibleRooms;
    }

    /**
     * Check if a tile type is walkable (can be traversed by player)
     * @param {number} tileType
     * @returns {boolean}
     */
    isWalkableTile(tileType) {
        return tileType === this.FLOOR ||
               tileType === this.EXIT ||
               tileType === this.TARGET ||
               tileType === this.KEY ||
               tileType === this.GATE_OPEN ||
               tileType === this.DOOR ||
               tileType === CONSTANTS.TILE.TYPES.DOOR_OPEN ||
               tileType === CONSTANTS.TILE.TYPES.TRANQ_GUN_ITEM ||
               tileType === this.ALARM_PANEL;
    }

    /**
     * Find a valid floor position for a key in a room
     * Avoids placing key on top of other items
     * @param {number[][]} map
     * @param {Object} room
     * @returns {{x: number, y: number}}
     */
    findValidKeyPosition(map, room) {
        const maxAttempts = 30;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const pos = this.getRandomFloorInRoom(room);

            if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                return pos;
            }
        }

        // Fallback: return room center
        return { x: room.centerX, y: room.centerY };
    }

    /**
     * Find all valid chokepoints on the map for gate placement
     * A chokepoint is a corridor section with walls on the outer perpendicular edges
     * Works with multi-tile wide corridors (2+ tiles)
     * @param {number[][]} map
     * @param {Object} startRoom - Avoid placing gates in start room
     * @returns {Array} Array of gate info objects
     */
    findAllChokepoints(map, startRoom) {
        const chokepoints = [];
        const checkedHorizontal = new Set(); // Track checked positions to avoid duplicates
        const checkedVertical = new Set();

        // Scan for HORIZONTAL corridors (running left-right, with walls above and below the full width)
        for (let y = 2; y < this.height - this.corridorWidth - 1; y++) {
            for (let x = 2; x < this.width - 2; x++) {
                const key = `${x},${y}`;
                if (checkedHorizontal.has(key)) continue;

                // Skip if inside start room
                if (this.isInsideRoom(x, y, startRoom)) continue;

                // Check if this is a multi-tile wide horizontal corridor
                // All corridor rows must be floor, walls must be above top row and below bottom row
                let isValidCorridor = true;

                // Check corridor width (all tiles must be floor)
                for (let dy = 0; dy < this.corridorWidth; dy++) {
                    if (!this.inBounds(x, y + dy) || map[y + dy][x] !== this.FLOOR) {
                        isValidCorridor = false;
                        break;
                    }
                }

                // Check walls: above the top row AND below the bottom row
                if (isValidCorridor) {
                    const topWallY = y - 1;
                    const bottomWallY = y + this.corridorWidth;

                    if (!this.inBounds(x, topWallY) || map[topWallY][x] !== this.WALL ||
                        !this.inBounds(x, bottomWallY) || map[bottomWallY][x] !== this.WALL) {
                        isValidCorridor = false;
                    }
                }

                if (!isValidCorridor) continue;

                // Found start of a valid corridor - find its full horizontal extent
                let spanStart = x;
                let spanEnd = x;

                // Extend left while corridor pattern continues
                while (spanStart > 1) {
                    let canExtend = true;
                    // Check all corridor rows are floor
                    for (let dy = 0; dy < this.corridorWidth; dy++) {
                        if (map[y + dy][spanStart - 1] !== this.FLOOR) {
                            canExtend = false;
                            break;
                        }
                    }
                    // Check walls above and below
                    if (canExtend && (map[y - 1][spanStart - 1] !== this.WALL ||
                                     map[y + this.corridorWidth][spanStart - 1] !== this.WALL)) {
                        canExtend = false;
                    }
                    if (!canExtend) break;
                    spanStart--;
                }

                // Extend right while corridor pattern continues
                while (spanEnd < this.width - 2) {
                    let canExtend = true;
                    // Check all corridor rows are floor
                    for (let dy = 0; dy < this.corridorWidth; dy++) {
                        if (map[y + dy][spanEnd + 1] !== this.FLOOR) {
                            canExtend = false;
                            break;
                        }
                    }
                    // Check walls above and below
                    if (canExtend && (map[y - 1][spanEnd + 1] !== this.WALL ||
                                     map[y + this.corridorWidth][spanEnd + 1] !== this.WALL)) {
                        canExtend = false;
                    }
                    if (!canExtend) break;
                    spanEnd++;
                }

                const spanLength = spanEnd - spanStart + 1;

                // Mark all positions in this corridor as checked
                for (let cx = spanStart; cx <= spanEnd; cx++) {
                    checkedHorizontal.add(`${cx},${y}`);
                }

                // Valid gate location: corridor is 3-8 tiles long (not too short, not spanning entire room)
                if (spanLength >= 3 && spanLength <= 8) {
                    // Place gate across the full corridor width at a single x position
                    const gateX = spanStart + Math.floor(spanLength / 2);
                    const tiles = [];
                    // Keyslot goes on the first tile of the corridor (player interacts with it)
                    const keyslotDy = 0;

                    for (let dy = 0; dy < this.corridorWidth; dy++) {
                        tiles.push({
                            x: gateX,
                            y: y + dy,
                            type: dy === keyslotDy ? 'keyslot' : 'bar'
                        });
                    }

                    chokepoints.push({
                        orientation: 'horizontal',
                        tiles: tiles,
                        keyslotPos: { x: gateX, y: y + keyslotDy }
                    });

                    console.log(`[LevelGenerator] Found horizontal chokepoint at x=${gateX}, y=${y}-${y + this.corridorWidth - 1}, corridor length=${spanLength}`);
                }
            }
        }

        // Scan for VERTICAL corridors (running up-down, with walls left and right of the full width)
        for (let x = 2; x < this.width - this.corridorWidth - 1; x++) {
            for (let y = 2; y < this.height - 2; y++) {
                const key = `${x},${y}`;
                if (checkedVertical.has(key)) continue;

                // Skip if inside start room
                if (this.isInsideRoom(x, y, startRoom)) continue;

                // Check if this is a multi-tile wide vertical corridor
                let isValidCorridor = true;

                // Check corridor width (all tiles must be floor)
                for (let dx = 0; dx < this.corridorWidth; dx++) {
                    if (!this.inBounds(x + dx, y) || map[y][x + dx] !== this.FLOOR) {
                        isValidCorridor = false;
                        break;
                    }
                }

                // Check walls: left of the leftmost column AND right of the rightmost column
                if (isValidCorridor) {
                    const leftWallX = x - 1;
                    const rightWallX = x + this.corridorWidth;

                    if (!this.inBounds(leftWallX, y) || map[y][leftWallX] !== this.WALL ||
                        !this.inBounds(rightWallX, y) || map[y][rightWallX] !== this.WALL) {
                        isValidCorridor = false;
                    }
                }

                if (!isValidCorridor) continue;

                // Found start of a valid corridor - find its full vertical extent
                let spanStart = y;
                let spanEnd = y;

                // Extend up while corridor pattern continues
                while (spanStart > 1) {
                    let canExtend = true;
                    // Check all corridor columns are floor
                    for (let dx = 0; dx < this.corridorWidth; dx++) {
                        if (map[spanStart - 1][x + dx] !== this.FLOOR) {
                            canExtend = false;
                            break;
                        }
                    }
                    // Check walls left and right
                    if (canExtend && (map[spanStart - 1][x - 1] !== this.WALL ||
                                     map[spanStart - 1][x + this.corridorWidth] !== this.WALL)) {
                        canExtend = false;
                    }
                    if (!canExtend) break;
                    spanStart--;
                }

                // Extend down while corridor pattern continues
                while (spanEnd < this.height - 2) {
                    let canExtend = true;
                    // Check all corridor columns are floor
                    for (let dx = 0; dx < this.corridorWidth; dx++) {
                        if (map[spanEnd + 1][x + dx] !== this.FLOOR) {
                            canExtend = false;
                            break;
                        }
                    }
                    // Check walls left and right
                    if (canExtend && (map[spanEnd + 1][x - 1] !== this.WALL ||
                                     map[spanEnd + 1][x + this.corridorWidth] !== this.WALL)) {
                        canExtend = false;
                    }
                    if (!canExtend) break;
                    spanEnd++;
                }

                const spanLength = spanEnd - spanStart + 1;

                // Mark all positions in this corridor as checked
                for (let cy = spanStart; cy <= spanEnd; cy++) {
                    checkedVertical.add(`${x},${cy}`);
                }

                // Valid gate location: corridor is 3-8 tiles long
                if (spanLength >= 3 && spanLength <= 8) {
                    // Place gate across the full corridor width at a single y position
                    const gateY = spanStart + Math.floor(spanLength / 2);
                    const tiles = [];
                    // Keyslot goes on the first tile of the corridor (player interacts with it)
                    const keyslotDx = 0;

                    for (let dx = 0; dx < this.corridorWidth; dx++) {
                        tiles.push({
                            x: x + dx,
                            y: gateY,
                            type: dx === keyslotDx ? 'keyslot' : 'bar'
                        });
                    }

                    chokepoints.push({
                        orientation: 'vertical',
                        tiles: tiles,
                        keyslotPos: { x: x + keyslotDx, y: gateY }
                    });

                    console.log(`[LevelGenerator] Found vertical chokepoint at x=${x}-${x + this.corridorWidth - 1}, y=${gateY}, corridor length=${spanLength}`);
                }
            }
        }

        return chokepoints;
    }

    /**
     * Check if a position is inside a room
     * @param {number} x
     * @param {number} y
     * @param {Object} room
     * @returns {boolean}
     */
    isInsideRoom(x, y, room) {
        return x >= room.x && x < room.x + room.width &&
               y >= room.y && y < room.y + room.height;
    }

    /**
     * Place gate tiles on the map
     * @param {number[][]} map
     * @param {Object} gateInfo
     */
    placeGateOnMap(map, gateInfo) {
        for (const tile of gateInfo.tiles) {
            if (tile.type === 'keyslot') {
                map[tile.y][tile.x] = this.GATE_KEYSLOT;
            } else {
                map[tile.y][tile.x] = this.GATE_BAR;
            }
        }
    }

    /**
     * Check if a tile type is floor-like (walkable, not blocking)
     * @param {number} tileType
     * @returns {boolean}
     */
    isFloorLike(tileType) {
        return tileType === this.FLOOR ||
               tileType === this.EXIT ||
               tileType === this.COVER ||
               tileType === this.DESK ||
               tileType === this.TARGET ||
               tileType === this.KEY ||
               tileType === this.GATE_OPEN;
    }

    /**
     * Add cover objects and obstacles to rooms for tactical gameplay
     * @param {number[][]} map
     * @param {Array} rooms
     * @param {number} difficulty
     */
    addCover(map, rooms, difficulty) {
        for (const room of rooms) {
            // Skip first room (player start) - keep it mostly clear
            if (room === rooms[0]) {
                // Just add 1-2 scattered cover objects near edges
                this.addScatteredCover(map, room, difficulty + 2); // Less cover
                continue;
            }

            // All rooms get structural cover (corner objects, center clusters, cover lines)
            // Multiple cover elements for larger rooms
            const coverElements = Math.min(3, Math.floor((room.width + room.height) / 8));
            for (let i = 0; i < coverElements; i++) {
                this.addStructuralCover(map, room);
            }

            // Add scattered cover objects (crates, desks)
            this.addScatteredCover(map, room, difficulty);
        }
    }

    /**
     * Add structural cover like pillars or partial walls to larger rooms
     * @param {number[][]} map
     * @param {Object} room
     */
    addStructuralCover(map, room) {
        const coverType = Math.random();

        if (coverType < 0.4) {
            // Corner pillars
            this.addCornerPillars(map, room);
        } else if (coverType < 0.7) {
            // Center pillar or obstacle
            this.addCenterObstacle(map, room);
        } else {
            // Partial wall jutting from a side
            this.addPartialWall(map, room);
        }
    }

    /**
     * Add cover objects near room corners (crates/desks, not walls)
     * @param {number[][]} map
     * @param {Object} room
     */
    addCornerPillars(map, room) {
        const inset = 2; // Distance from corner
        const corners = [
            { x: room.x + inset, y: room.y + inset },
            { x: room.x + room.width - 1 - inset, y: room.y + inset },
            { x: room.x + inset, y: room.y + room.height - 1 - inset },
            { x: room.x + room.width - 1 - inset, y: room.y + room.height - 1 - inset }
        ];

        // Place 2-4 cover objects randomly
        const numCovers = this.randomInt(2, 4);
        const shuffled = corners.sort(() => Math.random() - 0.5);

        for (let i = 0; i < numCovers && i < shuffled.length; i++) {
            const pos = shuffled[i];
            if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                // Use crates or desks, not walls
                map[pos.y][pos.x] = Math.random() < 0.5 ? this.COVER : this.DESK;
            }
        }
    }

    /**
     * Add a center obstacle (cover cluster - crates/desks, not walls)
     * @param {number[][]} map
     * @param {Object} room
     */
    addCenterObstacle(map, room) {
        const centerX = Math.floor(room.x + room.width / 2);
        const centerY = Math.floor(room.y + room.height / 2);

        // Create a small cover cluster (2x2 or L-shaped) using crates/desks
        const pattern = this.randomInt(0, 2);

        if (pattern === 0) {
            // 2x2 cluster
            const positions = [
                { x: centerX, y: centerY },
                { x: centerX + 1, y: centerY },
                { x: centerX, y: centerY + 1 },
                { x: centerX + 1, y: centerY + 1 }
            ];
            // Place 2-3 of them for gaps to move through
            const shuffled = positions.sort(() => Math.random() - 0.5);
            const numToPlace = this.randomInt(2, 3);
            for (let i = 0; i < numToPlace; i++) {
                const pos = shuffled[i];
                if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                    map[pos.y][pos.x] = Math.random() < 0.5 ? this.COVER : this.DESK;
                }
            }
        } else if (pattern === 1) {
            // Horizontal line of 2-3 crates
            const length = this.randomInt(2, 3);
            for (let i = 0; i < length; i++) {
                if (this.inBounds(centerX + i, centerY) && map[centerY][centerX + i] === this.FLOOR) {
                    map[centerY][centerX + i] = this.COVER;
                }
            }
        } else {
            // Vertical line of 2-3 desks
            const length = this.randomInt(2, 3);
            for (let i = 0; i < length; i++) {
                if (this.inBounds(centerX, centerY + i) && map[centerY + i][centerX] === this.FLOOR) {
                    map[centerY + i][centerX] = this.DESK;
                }
            }
        }
    }

    /**
     * Add a row of cover objects (desks/crates) for tactical cover
     * No longer uses walls - just cover objects that provide hiding spots
     * @param {number[][]} map
     * @param {Object} room
     */
    addPartialWall(map, room) {
        // Place a line of cover objects somewhere in the room (not connected to walls)
        const isHorizontal = Math.random() < 0.5;
        const coverLength = this.randomInt(2, 4);

        if (isHorizontal) {
            // Horizontal line of desks/crates in the room
            const startX = this.randomInt(room.x + 2, room.x + room.width - coverLength - 2);
            const y = this.randomInt(room.y + 2, room.y + room.height - 3);

            for (let i = 0; i < coverLength; i++) {
                if (this.inBounds(startX + i, y) && map[y][startX + i] === this.FLOOR) {
                    map[y][startX + i] = Math.random() < 0.6 ? this.DESK : this.COVER;
                }
            }
        } else {
            // Vertical line of desks/crates
            const x = this.randomInt(room.x + 2, room.x + room.width - 3);
            const startY = this.randomInt(room.y + 2, room.y + room.height - coverLength - 2);

            for (let i = 0; i < coverLength; i++) {
                if (this.inBounds(x, startY + i) && map[startY + i][x] === this.FLOOR) {
                    map[startY + i][x] = Math.random() < 0.6 ? this.COVER : this.DESK;
                }
            }
        }
    }

    /**
     * Add scattered cover objects (crates, desks) throughout a room
     * @param {number[][]} map
     * @param {Object} room
     * @param {number} difficulty
     */
    addScatteredCover(map, room, difficulty) {
        // More cover at lower difficulties (easier to hide)
        // Base chance is higher since rooms are now larger and more open
        const coverChance = Math.max(0.02, 0.06 - (difficulty * 0.008));

        for (let y = room.y + 1; y < room.y + room.height - 1; y++) {
            for (let x = room.x + 1; x < room.x + room.width - 1; x++) {
                if (map[y][x] === this.FLOOR && Math.random() < coverChance) {
                    map[y][x] = Math.random() < 0.5 ? this.COVER : this.DESK;
                }
            }
        }
    }

    /**
     * Get a random floor position within a room
     * @param {Object} room
     * @returns {{x: number, y: number}}
     */
    getRandomFloorInRoom(room) {
        return {
            x: this.randomInt(room.x + 1, room.x + room.width - 2),
            y: this.randomInt(room.y + 1, room.y + room.height - 2)
        };
    }

    /**
     * Place extraction zone in the end room
     * @param {number[][]} map
     * @param {Object} room
     * @returns {{x: number, y: number}}
     */
    placeExtractionZone(map, room) {
        // Place a 2x2 or 3x2 extraction zone
        const extWidth = Math.min(3, room.width - 2);
        const extHeight = 2;

        const startX = room.x + Math.floor((room.width - extWidth) / 2);
        const startY = room.y + Math.floor((room.height - extHeight) / 2);

        for (let y = startY; y < startY + extHeight; y++) {
            for (let x = startX; x < startX + extWidth; x++) {
                if (this.inBounds(x, y)) {
                    map[y][x] = this.EXIT;
                }
            }
        }

        return { x: startX, y: startY };
    }

    /**
     * Place objective target in a room
     * @param {number[][]} map
     * @param {Object} room
     * @returns {{x: number, y: number}}
     */
    placeObjective(map, room) {
        const pos = this.getRandomFloorInRoom(room);
        map[pos.y][pos.x] = this.TARGET;
        return pos;
    }

    /**
     * Place key item in a room
     * @param {number[][]} map
     * @param {Object} room
     * @returns {{x: number, y: number}}
     */
    placeKey(map, room) {
        const pos = this.getRandomFloorInRoom(room);
        map[pos.y][pos.x] = this.KEY;
        return pos;
    }

    /**
     * Generate guards with patrol waypoints spread across the map
     * @param {Array} rooms
     * @param {number} difficulty
     * @param {{x: number, y: number}} playerStart
     * @returns {Array}
     */
    generateGuards(rooms, difficulty, playerStart) {
        const guards = [];

        // Number of guards scales with difficulty (fewer guards in open maps)
        const numGuards = 2 + difficulty; // 3, 4, 5, 6, 7

        // Skip first room (player start) for guard placement
        const guardRooms = rooms.slice(1);

        // Minimum distance between guards to prevent clumping
        const minGuardDistance = 6;

        // Minimum distance from player start
        const minPlayerDistance = 8;

        const maxAttempts = 50;

        for (let i = 0; i < numGuards; i++) {
            let placed = false;
            let attempts = 0;

            while (!placed && attempts < maxAttempts) {
                attempts++;

                // Pick a random room (weighted toward middle rooms for objective coverage)
                const roomIndex = this.randomInt(0, guardRooms.length - 1);
                const room = guardRooms[roomIndex];

                // Random starting position in room (validated)
                const startPos = this.getValidFloorInRoom(room);
                if (!startPos) continue;

                // Check distance from player start
                const distToPlayer = Math.abs(startPos.x - playerStart.x) + Math.abs(startPos.y - playerStart.y);
                if (distToPlayer < minPlayerDistance) continue;

                // Check distance from other guards
                let tooClose = false;
                for (const guard of guards) {
                    const distToGuard = Math.abs(startPos.x - guard.x) + Math.abs(startPos.y - guard.y);
                    if (distToGuard < minGuardDistance) {
                        tooClose = true;
                        break;
                    }
                }
                if (tooClose) continue;

                // Generate patrol waypoints within the room
                const waypoints = this.generatePatrolRoute(startPos, room);

                guards.push({
                    x: startPos.x,
                    y: startPos.y,
                    waypoints: waypoints
                });
                placed = true;
            }
        }

        return guards;
    }

    /**
     * Generate patrol waypoints that create a sensible patrol route within a room
     * Guards patrol the perimeter and key positions within their assigned room
     * @param {{x: number, y: number}} startPos - Starting position in tile coords
     * @param {Object} room - The guard's patrol room
     * @returns {Array} Array of waypoints in tile coordinates
     */
    generatePatrolRoute(startPos, room) {
        // Generate waypoints along the room perimeter and interior
        // This ensures guards walk in a predictable pattern within walkable areas
        const waypoints = [];

        // Create patrol points at corners and midpoints of the room interior
        const inset = 2; // Stay 2 tiles away from walls
        const minX = room.x + inset;
        const maxX = room.x + room.width - 1 - inset;
        const minY = room.y + inset;
        const maxY = room.y + room.height - 1 - inset;

        // Only create patrol if room is big enough
        if (maxX <= minX || maxY <= minY) {
            // Small room - just patrol the center
            waypoints.push({ x: room.centerX, y: room.centerY });
            return waypoints;
        }

        // Randomly choose a patrol pattern
        const patternType = this.randomInt(0, 2);

        if (patternType === 0) {
            // Rectangular perimeter patrol (clockwise or counter-clockwise)
            const clockwise = Math.random() < 0.5;
            const corners = [
                { x: minX, y: minY },     // Top-left
                { x: maxX, y: minY },     // Top-right
                { x: maxX, y: maxY },     // Bottom-right
                { x: minX, y: maxY }      // Bottom-left
            ];

            // Find the corner closest to start position
            let startIndex = 0;
            let minDist = Infinity;
            for (let i = 0; i < corners.length; i++) {
                const dist = Math.abs(corners[i].x - startPos.x) + Math.abs(corners[i].y - startPos.y);
                if (dist < minDist) {
                    minDist = dist;
                    startIndex = i;
                }
            }

            // Add corners in order starting from nearest
            for (let i = 0; i < corners.length; i++) {
                const index = clockwise
                    ? (startIndex + i) % corners.length
                    : (startIndex - i + corners.length) % corners.length;
                waypoints.push(corners[index]);
            }
        } else if (patternType === 1) {
            // Figure-8 / cross pattern through center
            const centerX = Math.floor((minX + maxX) / 2);
            const centerY = Math.floor((minY + maxY) / 2);

            waypoints.push({ x: minX, y: minY });      // Top-left
            waypoints.push({ x: centerX, y: centerY }); // Center
            waypoints.push({ x: maxX, y: maxY });      // Bottom-right
            waypoints.push({ x: centerX, y: centerY }); // Center
            waypoints.push({ x: maxX, y: minY });      // Top-right
            waypoints.push({ x: centerX, y: centerY }); // Center
            waypoints.push({ x: minX, y: maxY });      // Bottom-left
        } else {
            // Back-and-forth horizontal or vertical patrol
            const horizontal = Math.random() < 0.5;
            if (horizontal) {
                const y = Math.floor((minY + maxY) / 2);
                waypoints.push({ x: minX, y: y });
                waypoints.push({ x: maxX, y: y });
            } else {
                const x = Math.floor((minX + maxX) / 2);
                waypoints.push({ x: x, y: minY });
                waypoints.push({ x: x, y: maxY });
            }
        }

        return waypoints;
    }

    /**
     * Get a validated floor position within a room
     * Ensures the position is actually a floor tile, not cover or other objects
     * @param {Object} room - Room object
     * @returns {{x: number, y: number}|null} Valid floor position or null
     */
    getValidFloorInRoom(room) {
        const maxAttempts = 20;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const pos = this.getRandomFloorInRoom(room);

            // We can't validate against the map here since we don't have access to it
            // But we can ensure it's within the room bounds with proper padding
            if (pos.x > room.x + 1 && pos.x < room.x + room.width - 2 &&
                pos.y > room.y + 1 && pos.y < room.y + room.height - 2) {
                return pos;
            }
        }

        // Fallback to room center
        return { x: room.centerX, y: room.centerY };
    }

    /**
     * Build objectives array
     * @param {{x: number, y: number}} targetPos
     * @param {{x: number, y: number}} extractionPos
     * @returns {Array}
     */
    buildObjectives(targetPos, extractionPos) {
        return [
            {
                id: 'target',
                type: CONSTANTS.OBJECTIVES.TYPES.INTERACT_TARGET,
                position: targetPos,
                description: 'Retrieve the intel package',
                isActive: true
            },
            {
                id: 'extraction',
                type: CONSTANTS.OBJECTIVES.TYPES.REACH_EXTRACTION,
                position: extractionPos,
                description: 'Reach extraction point',
                prerequisite: 'target',
                isActive: false
            }
        ];
    }

    /**
     * Check if coordinates are within map bounds
     * @param {number} x
     * @param {number} y
     * @returns {boolean}
     */
    inBounds(x, y) {
        return x >= 0 && x < this.width && y >= 0 && y < this.height;
    }

    /**
     * Random integer between min and max (inclusive)
     * @param {number} min
     * @param {number} max
     * @returns {number}
     */
    randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    /**
     * Set a seed for reproducible generation (optional)
     * @param {number} seed
     */
    setSeed(seed) {
        // Simple seeded random - for future implementation
        // Could use a seeded PRNG like mulberry32
        this.seed = seed;
    }

    // Session 7: Security System Generation

    /**
     * Generate cameras for the level
     * Cameras are placed on walls overlooking room entrances/corridors
     * @param {number[][]} map - The map array
     * @param {Array} rooms - Array of room objects
     * @param {number} difficulty - Level difficulty (1-5)
     * @param {Object} startRoom - The starting room (no cameras here)
     * @returns {Array} Array of camera objects { x, y, facingAngle, sweeping, roomId }
     */
    generateCameras(map, rooms, difficulty, startRoom) {
        const cameras = [];

        // Number of cameras scales with difficulty
        // Level 1: 0 cameras, Level 2: 1, Level 3: 2, Level 4: 3, Level 5: 4
        const numCameras = Math.max(0, difficulty - 1);

        if (numCameras === 0) return cameras;

        // Get rooms excluding start room
        const cameraRooms = rooms.filter(r => r !== startRoom);

        // Minimum distance between cameras
        const minCameraDistance = 8;

        for (let i = 0; i < numCameras && i < cameraRooms.length; i++) {
            const room = cameraRooms[i];

            // Find a wall position adjacent to floor in this room
            const cameraPos = this.findCameraPosition(map, room);

            if (cameraPos) {
                // Check distance from other cameras
                let tooClose = false;
                for (const cam of cameras) {
                    const dist = Math.abs(cameraPos.x - cam.x) + Math.abs(cameraPos.y - cam.y);
                    if (dist < minCameraDistance) {
                        tooClose = true;
                        break;
                    }
                }

                if (!tooClose) {
                    cameras.push({
                        x: cameraPos.x,
                        y: cameraPos.y,
                        facingAngle: cameraPos.facingAngle,
                        sweeping: true, // Most cameras sweep
                        roomId: i
                    });

                    // Mark camera tile on map (optional - cameras are entities not tiles)
                    // We don't place CAMERA tile since cameras are dynamic entities
                }
            }
        }

        return cameras;
    }

    /**
     * Find a suitable wall position for a camera in a room
     * @param {number[][]} map - The map array
     * @param {Object} room - Room object
     * @returns {Object|null} { x, y, facingAngle } or null if no valid position
     */
    findCameraPosition(map, room) {
        // Check each wall of the room for camera placement
        const candidates = [];

        // Top wall - camera faces down
        for (let x = room.x + 1; x < room.x + room.width - 1; x++) {
            const wallY = room.y - 1;
            const floorY = room.y;
            if (this.inBounds(x, wallY) && this.inBounds(x, floorY)) {
                if (map[wallY][x] === this.WALL && map[floorY][x] === this.FLOOR) {
                    candidates.push({
                        x: x,
                        y: floorY, // Place camera just inside room
                        facingAngle: Math.PI / 2 // Facing down
                    });
                }
            }
        }

        // Bottom wall - camera faces up
        for (let x = room.x + 1; x < room.x + room.width - 1; x++) {
            const wallY = room.y + room.height;
            const floorY = room.y + room.height - 1;
            if (this.inBounds(x, wallY) && this.inBounds(x, floorY)) {
                if (map[wallY][x] === this.WALL && map[floorY][x] === this.FLOOR) {
                    candidates.push({
                        x: x,
                        y: floorY,
                        facingAngle: -Math.PI / 2 // Facing up
                    });
                }
            }
        }

        // Left wall - camera faces right
        for (let y = room.y + 1; y < room.y + room.height - 1; y++) {
            const wallX = room.x - 1;
            const floorX = room.x;
            if (this.inBounds(wallX, y) && this.inBounds(floorX, y)) {
                if (map[y][wallX] === this.WALL && map[y][floorX] === this.FLOOR) {
                    candidates.push({
                        x: floorX,
                        y: y,
                        facingAngle: 0 // Facing right
                    });
                }
            }
        }

        // Right wall - camera faces left
        for (let y = room.y + 1; y < room.y + room.height - 1; y++) {
            const wallX = room.x + room.width;
            const floorX = room.x + room.width - 1;
            if (this.inBounds(wallX, y) && this.inBounds(floorX, y)) {
                if (map[y][wallX] === this.WALL && map[y][floorX] === this.FLOOR) {
                    candidates.push({
                        x: floorX,
                        y: y,
                        facingAngle: Math.PI // Facing left
                    });
                }
            }
        }

        // Return random candidate or null
        if (candidates.length === 0) return null;
        return candidates[this.randomInt(0, candidates.length - 1)];
    }

    /**
     * Place alarm panels in rooms
     * Alarm panels disable cameras in the same room when interacted with
     * @param {number[][]} map - The map array
     * @param {Array} rooms - Array of room objects
     * @param {number} difficulty - Level difficulty (1-5)
     * @param {Object} startRoom - The starting room
     * @returns {Array} Array of alarm panel objects { x, y, roomId, isDisabled }
     */
    placeAlarmPanels(map, rooms, difficulty, startRoom) {
        const panels = [];

        // Number of alarm panels: 1 per 2 difficulty levels
        // Level 1-2: 1 panel, Level 3-4: 2 panels, Level 5: 3 panels
        const numPanels = Math.min(3, 1 + Math.floor(difficulty / 2));

        // Get rooms excluding start room, prefer rooms with cameras or near objectives
        const panelRooms = rooms.filter(r => r !== startRoom);

        for (let i = 0; i < numPanels && i < panelRooms.length; i++) {
            const room = panelRooms[i];

            // Find a wall-adjacent floor tile for the panel
            const panelPos = this.findAlarmPanelPosition(map, room);

            if (panelPos) {
                // Place alarm panel tile on map
                map[panelPos.y][panelPos.x] = this.ALARM_PANEL;

                panels.push({
                    x: panelPos.x,
                    y: panelPos.y,
                    roomId: i,
                    isDisabled: false
                });
            }
        }

        return panels;
    }

    /**
     * Find a suitable wall-adjacent position for an alarm panel
     * @param {number[][]} map - The map array
     * @param {Object} room - Room object
     * @returns {Object|null} { x, y } or null if no valid position
     */
    findAlarmPanelPosition(map, room) {
        const candidates = [];

        // Check tiles along walls inside the room
        // Top edge
        for (let x = room.x + 1; x < room.x + room.width - 1; x++) {
            const y = room.y;
            if (map[y][x] === this.FLOOR && this.inBounds(x, y - 1) && map[y - 1][x] === this.WALL) {
                candidates.push({ x, y });
            }
        }

        // Bottom edge
        for (let x = room.x + 1; x < room.x + room.width - 1; x++) {
            const y = room.y + room.height - 1;
            if (map[y][x] === this.FLOOR && this.inBounds(x, y + 1) && map[y + 1][x] === this.WALL) {
                candidates.push({ x, y });
            }
        }

        // Left edge
        for (let y = room.y + 1; y < room.y + room.height - 1; y++) {
            const x = room.x;
            if (map[y][x] === this.FLOOR && this.inBounds(x - 1, y) && map[y][x - 1] === this.WALL) {
                candidates.push({ x, y });
            }
        }

        // Right edge
        for (let y = room.y + 1; y < room.y + room.height - 1; y++) {
            const x = room.x + room.width - 1;
            if (map[y][x] === this.FLOOR && this.inBounds(x + 1, y) && map[y][x + 1] === this.WALL) {
                candidates.push({ x, y });
            }
        }

        // Return random candidate or null
        if (candidates.length === 0) return null;
        return candidates[this.randomInt(0, candidates.length - 1)];
    }

    // ==================== SESSION 8: ELITE GUARDS AND BOSSES ====================

    /**
     * Session 8: Generate elite guards for higher difficulty levels
     * Elite guards appear starting at level 3 and scale with difficulty
     * @param {Array} rooms - All rooms
     * @param {number} difficulty - Level difficulty (1-5)
     * @param {{x: number, y: number}} playerStart - Player starting position
     * @param {Array} existingGuards - Already placed regular guards
     * @returns {Array} Array of elite guard data
     */
    generateEliteGuards(rooms, difficulty, playerStart, existingGuards) {
        const eliteGuards = [];

        // No elite guards on levels 1-2
        if (difficulty < 3) return eliteGuards;

        // Number of elite guards: 1 at level 3, 2 at level 4, 2 at level 5
        const numEliteGuards = Math.min(2, difficulty - 2);

        // Skip first room (player start)
        const eliteRooms = rooms.slice(1);

        // Minimum distances
        const minPlayerDistance = 10;
        const minGuardDistance = 8;

        const maxAttempts = 30;

        for (let i = 0; i < numEliteGuards; i++) {
            let placed = false;
            let attempts = 0;

            while (!placed && attempts < maxAttempts) {
                attempts++;

                // Prefer rooms further from start for elite guards
                const roomIndex = this.randomInt(Math.floor(eliteRooms.length / 2), eliteRooms.length - 1);
                const room = eliteRooms[roomIndex];

                // Get validated floor position
                const startPos = this.getValidFloorInRoom(room);
                if (!startPos) continue;

                // Check distance from player start
                const distToPlayer = Math.abs(startPos.x - playerStart.x) + Math.abs(startPos.y - playerStart.y);
                if (distToPlayer < minPlayerDistance) continue;

                // Check distance from regular guards
                let tooClose = false;
                for (const guard of existingGuards) {
                    const dist = Math.abs(startPos.x - guard.x) + Math.abs(startPos.y - guard.y);
                    if (dist < minGuardDistance) {
                        tooClose = true;
                        break;
                    }
                }

                // Check distance from other elite guards
                for (const elite of eliteGuards) {
                    const dist = Math.abs(startPos.x - elite.x) + Math.abs(startPos.y - elite.y);
                    if (dist < minGuardDistance) {
                        tooClose = true;
                        break;
                    }
                }

                if (tooClose) continue;

                // Generate patrol waypoints within the room
                const waypoints = this.generatePatrolRoute(startPos, room);

                eliteGuards.push({
                    x: startPos.x,
                    y: startPos.y,
                    waypoints: waypoints,
                    isElite: true
                });

                placed = true;
            }
        }

        console.log(`[LevelGenerator] Placed ${eliteGuards.length} elite guards for difficulty ${difficulty}`);
        return eliteGuards;
    }

    /**
     * Session 8: Generate boss for level 4 (Captain) or level 5 (Maduro)
     * @param {number} levelNum - Level number (1-5)
     * @param {Object} endRoom - The extraction/end room
     * @param {Array} rooms - All rooms in the level
     * @returns {Object|null} Boss data or null if no boss on this level
     */
    generateBoss(levelNum, endRoom, rooms) {
        // No boss on levels 1-3
        if (levelNum < 4) return null;

        // Determine boss type
        const bossType = levelNum === 4 ? 'CAPTAIN' : 'MADURO';

        // Session 8: Maduro spawns in a separate room from extraction
        // so player must drag him to extraction zone
        let bossRoom = endRoom;
        if (bossType === 'MADURO' && rooms.length >= 3) {
            // Use second-to-last room for Maduro
            bossRoom = rooms[rooms.length - 2];
        }

        // Boss spawns in center of their room
        const bossPos = {
            x: bossRoom.centerX,
            y: bossRoom.centerY
        };

        // Generate patrol waypoints around the boss's room
        const waypoints = this.generateBossPatrol(bossRoom);

        const boss = {
            type: bossType,
            x: bossPos.x,
            y: bossPos.y,
            waypoints: waypoints
        };

        console.log(`[LevelGenerator] Placed ${bossType} boss at (${bossPos.x}, ${bossPos.y}) in ${bossType === 'MADURO' ? 'separate room from extraction' : 'extraction room'}`);
        return boss;
    }

    /**
     * Session 8: Generate patrol waypoints for boss (covers entire room)
     * Uses predictable perimeter patrol that stays within walkable area
     * @param {Object} room - The boss's room
     * @returns {Array} Array of waypoints
     */
    generateBossPatrol(room) {
        // Boss patrols the four corners of the room interior
        // Stay 2 tiles away from walls to avoid getting stuck
        const inset = 2;
        const minX = room.x + inset;
        const maxX = room.x + room.width - 1 - inset;
        const minY = room.y + inset;
        const maxY = room.y + room.height - 1 - inset;

        // Ensure room is big enough for patrol
        if (maxX <= minX || maxY <= minY) {
            // Small room - just stay in center
            return [{ x: room.centerX, y: room.centerY }];
        }

        // Clockwise perimeter patrol - bosses are predictable
        const waypoints = [
            { x: minX, y: minY },     // Top-left
            { x: maxX, y: minY },     // Top-right
            { x: maxX, y: maxY },     // Bottom-right
            { x: minX, y: maxY }      // Bottom-left
        ];

        return waypoints;
    }

    /**
     * Session 8: Place tranquilizer ammo pickups in the level
     * @param {number[][]} map - The map array
     * @param {Array} rooms - All rooms
     * @param {number} difficulty - Level difficulty
     * @param {Object} startRoom - Starting room
     * @returns {Array} Array of pickup positions
     */
    placeTranquilizerAmmo(map, rooms, difficulty, startRoom) {
        const pickups = [];

        // More ammo on harder levels (where bosses are)
        // Level 1-2: 1 pickup, Level 3: 2 pickups, Level 4-5: 3 pickups
        const numPickups = Math.min(3, 1 + Math.floor(difficulty / 2));

        // Place in rooms (not start room, not end room)
        const pickupRooms = rooms.slice(1, -1);

        if (pickupRooms.length === 0) {
            // Fallback: place in start room if no middle rooms
            const pos = this.getRandomFloorInRoom(startRoom);
            pickups.push({ x: pos.x, y: pos.y, ammo: 2 });
            return pickups;
        }

        for (let i = 0; i < numPickups && i < pickupRooms.length; i++) {
            const room = pickupRooms[i % pickupRooms.length];
            const pos = this.getRandomFloorInRoom(room);

            // Only place if tile is floor
            if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                pickups.push({
                    x: pos.x,
                    y: pos.y,
                    ammo: difficulty >= 4 ? 3 : 2 // More ammo for boss levels
                });
            }
        }

        console.log(`[LevelGenerator] Placed ${pickups.length} tranquilizer ammo pickups`);
        return pickups;
    }

    /**
     * Session 8: Place the tranquilizer gun item on boss levels (4 and 5)
     * Required on level 5 to capture Maduro, optional on level 4
     * Placed in an early/middle room so player finds it before boss
     * @param {number[][]} map - The map array
     * @param {Array} rooms - All rooms
     * @param {Object} startRoom - Starting room
     * @returns {Object|null} Position { x, y } or null
     */
    placeTranquilizerGun(map, rooms, startRoom) {
        // Place in a middle room (not start, not boss room)
        // Give player time to find it before reaching boss
        const middleRooms = rooms.slice(1, -1);

        if (middleRooms.length === 0) {
            // Fallback: place near start room
            const pos = this.getRandomFloorInRoom(startRoom);
            if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                map[pos.y][pos.x] = CONSTANTS.TILE.TYPES.TRANQ_GUN_ITEM;
                console.log(`[LevelGenerator] Placed tranquilizer gun at (${pos.x}, ${pos.y}) - fallback location`);
                return pos;
            }
            return null;
        }

        // Choose an early-middle room so player finds it before boss
        const roomIndex = Math.floor(middleRooms.length / 3);
        const room = middleRooms[roomIndex];

        // Find a clear floor tile in the room
        const maxAttempts = 20;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const pos = this.getRandomFloorInRoom(room);

            if (this.inBounds(pos.x, pos.y) && map[pos.y][pos.x] === this.FLOOR) {
                map[pos.y][pos.x] = CONSTANTS.TILE.TYPES.TRANQ_GUN_ITEM;
                console.log(`[LevelGenerator] Placed tranquilizer gun at (${pos.x}, ${pos.y})`);
                return pos;
            }
        }

        console.warn('[LevelGenerator] Failed to place tranquilizer gun');
        return null;
    }
}

// Maduro Nights - Base Entity Class
// Base class for all game entities (player, guards, objects)

class Entity {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.prevX = x;
        this.prevY = y;

        this.width = 16;
        this.height = 16;

        this.active = true;
    }

    /**
     * Update entity (override in subclasses)
     * @param {number} dt - Delta time in seconds
     */
    update(dt) {
        // Store previous position for interpolation
        this.prevX = this.x;
        this.prevY = this.y;
    }

    /**
     * Get interpolated X position for smooth rendering
     * @param {number} alpha - Interpolation factor (0-1)
     * @returns {number}
     */
    getInterpolatedX(alpha) {
        return this.prevX + (this.x - this.prevX) * alpha;
    }

    /**
     * Get interpolated Y position for smooth rendering
     * @param {number} alpha - Interpolation factor (0-1)
     * @returns {number}
     */
    getInterpolatedY(alpha) {
        return this.prevY + (this.y - this.prevY) * alpha;
    }

    /**
     * Get tile X position
     * @returns {number}
     */
    getTileX() {
        return Math.floor(this.x / CONSTANTS.TILE.SIZE);
    }

    /**
     * Get tile Y position
     * @returns {number}
     */
    getTileY() {
        return Math.floor(this.y / CONSTANTS.TILE.SIZE);
    }

    /**
     * Get distance to another entity
     * @param {Entity} other
     * @returns {number}
     */
    distanceTo(other) {
        return Math.hypot(this.x - other.x, this.y - other.y);
    }

    /**
     * Get distance to a point
     * @param {number} x
     * @param {number} y
     * @returns {number}
     */
    distanceToPoint(x, y) {
        return Math.hypot(this.x - x, this.y - y);
    }

    /**
     * Check if entity is active
     * @returns {boolean}
     */
    isActive() {
        return this.active;
    }

    /**
     * Deactivate entity
     */
    deactivate() {
        this.active = false;
    }

    /**
     * Get bounding box
     * @returns {{x: number, y: number, width: number, height: number}}
     */
    getBounds() {
        return {
            x: this.x - this.width / 2,
            y: this.y - this.height / 2,
            width: this.width,
            height: this.height
        };
    }
}
