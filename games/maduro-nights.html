<script>
// Maduro Nights - HUD
// In-game heads-up display
// Session 2: Movement mode indicator and controls hint
// Session 4: Health display and detection indicator
// Session 8: Tranquilizer ammo and boss health bar

class HUD {
    constructor(ctx) {
        this.ctx = ctx;
        // Session 4: Player reference for health/detection display
        this.player = null;
        this.guards = [];

        // Session 7: Camera reference for minimap
        this.cameras = [];

        // Session 8: Boss reference for boss health bar
        this.boss = null;

        // Session 5: Minimap properties
        this.tilemap = null;
        this.objectiveManager = null;
        this.discoveredTiles = new Set();
        this.minimapConfig = CONSTANTS.MINIMAP;

        // Session 6: Game reference for inventory/item pickup
        this.game = null;

        // Session 6: Item pickup notifications
        this.notifications = []; // { text: string, startTime: number, duration: number }

        // Objective intro display
        this.objectiveIntro = null; // { text: string, startTime: number, duration: number }

        this.setupEventListeners();
    }

    /**
     * Session 6: Setup event listeners for HUD notifications
     */
    setupEventListeners() {
        eventBus.on(EVENTS.ITEM_COLLECTED, (data) => {
            this.showNotification(`+ ${data.item.name}`, 1500);
        });
        eventBus.on(EVENTS.DOOR_OPENED, (data) => {
            if (data.wasLocked) {
                this.showNotification('- Key Used', 1500);
            }
        });
    }

    /**
     * Session 6: Show a floating notification
     * @param {string} text - Text to display
     * @param {number} duration - Duration in ms
     */
    showNotification(text, duration = 1500) {
        this.notifications.push({
            text,
            startTime: Date.now(),
            duration
        });
    }

    /**
     * Session 4: Set player reference for HUD display
     * @param {Player} player
     */
    setPlayer(player) {
        this.player = player;
    }

    /**
     * Session 4: Set guards reference for detection indicator
     * @param {Guard[]} guards
     */
    setGuards(guards) {
        this.guards = guards;
    }

    /**
     * Session 7: Set cameras reference for minimap
     * @param {Camera[]} cameras
     */
    setCameras(cameras) {
        this.cameras = cameras;
    }

    /**
     * Session 8: Set boss reference for boss health bar
     * @param {Boss} boss
     */
    setBoss(boss) {
        this.boss = boss;
    }

    /**
     * Session 5: Set tilemap reference for minimap
     * @param {Tilemap} tilemap
     */
    setTilemap(tilemap) {
        this.tilemap = tilemap;
    }

    /**
     * Session 5: Set objective manager reference
     * @param {ObjectiveManager} objectiveManager
     */
    setObjectiveManager(objectiveManager) {
        this.objectiveManager = objectiveManager;
    }

    /**
     * Session 6: Set game reference for inventory display
     * @param {Game} game
     */
    setGame(game) {
        this.game = game;
    }

    /**
     * Session 5: Reset discovered tiles (for new level)
     */
    resetDiscoveredTiles() {
        this.discoveredTiles.clear();
    }

    /**
     * Show the objective intro text at level start
     * @param {number} duration - How long to show (ms)
     */
    showObjectiveIntro(duration = 4000) {
        let objectiveText = 'Reach extraction';
        if (this.objectiveManager) {
            const currentObjective = this.objectiveManager.getCurrentObjective();
            if (currentObjective) {
                objectiveText = currentObjective.description;
            }
        }

        this.objectiveIntro = {
            text: objectiveText,
            startTime: Date.now(),
            duration
        };
    }

    /**
     * Render the HUD
     * @param {number} fps - Current FPS
     * @param {boolean} debugEnabled - Whether debug mode is on
     */
    render(fps, debugEnabled) {
        // Session 5: Update discovered tiles based on player position
        this.updateDiscoveredTiles();

        // Session 5: Minimap (top-right) - minimal HUD
        this.renderMinimap();

        // Session 4: Health display (bottom-left) - minimal HUD
        this.renderHealth();

        // Session 8: Tranquilizer ammo display (next to health)
        this.renderTranquilizerAmmo();

        // Session 6: Key inventory display (next to health)
        this.renderInventory();

        // Session 6: Credits display (top-left)
        this.renderCredits();

        // Session 6: Item pickup notifications (floating text)
        this.renderNotifications();

        // Session 6: Item pickup prompt (center-bottom)
        this.renderPickupPrompt();

        // Session 8: Maduro interaction prompts
        this.renderMaduroPrompts();

        // Session 8: Alarm panel interaction prompt
        this.renderAlarmPanelPrompt();

        // Session 4: Detection indicator (top-center) - only shows when threatened
        this.renderDetectionIndicator();

        // Session 8: Boss health bar (bottom center, if boss exists)
        this.renderBossHealthBar();

        // Objective intro (shows at level start, fades out)
        this.renderObjectiveIntro();

        // Debug info (if enabled)
        if (debugEnabled) {
            this.renderDebugInfo(fps);
        }
    }

    /**
     * Session 6: Render floating notifications for item pickups
     */
    renderNotifications() {
        const ctx = this.ctx;
        const now = Date.now();

        // Filter out expired notifications
        this.notifications = this.notifications.filter(n => now - n.startTime < n.duration);

        // Render each notification
        this.notifications.forEach((notification, index) => {
            const elapsed = now - notification.startTime;
            const progress = elapsed / notification.duration;

            // Fade out and float up
            const alpha = 1 - Math.pow(progress, 2); // Ease out fade
            const yOffset = progress * 30; // Float up 30 pixels

            // Position near inventory
            const x = 130;
            const y = CONSTANTS.CANVAS.BASE_HEIGHT - 60 - yOffset - (index * 20);

            // Draw notification
            ctx.save();
            ctx.globalAlpha = alpha;

            // Background
            ctx.font = '12px monospace';
            const textWidth = ctx.measureText(notification.text).width;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x - 4, y - 12, textWidth + 8, 18);

            // Text with gold color for items
            ctx.fillStyle = '#ffcc00';
            ctx.fillText(notification.text, x, y);

            ctx.restore();
        });
    }

    /**
     * Render objective intro text (shows at level start, fades out)
     */
    renderObjectiveIntro() {
        if (!this.objectiveIntro) return;

        const ctx = this.ctx;
        const now = Date.now();
        const elapsed = now - this.objectiveIntro.startTime;

        // Clear intro after duration
        if (elapsed >= this.objectiveIntro.duration) {
            this.objectiveIntro = null;
            return;
        }

        const progress = elapsed / this.objectiveIntro.duration;

        // Fade in for first 10%, hold, then fade out for last 30%
        let alpha;
        if (progress < 0.1) {
            alpha = progress / 0.1 * 0.7; // Fade in to max 0.7
        } else if (progress > 0.7) {
            alpha = (1 - (progress - 0.7) / 0.3) * 0.7; // Fade out from 0.7
        } else {
            alpha = 0.7; // Partial visibility
        }

        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        const centerY = 60;

        ctx.save();
        ctx.globalAlpha = alpha;

        // Background panel
        ctx.font = 'bold 14px monospace';
        const labelWidth = ctx.measureText('OBJECTIVE').width;
        ctx.font = '16px monospace';
        const textWidth = ctx.measureText(this.objectiveIntro.text).width;
        const panelWidth = Math.max(labelWidth, textWidth) + 40;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(centerX - panelWidth / 2, centerY - 10, panelWidth, 50);

        // Border
        ctx.strokeStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - panelWidth / 2, centerY - 10, panelWidth, 50);

        // "OBJECTIVE" label
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('OBJECTIVE', centerX, centerY + 10);

        // Objective text
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '16px monospace';
        ctx.fillText(this.objectiveIntro.text, centerX, centerY + 30);

        ctx.textAlign = 'left';
        ctx.restore();
    }

    /**
     * Render objective text
     */
    renderObjective() {
        const ctx = this.ctx;

        // Get current objective text from objectiveManager
        let objectiveText = 'Reach extraction';
        if (this.objectiveManager) {
            const currentObjective = this.objectiveManager.getCurrentObjective();
            if (currentObjective) {
                objectiveText = currentObjective.description;
            } else if (this.objectiveManager.isAllComplete()) {
                objectiveText = 'All objectives complete!';
            }
        }

        // Background (width adjusts to text length)
        const textWidth = Math.max(200, ctx.measureText('OBJECTIVE: ' + objectiveText).width + 30);
        ctx.fillStyle = CONSTANTS.COLORS.UI_BACKGROUND;
        ctx.fillRect(8, 8, textWidth, 28);

        // Text
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '12px monospace';
        ctx.fillText('OBJECTIVE: ' + objectiveText, 16, 26);
    }

    /**
     * Session 2/4: Render controls hint
     */
    renderControlsHint() {
        const ctx = this.ctx;
        const x = CONSTANTS.CANVAS.BASE_WIDTH - 160;
        const y = CONSTANTS.CANVAS.BASE_HEIGHT - 62;

        // Background
        ctx.fillStyle = CONSTANTS.COLORS.UI_BACKGROUND;
        ctx.fillRect(x - 5, y - 15, 160, 67);

        // Text
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '10px monospace';
        ctx.fillText('WASD - Move', x, y);
        ctx.fillText('SHIFT - Crouch (harder to see)', x, y + 12);
        ctx.fillText('SPACE - Run (easier to spot)', x, y + 24);
        ctx.fillText('F - Attack (melee)', x, y + 36);
        ctx.fillText('` - Toggle debug', x, y + 48);
    }

    /**
     * Render debug information
     * @param {number} fps
     */
    renderDebugInfo(fps) {
        const ctx = this.ctx;

        // FPS (top-right)
        ctx.fillStyle = CONSTANTS.COLORS.UI_BACKGROUND;
        ctx.fillRect(CONSTANTS.CANVAS.BASE_WIDTH - 70, 8, 62, 24);

        ctx.fillStyle = fps >= 55 ? '#40ff40' : fps >= 30 ? '#ffff40' : '#ff4040';
        ctx.font = '12px monospace';
        ctx.fillText(`FPS: ${fps}`, CONSTANTS.CANVAS.BASE_WIDTH - 62, 24);
    }

    /**
     * Session 4/6: Render health display - Metal Gear style LIFE bar
     */
    renderHealth() {
        if (!this.player) return;

        const ctx = this.ctx;
        const health = this.player.getHealth();
        const maxHealth = this.player.getMaxHealth();

        // Metal Gear style bottom-left HUD
        const startX = 8;
        const startY = CONSTANTS.CANVAS.BASE_HEIGHT - 32;

        // Background panel
        ctx.fillStyle = '#000000';
        ctx.fillRect(startX, startY - 4, 100, 28);

        // Border
        ctx.strokeStyle = '#404858';
        ctx.lineWidth = 2;
        ctx.strokeRect(startX, startY - 4, 100, 28);

        // "LIFE" label (yellow like Metal Gear)
        ctx.fillStyle = '#e0c040';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('LIFE', startX + 4, startY + 10);

        // Health bar background
        const barX = startX + 36;
        const barY = startY + 2;
        const barWidth = 56;
        const barHeight = 12;

        ctx.fillStyle = '#202028';
        ctx.fillRect(barX, barY, barWidth, barHeight);

        // Health bar segments (Metal Gear segmented style)
        const segmentWidth = barWidth / maxHealth;
        for (let i = 0; i < maxHealth; i++) {
            const segX = barX + i * segmentWidth + 1;

            if (i < health) {
                // Full segment - gradient green like Metal Gear
                const gradient = ctx.createLinearGradient(segX, barY, segX, barY + barHeight);
                gradient.addColorStop(0, '#60c060');
                gradient.addColorStop(0.5, '#40a040');
                gradient.addColorStop(1, '#208020');
                ctx.fillStyle = gradient;

                // Flash when invincible
                if (this.player.isInvincible() && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.fillStyle = '#ffffff';
                }
            } else {
                // Empty segment
                ctx.fillStyle = '#301010';
            }

            ctx.fillRect(segX, barY + 1, segmentWidth - 2, barHeight - 2);
        }

        // Segment dividers
        ctx.fillStyle = '#000000';
        for (let i = 1; i < maxHealth; i++) {
            ctx.fillRect(barX + i * segmentWidth - 1, barY, 2, barHeight);
        }
    }

    /**
     * Session 8: Render tranquilizer status display - Metal Gear style
     * Tranquilizer has unlimited ammo, so just show equipped status
     */
    renderTranquilizerAmmo() {
        if (!this.player) return;

        const ctx = this.ctx;
        const currentWeapon = this.player.currentWeapon || 'melee';
        const hasTranqGun = this.player.hasTranquilizerGun || false;

        // Position below LIFE bar
        const startX = 8;
        const startY = CONSTANTS.CANVAS.BASE_HEIGHT - 58;

        // Background panel
        ctx.fillStyle = '#000000';
        ctx.fillRect(startX, startY - 4, 100, 22);

        // Border - highlight if tranquilizer is active, red if no gun
        if (!hasTranqGun) {
            ctx.strokeStyle = '#404040';
        } else {
            ctx.strokeStyle = currentWeapon === 'tranquilizer' ? '#00ffff' : '#404858';
        }
        ctx.lineWidth = 2;
        ctx.strokeRect(startX, startY - 4, 100, 22);

        // "TRANQ" label
        if (!hasTranqGun) {
            // No gun yet - show "NO GUN"
            ctx.fillStyle = '#606060';
            ctx.font = 'bold 10px monospace';
            ctx.fillText('TRANQ', startX + 4, startY + 10);

            ctx.fillStyle = '#804040';
            ctx.font = '10px monospace';
            ctx.textAlign = 'right';
            ctx.fillText('NO GUN', startX + 94, startY + 10);
            ctx.textAlign = 'left';
        } else {
            // Has gun - show status (unlimited ammo)
            const isEquipped = currentWeapon === 'tranquilizer';
            ctx.fillStyle = isEquipped ? '#00ffff' : '#808080';
            ctx.font = 'bold 10px monospace';
            ctx.fillText('TRANQ', startX + 4, startY + 10);

            // Status indicator instead of ammo count
            ctx.fillStyle = isEquipped ? '#00ff00' : '#606060';
            ctx.font = '10px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(isEquipped ? 'READY' : '[Q]', startX + 94, startY + 10);
            ctx.textAlign = 'left';
        }

        // Session 8: Render drag status if dragging
        this.renderDragStatus();
    }

    /**
     * Session 8: Render drag status when player is dragging Maduro
     */
    renderDragStatus() {
        if (!this.player || !this.player.isDraggingTarget || !this.player.isDraggingTarget()) return;

        const ctx = this.ctx;
        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        const y = CONSTANTS.CANVAS.BASE_HEIGHT - 90;

        // Pulsing effect
        const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;

        // Background panel
        ctx.fillStyle = `rgba(0, 0, 0, 0.8)`;
        ctx.fillRect(centerX - 80, y - 10, 160, 30);

        // Border with pulse
        ctx.strokeStyle = `rgba(255, 255, 100, ${pulse})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - 80, y - 10, 160, 30);

        // "DRAGGING MADURO" text
        ctx.fillStyle = '#ffff80';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('DRAGGING MADURO', centerX, y + 5);

        // "To Extraction!" hint
        ctx.fillStyle = '#80ff80';
        ctx.font = '10px monospace';
        ctx.fillText('Bring to extraction!', centerX, y + 16);

        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render boss health bar at bottom center
     */
    renderBossHealthBar() {
        if (!this.boss || this.boss.isEliminated) return;

        const ctx = this.ctx;
        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        const y = CONSTANTS.CANVAS.BASE_HEIGHT - 50;

        const barWidth = 200;
        const barHeight = 16;

        // Get boss stats
        const maxHealth = this.boss.isFinalBoss ?
            CONSTANTS.BOSS.MADURO.MAX_HEALTH : CONSTANTS.BOSS.CAPTAIN.MAX_HEALTH;
        const currentHealth = Math.max(0, this.boss.health);
        const healthPercent = currentHealth / maxHealth;

        // Session 8: Check if boss is sleeping (Maduro capture mechanic)
        const isSleeping = this.boss.isSleeping || false;

        // Boss name - show sleeping status
        let bossName = this.boss.isFinalBoss ? 'PRESIDENT MADURO' : 'GUARD CAPTAIN';
        if (isSleeping) {
            bossName = 'MADURO [SLEEPING]';
        }

        // Background panel
        ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
        ctx.fillRect(centerX - barWidth / 2 - 10, y - 20, barWidth + 20, 40);

        // Border - blue for sleeping, red pulse for active
        const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
        if (isSleeping) {
            ctx.strokeStyle = `rgba(100, 150, 255, ${pulse})`;
        } else {
            ctx.strokeStyle = `rgba(255, 50, 50, ${pulse})`;
        }
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - barWidth / 2 - 10, y - 20, barWidth + 20, 40);

        // Boss name label
        ctx.fillStyle = '#ff6666';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(bossName, centerX, y - 6);

        // Health bar background
        ctx.fillStyle = '#202028';
        ctx.fillRect(centerX - barWidth / 2, y, barWidth, barHeight);

        // Health bar fill with gradient
        const gradient = ctx.createLinearGradient(
            centerX - barWidth / 2, y,
            centerX - barWidth / 2, y + barHeight
        );

        if (healthPercent > 0.5) {
            gradient.addColorStop(0, '#ff6666');
            gradient.addColorStop(0.5, '#cc3333');
            gradient.addColorStop(1, '#aa2222');
        } else if (healthPercent > 0.25) {
            gradient.addColorStop(0, '#ff8800');
            gradient.addColorStop(0.5, '#cc6600');
            gradient.addColorStop(1, '#aa4400');
        } else {
            gradient.addColorStop(0, '#ff4444');
            gradient.addColorStop(0.5, '#cc2222');
            gradient.addColorStop(1, '#aa0000');
        }

        ctx.fillStyle = gradient;
        ctx.fillRect(centerX - barWidth / 2, y, barWidth * healthPercent, barHeight);

        // Health bar border
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.strokeRect(centerX - barWidth / 2, y, barWidth, barHeight);

        // Health text
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(`${currentHealth}/${maxHealth}`, centerX, y + 12);

        // Phase indicator for Maduro
        if (this.boss.isFinalBoss && this.boss.phase > 1) {
            ctx.fillStyle = this.boss.phase >= 3 ? '#ff0000' : '#ff8800';
            ctx.font = 'bold 8px monospace';
            ctx.fillText(`PHASE ${this.boss.phase}`, centerX, y + 26);
        }

        ctx.textAlign = 'left';
    }

    /**
     * Session 4/6: Render detection indicator - Metal Gear "ALERT" style
     * Shows status and suspicion level
     */
    renderDetectionIndicator() {
        if (!this.guards || this.guards.length === 0) return;

        const ctx = this.ctx;

        // Find the highest suspicion level among guards
        let maxSuspicion = 0;
        let isAlert = false;

        this.guards.forEach(guard => {
            if (guard.isEliminated) return;
            if (guard.getState() === CONSTANTS.GUARD.STATES.ALERT) {
                isAlert = true;
            }
            maxSuspicion = Math.max(maxSuspicion, guard.getSuspicion());
        });

        // Only show if there's some suspicion or alert
        if (maxSuspicion < 0.05 && !isAlert) return;

        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        const y = 20;

        // Metal Gear style alert box
        ctx.fillStyle = '#000000';
        ctx.fillRect(centerX - 60, y, 120, 36);

        // Border color based on state
        if (isAlert) {
            ctx.strokeStyle = '#ff4040';
        } else if (maxSuspicion >= 0.5) {
            ctx.strokeStyle = '#ff8800';
        } else {
            ctx.strokeStyle = '#ffff00';
        }
        ctx.lineWidth = 3;
        ctx.strokeRect(centerX - 60, y, 120, 36);

        // Status text
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';

        if (isAlert) {
            // Flashing ALERT text
            if (Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.fillStyle = '#ff4040';
            } else {
                ctx.fillStyle = '#ff8080';
            }
            ctx.fillText('! ALERT !', centerX, y + 16);
        } else if (maxSuspicion >= 0.5) {
            ctx.fillStyle = '#ff8800';
            ctx.fillText('CAUTION', centerX, y + 16);
        } else {
            ctx.fillStyle = '#ffff00';
            ctx.fillText('?', centerX, y + 16);
        }

        // Detection bar (smaller, below text)
        const barWidth = 100;
        const barHeight = 6;
        const barX = centerX - barWidth / 2;
        const barY = y + 24;

        // Bar background
        ctx.fillStyle = '#202028';
        ctx.fillRect(barX, barY, barWidth, barHeight);

        // Bar fill
        if (isAlert) {
            ctx.fillStyle = '#ff4040';
        } else if (maxSuspicion >= 0.5) {
            ctx.fillStyle = '#ff8800';
        } else {
            ctx.fillStyle = '#ffff00';
        }
        ctx.fillRect(barX, barY, barWidth * maxSuspicion, barHeight);

        // Reset text align
        ctx.textAlign = 'left';
    }

    /**
     * Session 5: Update discovered tiles based on player position
     * Reveals tiles within player's vision radius
     */
    updateDiscoveredTiles() {
        if (!this.player || !this.tilemap) return;

        const playerTileX = Math.floor(this.player.x / CONSTANTS.TILE.SIZE);
        const playerTileY = Math.floor(this.player.y / CONSTANTS.TILE.SIZE);
        const visionRadius = CONSTANTS.MINIMAP.VISION_RADIUS;

        // Reveal tiles in a square around the player
        for (let dy = -visionRadius; dy <= visionRadius; dy++) {
            for (let dx = -visionRadius; dx <= visionRadius; dx++) {
                const tileX = playerTileX + dx;
                const tileY = playerTileY + dy;

                // Check if within vision radius (circular)
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance <= visionRadius) {
                    const key = `${tileX},${tileY}`;
                    this.discoveredTiles.add(key);
                }
            }
        }
    }

    /**
     * Session 5: Render minimap in top-right corner
     */
    renderMinimap() {
        if (!this.tilemap || !this.player) return;

        const ctx = this.ctx;
        const config = this.minimapConfig;
        const tileSize = config.TILE_SIZE;

        // Calculate minimap position (top-right with padding)
        const mapX = CONSTANTS.CANVAS.BASE_WIDTH - config.WIDTH - 10;
        const mapY = 10;

        // Draw background
        ctx.fillStyle = config.COLORS.BACKGROUND;
        ctx.fillRect(mapX - 2, mapY - 2, config.WIDTH + 4, config.HEIGHT + 4);

        // Save context for clipping
        ctx.save();

        // Create clipping region for minimap
        ctx.beginPath();
        ctx.rect(mapX, mapY, config.WIDTH, config.HEIGHT);
        ctx.clip();

        // Calculate offset to center player on minimap
        const playerTileX = Math.floor(this.player.x / CONSTANTS.TILE.SIZE);
        const playerTileY = Math.floor(this.player.y / CONSTANTS.TILE.SIZE);

        const tilesWide = Math.floor(config.WIDTH / tileSize);
        const tilesHigh = Math.floor(config.HEIGHT / tileSize);

        const startTileX = playerTileX - Math.floor(tilesWide / 2);
        const startTileY = playerTileY - Math.floor(tilesHigh / 2);

        // Draw tiles
        for (let ty = 0; ty < tilesHigh; ty++) {
            for (let tx = 0; tx < tilesWide; tx++) {
                const worldTileX = startTileX + tx;
                const worldTileY = startTileY + ty;
                const key = `${worldTileX},${worldTileY}`;

                const screenX = mapX + tx * tileSize;
                const screenY = mapY + ty * tileSize;

                // Check if tile is discovered
                if (!this.discoveredTiles.has(key)) {
                    // Fog of war - dark
                    ctx.fillStyle = config.COLORS.FOG;
                    ctx.fillRect(screenX, screenY, tileSize, tileSize);
                    continue;
                }

                // Get tile type
                const tileType = this.tilemap.getTile(worldTileX, worldTileY);

                // Draw based on tile type
                if (tileType === CONSTANTS.TILE.TYPES.WALL) {
                    ctx.fillStyle = config.COLORS.WALL;
                } else if (tileType === CONSTANTS.TILE.TYPES.EXTRACTION_ZONE) {
                    // Pulse extraction zone
                    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(0, 255, 0, ${pulse})`;
                } else if (tileType === CONSTANTS.TILE.TYPES.DOOR_CLOSED ||
                           tileType === CONSTANTS.TILE.TYPES.DOOR_LOCKED) {
                    ctx.fillStyle = '#886644';
                } else if (tileType === CONSTANTS.TILE.TYPES.DOOR_OPEN) {
                    ctx.fillStyle = config.COLORS.FLOOR;
                } else if (tileType === CONSTANTS.TILE.TYPES.COVER_CRATE ||
                           tileType === CONSTANTS.TILE.TYPES.COVER_DESK) {
                    ctx.fillStyle = '#665544';
                } else if (tileType === CONSTANTS.TILE.TYPES.OBJECTIVE_TARGET) {
                    // Pulse objective
                    const pulse = Math.sin(Date.now() / 150) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(255, 255, 0, ${pulse})`;
                } else if (tileType === CONSTANTS.TILE.TYPES.KEY_ITEM) {
                    ctx.fillStyle = '#ffdd00';
                // Session 8: Gate tiles on minimap
                } else if (tileType === CONSTANTS.TILE.TYPES.GATE_BAR ||
                           tileType === CONSTANTS.TILE.TYPES.GATE_KEYSLOT) {
                    ctx.fillStyle = config.COLORS.GATE || '#8a4a2a';
                } else if (tileType === CONSTANTS.TILE.TYPES.GATE_OPEN) {
                    ctx.fillStyle = config.COLORS.FLOOR;
                // Session 7: Alarm panel tiles on minimap
                } else if (tileType === CONSTANTS.TILE.TYPES.ALARM_PANEL) {
                    // Pulse active alarm panels green
                    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(64, 255, 64, ${pulse})`;
                } else if (tileType === CONSTANTS.TILE.TYPES.ALARM_PANEL_DISABLED) {
                    ctx.fillStyle = config.COLORS.ALARM_PANEL_DISABLED || '#404040';
                } else {
                    ctx.fillStyle = config.COLORS.FLOOR;
                }

                ctx.fillRect(screenX, screenY, tileSize, tileSize);
            }
        }

        // Draw guards (only in discovered areas)
        if (this.guards) {
            this.guards.forEach(guard => {
                if (guard.isEliminated) return;

                const guardTileX = Math.floor(guard.x / CONSTANTS.TILE.SIZE);
                const guardTileY = Math.floor(guard.y / CONSTANTS.TILE.SIZE);
                const key = `${guardTileX},${guardTileY}`;

                // Only show guards in discovered areas
                if (!this.discoveredTiles.has(key)) return;

                const screenX = mapX + (guardTileX - startTileX) * tileSize;
                const screenY = mapY + (guardTileY - startTileY) * tileSize;

                // Check if on minimap
                if (screenX >= mapX && screenX < mapX + config.WIDTH &&
                    screenY >= mapY && screenY < mapY + config.HEIGHT) {

                    // Color based on state
                    if (guard.getState() === CONSTANTS.GUARD.STATES.ALERT) {
                        ctx.fillStyle = '#ff0000';
                    } else if (guard.getState() === CONSTANTS.GUARD.STATES.SUSPICIOUS ||
                               guard.getState() === CONSTANTS.GUARD.STATES.INVESTIGATING) {
                        ctx.fillStyle = '#ff8800';
                    } else {
                        ctx.fillStyle = config.COLORS.GUARD;
                    }

                    ctx.fillRect(screenX, screenY, tileSize, tileSize);
                }
            });
        }

        // Session 7: Draw cameras (only in discovered areas)
        if (this.cameras) {
            this.cameras.forEach(camera => {
                const cameraTileX = Math.floor(camera.x / CONSTANTS.TILE.SIZE);
                const cameraTileY = Math.floor(camera.y / CONSTANTS.TILE.SIZE);
                const key = `${cameraTileX},${cameraTileY}`;

                // Only show cameras in discovered areas
                if (!this.discoveredTiles.has(key)) return;

                const screenX = mapX + (cameraTileX - startTileX) * tileSize;
                const screenY = mapY + (cameraTileY - startTileY) * tileSize;

                // Check if on minimap
                if (screenX >= mapX && screenX < mapX + config.WIDTH &&
                    screenY >= mapY && screenY < mapY + config.HEIGHT) {

                    if (camera.isDisabled()) {
                        // Disabled camera - dark grey
                        ctx.fillStyle = config.COLORS.CAMERA_DISABLED || '#404040';
                    } else if (camera.state === CONSTANTS.CAMERA.STATES.TRIGGERED) {
                        // Triggered camera - bright red pulsing
                        const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
                        ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
                    } else {
                        // Active camera - red
                        ctx.fillStyle = config.COLORS.CAMERA || '#ff4040';
                    }

                    ctx.fillRect(screenX, screenY, tileSize, tileSize);
                }
            });
        }

        // Draw objective markers
        if (this.objectiveManager) {
            const objectives = this.objectiveManager.getObjectives();
            objectives.forEach(obj => {
                if (!obj.position) return;
                if (obj.status === CONSTANTS.OBJECTIVES.STATUS.COMPLETE) return;

                const screenX = mapX + (obj.position.x - startTileX) * tileSize;
                const screenY = mapY + (obj.position.y - startTileY) * tileSize;

                // Check if on minimap
                if (screenX >= mapX && screenX < mapX + config.WIDTH &&
                    screenY >= mapY && screenY < mapY + config.HEIGHT) {

                    // Pulsing marker
                    const pulse = Math.sin(Date.now() / 150) * 0.3 + 0.7;

                    if (obj.type === CONSTANTS.OBJECTIVES.TYPES.REACH_EXTRACTION) {
                        ctx.fillStyle = obj.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE
                            ? `rgba(0, 255, 0, ${pulse})`
                            : `rgba(100, 100, 100, 0.5)`;
                    } else {
                        ctx.fillStyle = obj.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE
                            ? `rgba(255, 255, 0, ${pulse})`
                            : `rgba(100, 100, 100, 0.5)`;
                    }

                    // Draw larger marker
                    ctx.fillRect(screenX - 1, screenY - 1, tileSize + 2, tileSize + 2);
                }
            });
        }

        // Draw player (always visible, centered)
        const playerScreenX = mapX + Math.floor(tilesWide / 2) * tileSize;
        const playerScreenY = mapY + Math.floor(tilesHigh / 2) * tileSize;

        ctx.fillStyle = config.COLORS.PLAYER;
        ctx.fillRect(playerScreenX, playerScreenY, tileSize, tileSize);

        // Draw player direction indicator
        ctx.fillStyle = '#ffffff';
        const dirX = this.player.direction.x;
        const dirY = this.player.direction.y;
        const indicatorX = playerScreenX + tileSize / 2 + dirX * 2;
        const indicatorY = playerScreenY + tileSize / 2 + dirY * 2;
        ctx.fillRect(indicatorX - 1, indicatorY - 1, 2, 2);

        // Restore context
        ctx.restore();

        // Draw border
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.strokeRect(mapX - 1, mapY - 1, config.WIDTH + 2, config.HEIGHT + 2);

        // Draw "MINIMAP" label
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '8px monospace';
        ctx.fillText('MAP', mapX, mapY + config.HEIGHT + 10);
    }

    /**
     * Session 6: Render inventory display - Metal Gear style with slots
     * Shows all inventory items (keycards, intel) in individual slots
     * Session 8: Repositioned to accommodate tranquilizer ammo display
     */
    renderInventory() {
        if (!this.game) return;

        const ctx = this.ctx;
        const inventory = this.game.inventory || [];

        // Position next to TRANQ bar (moved right in Session 8)
        const startX = 116;
        const startY = CONSTANTS.CANVAS.BASE_HEIGHT - 58;
        const slotSize = 20;
        const slotPadding = 2;
        const maxSlots = 4;

        // Calculate width based on items (min 1 slot shown)
        const numSlots = Math.max(1, Math.min(inventory.length, maxSlots));
        const panelWidth = 36 + numSlots * (slotSize + slotPadding);

        // Background panel
        ctx.fillStyle = '#000000';
        ctx.fillRect(startX, startY - 4, panelWidth, 28);

        // Border
        ctx.strokeStyle = '#404858';
        ctx.lineWidth = 2;
        ctx.strokeRect(startX, startY - 4, panelWidth, 28);

        // "ITEM" label (yellow like Metal Gear)
        ctx.fillStyle = '#e0c040';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('ITEM', startX + 4, startY + 10);

        // Draw inventory slots
        const slotsStartX = startX + 32;
        for (let i = 0; i < numSlots; i++) {
            const slotX = slotsStartX + i * (slotSize + slotPadding);
            const slotY = startY;

            // Slot background
            ctx.fillStyle = '#101820';
            ctx.fillRect(slotX, slotY, slotSize, slotSize);

            // Slot border
            ctx.strokeStyle = '#2a3a4a';
            ctx.lineWidth = 1;
            ctx.strokeRect(slotX, slotY, slotSize, slotSize);

            // Draw item icon if slot has item
            if (i < inventory.length) {
                const item = inventory[i];
                if (item.type === 'key') {
                    this.drawMiniKeycard(ctx, slotX + 4, slotY + 6);
                } else if (item.type === 'intel') {
                    this.drawMiniIntel(ctx, slotX + 4, slotY + 3);
                }
            }
        }

        // Show overflow count if more items than slots
        if (inventory.length > maxSlots) {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 8px monospace';
            ctx.fillText(`+${inventory.length - maxSlots}`, startX + panelWidth - 14, startY + 16);
        }

        // Show empty indicator if no items
        if (inventory.length === 0) {
            ctx.fillStyle = '#404040';
            ctx.font = '10px monospace';
            ctx.fillText('--', slotsStartX + 4, startY + 14);
        }
    }

    /**
     * Session 6: Draw a mini keycard icon (Metal Gear style)
     */
    drawMiniKeycard(ctx, x, y) {
        // Card background
        ctx.fillStyle = '#d0d0e0';
        ctx.fillRect(x, y, 12, 8);

        // Blue stripe
        ctx.fillStyle = '#3060a0';
        ctx.fillRect(x, y + 4, 12, 2);

        // Chip
        ctx.fillStyle = '#c0a040';
        ctx.fillRect(x + 2, y + 1, 3, 2);
    }

    /**
     * Session 6: Draw a mini intel/document icon (Metal Gear style)
     */
    drawMiniIntel(ctx, x, y) {
        // Folder background (manila)
        ctx.fillStyle = '#c0a060';
        ctx.fillRect(x, y + 2, 12, 12);

        // Folder tab
        ctx.fillRect(x + 7, y, 5, 3);

        // TOP SECRET stripe (red)
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(x + 1, y + 6, 10, 3);

        // Dark red inner
        ctx.fillStyle = '#cc2020';
        ctx.fillRect(x + 2, y + 7, 8, 1);
    }

    /**
     * Session 6: Draw a pixelated key icon (legacy - kept for compatibility)
     */
    drawPixelKey(ctx, x, y, size) {
        const p = size / 6;
        ctx.fillStyle = '#d0d0e0';
        ctx.fillRect(x, y + p, p * 5, p * 3);
        ctx.fillStyle = '#3060a0';
        ctx.fillRect(x, y + p * 2.5, p * 5, p);
        ctx.fillStyle = '#c0a040';
        ctx.fillRect(x + p * 0.5, y + p * 1.5, p * 1.5, p);
    }

    /**
     * Session 6: Draw a pixelated intel/document icon
     */
    drawPixelIntel(ctx, x, y, size) {
        const p = size / 6;

        // Folder background (manila)
        ctx.fillStyle = '#c0a060';
        ctx.fillRect(x + p, y, p * 4, p * 5);

        // Tab
        ctx.fillRect(x + p * 3, y - p * 0.5, p * 2, p);

        // TOP SECRET stripe (red)
        ctx.fillStyle = '#ff4040';
        ctx.fillRect(x + p * 1.5, y + p * 2, p * 3, p);
    }

    /**
     * Session 6: Render pickup prompt when near an item
     */
    renderPickupPrompt() {
        if (!this.game || !this.game.nearbyItem) return;

        const ctx = this.ctx;
        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        // Session 8: Moved up to avoid overlap with boss health bar on mobile
        const y = CONSTANTS.CANVAS.BASE_HEIGHT - 120;

        // Determine the key based on mobile or desktop
        const isMobile = this.game.isMobile;
        const keyText = isMobile ? '[Y]' : '[E]';

        // Use item name from nearbyItem (set by tilemap.getInteractableItemAt)
        const itemName = this.game.nearbyItem.name || 'Item';

        // Build prompt text - different verbs for different item types
        let actionVerb = 'Pick up';
        if (this.game.nearbyItem.type === 'objective') {
            actionVerb = 'Collect';
        }

        const promptText = `${actionVerb} ${itemName} ${keyText}`;

        // Measure text for background sizing
        ctx.font = '14px monospace';
        const textWidth = ctx.measureText(promptText).width;

        // Background with pulsing effect
        const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
        ctx.fillStyle = `rgba(0, 0, 0, ${0.8 * pulse})`;
        ctx.fillRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

        // Border
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

        // Text
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(promptText, centerX, y + 10);

        // Reset alignment
        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render Maduro-specific interaction prompts
     */
    renderMaduroPrompts() {
        if (!this.game) return;

        const ctx = this.ctx;
        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;

        // Prompt when near sleeping Maduro (can drag)
        if (this.game.nearSleepingMaduro) {
            const y = CONSTANTS.CANVAS.BASE_HEIGHT - 100;
            const isMobile = this.game.isMobile;
            const keyText = isMobile ? '[Y]' : '[E]';
            const promptText = `Drag Target ${keyText}`;

            ctx.font = '14px monospace';
            const textWidth = ctx.measureText(promptText).width;

            // Pulsing background
            const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
            ctx.fillStyle = `rgba(0, 0, 0, ${0.8 * pulse})`;
            ctx.fillRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

            // Cyan border (matches tranquilizer theme)
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

            // Text
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(promptText, centerX, y + 10);
            ctx.textAlign = 'left';
        }

        // Warning when at extraction without Maduro
        if (this.game.atExtractionWithoutMaduro) {
            const y = CONSTANTS.CANVAS.BASE_HEIGHT - 130;
            const promptText = 'Must extract target!';

            ctx.font = 'bold 14px monospace';
            const textWidth = ctx.measureText(promptText).width;

            // Pulsing red background
            const pulse = Math.sin(Date.now() / 150) * 0.2 + 0.8;
            ctx.fillStyle = `rgba(80, 0, 0, ${0.9 * pulse})`;
            ctx.fillRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

            // Red border
            ctx.strokeStyle = '#ff4040';
            ctx.lineWidth = 2;
            ctx.strokeRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

            // Red warning text
            ctx.fillStyle = '#ff4040';
            ctx.textAlign = 'center';
            ctx.fillText(promptText, centerX, y + 10);
            ctx.textAlign = 'left';
        }
    }

    /**
     * Session 8: Render alarm panel interaction prompt
     */
    renderAlarmPanelPrompt() {
        if (!this.game || !this.game.nearbyAlarmPanel) return;

        const ctx = this.ctx;
        const centerX = CONSTANTS.CANVAS.BASE_WIDTH / 2;
        const y = CONSTANTS.CANVAS.BASE_HEIGHT - 80;

        const isMobile = this.game.isMobile;
        const keyText = isMobile ? '[Y]' : '[E]';
        const promptText = `Turn Camera Off ${keyText}`;

        ctx.font = '14px monospace';
        const textWidth = ctx.measureText(promptText).width;

        // Pulsing background
        const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
        ctx.fillStyle = `rgba(0, 0, 0, ${0.8 * pulse})`;
        ctx.fillRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

        // Green border (matches alarm panel theme)
        ctx.strokeStyle = '#40ff40';
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - textWidth / 2 - 12, y - 6, textWidth + 24, 24);

        // Text
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(promptText, centerX, y + 10);
        ctx.textAlign = 'left';
    }

    /**
     * Session 6: Render credits display in top-left corner
     */
    renderCredits() {
        if (!this.game || !this.game.saveManager) return;

        const ctx = this.ctx;
        const credits = this.game.saveManager.getCredits();

        // Position in top-left
        const x = 10;
        const y = 10;

        // Background panel
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(x, y, 80, 22);

        // Border
        ctx.strokeStyle = '#404858';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, 80, 22);

        // "CR" label (gold)
        ctx.fillStyle = '#e0c040';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('CR', x + 4, y + 15);

        // Credit amount
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(String(credits), x + 74, y + 15);
        ctx.textAlign = 'left';
    }
}

<script>
// Maduro Nights - Menu System
// Title screen and overlay menus
// Session 3: Mobile-friendly prompts
// Session 6: Run results and upgrade shop screens
// Session 7: Audio controls integration
// Session 8: Settings menu and achievement display

class Menu {
    constructor(ctx) {
        this.ctx = ctx;
        this.canvasWidth = CONSTANTS.CANVAS.BASE_WIDTH;
        this.canvasHeight = CONSTANTS.CANVAS.BASE_HEIGHT;

        // Session 3: Detect if touch device

    /**
     * Session 3: Get appropriate action prompt text
     * @param {string} action - 'start', 'continue', or 'return'
     * @returns {string}
     */
    getPromptText(action) {
        if (this.isTouchDevice) {
            switch (action) {
                case 'start': return 'Tap anywhere to Start';
                case 'continue': return 'Tap anywhere to continue';
                case 'return': return 'Tap anywhere to return to menu';
                default: return 'Tap anywhere';
            }
        } else {
            switch (action) {
                case 'start': return 'Press ENTER or E to Start';
                case 'continue': return 'Press ENTER or E to continue';
                case 'return': return 'Press ENTER or E to return to menu';
                default: return 'Press ENTER';
            }
        }
    }

    /**
     * Session 8: Render achievement unlock notifications
     */
    renderAchievementNotifications() {
        const ctx = this.ctx;
        const now = Date.now();

        // Filter expired notifications
        this.achievementNotifications = this.achievementNotifications.filter(
            n => now - n.startTime < n.duration
        );

        // Render each notification
        this.achievementNotifications.forEach((notification, index) => {
            const elapsed = now - notification.startTime;
            const progress = elapsed / notification.duration;
            const achievement = notification.achievement;

            // Slide in from right, then slide out
            let xOffset = 0;
            let alpha = 1;

            if (progress < 0.1) {
                // Slide in
                xOffset = (1 - progress / 0.1) * 300;
                alpha = progress / 0.1;
            } else if (progress > 0.8) {
                // Fade out
                alpha = (1 - progress) / 0.2;
            }

            const x = this.canvasWidth - 220 + xOffset;
            const y = 60 + index * 70;

            ctx.save();
            ctx.globalAlpha = alpha;

            // Background
            ctx.fillStyle = 'rgba(40, 80, 40, 0.95)';
            ctx.fillRect(x, y, 210, 60);

            // Gold border
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, 210, 60);

            // Achievement icon (trophy)
            ctx.fillStyle = '#ffd700';
            ctx.font = '24px monospace';
            ctx.textAlign = 'left';
            ctx.fillText('🏆', x + 10, y + 38);

            // Achievement name
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 12px monospace';
            ctx.fillText('ACHIEVEMENT UNLOCKED!', x + 45, y + 20);

            // Achievement description
            ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
            ctx.font = '11px monospace';
            ctx.fillText(achievement.name, x + 45, y + 38);
            ctx.fillStyle = '#888';
            ctx.font = '9px monospace';
            ctx.fillText(achievement.description, x + 45, y + 52);

            ctx.restore();
        });
    }

    /**

     * @param {number} completedLevel - Level number just completed
     * @param {number} nextLevel - Next level number
     * @param {number} creditsEarned - Session 8: Credits earned this level
     * @param {number} totalCredits - Session 8: Total credits player has
     */
    renderLevelTransition(completedLevel, nextLevel, creditsEarned = 0, totalCredits = 0) {
        const ctx = this.ctx;
        const centerX = this.canvasWidth / 2;
        const centerY = this.canvasHeight / 2;

        // Dim overlay with blue tint
        ctx.fillStyle = 'rgba(0, 30, 60, 0.9)';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Level complete header
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`LEVEL ${completedLevel} COMPLETE`, centerX, centerY - 100);

        // Session 8: Show credits earned
        if (creditsEarned > 0) {
            ctx.fillStyle = '#40ff40';
            ctx.font = 'bold 18px monospace';
            ctx.fillText(`+${creditsEarned} CREDITS`, centerX, centerY - 65);

            ctx.fillStyle = '#888';
            ctx.font = '12px monospace';
            ctx.fillText(`Total: ${totalCredits}`, centerX, centerY - 45);
        }

        // Progress bar background
        const barWidth = 200;
        const barHeight = 20;
        const barX = centerX - barWidth / 2;
        const barY = centerY - 40;

        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY, barWidth, barHeight);

        // Progress bar fill
        const totalLevels = this.levelManager ? this.levelManager.getLevelCount() : 3;
        const progress = completedLevel / totalLevels;
        ctx.fillStyle = CONSTANTS.COLORS.EXTRACTION;
        ctx.fillRect(barX, barY, barWidth * progress, barHeight);

        // Progress bar border
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barWidth, barHeight);

        // Progress text
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '14px monospace';
        ctx.fillText(`Progress: ${completedLevel}/${totalLevels}`, centerX, barY + barHeight + 20);

        // Next level preview
        if (this.levelManager && nextLevel <= totalLevels) {
            const nextLevelData = this.levelManager.levels[nextLevel - 1];
            if (nextLevelData) {
                ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
                ctx.font = 'bold 24px monospace';
                ctx.fillText('NEXT:', centerX, centerY + 30);

                ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
                ctx.font = '18px monospace';
                ctx.fillText(nextLevelData.name, centerX, centerY + 60);

                // Difficulty indicator
                ctx.font = '12px monospace';
                ctx.fillStyle = '#888';
                const guardCount = nextLevelData.guards.length;
                ctx.fillText(`Guards: ${guardCount}`, centerX, centerY + 85);
            }
        }

        // Continue prompt (pulsing)
        const pulse = (Math.sin(Date.now() / 500) + 1) / 2;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '16px monospace';
        ctx.fillText(this.getPromptText('continue'), centerX, centerY + 130);
        ctx.globalAlpha = 1;

        ctx.textAlign = 'left';
    }

    /**

    renderRunResults(runStats, credits) {
        const ctx = this.ctx;
        const centerX = this.canvasWidth / 2;

        // Background
        const bgColor = runStats && runStats.success ? 'rgba(0, 40, 20, 0.95)' : 'rgba(40, 10, 10, 0.95)';
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Header
        ctx.textAlign = 'center';
        ctx.fillStyle = runStats && runStats.success ? CONSTANTS.COLORS.EXTRACTION : CONSTANTS.COLORS.DETECTION_ALERT;
        ctx.font = 'bold 36px monospace';
        ctx.fillText(runStats && runStats.success ? 'MISSION COMPLETE' : 'MISSION FAILED', centerX, 60);

        // Stats section
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = 'bold 16px monospace';
        ctx.fillText('RUN STATISTICS', centerX, 110);

        // Stats grid
        ctx.font = '14px monospace';
        const statsY = 140;
        const lineHeight = 24;

        if (runStats) {
            // Left column
            ctx.textAlign = 'right';
            ctx.fillStyle = '#888';

            ctx.fillText('Guards Eliminated:', centerX - 20, statsY + lineHeight);
            ctx.fillText('Alerts Triggered:', centerX - 20, statsY + lineHeight * 2);
            ctx.fillText('Damage Taken:', centerX - 20, statsY + lineHeight * 3);

            // Right column
            ctx.textAlign = 'left';
            ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
            ctx.fillText(this.formatTime(runStats.totalTime || 0), centerX + 20, statsY);
            ctx.fillText(String(runStats.guardsEliminated || 0), centerX + 20, statsY + lineHeight);
            ctx.fillText(String(runStats.alertsTriggered || 0), centerX + 20, statsY + lineHeight * 2);
            ctx.fillText(String(runStats.damagesTaken || 0), centerX + 20, statsY + lineHeight * 3);

            // Bonus badges

            ctx.textAlign = 'center';

                ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
                ctx.fillText('GHOST', centerX - 60, badgeY);

            if (runStats.isPacifist && runStats.success) {
                ctx.fillStyle = '#40ff80';

                ctx.fillText(item.label, centerX - 120, y);
                ctx.textAlign = 'right';
                ctx.fillText(`+${item.value}`, centerX + 120, y);
                y += 22;

            // Total
            ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
            ctx.font = 'bold 18px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`TOTAL: ${credits.total} CREDITS`, centerX, y + 15);
        }

        // Continue prompt
        const pulse = (Math.sin(Date.now() / 500) + 1) / 2;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '16px monospace';
        ctx.fillText(this.getPromptText('continue'), centerX, this.canvasHeight - 40);
        ctx.globalAlpha = 1;

        ctx.textAlign = 'left';
    }

    /**

     * Full shop with upgrade tree, costs, and purchase ability
     */
    renderUpgradeShop() {
        const ctx = this.ctx;
        const centerX = this.canvasWidth / 2;

        // Background
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Header
        ctx.textAlign = 'center';

        ctx.font = '16px monospace';
        ctx.fillText(`CREDITS: ${credits}`, centerX, 58);

        // Clear button areas
        this.upgradeButtons = [];

        // Get upgrades by category
        const byCategory = this.upgradeManager ? this.upgradeManager.getUpgradesByCategory() : { MOVEMENT: [], DETECTION: [] };

        // Draw categories - fit within 768px width with padding
        const padding = 10;
        const gap = 8;
        const categoryWidth = (this.canvasWidth - padding * 2 - gap) / 2; // ~375px each
        const categoryStartY = 75;

        // Movement category (left side)
        this.renderUpgradeCategory(ctx, 'MOVEMENT', byCategory.MOVEMENT, padding, categoryStartY, categoryWidth);

        // Detection category (right side)
        this.renderUpgradeCategory(ctx, 'DETECTION', byCategory.DETECTION, padding + categoryWidth + gap, categoryStartY, categoryWidth);

        // Continue button
        const continueY = this.canvasHeight - 30;
        ctx.textAlign = 'center';

        const pulse = (Math.sin(Date.now() / 500) + 1) / 2;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '14px monospace';
        ctx.fillText(this.isTouchDevice ? 'Tap here to continue' : 'Press ENTER to continue', centerX, continueY);
        ctx.globalAlpha = 1;

        // Store continue button area
        this.continueButton = {
            x: centerX - 150,
            y: continueY - 15,
            width: 300,
            height: 30
        };

        // Session 8: Reset progression button (top-right corner)
        this.renderResetButton(ctx);

        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render reset progression button
     * @param {CanvasRenderingContext2D} ctx
     */
    renderResetButton(ctx) {
        const buttonWidth = 120;
        const buttonHeight = 24;
        const buttonX = this.canvasWidth - buttonWidth - 10;
        const buttonY = 10;

        // Button background
        if (this.resetConfirmPending) {
            // Red background when confirming
            ctx.fillStyle = '#802020';
        } else {
            ctx.fillStyle = '#2a2a3a';
        }
        ctx.fillRect(buttonX, buttonY, buttonWidth, buttonHeight);

        // Button border
        ctx.strokeStyle = this.resetConfirmPending ? '#ff4040' : '#404858';
        ctx.lineWidth = 1;
        ctx.strokeRect(buttonX, buttonY, buttonWidth, buttonHeight);

        // Button text
        ctx.fillStyle = this.resetConfirmPending ? '#ff4040' : '#888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        const buttonText = this.resetConfirmPending ? 'Click to Confirm' : 'Reset Progress';
        ctx.fillText(buttonText, buttonX + buttonWidth / 2, buttonY + 16);

        // Store button area for click detection
        this.resetButton = {
            x: buttonX,
            y: buttonY,
            width: buttonWidth,
            height: buttonHeight
        };
    }

    /**
     * Session 6: Render a category of upgrades
     * @param {CanvasRenderingContext2D} ctx
     * @param {string} categoryName
     * @param {Array} upgrades
     * @param {number} x
     * @param {number} y
     * @param {number} width
     */
    renderUpgradeCategory(ctx, categoryName, upgrades, x, y, width) {
        // Category header
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(categoryName, x + width / 2, y);

        // Upgrades - compact layout to fit 4 upgrades in available space
        // Available height: 576 - 75 (start) - 40 (continue button) = 461px
        // 4 upgrades: (461 - 18 header) / 4 = ~110px per upgrade with gaps
        const upgradeHeight = 108;
        const upgradeGap = 3;
        const padding = 6;
        let currentY = y + 16;

        upgrades.forEach((upgrade) => {
            const buttonY = currentY;

            // Background
            ctx.fillStyle = upgrade.canPurchase ? 'rgba(60, 80, 60, 0.8)' : 'rgba(40, 40, 50, 0.8)';
            ctx.fillRect(x, buttonY, width, upgradeHeight);

            // Border
            ctx.strokeStyle = upgrade.canPurchase ? '#40ff40' : '#404858';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, buttonY, width, upgradeHeight);

            // Upgrade name
            ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(upgrade.name, x + padding, buttonY + 16);

            // Tier indicators (smaller, on same line as name)
            const tierX = x + width - padding - 50;
            for (let t = 1; t <= upgrade.maxTier; t++) {
                ctx.fillStyle = t <= upgrade.currentTier ? CONSTANTS.COLORS.UI_ACCENT : '#333';
                ctx.fillRect(tierX + (t - 1) * 16, buttonY + 6, 12, 12);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                ctx.strokeRect(tierX + (t - 1) * 16, buttonY + 6, 12, 12);
            }

            // Description
            ctx.fillStyle = '#888';
            ctx.font = '10px monospace';
            ctx.fillText(upgrade.description, x + padding, buttonY + 32);

            // Effect preview
            if (upgrade.nextEffect) {
                const effectKey = Object.keys(upgrade.nextEffect)[0];
                const effectValue = upgrade.nextEffect[effectKey];
                const formatted = this.upgradeManager ? this.upgradeManager.formatEffect(effectKey, effectValue) : effectValue;
                ctx.fillStyle = '#40ff80';
                ctx.fillText(`Next: ${formatted}`, x + padding, buttonY + 46);
            } else {
                ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
                ctx.fillText('MAXED', x + padding, buttonY + 46);
            }

            // Cost / Purchase button
            if (!upgrade.isMaxed) {
                const costText = `${upgrade.nextCost} CR`;
                const buttonWidth = 60;
                const buttonX = x + width - padding - buttonWidth;
                const buttonBtnY = buttonY + 28;

                ctx.fillStyle = upgrade.canPurchase ? '#40a040' : '#404040';
                ctx.fillRect(buttonX, buttonBtnY, buttonWidth, 20);

                ctx.fillStyle = upgrade.canPurchase ? '#fff' : '#666';
                ctx.font = '11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(costText, buttonX + buttonWidth / 2, buttonBtnY + 14);

                // Store button area for click detection
                this.upgradeButtons.push({
                    x: buttonX,
                    y: buttonBtnY,
                    width: buttonWidth,
                    height: 20,
                    upgradeId: upgrade.id,
                    canPurchase: upgrade.canPurchase
                });
            }

            ctx.textAlign = 'left';
            currentY += upgradeHeight + upgradeGap;
        });
    }

    /**
     * Session 6: Handle click in upgrade shop
     * @param {number} clickX
     * @param {number} clickY
     * @returns {boolean} True if an action was taken
     */
    handleUpgradeShopClick(clickX, clickY) {
        // Session 8: Check reset button
        if (this.resetButton) {
            if (clickX >= this.resetButton.x && clickX <= this.resetButton.x + this.resetButton.width &&
                clickY >= this.resetButton.y && clickY <= this.resetButton.y + this.resetButton.height) {
                if (this.resetConfirmPending) {
                    // Confirmed - reset all progression
                    this.performReset();
                } else {
                    // First click - show confirmation
                    this.resetConfirmPending = true;
                }
                return true;
            } else {
                // Clicked elsewhere - cancel confirmation
                this.resetConfirmPending = false;
            }
        }

        // Check upgrade buttons
        for (const button of this.upgradeButtons) {
            if (clickX >= button.x && clickX <= button.x + button.width &&
                clickY >= button.y && clickY <= button.y + button.height) {
                if (button.canPurchase && this.upgradeManager) {
                    this.upgradeManager.purchase(button.upgradeId);
                    return true;
                }
            }
        }

        // Check continue button
        if (this.continueButton) {
            if (clickX >= this.continueButton.x && clickX <= this.continueButton.x + this.continueButton.width &&
                clickY >= this.continueButton.y && clickY <= this.continueButton.y + this.continueButton.height) {
                // Trigger menu interaction (will exit shop)
                eventBus.emit(EVENTS.INPUT_ACTION, CONSTANTS.ACTIONS.INTERACT);
                return true;
            }
        }

        return false;
    }

    /**
     * Session 8: Check if shop button was clicked on title screen
     * @param {number} clickX
     * @param {number} clickY
     * @returns {boolean} True if shop button was clicked
     */
    handleTitleScreenClick(clickX, clickY) {
        if (this.shopButton) {
            if (clickX >= this.shopButton.x && clickX <= this.shopButton.x + this.shopButton.width &&
                clickY >= this.shopButton.y && clickY <= this.shopButton.y + this.shopButton.height) {
                return true; // Shop button clicked
            }
        }
        return false;
    }

    /**
     * Session 8: Perform the actual reset of all progression
     */
    performReset() {
        if (this.saveManager) {
            this.saveManager.reset();
        }
        if (this.upgradeManager) {
            this.upgradeManager.recalculateEffects();
        }
        this.resetConfirmPending = false;
    }

    // ==================== SESSION 8: ACHIEVEMENT GALLERY ====================

    /**
     * Session 8: Render achievement gallery screen
     * Displays all 6 achievements in a 2x3 grid with lock status
     */
    renderAchievementGallery() {
        const ctx = this.ctx;
        const centerX = this.canvasWidth / 2;

        // Background
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Header
        ctx.textAlign = 'center';
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.font = 'bold 28px monospace';
        ctx.fillText('ACHIEVEMENTS', centerX, 40);

        // Get all achievements with unlock status
        const achievements = this.statisticsManager ? this.statisticsManager.getAllAchievements() : [];

        // Grid layout: 3 columns x 2 rows
        const cols = 3;
        const cardWidth = 280;
        const cardHeight = 160;
        const gapX = 20;
        const gapY = 20;
        const gridWidth = cols * cardWidth + (cols - 1) * gapX;
        const startX = (this.canvasWidth - gridWidth) / 2;
        const startY = 70;

        // Clear achievement click areas
        this.achievementCards = [];

        achievements.forEach((achievement, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);
            const x = startX + col * (cardWidth + gapX);
            const y = startY + row * (cardHeight + gapY);
            const isUnlocked = achievement.isUnlocked;

            // Card background
            ctx.fillStyle = isUnlocked ? 'rgba(60, 50, 20, 0.9)' : 'rgba(30, 30, 40, 0.9)';
            ctx.fillRect(x, y, cardWidth, cardHeight);

            // Card border
            ctx.strokeStyle = isUnlocked ? CONSTANTS.COLORS.ACHIEVEMENT_GOLD : CONSTANTS.COLORS.ACHIEVEMENT_LOCKED;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, cardWidth, cardHeight);

            // Icon placeholder (circle with icon text)
            const iconX = x + 40;
            const iconY = y + 55;
            const iconRadius = 25;

            ctx.beginPath();
            ctx.arc(iconX, iconY, iconRadius, 0, Math.PI * 2);
            ctx.fillStyle = isUnlocked ? 'rgba(255, 215, 0, 0.2)' : 'rgba(64, 64, 64, 0.3)';
            ctx.fill();
            ctx.strokeStyle = isUnlocked ? CONSTANTS.COLORS.ACHIEVEMENT_GOLD : CONSTANTS.COLORS.ACHIEVEMENT_LOCKED;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Icon symbol
            ctx.fillStyle = isUnlocked ? CONSTANTS.COLORS.ACHIEVEMENT_GOLD : CONSTANTS.COLORS.ACHIEVEMENT_LOCKED;
            ctx.font = '20px monospace';
            ctx.textAlign = 'center';
            const iconSymbols = {
                ghost: '?',
                dove: '~',
                clock: '@',
                skull: 'X',
                shield: '#',
                target: '+'
            };
            ctx.fillText(iconSymbols[achievement.icon] || '?', iconX, iconY + 7);

            // Achievement name
            ctx.textAlign = 'left';
            ctx.fillStyle = isUnlocked ? CONSTANTS.COLORS.ACHIEVEMENT_GOLD : CONSTANTS.COLORS.UI_TEXT;
            ctx.font = 'bold 14px monospace';
            ctx.fillText(achievement.name, x + 75, y + 35);

            // Achievement description
            ctx.fillStyle = isUnlocked ? '#ccaa44' : '#888';
            ctx.font = '11px monospace';
            // Word wrap the description
            const maxTextWidth = cardWidth - 85;
            const words = achievement.description.split(' ');
            let line = '';
            let lineY = y + 55;
            words.forEach(word => {
                const testLine = line + (line ? ' ' : '') + word;
                if (ctx.measureText(testLine).width > maxTextWidth) {
                    ctx.fillText(line, x + 75, lineY);
                    line = word;
                    lineY += 16;
                } else {
                    line = testLine;
                }
            });
            ctx.fillText(line, x + 75, lineY);

            // Status badge
            ctx.textAlign = 'left';
            ctx.font = 'bold 11px monospace';
            if (isUnlocked) {
                ctx.fillStyle = CONSTANTS.COLORS.ACHIEVEMENT_GOLD;
                ctx.fillText('UNLOCKED', x + 75, y + cardHeight - 20);
            } else {
                ctx.fillStyle = CONSTANTS.COLORS.ACHIEVEMENT_LOCKED;
                ctx.fillText('LOCKED', x + 75, y + cardHeight - 20);
            }
        });

        // Back button
        ctx.textAlign = 'center';
        const backY = this.canvasHeight - 40;
        const pulse = (Math.sin(Date.now() / 500) + 1) / 2;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '14px monospace';
        ctx.fillText(this.isTouchDevice ? 'Tap here to go back' : 'Press ESC or ENTER to go back', centerX, backY);
        ctx.globalAlpha = 1;

        // Store back button area
        this.galleryBackButton = {
            x: centerX - 150,
            y: backY - 15,
            width: 300,
            height: 30
        };

        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Handle click on achievement gallery back button
     * @param {number} clickX
     * @param {number} clickY
     * @returns {boolean}
     */
    handleAchievementGalleryClick(clickX, clickY) {
        if (this.galleryBackButton) {
            if (clickX >= this.galleryBackButton.x && clickX <= this.galleryBackButton.x + this.galleryBackButton.width &&
                clickY >= this.galleryBackButton.y && clickY <= this.galleryBackButton.y + this.galleryBackButton.height) {
                return true; // Back button clicked
            }
        }
        return false;
    }

    // ==================== SESSION 8: SETTINGS SCREEN ====================

    /**
     * Session 8: Render settings screen (accessible from pause menu)
     * Displays volume sliders and difficulty selector
     */
    renderSettings() {
        const ctx = this.ctx;
        const centerX = this.canvasWidth / 2;
        const centerY = this.canvasHeight / 2;

        // Background
        ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
        ctx.fillRect(0, 0, this.canvasWidth, this.canvasHeight);

        // Header
        ctx.textAlign = 'center';
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.font = 'bold 28px monospace';
        ctx.fillText('SETTINGS', centerX, 60);

        // Get current settings
        const settings = this.saveManager ? this.saveManager.getSettings() : {
            masterVolume: 0.7, sfxVolume: 0.8, musicVolume: 0.5, difficulty: 'NORMAL'
        };

        // Clear slider areas
        this.settingsSliders = [];
        this.settingsDifficultyButtons = [];

        // Volume section
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = 'bold 16px monospace';
        ctx.fillText('VOLUME', centerX, 110);

        const sliderWidth = 300;
        const sliderHeight = 20;
        const sliderX = centerX - sliderWidth / 2;
        let sliderY = 140;

        // Master volume slider
        this.renderVolumeSlider(ctx, 'Master', settings.masterVolume, sliderX, sliderY, sliderWidth, sliderHeight, 'masterVolume');
        sliderY += 60;

        // SFX volume slider
        this.renderVolumeSlider(ctx, 'SFX', settings.sfxVolume, sliderX, sliderY, sliderWidth, sliderHeight, 'sfxVolume');
        sliderY += 60;

        // Music volume slider
        this.renderVolumeSlider(ctx, 'Music', settings.musicVolume, sliderX, sliderY, sliderWidth, sliderHeight, 'musicVolume');

        // Difficulty section
        const diffY = 380;
        ctx.textAlign = 'center';
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = 'bold 16px monospace';
        ctx.fillText('DIFFICULTY', centerX, diffY);

        ctx.fillStyle = '#888';
        ctx.font = '11px monospace';
        ctx.fillText('(takes effect on next level)', centerX, diffY + 18);

        const difficulties = ['EASY', 'NORMAL', 'HARD'];
        const btnWidth = 120;
        const btnHeight = 36;
        const btnGap = 20;
        const totalBtnWidth = difficulties.length * btnWidth + (difficulties.length - 1) * btnGap;
        let btnX = centerX - totalBtnWidth / 2;
        const btnY = diffY + 35;

        difficulties.forEach(diff => {
            const isActive = settings.difficulty === diff;
            const diffConfig = CONSTANTS.SETTINGS.DIFFICULTY[diff];

            // Button background
            ctx.fillStyle = isActive ? '#40a040' : '#2a2a3a';
            ctx.fillRect(btnX, btnY, btnWidth, btnHeight);

            // Button border
            ctx.strokeStyle = isActive ? '#40ff40' : '#404858';
            ctx.lineWidth = isActive ? 2 : 1;
            ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);

            // Button text
            ctx.fillStyle = isActive ? '#ffffff' : '#888';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(diffConfig.name, btnX + btnWidth / 2, btnY + 22);

            // Store button area
            this.settingsDifficultyButtons.push({
                x: btnX,
                y: btnY,
                width: btnWidth,
                height: btnHeight,
                difficulty: diff
            });

            btnX += btnWidth + btnGap;
        });

        // Difficulty description
        const currentDiff = CONSTANTS.SETTINGS.DIFFICULTY[settings.difficulty];
        ctx.fillStyle = '#666';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        const descY = btnY + btnHeight + 20;
        ctx.fillText(`Vision: x${currentDiff.guardVisionMultiplier} | Detection: x${currentDiff.guardDetectionMultiplier} | HP Bonus: ${currentDiff.playerHealthBonus >= 0 ? '+' : ''}${currentDiff.playerHealthBonus}`, centerX, descY);

        // Back button
        const backY = this.canvasHeight - 40;
        const pulse = (Math.sin(Date.now() / 500) + 1) / 2;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '14px monospace';
        ctx.fillText(this.isTouchDevice ? 'Tap here to go back' : 'Press ESC or ENTER to go back', centerX, backY);
        ctx.globalAlpha = 1;

        // Store back button area
        this.settingsBackButton = {
            x: centerX - 150,
            y: backY - 15,
            width: 300,
            height: 30
        };

        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Render a volume slider
     * @param {CanvasRenderingContext2D} ctx
     * @param {string} label
     * @param {number} value - 0 to 1
     * @param {number} x
     * @param {number} y
     * @param {number} width
     * @param {number} height
     * @param {string} settingKey - save manager setting key
     */
    renderVolumeSlider(ctx, label, value, x, y, width, height, settingKey) {
        // Label
        ctx.fillStyle = '#cccccc';
        ctx.font = '13px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(label, x, y - 5);

        // Value percentage
        ctx.textAlign = 'right';
        ctx.fillText(`${Math.round(value * 100)}%`, x + width, y - 5);

        // Slider background
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(x, y, width, height);

        // Slider fill
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.fillRect(x, y, width * value, height);

        // Slider border
        ctx.strokeStyle = '#404858';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, width, height);

        // Slider handle
        const handleX = x + width * value;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(handleX - 3, y - 2, 6, height + 4);

        // Store slider area for click detection
        this.settingsSliders.push({
            x: x,
            y: y,
            width: width,
            height: height,
            settingKey: settingKey
        });

        ctx.textAlign = 'left';
    }

    /**
     * Session 8: Handle click on settings screen
     * @param {number} clickX
     * @param {number} clickY
     * @returns {Object|null} Action taken: { type: 'volume', key, value } or { type: 'difficulty', value } or { type: 'back' } or null
     */
    handleSettingsClick(clickX, clickY) {
        // Check volume sliders
        if (this.settingsSliders) {
            for (const slider of this.settingsSliders) {
                if (clickX >= slider.x && clickX <= slider.x + slider.width &&
                    clickY >= slider.y - 5 && clickY <= slider.y + slider.height + 5) {
                    const value = Math.max(0, Math.min(1, (clickX - slider.x) / slider.width));
                    return { type: 'volume', key: slider.settingKey, value: Math.round(value * 100) / 100 };
                }
            }
        }

        // Check difficulty buttons
        if (this.settingsDifficultyButtons) {
            for (const btn of this.settingsDifficultyButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.width &&
                    clickY >= btn.y && clickY <= btn.y + btn.height) {
                    return { type: 'difficulty', value: btn.difficulty };
                }
            }
        }

        // Check back button
        if (this.settingsBackButton) {
            if (clickX >= this.settingsBackButton.x && clickX <= this.settingsBackButton.x + this.settingsBackButton.width &&
                clickY >= this.settingsBackButton.y && clickY <= this.settingsBackButton.y + this.settingsBackButton.height) {
                return { type: 'back' };
            }
        }

        return null;
    }

    /**
     * Session 8: Check if achievement count was clicked on title screen
     * @param {number} clickX
     * @param {number} clickY
     * @returns {boolean}
     */
    handleAchievementCountClick(clickX, clickY) {
        if (this.achievementCountButton) {
            if (clickX >= this.achievementCountButton.x && clickX <= this.achievementCountButton.x + this.achievementCountButton.width &&
                clickY >= this.achievementCountButton.y && clickY <= this.achievementCountButton.y + this.achievementCountButton.height) {
                return true;
            }
        }
        return false;
    }

    /**
     * Session 6: Format time in minutes:seconds
     * @param {number} seconds
     * @returns {string}
     */
    formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
}
