<script>
// Maduro Nights - Audio Manager
// Session 7: Web Audio API-based sound system with procedural audio

class AudioManager {
    constructor() {
        this.audioContext = null;
        this.masterGain = null;
        this.sfxGain = null;
        this.musicGain = null;

        // Volume settings
        this.masterVolume = CONSTANTS.AUDIO.MASTER_VOLUME;
        this.sfxVolume = CONSTANTS.AUDIO.SFX_VOLUME;
        this.musicVolume = CONSTANTS.AUDIO.MUSIC_VOLUME;

        // Audio state
        this.isInitialized = false;
        this.isMuted = false;

        // Music state
        this.musicNodes = [];
        this.currentTension = CONSTANTS.AUDIO.MUSIC.TENSION_CALM;
        this.isMusicPlaying = false;

        // Footstep timing
        this.lastFootstepTime = 0;
        this.footstepInterval = CONSTANTS.AUDIO.FOOTSTEP_INTERVAL.WALK;

        // Event listeners
        this.setupEventListeners();
    }

    /**
     * Initialize audio context (must be called after user interaction)
     */
    init() {
        if (this.isInitialized) return;

        try {
            // Create audio context
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // Create gain nodes for volume control
            this.masterGain = this.audioContext.createGain();
            this.sfxGain = this.audioContext.createGain();
            this.musicGain = this.audioContext.createGain();

            // Connect gain chain: sfx/music -> master -> destination
            this.sfxGain.connect(this.masterGain);
            this.musicGain.connect(this.masterGain);
            this.masterGain.connect(this.audioContext.destination);

            // Set initial volumes
            this.updateVolumes();

            this.isInitialized = true;
            console.log('[AudioManager] Initialized');
        } catch (error) {
            console.error('[AudioManager] Failed to initialize:', error);
        }
    }

    /**
     * Resume audio context if suspended (browser autoplay policy)
     */
    async resume() {
        if (this.audioContext && this.audioContext.state === 'suspended') {
            await this.audioContext.resume();
        }
    }

    /**
     * Setup event listeners for game events
     */
    setupEventListeners() {
        // Player events
        eventBus.on(EVENTS.PLAYER_ATTACK, () => this.playSFX('ATTACK'));
        eventBus.on(EVENTS.PLAYER_DAMAGED, () => this.playSFX('HIT'));
        eventBus.on(EVENTS.PLAYER_DIED, () => this.playSFX('GAME_OVER'));

        // Guard events
        eventBus.on(EVENTS.GUARD_ALERT, (data) => {
            if (data.state === 'ALERT') {
                this.playSFX('ALERT');
                this.setTension(CONSTANTS.AUDIO.MUSIC.TENSION_ALERT);
            } else if (data.state === 'SUSPICIOUS') {
                this.playSFX('SUSPICIOUS');
                this.setTension(CONSTANTS.AUDIO.MUSIC.TENSION_SUSPICIOUS);
            }
        });
        eventBus.on(EVENTS.GUARD_ELIMINATED, () => this.playSFX('GUARD_ELIMINATED'));

        // Door/Item events
        eventBus.on(EVENTS.DOOR_OPENED, () => this.playSFX('DOOR_OPEN'));
        eventBus.on(EVENTS.DOOR_LOCKED, () => this.playSFX('DOOR_LOCKED'));
        eventBus.on(EVENTS.KEY_COLLECTED, () => this.playSFX('KEY_PICKUP'));
        eventBus.on(EVENTS.ITEM_COLLECTED, () => this.playSFX('ITEM_PICKUP'));

        // Objective events
        eventBus.on(EVENTS.OBJECTIVE_COMPLETE, () => this.playSFX('OBJECTIVE_COMPLETE'));
        eventBus.on(EVENTS.LEVEL_COMPLETE, () => this.playSFX('LEVEL_COMPLETE'));

        // Session 7: Security system events
        eventBus.on(EVENTS.CAMERA_DETECTED_PLAYER, () => {
            this.playSFX('CAMERA_DETECT');
            this.setTension(CONSTANTS.AUDIO.MUSIC.TENSION_ALERT);
        });
        eventBus.on(EVENTS.CAMERA_DESTROYED, () => this.playSFX('CAMERA_DESTROY'));
        eventBus.on(EVENTS.ALARM_PANEL_DISABLED, () => this.playSFX('ALARM_DISABLE'));

        // Game state events
        eventBus.on(EVENTS.GAME_START, () => {
            this.init();
            this.resume();
            this.startMusic();
        });
        eventBus.on(EVENTS.LEVEL_START, () => {
            this.setTension(CONSTANTS.AUDIO.MUSIC.TENSION_CALM);
        });
        eventBus.on(EVENTS.GAME_PAUSE, () => this.pauseMusic());
        eventBus.on(EVENTS.GAME_RESUME, () => this.resumeMusic());

        // Menu events
        eventBus.on(EVENTS.MENU_SELECT, () => this.playSFX('MENU_SELECT'));
        eventBus.on(EVENTS.MENU_CONFIRM, () => this.playSFX('MENU_CONFIRM'));

        // Session 8: Boss events
        eventBus.on(EVENTS.BOSS_PHASE_CHANGE, () => this.playSFX('BOSS_PHASE_CHANGE'));
        eventBus.on(EVENTS.BOSS_DAMAGED, () => this.playSFX('BOSS_DAMAGED'));
        eventBus.on(EVENTS.BOSS_DEFEATED, () => this.playSFX('BOSS_DEFEATED'));
        eventBus.on(EVENTS.BOSS_ATTACK, () => this.playSFX('BOSS_ATTACK'));
        eventBus.on(EVENTS.BOSS_SUMMON, () => this.playSFX('BOSS_SUMMON'));
        eventBus.on(EVENTS.TRANQUILIZER_FIRED, () => this.playSFX('TRANQUILIZER_FIRE'));
        eventBus.on(EVENTS.TRANQUILIZER_HIT, () => this.playSFX('TRANQUILIZER_HIT'));
        eventBus.on(EVENTS.ACHIEVEMENT_UNLOCKED, () => this.playSFX('ACHIEVEMENT_UNLOCK'));
    }

    /**
     * Play a sound effect
     * @param {string} sfxName - Name from CONSTANTS.AUDIO.SFX
     */
    playSFX(sfxName) {
        if (!this.isInitialized || this.isMuted) return;

        const sfxConfig = CONSTANTS.AUDIO.SFX[sfxName];
        if (!sfxConfig) {
            console.warn(`[AudioManager] Unknown SFX: ${sfxName}`);
            return;
        }

        this.resume();
        this.playTone(sfxConfig, this.sfxGain);
    }

    /**
     * Play footstep sound based on movement mode
     * @param {string} mode - 'WALK', 'RUN', or 'CROUCH'
     */
    playFootstep(mode) {
        if (!this.isInitialized || this.isMuted) return;

        const now = this.audioContext.currentTime;
        const interval = CONSTANTS.AUDIO.FOOTSTEP_INTERVAL[mode] || 0.4;

        if (now - this.lastFootstepTime < interval) return;

        this.lastFootstepTime = now;

        const sfxName = `FOOTSTEP_${mode}`;
        const sfxConfig = CONSTANTS.AUDIO.SFX[sfxName];
        if (sfxConfig) {
            this.playTone(sfxConfig, this.sfxGain);
        }
    }

    /**
     * Play a procedural tone
     * @param {Object} config - { frequency, duration, type }
     * @param {GainNode} outputNode - Destination gain node
     */
    playTone(config, outputNode) {
        if (!this.audioContext) return;

        const { frequency, duration, type } = config;

        if (type === 'noise') {
            this.playNoise(duration, outputNode);
            return;
        }

        // Create oscillator
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();

        oscillator.type = type || 'sine';
        oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);

        // Envelope (attack-decay)
        const now = this.audioContext.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.3, now + 0.01); // Quick attack
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); // Decay

        // Connect and play
        oscillator.connect(gainNode);
        gainNode.connect(outputNode);

        oscillator.start(now);
        oscillator.stop(now + duration);
    }

    /**
     * Play white noise (for footsteps, etc.)
     * @param {number} duration
     * @param {GainNode} outputNode
     */
    playNoise(duration, outputNode) {
        if (!this.audioContext) return;

        // Create noise buffer
        const bufferSize = this.audioContext.sampleRate * duration;
        const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
        const output = buffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        // Create source
        const noise = this.audioContext.createBufferSource();
        noise.buffer = buffer;

        // Filter for more natural sound
        const filter = this.audioContext.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;

        // Envelope
        const gainNode = this.audioContext.createGain();
        const now = this.audioContext.currentTime;
        gainNode.gain.setValueAtTime(0.15, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        // Connect and play
        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(outputNode);

        noise.start(now);
        noise.stop(now + duration);
    }

    /**
     * Start ambient music
     */
    startMusic() {
        if (!this.isInitialized || this.isMusicPlaying) return;

        this.isMusicPlaying = true;
        this.playAmbientDrone();
    }

    /**
     * Play ambient drone based on current tension level
     */
    playAmbientDrone() {
        if (!this.isMusicPlaying || !this.audioContext) return;

        // Stop existing music
        this.stopMusicNodes();

        const baseFreq = CONSTANTS.AUDIO.MUSIC.DRONE_FREQUENCY;

        // Create drone oscillators
        const freqs = this.getDroneFrequencies(baseFreq);

        freqs.forEach((freq, i) => {
            const osc = this.audioContext.createOscillator();
            const gain = this.audioContext.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, this.audioContext.currentTime);

            // Subtle LFO for movement
            const lfo = this.audioContext.createOscillator();
            const lfoGain = this.audioContext.createGain();
            lfo.frequency.value = 0.1 + (i * 0.05);
            lfoGain.gain.value = freq * 0.02;
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            lfo.start();

            // Volume based on tension and position in chord
            const baseVol = 0.08 - (i * 0.015);
            const tensionMult = 1 + (this.currentTension * 0.3);
            gain.gain.setValueAtTime(baseVol * tensionMult, this.audioContext.currentTime);

            osc.connect(gain);
            gain.connect(this.musicGain);
            osc.start();

            this.musicNodes.push({ osc, gain, lfo, lfoGain });
        });

        // Add tension-based elements
        if (this.currentTension >= CONSTANTS.AUDIO.MUSIC.TENSION_SUSPICIOUS) {
            this.addTensionPulse();
        }
    }

    /**
     * Get drone frequencies based on tension
     * @param {number} baseFreq
     * @returns {number[]}
     */
    getDroneFrequencies(baseFreq) {
        // Calm: minor chord drone
        // Suspicious: add dissonance
        // Alert: tritone tension
        const calm = [baseFreq, baseFreq * 1.2, baseFreq * 1.5]; // Minor-ish
        const suspicious = [baseFreq, baseFreq * 1.189, baseFreq * 1.498, baseFreq * 1.782];
        const alert = [baseFreq, baseFreq * 1.414, baseFreq * 1.682, baseFreq * 2]; // Tritone + octave

        switch (this.currentTension) {
            case CONSTANTS.AUDIO.MUSIC.TENSION_ALERT:
                return alert;
            case CONSTANTS.AUDIO.MUSIC.TENSION_SUSPICIOUS:
                return suspicious;
            default:
                return calm;
        }
    }

    /**
     * Add rhythmic pulse for tension
     */
    addTensionPulse() {
        if (!this.audioContext) return;

        const bpm = CONSTANTS.AUDIO.MUSIC.BPM;
        const interval = 60 / bpm;
        const baseFreq = CONSTANTS.AUDIO.MUSIC.DRONE_FREQUENCY * 2;

        // Schedule pulse notes
        const scheduleAhead = 4; // Schedule 4 beats ahead
        for (let i = 0; i < scheduleAhead; i++) {
            const time = this.audioContext.currentTime + (i * interval);
            this.schedulePulseNote(baseFreq, time, interval * 0.5);
        }

        // Continue scheduling if still playing
        if (this.isMusicPlaying && this.currentTension >= CONSTANTS.AUDIO.MUSIC.TENSION_SUSPICIOUS) {
            setTimeout(() => this.addTensionPulse(), interval * scheduleAhead * 1000);
        }
    }

    /**
     * Schedule a single pulse note
     * @param {number} freq
     * @param {number} startTime
     * @param {number} duration
     */
    schedulePulseNote(freq, startTime, duration) {
        if (!this.audioContext || !this.isMusicPlaying) return;

        const osc = this.audioContext.createOscillator();
        const gain = this.audioContext.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, startTime);

        // Envelope
        const vol = this.currentTension === CONSTANTS.AUDIO.MUSIC.TENSION_ALERT ? 0.1 : 0.05;
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        osc.connect(gain);
        gain.connect(this.musicGain);

        osc.start(startTime);
        osc.stop(startTime + duration);
    }

    /**
     * Set tension level for music
     * @param {number} tension - TENSION_CALM, TENSION_SUSPICIOUS, or TENSION_ALERT
     */
    setTension(tension) {
        if (tension === this.currentTension) return;

        this.currentTension = tension;

        // Rebuild drone with new tension
        if (this.isMusicPlaying) {
            // Fade transition
            setTimeout(() => this.playAmbientDrone(), 100);
        }
    }

    /**
     * Stop all music nodes
     */
    stopMusicNodes() {
        this.musicNodes.forEach(({ osc, lfo }) => {
            try {
                osc.stop();
                if (lfo) lfo.stop();
            } catch (e) {
                // Already stopped
            }
        });
        this.musicNodes = [];
    }

    /**
     * Pause music
     */
    pauseMusic() {
        this.isMusicPlaying = false;
        this.fadeOut(this.musicGain, 0.5);
    }

    /**
     * Resume music
     */
    resumeMusic() {
        if (!this.isInitialized) return;

        this.isMusicPlaying = true;
        this.fadeIn(this.musicGain, 0.5);
        this.playAmbientDrone();
    }

    /**
     * Stop music completely
     */
    stopMusic() {
        this.isMusicPlaying = false;
        this.stopMusicNodes();
    }

    /**
     * Fade out a gain node
     * @param {GainNode} gainNode
     * @param {number} duration
     */
    fadeOut(gainNode, duration) {
        if (!gainNode || !this.audioContext) return;

        const now = this.audioContext.currentTime;
        gainNode.gain.linearRampToValueAtTime(0, now + duration);
    }

    /**
     * Fade in a gain node
     * @param {GainNode} gainNode
     * @param {number} duration
     */
    fadeIn(gainNode, duration) {
        if (!gainNode || !this.audioContext) return;

        const now = this.audioContext.currentTime;
        gainNode.gain.linearRampToValueAtTime(this.musicVolume, now + duration);
    }

    /**
     * Update all volume levels
     */
    updateVolumes() {
        if (!this.masterGain) return;

        this.masterGain.gain.value = this.isMuted ? 0 : this.masterVolume;
        this.sfxGain.gain.value = this.sfxVolume;
        this.musicGain.gain.value = this.musicVolume;
    }

    /**
     * Set master volume
     * @param {number} volume - 0 to 1
     */
    setMasterVolume(volume) {
        this.masterVolume = Math.max(0, Math.min(1, volume));
        this.updateVolumes();
    }

    /**
     * Set SFX volume
     * @param {number} volume - 0 to 1
     */
    setSFXVolume(volume) {
        this.sfxVolume = Math.max(0, Math.min(1, volume));
        this.updateVolumes();
    }

    /**
     * Set music volume
     * @param {number} volume - 0 to 1
     */
    setMusicVolume(volume) {
        this.musicVolume = Math.max(0, Math.min(1, volume));
        this.updateVolumes();
    }

    /**
     * Toggle mute
     */
    toggleMute() {
        this.isMuted = !this.isMuted;
        this.updateVolumes();
        return this.isMuted;
    }

    /**
     * Get current volume settings
     * @returns {Object}
     */
    getVolumeSettings() {
        return {
            master: this.masterVolume,
            sfx: this.sfxVolume,
            music: this.musicVolume,
            muted: this.isMuted
        };
    }
}

// Global audio manager instance
const audioManager = new AudioManager();
