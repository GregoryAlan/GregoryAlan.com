<script>
// Maduro Nights - Game Loop
// Fixed timestep game loop with update and render separation

class GameLoop {
    constructor(updateFn, renderFn) {
        this.updateFn = updateFn;
        this.renderFn = renderFn;

        this.running = false;
        this.rafId = null;

        // Timing
        this.targetFps = CONSTANTS.GAME_LOOP.TARGET_FPS;
        this.fixedTimestep = CONSTANTS.GAME_LOOP.FIXED_TIMESTEP;
        this.accumulator = 0;
        this.lastTime = 0;

        // FPS tracking
        this.fps = 0;
        this.frameCount = 0;
        this.fpsTime = 0;

        // Bind the loop method
        this.loop = this.loop.bind(this);
    }

    /**
     * Start the game loop
     */
    start() {
        if (this.running) return;

        this.running = true;
        this.lastTime = performance.now();
        this.accumulator = 0;
        this.frameCount = 0;
        this.fpsTime = 0;

        this.rafId = requestAnimationFrame(this.loop);
    }

    /**
     * Stop the game loop
     */
    stop() {
        this.running = false;
        if (this.rafId) {
            cancelAnimationFrame(this.rafId);
            this.rafId = null;
        }
    }

    /**
     * Main loop function
     * @param {number} currentTime - Current timestamp from requestAnimationFrame
     */
    loop(currentTime) {
        if (!this.running) return;

        // Calculate delta time
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;

        // Prevent spiral of death - cap max frame time
        const cappedDelta = Math.min(deltaTime, 250);
        this.accumulator += cappedDelta;

        // Fixed timestep updates
        while (this.accumulator >= this.fixedTimestep) {
            this.updateFn(this.fixedTimestep / 1000); // Convert to seconds
            this.accumulator -= this.fixedTimestep;
        }

        // Render with interpolation factor
        const alpha = this.accumulator / this.fixedTimestep;
        this.renderFn(alpha);

        // FPS calculation
        this.frameCount++;
        this.fpsTime += deltaTime;
        if (this.fpsTime >= 1000) {
            this.fps = this.frameCount;
            this.frameCount = 0;
            this.fpsTime -= 1000;
        }

        // Continue loop
        this.rafId = requestAnimationFrame(this.loop);
    }

    /**
     * Get current FPS
     * @returns {number}
     */
    getFps() {
        return this.fps;
    }

    /**
     * Check if loop is running
     * @returns {boolean}
     */
    isRunning() {
        return this.running;
    }
}

<script>
// Maduro Nights - Main Game Class
// Orchestrates all game systems
// Session 2: Vision cone detection and movement modes
// Session 3: Mobile touch controls support
// Session 4: Combat system, sound detection, enhanced AI
// Session 5: Multi-level structure, objectives, minimap
// Session 6: Rogue-lite meta-progression, credits, upgrades
// Session 7: Procedural generation, audio system, 5-level runs
// Session 8: Bosses, elite guards, tranquilizer, achievements

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');

        // Session 3: Control canvas for portrait mode
        this.controlCanvas = document.getElementById('controlCanvas');
        this.controlCtx = this.controlCanvas.getContext('2d');

        // Session 6: Rogue-lite managers (initialize before other systems)
        this.saveManager = new SaveManager();
        this.upgradeManager = new UpgradeManager(this.saveManager);
        this.statisticsManager = new StatisticsManager(this.saveManager);

        // Systems
        this.stateManager = new StateManager();
        this.renderer = new Renderer(this.canvas, this.ctx);
        this.input = new InputHandler();
        this.tilemap = null;
        this.collision = null;
        this.levelManager = new LevelManager();
        this.hud = new HUD(this.ctx);
        this.menu = new Menu(this.ctx);

        // Session 5: Objective manager
        this.objectiveManager = new ObjectiveManager();

        // Session 3: Touch controls (pass both canvases)
        this.touchControls = new TouchControls(this.canvas, this.controlCanvas);
        this.input.setTouchControls(this.touchControls);
        this.isMobile = this.detectMobile();

        // Entities
        this.player = null;
        this.guards = [];

        // Session 8: Elite guards and bosses
        this.eliteGuards = [];   // Array of EliteGuard entities
        this.boss = null;        // Current level boss (CaptainBoss or MaduroBoss)
        this.projectiles = [];   // Array of active projectiles
        this.shotgunPellets = []; // Array of active shotgun pellet spreads

        // Session 5: Level progression
        this.currentLevelNum = 1;
        this.hasKey = false;

        // Session 8: Gate system - array of gate data from level
        this.gates = [];

        // Session 7: Security systems
        this.cameras = [];       // Array of Camera entities
        this.alarmPanels = [];   // Array of alarm panel data { x, y, roomId, isDisabled }

        // Session 8: Tranquilizer gun position on level 5
        this.tranqGunPos = null; // { x, y } tile position, null if collected or not on this level

        // Session 6: Inventory system - tracks all collected items
        this.inventory = []; // Array of { type: 'key'|'intel', name: string, icon: string }

        // Session 6: Nearby item for pickup prompt
        this.nearbyItem = null; // { type: 'key', x, y } when player is near an item

        // Session 8: Maduro interaction prompts
        this.nearSleepingMaduro = false;  // True when player is near sleeping Maduro
        this.atExtractionWithoutMaduro = false;  // True when at extraction but not dragging Maduro
        this.gameOverReason = null;  // Custom game over reason (e.g., 'TARGET_KILLED')
        this.nearbyAlarmPanel = false;  // True when player is near an active alarm panel

        // Session 6: Pending credits to award at run results screen
        this.pendingCredits = null;

        // Session 8: Credits earned for the last completed level (for transition screen)
        this.lastLevelCredits = 0;

        // Debug
        this.debugEnabled = CONSTANTS.DEBUG.ENABLED;

        // Game loop
        this.gameLoop = new GameLoop(
            (dt) => this.update(dt),
            (alpha) => this.render(alpha)
        );

        // Setup
        this.setupCanvas();
        this.setupEventListeners();
        this.setupMobile();

        // Session 6: Pass managers to menu for upgrade shop
        this.menu.setRogueLiteManagers(this.saveManager, this.upgradeManager, this.statisticsManager);
    }

    /**
     * Session 3: Detect if device is mobile/touch
     * @returns {boolean}
     */
    detectMobile() {
        // Check for touch capability
        const hasTouchScreen = (
            'ontouchstart' in window ||
            navigator.maxTouchPoints > 0 ||
            navigator.msMaxTouchPoints > 0
        );

        // Check for mobile user agent (backup)
        const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
            navigator.userAgent
        );

        // Check for coarse pointer (touch)
        const hasCoarsePointer = window.matchMedia('(pointer: coarse)').matches;

        const result = hasTouchScreen && (mobileUA || hasCoarsePointer);
        console.log('detectMobile:', { hasTouchScreen, mobileUA, hasCoarsePointer, result });
        return result;
    }

    /**
     * Session 3: Setup mobile-specific features
     */
    setupMobile() {
        // Enable touch controls if mobile device detected
        if (this.isMobile) {
            this.touchControls.setEnabled(true);
            console.log('Mobile device detected - touch controls enabled');
        }

        // Listen for orientation changes
        window.addEventListener('orientationchange', () => this.onOrientationChange());
        window.matchMedia('(orientation: portrait)').addEventListener('change', () => {
            this.onOrientationChange();
        });

        // Also allow manual toggle for testing on desktop
        // (can be triggered from console: game.toggleTouchControls())
    }

    /**
     * Session 3: Handle orientation change
     */
    onOrientationChange() {
        // Update touch control layout when orientation changes
        this.touchControls.updateLayout();
    }

    /**
     * Session 3: Toggle touch controls (for testing)
     */
    toggleTouchControls() {
        const enabled = !this.touchControls.isEnabled();
        this.touchControls.setEnabled(enabled);
        console.log(`Touch controls ${enabled ? 'enabled' : 'disabled'}`);
    }

    /**
     * Setup canvas dimensions and scaling
     */
    setupCanvas() {
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
    }

    /**
     * Resize canvas to fit window while maintaining aspect ratio
     * Session 3 Update: Portrait mode is default for mobile (Game Boy style)
     */
    resizeCanvas() {
        const baseWidth = CONSTANTS.CANVAS.BASE_WIDTH;
        const baseHeight = CONSTANTS.CANVAS.BASE_HEIGHT;
        const aspectRatio = baseWidth / baseHeight;

        let width = window.innerWidth;
        let height = window.innerHeight;

        // Check if we're on mobile in portrait orientation
        const isPortrait = height > width;
        const isMobilePortrait = this.isMobile && isPortrait;

        if (isMobilePortrait) {
            // Portrait mode: Game fills width, controls below
            // Reserve bottom portion for Game Boy-style controls
            const controlAreaHeight = Math.min(height * 0.38, 220); // 38% of screen or 220px max
            const availableHeight = height - controlAreaHeight;

            // Scale game to fit the available width
            width = window.innerWidth;
            height = width / aspectRatio;

            // If game is too tall, scale down to fit available space
            if (height > availableHeight) {
                height = availableHeight;
                width = height * aspectRatio;
            }

            // Store control area info for touch controls
            this.controlAreaHeight = controlAreaHeight;
            this.gameAreaHeight = height;

            // Setup control canvas for portrait mode
            this.controlCanvas.style.display = 'block';
            this.controlCanvas.width = window.innerWidth;
            this.controlCanvas.height = controlAreaHeight;
            this.controlCanvas.style.width = `${window.innerWidth}px`;
            this.controlCanvas.style.height = `${controlAreaHeight}px`;
            this.controlCtx.imageSmoothingEnabled = false;
        } else {
            // Landscape mode: traditional fit-to-screen
            if (width / height > aspectRatio) {
                width = height * aspectRatio;
            } else {
                height = width / aspectRatio;
            }
            this.controlAreaHeight = 0;
            this.gameAreaHeight = height;

            // Hide control canvas in landscape
            this.controlCanvas.style.display = 'none';
        }

        this.canvas.width = baseWidth;
        this.canvas.height = baseHeight;
        this.canvas.style.width = `${width}px`;
        this.canvas.style.height = `${height}px`;

        // Position canvas at top for portrait mode
        if (isMobilePortrait) {
            this.canvas.style.marginTop = '0';
        }

        // Disable image smoothing for crisp pixels
        this.ctx.imageSmoothingEnabled = false;

        // Session 3: Update touch control layout on resize
        if (this.touchControls) {
            this.touchControls.updateLayout(isMobilePortrait, this.controlAreaHeight);
        }
    }

    /**
     * Setup event listeners
     */
    setupEventListeners() {
        // State changes
        eventBus.on(EVENTS.STATE_CHANGE, (data) => this.onStateChange(data));

        // Player events
        eventBus.on(EVENTS.PLAYER_DETECTED, () => this.onPlayerDetected());
        eventBus.on(EVENTS.PLAYER_REACHED_EXTRACTION, () => this.onLevelComplete());

        // Session 2: Guard alert events (for future features)
        eventBus.on(EVENTS.GUARD_ALERT, (data) => this.onGuardAlert(data));

        // Session 4: Combat events
        eventBus.on(EVENTS.PLAYER_ATTACK, (data) => this.onPlayerAttack(data));
        eventBus.on(EVENTS.GUARD_ATTACK, (data) => this.onGuardAttack(data));
        eventBus.on(EVENTS.PLAYER_DIED, () => this.onPlayerDied());
        eventBus.on(EVENTS.GUARD_ELIMINATED, (data) => this.onGuardEliminated(data));

        // Session 5: Objective events
        eventBus.on(EVENTS.OBJECTIVE_COMPLETE, (data) => this.onObjectiveComplete(data));
        eventBus.on(EVENTS.OBJECTIVE_ACTIVATED, (data) => this.onObjectiveActivated(data));
        eventBus.on(EVENTS.KEY_COLLECTED, (data) => this.onKeyCollected(data));
        eventBus.on(EVENTS.DOOR_OPENED, (data) => this.onDoorOpened(data));

        // Session 8: Boss events
        eventBus.on(EVENTS.BOSS_ATTACK, (data) => this.onBossAttack(data));
        eventBus.on(EVENTS.BOSS_SUMMON, (data) => this.onBossSummon(data));
        eventBus.on(EVENTS.BOSS_DEFEATED, (data) => this.onBossDefeated(data));
        eventBus.on(EVENTS.TRANQUILIZER_FIRED, (data) => this.onTranquilizerFired(data));
        eventBus.on(EVENTS.SHOTGUN_FIRED, (data) => this.onShotgunFired(data));

        // Debug toggle
        eventBus.on(EVENTS.DEBUG_TOGGLE, () => {
            this.debugEnabled = !this.debugEnabled;
        });

        // Input for menu interactions
        eventBus.on(EVENTS.INPUT_ACTION, (action) => {
            if (action === CONSTANTS.ACTIONS.INTERACT) {
                this.handleMenuInteraction();
            }
            if (action === CONSTANTS.ACTIONS.PAUSE) {
                this.togglePause();
            }
            // Session 6: Debug skip level (only works in debug mode while playing)
            if (action === CONSTANTS.ACTIONS.DEBUG_SKIP_LEVEL) {
                this.debugSkipLevel();
            }
            // Session 7: Toggle audio mute
            if (action === CONSTANTS.ACTIONS.TOGGLE_MUTE) {
                const isMuted = audioManager.toggleMute();
                console.log(`Audio ${isMuted ? 'muted' : 'unmuted'}`);
            }
            // Session 8: Switch weapon (only while playing)
            if (action === CONSTANTS.ACTIONS.SWITCH_WEAPON && this.stateManager.isPlaying()) {
                if (this.player) {
                    this.player.switchWeapon();
                }
            }
            // Session 8: Open shop from menu
            if (action === CONSTANTS.ACTIONS.OPEN_SHOP) {
                if (this.stateManager.getState() === CONSTANTS.STATES.MENU) {
                    this.stateManager.setState(CONSTANTS.STATES.UPGRADE_SHOP);
                }
            }
            // Session 8: Handle PAUSE for achievement gallery and settings (ESC goes back)
            if (action === CONSTANTS.ACTIONS.PAUSE) {
                const currentState = this.stateManager.getState();
                if (currentState === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
                    this.stateManager.setState(CONSTANTS.STATES.MENU);
                } else if (currentState === CONSTANTS.STATES.SETTINGS) {
                    this.stateManager.setState(CONSTANTS.STATES.PAUSED);
                }
            }
        });

        // Session 8: Key listeners for gallery and settings (raw key events, not action-mapped)
        document.addEventListener('keydown', (e) => {
            const state = this.stateManager.getState();
            // "G" key on title screen opens achievement gallery
            if (e.code === 'KeyG' && state === CONSTANTS.STATES.MENU) {
                this.stateManager.setState(CONSTANTS.STATES.ACHIEVEMENT_GALLERY);
            }
            // "S" key in pause opens settings
            if (e.code === 'KeyS' && state === CONSTANTS.STATES.PAUSED) {
                this.stateManager.setState(CONSTANTS.STATES.SETTINGS);
            }
            // ENTER/E in gallery goes back to menu
            if ((e.code === 'Enter' || e.code === 'KeyE') && state === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
                this.stateManager.setState(CONSTANTS.STATES.MENU);
            }
            // ENTER/E in settings goes back to pause
            if ((e.code === 'Enter' || e.code === 'KeyE') && state === CONSTANTS.STATES.SETTINGS) {
                this.stateManager.setState(CONSTANTS.STATES.PAUSED);
            }
        });

        // Session 3: Tap to interact on menu screens
        this.canvas.addEventListener('touchend', (e) => this.onCanvasTap(e));
        this.canvas.addEventListener('click', (e) => this.onCanvasClick(e));
    }

    /**
     * Session 3: Handle canvas tap (touch)
     * Session 6: Added RUN_RESULTS and UPGRADE_SHOP states
     * @param {TouchEvent} e
     */
    onCanvasTap(e) {
        // Only handle tap for menu interactions (not during gameplay)
        const state = this.stateManager.getState();
        const interactiveStates = [
            CONSTANTS.STATES.MENU, CONSTANTS.STATES.GAME_OVER,
            CONSTANTS.STATES.LEVEL_COMPLETE, CONSTANTS.STATES.LEVEL_TRANSITION,
            CONSTANTS.STATES.RUN_RESULTS, CONSTANTS.STATES.UPGRADE_SHOP,
            CONSTANTS.STATES.ACHIEVEMENT_GALLERY, CONSTANTS.STATES.SETTINGS,
            CONSTANTS.STATES.PAUSED
        ];
        if (interactiveStates.includes(state)) {
            // Check if the tap was on the game canvas
            if (e.changedTouches.length > 0) {
                const touch = e.changedTouches[0];
                const rect = this.canvas.getBoundingClientRect();

                // Check if touch is within the game canvas bounds
                const touchInCanvas = (
                    touch.clientX >= rect.left &&
                    touch.clientX <= rect.right &&
                    touch.clientY >= rect.top &&
                    touch.clientY <= rect.bottom
                );

                if (touchInCanvas) {
                    // Prevent default to avoid any conflicts on iOS
                    e.preventDefault();

                    const canvasPos = this.screenToCanvas(touch);

                    // Session 6: Handle upgrade shop interactions
                    if (state === CONSTANTS.STATES.UPGRADE_SHOP) {
                        this.menu.handleUpgradeShopClick(canvasPos.x, canvasPos.y);
                    } else if (state === CONSTANTS.STATES.MENU) {
                        // Session 8: Check for achievement count tap
                        if (this.menu.handleAchievementCountClick(canvasPos.x, canvasPos.y)) {
                            this.stateManager.setState(CONSTANTS.STATES.ACHIEVEMENT_GALLERY);
                        // Session 8: Check for shop button tap
                        } else if (this.menu.handleTitleScreenClick(canvasPos.x, canvasPos.y)) {
                            this.stateManager.setState(CONSTANTS.STATES.UPGRADE_SHOP);
                        } else {
                            this.handleMenuInteraction();
                        }
                    } else if (state === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
                        // Session 8: Gallery tap - back button
                        if (this.menu.handleAchievementGalleryClick(canvasPos.x, canvasPos.y)) {
                            this.stateManager.setState(CONSTANTS.STATES.MENU);
                        }
                    } else if (state === CONSTANTS.STATES.SETTINGS) {
                        // Session 8: Settings tap
                        this.handleSettingsAction(canvasPos.x, canvasPos.y);
                    } else if (state === CONSTANTS.STATES.PAUSED) {
                        // Session 8: Pause menu settings button tap
                        if (this.menu.pauseSettingsButton) {
                            const btn = this.menu.pauseSettingsButton;
                            if (canvasPos.x >= btn.x && canvasPos.x <= btn.x + btn.width &&
                                canvasPos.y >= btn.y && canvasPos.y <= btn.y + btn.height) {
                                this.stateManager.setState(CONSTANTS.STATES.SETTINGS);
                            }
                        }
                    } else {
                        this.handleMenuInteraction();
                    }
                }
            }
        }
    }

    /**
     * Session 3: Handle canvas click (mouse)
     * Session 6: Added RUN_RESULTS and UPGRADE_SHOP states
     * @param {MouseEvent} e
     */
    onCanvasClick(e) {
        // Only handle click for menu interactions on non-touch devices
        if (this.isMobile) return;

        const state = this.stateManager.getState();
        if (state === CONSTANTS.STATES.MENU) {
            const canvasPos = this.screenToCanvas(e);
            // Session 8: Check for achievement count click
            if (this.menu.handleAchievementCountClick(canvasPos.x, canvasPos.y)) {
                this.stateManager.setState(CONSTANTS.STATES.ACHIEVEMENT_GALLERY);
            // Session 8: Check for shop button click
            } else if (this.menu.handleTitleScreenClick(canvasPos.x, canvasPos.y)) {
                this.stateManager.setState(CONSTANTS.STATES.UPGRADE_SHOP);
            } else {
                this.handleMenuInteraction();
            }
        } else if (state === CONSTANTS.STATES.GAME_OVER ||
            state === CONSTANTS.STATES.LEVEL_COMPLETE ||
            state === CONSTANTS.STATES.LEVEL_TRANSITION ||
            state === CONSTANTS.STATES.RUN_RESULTS) {
            this.handleMenuInteraction();
        } else if (state === CONSTANTS.STATES.UPGRADE_SHOP) {
            // Session 6: Handle upgrade shop click
            const canvasPos = this.screenToCanvas(e);
            this.menu.handleUpgradeShopClick(canvasPos.x, canvasPos.y);
        } else if (state === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
            // Session 8: Handle gallery click
            const canvasPos = this.screenToCanvas(e);
            if (this.menu.handleAchievementGalleryClick(canvasPos.x, canvasPos.y)) {
                this.stateManager.setState(CONSTANTS.STATES.MENU);
            }
        } else if (state === CONSTANTS.STATES.SETTINGS) {
            // Session 8: Handle settings click
            const canvasPos = this.screenToCanvas(e);
            this.handleSettingsAction(canvasPos.x, canvasPos.y);
        } else if (state === CONSTANTS.STATES.PAUSED) {
            // Session 8: Handle pause menu settings button click
            const canvasPos = this.screenToCanvas(e);
            if (this.menu.pauseSettingsButton) {
                const btn = this.menu.pauseSettingsButton;
                if (canvasPos.x >= btn.x && canvasPos.x <= btn.x + btn.width &&
                    canvasPos.y >= btn.y && canvasPos.y <= btn.y + btn.height) {
                    this.stateManager.setState(CONSTANTS.STATES.SETTINGS);
                }
            }
        }
    }

    /**
     * Session 8: Handle settings screen click/tap actions
     * @param {number} x - Canvas x
     * @param {number} y - Canvas y
     */
    handleSettingsAction(x, y) {
        const action = this.menu.handleSettingsClick(x, y);
        if (!action) return;

        if (action.type === 'volume') {
            // Update save manager
            this.saveManager.setSetting(action.key, action.value);
            // Apply to audio manager immediately
            if (action.key === 'masterVolume') {
                audioManager.setMasterVolume(action.value);
            } else if (action.key === 'sfxVolume') {
                audioManager.setSFXVolume(action.value);
            } else if (action.key === 'musicVolume') {
                audioManager.setMusicVolume(action.value);
            }
        } else if (action.type === 'difficulty') {
            this.saveManager.setDifficulty(action.value);
        } else if (action.type === 'back') {
            this.stateManager.setState(CONSTANTS.STATES.PAUSED);
        }
    }

    /**
     * Session 3: Convert screen coordinates to canvas coordinates
     * @param {Touch|MouseEvent} point
     * @returns {{x: number, y: number}}
     */
    screenToCanvas(point) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width / rect.width;
        const scaleY = this.canvas.height / rect.height;

        return {
            x: (point.clientX - rect.left) * scaleX,
            y: (point.clientY - rect.top) * scaleY
        };
    }

    /**
     * Start the game
     */
    start() {
        this.gameLoop.start();
        this.stateManager.setState(CONSTANTS.STATES.MENU);
    }

    /**
     * Start a new game/run
     */
    startGame() {
        // Session 6: Reset pending credits and start run tracking
        this.pendingCredits = null;
        this.statisticsManager.startRun();

        // Session 7: Clear generated levels for fresh procedural generation
        this.levelManager.clearGeneratedLevels();

        // Session 7: Initialize and start audio
        audioManager.init();
        audioManager.resume();

        // Session 8: Apply saved volume settings
        const savedSettings = this.saveManager.getSettings();
        if (savedSettings) {
            audioManager.setMasterVolume(savedSettings.masterVolume);
            audioManager.setSFXVolume(savedSettings.sfxVolume);
            audioManager.setMusicVolume(savedSettings.musicVolume);
        }

        audioManager.startMusic();

        // Session 6: Emit run started event
        eventBus.emit(EVENTS.RUN_STARTED, {
            credits: this.saveManager.getCredits(),
            upgrades: this.upgradeManager.getActiveEffects()
        });

        eventBus.emit(EVENTS.GAME_START);

        this.loadLevel(1);
        this.stateManager.setState(CONSTANTS.STATES.PLAYING);
    }

    /**
     * Load a level
     * @param {number} levelNum - Level number to load
     */
    loadLevel(levelNum) {
        this.currentLevelNum = levelNum;
        const levelData = this.levelManager.getLevel(levelNum);

        // Session 5: Create tilemap with doors, cover, and keys from map data
        this.tilemap = new Tilemap(
            levelData.map,
            levelData.doors || [],
            levelData.cover || [],
            levelData.keys || []
        );
        this.collision = new Collision(this.tilemap);

        // Session 5: Reset key state for new level
        this.hasKey = false;

        // Session 8: Reset game over reason and prompts
        this.gameOverReason = null;
        this.nearSleepingMaduro = false;
        this.atExtractionWithoutMaduro = false;
        this.menu.setGameOverReason(null);

        // Session 8: Load gates from level data
        this.gates = levelData.gates || [];

        // Session 7: Load cameras from level data
        this.cameras = [];
        if (levelData.cameras) {
            levelData.cameras.forEach(camData => {
                const tileSize = CONSTANTS.TILE.SIZE;
                const camera = new Camera(
                    camData.x * tileSize + tileSize / 2,
                    camData.y * tileSize + tileSize / 2,
                    camData.facingAngle,
                    this.collision,
                    camData.sweeping !== false // Default to sweeping
                );
                camera.setRoomId(camData.roomId);
                this.cameras.push(camera);
            });
        }

        // Session 7: Load alarm panels from level data
        this.alarmPanels = levelData.alarmPanels || [];

        // Session 8: Load tranquilizer gun position (level 5 only)
        this.tranqGunPos = levelData.tranqGunPos || null;

        // Session 6: Reset inventory for new level
        this.inventory = [];

        // Session 5: Load objectives
        if (levelData.objectives) {
            this.objectiveManager.loadObjectives(levelData.objectives);
        }

        // Create player with spawn validation
        const playerStart = levelData.playerStart;
        const playerSize = CONSTANTS.PLAYER.SIZE;

        // Find a valid spawn position (handles cases where level design puts player in collision)
        const validSpawn = this.collision.findValidSpawnPosition(
            playerStart.x,
            playerStart.y,
            playerSize,
            playerSize
        );

        if (validSpawn) {
            this.player = new Player(
                validSpawn.x,
                validSpawn.y,
                this.collision
            );
        } else {
            // Fallback to original position if no valid spawn found
            console.error('No valid spawn found, using original position');
            this.player = new Player(
                playerStart.x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2,
                playerStart.y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2,
                this.collision
            );
        }

        // Session 6: Apply upgrade effects to player
        this.player.setUpgradeEffects(this.upgradeManager.getActiveEffects());

        // Session 8: Get difficulty setting multipliers
        const currentDifficulty = this.saveManager.getDifficulty() || 'NORMAL';
        const difficultyConfig = CONSTANTS.SETTINGS.DIFFICULTY[currentDifficulty] || CONSTANTS.SETTINGS.DIFFICULTY.NORMAL;

        // Session 8: Apply difficulty health bonus
        if (difficultyConfig.playerHealthBonus !== 0) {
            this.player.maxHealth = CONSTANTS.COMBAT.PLAYER.MAX_HEALTH + difficultyConfig.playerHealthBonus;
            this.player.health = this.player.maxHealth;
        }

        // Create guards with difficulty scaling
        this.guards = [];
        const difficulty = levelData.difficulty || 1;

        // Session 6: Get upgrade effects for guard modifications
        const upgradeEffects = this.upgradeManager.getActiveEffects();

        levelData.guards.forEach(guardData => {
            // Session 6: Validate guard spawn position to avoid collision with walls/objects
            const guardSize = CONSTANTS.GUARD.SIZE;
            const validSpawn = this.collision.findValidSpawnPosition(
                guardData.x,
                guardData.y,
                guardSize,
                guardSize
            );

            let spawnX, spawnY;
            if (validSpawn) {
                spawnX = validSpawn.x;
                spawnY = validSpawn.y;
            } else {
                // Fallback to center of tile if no valid position found
                console.warn(`Guard spawn at (${guardData.x}, ${guardData.y}) invalid, using tile center`);
                spawnX = guardData.x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
                spawnY = guardData.y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
            }

            const guard = new Guard(
                spawnX,
                spawnY,
                guardData.waypoints,
                this.collision
            );

            // Session 5: Apply difficulty scaling
            // Higher difficulty = better detection
            if (difficulty > 1) {
                guard.visionRange *= (1 + (difficulty - 1) * 0.1); // +10% per difficulty
            }

            // Session 8: Apply difficulty setting multipliers
            guard.visionRange *= difficultyConfig.guardVisionMultiplier;

            // Session 6: Apply upgrade effects to guards
            // Low Profile reduces guard vision range
            guard.visionRange *= upgradeEffects.visionRangeMultiplier;
            // Nerves of Steel reduces suspicion buildup rate (combined with difficulty multiplier)
            guard.suspicionRateMultiplier = upgradeEffects.suspicionRateMultiplier * difficultyConfig.guardDetectionMultiplier;
            // Ghost Protocol increases suspicion decay
            guard.suspicionDecayMultiplier = upgradeEffects.suspicionDecayMultiplier;
            // Last Chance adds grace period before full alert
            guard.gracePeriod = upgradeEffects.gracePeriod;

            this.guards.push(guard);
        });

        // Session 8: Create elite guards
        this.eliteGuards = [];
        if (levelData.eliteGuards) {
            levelData.eliteGuards.forEach(eliteData => {
                const eliteSize = CONSTANTS.ELITE_GUARD.SIZE;
                const validSpawn = this.collision.findValidSpawnPosition(
                    eliteData.x,
                    eliteData.y,
                    eliteSize,
                    eliteSize
                );

                let spawnX, spawnY;
                if (validSpawn) {
                    spawnX = validSpawn.x;
                    spawnY = validSpawn.y;
                } else {
                    spawnX = eliteData.x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
                    spawnY = eliteData.y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
                }

                const elite = new EliteGuard(
                    spawnX,
                    spawnY,
                    eliteData.waypoints,
                    this.collision
                );

                // Session 8: Apply difficulty setting multipliers
                elite.visionRange *= difficultyConfig.guardVisionMultiplier;

                // Apply upgrade effects (combined with difficulty multiplier)
                elite.visionRange *= upgradeEffects.visionRangeMultiplier;
                elite.suspicionRateMultiplier = upgradeEffects.suspicionRateMultiplier * difficultyConfig.guardDetectionMultiplier;
                elite.suspicionDecayMultiplier = upgradeEffects.suspicionDecayMultiplier;
                elite.gracePeriod = upgradeEffects.gracePeriod;

                this.eliteGuards.push(elite);
            });
        }

        // Session 8: Create boss for levels 4 and 5
        this.boss = null;
        if (levelData.boss) {
            const bossData = levelData.boss;
            const tileSize = CONSTANTS.TILE.SIZE;

            if (bossData.type === 'CAPTAIN') {
                this.boss = new CaptainBoss(
                    bossData.x * tileSize + tileSize / 2,
                    bossData.y * tileSize + tileSize / 2,
                    bossData.waypoints,
                    this.collision
                );
            } else if (bossData.type === 'MADURO') {
                this.boss = new MaduroBoss(
                    bossData.x * tileSize + tileSize / 2,
                    bossData.y * tileSize + tileSize / 2,
                    bossData.waypoints,
                    this.collision
                );
                // Set summon callback for Phase 2
                this.boss.setSummonCallback((x, y) => this.spawnSummonedGuard(x, y));
            }
        }

        // Session 8: Reset projectiles and shotgun pellets
        this.projectiles = [];
        this.shotgunPellets = [];

        // Session 4: Update HUD references
        this.hud.setPlayer(this.player);
        this.hud.setGuards(this.guards);

        // Session 8: Update HUD with boss reference
        this.hud.setBoss(this.boss);

        // Session 7: Update HUD with camera references
        this.hud.setCameras(this.cameras);

        // Set guards reference on player for collision detection
        // Session 8: Include elite guards and boss in the guards list for player collision
        const allEnemies = [...this.guards, ...this.eliteGuards];
        if (this.boss) allEnemies.push(this.boss);
        this.player.setGuards(allEnemies);

        // Set collision references on guards (player and other guards)
        this.guards.forEach(guard => {
            guard.setCollisionRefs(this.player, this.guards);
        });

        // Session 8: Set collision refs for elite guards
        this.eliteGuards.forEach(elite => {
            elite.setCollisionRefs(this.player, [...this.guards, ...this.eliteGuards]);
        });

        // Session 8: Set collision refs for boss
        if (this.boss) {
            this.boss.setCollisionRefs(this.player, [...this.guards, ...this.eliteGuards]);
        }

        // Session 5: Update HUD with tilemap and objectives
        this.hud.setTilemap(this.tilemap);
        this.hud.setObjectiveManager(this.objectiveManager);
        this.hud.resetDiscoveredTiles();

        // Session 6: Update HUD with game reference for inventory/pickup prompt
        this.hud.setGame(this);

        // Show objective intro at level start
        this.hud.showObjectiveIntro(2500);

        // Session 5: Update menu with level info and objectives
        this.menu.setLevelManager(this.levelManager);
        this.menu.setCurrentLevel(levelNum);
        this.menu.setObjectiveManager(this.objectiveManager);

        eventBus.emit(EVENTS.LEVEL_START, { level: levelNum });
    }

    /**
     * Handle state changes

    onStateChange(data) {

    /**
     * Handle level completion
     */
    onLevelComplete() {
        // Session 6: Record level completion in statistics
        this.statisticsManager.completeLevel(this.currentLevelNum);
        eventBus.emit(EVENTS.LEVEL_COMPLETE, { levelNum: this.currentLevelNum });

        // Session 8: Award base credits immediately for each completed level
        const levelCredits = CONSTANTS.CREDITS.LEVEL_COMPLETE[this.currentLevelNum] || 0;
        if (levelCredits > 0) {
            this.saveManager.addCredits(levelCredits);
            this.lastLevelCredits = levelCredits; // Store for transition screen display
            eventBus.emit(EVENTS.CREDITS_EARNED, {
                amount: levelCredits,
                breakdown: [{ label: `Level ${this.currentLevelNum} Complete`, value: levelCredits }]
            });
        }

        // Session 5: Check if there are more levels
        if (this.levelManager.hasNextLevel()) {
            // More levels to go - show transition screen
            this.stateManager.setState(CONSTANTS.STATES.LEVEL_TRANSITION);
        } else {
            // Session 6: All levels complete - calculate credits and show run results
            this.statisticsManager.endRunSuccess();
            this.pendingCredits = this.statisticsManager.calculateCredits();

            // Emit run complete event
            eventBus.emit(EVENTS.RUN_COMPLETE, { success: true });

            // Show run results screen instead of immediate level complete
            this.stateManager.setState(CONSTANTS.STATES.RUN_RESULTS);
        }
    }

    startNextLevel() {
        const nextLevel = this.currentLevelNum + 1;
        this.loadLevel(nextLevel);
        this.stateManager.setState(CONSTANTS.STATES.PLAYING);

    /**
     * Session 2: Handle guard alert state changes
     * Session 4: Now also sets chase target for ALERT state and propagates alerts
     * @param {Object} data - Alert data { guard, state }
     */
    onGuardAlert(data) {
        // Log for debugging, future use for sound effects etc.
        console.log(`Guard alert: ${data.state}`);

        // Session 4: Set chase target when guard goes to ALERT state
        if (data.state === 'ALERT' && this.player) {
            data.guard.setChaseTarget(this.player);

            // Session 4: Alert nearby guards (guard-to-guard propagation)
            const alertRadius = 6 * CONSTANTS.TILE.SIZE; // 6 tile radius
            this.guards.forEach(otherGuard => {
                if (otherGuard === data.guard || otherGuard.isEliminated) return;

                const distance = data.guard.distanceTo(otherGuard);
                if (distance < alertRadius) {
                    // Increase suspicion of nearby guards
                    otherGuard.suspicion = Math.min(1.0, otherGuard.suspicion + 0.5);

                    // Transition unaware guards to suspicious
                    if (otherGuard.state === CONSTANTS.GUARD.STATES.UNAWARE) {
                        otherGuard.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
                        // Give them the last known player position
                        otherGuard.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
                    }
                }
            });
        }
    }

    /**
     * Session 4: Handle player attack
     * Check if any guards are hit by the attack
     * Session 8: Also checks elite guards and boss
     * @param {Object} data - Attack data
     */
    onPlayerAttack(data) {
        if (!this.player) return;

        const attackHitbox = this.player.getAttackHitbox();
        const attackRange = CONSTANTS.COMBAT.PLAYER.ATTACK_RANGE * CONSTANTS.TILE.SIZE;

        // Session 8: Determine damage - melee does less damage but has knockback
        const isMelee = data.isMelee !== false; // Default to melee if not specified
        const damage = isMelee ? CONSTANTS.COMBAT.PLAYER.MELEE_DAMAGE : data.damage;
        const knockbackForce = CONSTANTS.COMBAT.PLAYER.KNOCKBACK_FORCE;

        // Check each guard for hit
        this.guards.forEach(guard => {
            if (guard.isEliminated) return;

            // Simple distance-based hit detection
            const dx = guard.x - attackHitbox.x;
            const dy = guard.y - attackHitbox.y;
            const distance = Math.hypot(dx, dy);

            if (distance < attackRange) {
                guard.takeDamage(damage);
                // Session 8: Apply knockback on melee hit
                if (isMelee && guard.applyKnockback) {
                    guard.applyKnockback(this.player.x, this.player.y, knockbackForce);
                }
            }
        });

        // Session 8: Check elite guards for hit
        this.eliteGuards.forEach(elite => {
            if (elite.isEliminated) return;

            const dx = elite.x - attackHitbox.x;
            const dy = elite.y - attackHitbox.y;
            const distance = Math.hypot(dx, dy);

            if (distance < attackRange) {
                elite.takeDamage(damage);
                // Session 8: Apply knockback on melee hit
                if (isMelee && elite.applyKnockback) {
                    elite.applyKnockback(this.player.x, this.player.y, knockbackForce);
                }
            }
        });

        // Session 8: Check boss for hit
        if (this.boss && !this.boss.isEliminated) {
            const dx = this.boss.x - attackHitbox.x;
            const dy = this.boss.y - attackHitbox.y;
            const distance = Math.hypot(dx, dy);

            if (distance < attackRange) {
                this.boss.takeDamage(damage);
                // Session 8: Apply knockback on melee hit (reduced for bosses)
                if (isMelee && this.boss.applyKnockback) {
                    this.boss.applyKnockback(this.player.x, this.player.y, knockbackForce * 0.5);
                }
            }
        }

        // Attack makes noise - alert nearby guards
        this.propagateSound(data.x, data.y, CONSTANTS.SOUND.RADIUS.ATTACK);
    }

    /**
     * Session 4: Handle guard attack
     * @param {Object} data - Attack data { guard, damage }
     */
    onGuardAttack(data) {
        if (!this.player || this.player.isDead) return;

        // Check if player is in range of the guard's attack
        const guard = data.guard;
        const dx = this.player.x - guard.x;
        const dy = this.player.y - guard.y;
        const distance = Math.hypot(dx, dy);

        if (distance < CONSTANTS.COMBAT.GUARD.ATTACK_RANGE * CONSTANTS.TILE.SIZE) {
            this.player.takeDamage(data.damage);
        }
    }

    /**
     * Session 4: Handle player death
     * Session 6: Track failure in statistics
     */
    onPlayerDied() {
        // Session 6: Record failed run
        this.statisticsManager.endRunFailure(this.currentLevelNum);
        this.pendingCredits = this.statisticsManager.calculateCredits();

        // Emit run complete event with failure
        eventBus.emit(EVENTS.RUN_COMPLETE, {
            success: false,
            levelNum: this.currentLevelNum
        });

        // Show run results even on failure (to show stats)
        this.stateManager.setState(CONSTANTS.STATES.RUN_RESULTS);
    }

    /**
     * Session 4: Handle guard elimination
     * @param {Object} data - { guard, x, y }
     */
    onGuardEliminated(data) {
        console.log('Guard eliminated!');
