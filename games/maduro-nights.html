<script>
// Maduro Nights - Player Entity
// Player character with movement and collision
// Session 2: Movement modes (walk, crouch, run)
// Session 4: Combat system and health
// Session 6: Upgrade effects integration

class Player extends Entity {
    constructor(x, y, collision) {
        super(x, y);

        this.collision = collision;

        // Player-specific properties
        this.width = CONSTANTS.PLAYER.SIZE * 0.6;  // Collision box smaller than sprite
        this.height = CONSTANTS.PLAYER.SIZE * 0.6;
        this.baseSpeed = CONSTANTS.PLAYER.SPEED * CONSTANTS.TILE.SIZE;

        // Movement state
        this.direction = { x: 0, y: 0 };
        this.facing = 'down';  // down, up, left, right

        // Session 2: Movement modes
        this.movementMode = 'WALK'; // WALK, CROUCH, RUN

        // Session 4: Combat system
        this.maxHealth = CONSTANTS.COMBAT.PLAYER.MAX_HEALTH;
        this.health = this.maxHealth;
        this.isAttacking = false;
        this.attackCooldown = 0;           // Time until can attack again
        this.attackTimer = 0;              // Time remaining in attack animation
        this.invincibilityTimer = 0;       // Time remaining invincible after hit
        this.isDead = false;

        // Reference to guards for collision
        this.guards = [];

        // Session 6: Upgrade effect multipliers (set by Game.loadLevel)
        this.upgradeEffects = {
            walkNoiseMultiplier: 1.0,
            runNoiseMultiplier: 1.0,
            crouchSpeedMultiplier: 1.0,
            attackCooldownMultiplier: 1.0,
            hasShotgun: false
        };

        // Session 8: Shotgun state
        this.shotgunCooldown = 0;
        this.isFiringShotgun = false;
        this.shotgunTimer = 0;  // For muzzle flash effect

        // Session 8: Weapon system
        this.currentWeapon = 'melee'; // 'melee' or 'tranquilizer'
        this.tranquilizerAmmo = 0;
        this.tranquilizerMaxAmmo = CONSTANTS.TRANQUILIZER.MAX_AMMO;
        this.tranquilizerCooldown = 0;
        this.hasTranquilizerGun = false; // Must pick up tranq gun on level 5

        // Session 8: Drag system (for dragging sleeping Maduro)
        this.isDragging = false;
        this.dragTarget = null; // Reference to the entity being dragged
    }

    /**
     * Session 6: Apply upgrade effects to this player
     * Called by Game.loadLevel after creating the player
     * @param {Object} effects - Upgrade effects from UpgradeManager
     */
    setUpgradeEffects(effects) {
        this.upgradeEffects = {
            walkNoiseMultiplier: effects.walkNoiseMultiplier || 1.0,
            runNoiseMultiplier: effects.runNoiseMultiplier || 1.0,
            crouchSpeedMultiplier: effects.crouchSpeedMultiplier || 1.0,
            attackCooldownMultiplier: effects.attackCooldownMultiplier || 1.0,
            hasShotgun: effects.hasShotgun || false
        };
    }

    /**
     * Session 8: Check if player has the shotgun upgrade
     * @returns {boolean}
     */
    hasShotgun() {
        return this.upgradeEffects.hasShotgun === true;
    }

    /**
     * Set guards reference for collision detection
     * @param {Array} guards
     */
    setGuards(guards) {
        this.guards = guards;
    }

    /**
     * Update player
     * @param {number} dt - Delta time in seconds
     * @param {InputHandler} input
     */
    update(dt, input) {
        super.update(dt);

        // Don't update if dead
        if (this.isDead) return;

        // Session 4: Update combat timers
        this.updateCombatTimers(dt);

        // Session 4: Check for attack input
        if (input.isActionPressed(CONSTANTS.ACTIONS.ATTACK)) {
            this.tryAttack();
        }

        // Session 2: Update movement mode based on input
        this.updateMovementMode(input);

        // Get movement input
        this.direction = input.getMovementDirection();

        // Update facing direction
        if (this.direction.x < 0) this.facing = 'left';
        else if (this.direction.x > 0) this.facing = 'right';
        else if (this.direction.y < 0) this.facing = 'up';
        else if (this.direction.y > 0) this.facing = 'down';

        // Calculate movement with speed modifier
        const currentSpeed = this.getCurrentSpeed();
        const moveX = this.direction.x * currentSpeed * dt;
        const moveY = this.direction.y * currentSpeed * dt;

        // Apply movement with collision (including guards)
        // Session 8: Exclude drag target from collision so player can move while dragging
        if (moveX !== 0 || moveY !== 0) {
            const excludeEntity = this.isDragging ? this.dragTarget : null;
            const newPos = this.collision.resolveCollisionWithEntities(
                this.x, this.y,
                this.x + moveX, this.y + moveY,
                this.width, this.height,
                this.guards,
                excludeEntity
            );

            this.x = newPos.x;
            this.y = newPos.y;

            eventBus.emit(EVENTS.PLAYER_MOVE, {
                x: this.x,
                y: this.y,
                tileX: this.getTileX(),
                tileY: this.getTileY(),
                movementMode: this.movementMode
            });
        }
    }

    /**
     * Session 2: Update movement mode based on input
     * @param {InputHandler} input
     */
    updateMovementMode(input) {
        if (input.isActionHeld(CONSTANTS.ACTIONS.CROUCH)) {
            this.movementMode = 'CROUCH';
        } else if (input.isActionHeld(CONSTANTS.ACTIONS.RUN)) {
            this.movementMode = 'RUN';
        } else {
            this.movementMode = 'WALK';
        }
    }

    /**
     * Session 2: Get current speed based on movement mode
     * Session 6: Apply Quick Crouch upgrade
     * Session 8: Apply drag speed penalty
     * @returns {number}
     */
    getCurrentSpeed() {
        const modes = CONSTANTS.PLAYER.MOVEMENT_MODES;
        let speed;

        switch (this.movementMode) {
            case 'CROUCH':
                // Session 6: Apply Quick Crouch upgrade multiplier
                speed = this.baseSpeed * modes.CROUCH.SPEED_MULTIPLIER * this.upgradeEffects.crouchSpeedMultiplier;
                break;
            case 'RUN':
                speed = this.baseSpeed * modes.RUN.SPEED_MULTIPLIER;
                break;
            default:
                speed = this.baseSpeed * modes.WALK.SPEED_MULTIPLIER;
        }

        // Session 8: Apply drag speed penalty when dragging Maduro
        if (this.isDragging) {
            speed *= CONSTANTS.MADURO_CAPTURE.DRAG_SPEED_MULTIPLIER;
        }

        return speed;
    }

    /**
     * Session 2: Get visibility multiplier based on movement mode
     * Used by guards to determine how easily player is spotted
     * @returns {number}
     */
    getVisibilityMultiplier() {
        const modes = CONSTANTS.PLAYER.MOVEMENT_MODES;
        switch (this.movementMode) {
            case 'CROUCH':
                return modes.CROUCH.VISIBILITY_MULTIPLIER;
            case 'RUN':
                return modes.RUN.VISIBILITY_MULTIPLIER;
            default:
                return modes.WALK.VISIBILITY_MULTIPLIER;
        }
    }

    /**
     * Session 2: Get current movement mode
     * @returns {string}
     */
    getMovementMode() {
        return this.movementMode;
    }

    /**
     * Session 2: Check if player is crouching
     * @returns {boolean}
     */
    isCrouching() {
        return this.movementMode === 'CROUCH';
    }

    /**
     * Session 2: Check if player is running
     * @returns {boolean}
     */
    isRunning() {
        return this.movementMode === 'RUN';
    }

    /**
     * Get facing direction
     * @returns {string}
     */
    getFacing() {
        return this.facing;
    }

    /**
     * Check if player is moving
     * @returns {boolean}
     */
    isMoving() {
        return this.direction.x !== 0 || this.direction.y !== 0;
    }

    /**
     * Set position (for level start/reset)
     * @param {number} x
     * @param {number} y
     */
    setPosition(x, y) {
        this.x = x;
        this.y = y;
        this.prevX = x;
        this.prevY = y;
    }

    /**
     * Reset player state
     */
    reset() {
        this.movementMode = 'WALK';
        this.direction = { x: 0, y: 0 };
        this.facing = 'down';
        // Session 4: Reset combat state
        this.health = this.maxHealth;
        this.isAttacking = false;
        this.attackCooldown = 0;
        this.attackTimer = 0;
        this.invincibilityTimer = 0;
        this.isDead = false;
    }

    // ==================== SESSION 4: COMBAT SYSTEM ====================

    /**
     * Session 4: Update combat-related timers
     * Session 8: Added tranquilizer cooldown
     * @param {number} dt - Delta time in seconds
     */
    updateCombatTimers(dt) {
        // Attack cooldown
        if (this.attackCooldown > 0) {
            this.attackCooldown -= dt;
        }

        // Session 8: Tranquilizer cooldown
        if (this.tranquilizerCooldown > 0) {
            this.tranquilizerCooldown -= dt;
        }

        // Session 8: Shotgun cooldown
        if (this.shotgunCooldown > 0) {
            this.shotgunCooldown -= dt;
        }

        // Session 8: Shotgun muzzle flash timer
        if (this.shotgunTimer > 0) {
            this.shotgunTimer -= dt;
            if (this.shotgunTimer <= 0) {
                this.isFiringShotgun = false;
            }
        }

        // Attack animation timer
        if (this.attackTimer > 0) {
            this.attackTimer -= dt;
            if (this.attackTimer <= 0) {
                this.isAttacking = false;
            }
        }

        // Invincibility timer
        if (this.invincibilityTimer > 0) {
            this.invincibilityTimer -= dt;
        }
    }

    /**
     * Session 4: Try to perform an attack
     * Session 6: Apply Swift Takedown upgrade
     * Session 8: Weapon-based attack (melee, tranquilizer, or shotgun)
     * @returns {boolean} - True if attack was performed
     */
    tryAttack() {
        // Session 8: Use current weapon
        if (this.currentWeapon === 'tranquilizer') {
            return this.tryTranquilizerShot();
        }

        // Session 8: If player has shotgun upgrade, use shotgun instead of melee
        if (this.hasShotgun()) {
            return this.tryShotgunBlast();
        }

        // Default: melee attack
        if (this.attackCooldown > 0 || this.isAttacking) {
            return false;
        }

        this.isAttacking = true;
        this.attackTimer = CONSTANTS.COMBAT.PLAYER.ATTACK_DURATION;
        // Session 6: Apply Swift Takedown upgrade to cooldown
        this.attackCooldown = CONSTANTS.COMBAT.PLAYER.ATTACK_COOLDOWN * this.upgradeEffects.attackCooldownMultiplier;

        // Emit attack event for sound detection and combat resolution
        eventBus.emit(EVENTS.PLAYER_ATTACK, {
            x: this.x,
            y: this.y,
            facing: this.facing,
            range: CONSTANTS.COMBAT.PLAYER.ATTACK_RANGE,
            damage: CONSTANTS.COMBAT.PLAYER.ATTACK_DAMAGE,
            weaponType: 'melee'
        });

        return true;
    }

    /**
     * Session 8: Try to fire the stealth shotgun
     * @returns {boolean} - True if shotgun was fired
     */
    tryShotgunBlast() {
        if (this.shotgunCooldown > 0 || this.isFiringShotgun) {
            return false;
        }

        this.isFiringShotgun = true;
        this.shotgunTimer = CONSTANTS.SHOTGUN.MUZZLE_FLASH_DURATION;
        this.shotgunCooldown = CONSTANTS.SHOTGUN.COOLDOWN;

        // Calculate direction based on facing
        let facingAngle = 0;
        switch (this.facing) {
            case 'up':
                facingAngle = -Math.PI / 2;
                break;
            case 'down':
                facingAngle = Math.PI / 2;
                break;
            case 'left':
                facingAngle = Math.PI;
                break;
            case 'right':
                facingAngle = 0;
                break;
        }

        // Calculate pellet spread
        const pelletCount = CONSTANTS.SHOTGUN.PELLET_COUNT;
        const spreadAngle = CONSTANTS.SHOTGUN.SPREAD_ANGLE;
        const pellets = [];

        for (let i = 0; i < pelletCount; i++) {
            // Spread pellets evenly across the spread angle
            const angleOffset = spreadAngle * (i / (pelletCount - 1) - 0.5);
            const pelletAngle = facingAngle + angleOffset;
            pellets.push({
                angle: pelletAngle,
                dx: Math.cos(pelletAngle),
                dy: Math.sin(pelletAngle)
            });
        }

        // Emit shotgun event for game to handle damage and alerts
        eventBus.emit(EVENTS.SHOTGUN_FIRED, {
            x: this.x,
            y: this.y,
            facing: this.facing,
            facingAngle: facingAngle,
            pellets: pellets,
            range: CONSTANTS.SHOTGUN.RANGE,
            damage: CONSTANTS.COMBAT.PLAYER.MELEE_DAMAGE * CONSTANTS.SHOTGUN.DAMAGE_MULTIPLIER
        });

        // Play shotgun sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('SHOTGUN_FIRE');
        }

        return true;
    }

    // ==================== SESSION 8: WEAPON SYSTEM ====================

    /**
     * Session 8: Try to fire tranquilizer
     * @returns {boolean} - True if shot was fired
     */
    tryTranquilizerShot() {
        // Must have the tranquilizer gun to fire
        if (!this.hasTranquilizerGun) {
            return false;
        }

        // Session 8: Tranquilizer has unlimited ammo, only check cooldown
        if (this.tranquilizerCooldown > 0) {
            return false;
        }

        this.tranquilizerCooldown = CONSTANTS.TRANQUILIZER.COOLDOWN;

        // Calculate direction based on facing
        let dx = 0;
        let dy = 0;

        switch (this.facing) {
            case 'up':
                dy = -1;
                break;
            case 'down':
                dy = 1;
                break;
            case 'left':
                dx = -1;
                break;
            case 'right':
                dx = 1;
                break;
        }

        // Emit tranquilizer event for game to create projectile
        eventBus.emit(EVENTS.TRANQUILIZER_FIRED, {
            x: this.x,
            y: this.y,
            direction: { dx, dy },
            facing: this.facing,
            damage: CONSTANTS.TRANQUILIZER.DAMAGE
        });

        // Play tranquilizer sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('TRANQUILIZER_FIRE');
        }

        return true;
    }

    /**
     * Session 8: Switch between weapons
     */
    switchWeapon() {
        // Can only switch to tranquilizer if we have the gun (unlimited ammo)
        if (this.currentWeapon === 'melee' && this.hasTranquilizerGun) {
            this.currentWeapon = 'tranquilizer';
        } else {
            this.currentWeapon = 'melee';
        }

        eventBus.emit(EVENTS.WEAPON_SWITCH, {
            weapon: this.currentWeapon,
            ammo: Infinity, // Unlimited ammo
            hasTranqGun: this.hasTranquilizerGun
        });
    }

    /**
     * Session 8: Add tranquilizer ammo
     * @param {number} amount - Amount of ammo to add
     */
    addTranquilizerAmmo(amount) {
        this.tranquilizerAmmo = Math.min(
            this.tranquilizerAmmo + amount,
            this.tranquilizerMaxAmmo
        );

        eventBus.emit(EVENTS.TRANQUILIZER_PICKUP, {
            amount: amount,
            total: this.tranquilizerAmmo
        });
    }

    /**
     * Session 8: Get current weapon
     * @returns {string}
     */
    getCurrentWeapon() {
        return this.currentWeapon;
    }

    /**
     * Session 8: Get tranquilizer ammo count
     * @returns {number}
     */
    getTranquilizerAmmo() {
        return this.tranquilizerAmmo;
    }

    /**
     * Session 8: Get max tranquilizer ammo
     * @returns {number}
     */
    getTranquilizerMaxAmmo() {
        return this.tranquilizerMaxAmmo;
    }

    /**
     * Session 8: Check if tranquilizer can fire
     * @returns {boolean}
     */
    canFireTranquilizer() {
        // Unlimited ammo - only check gun ownership and cooldown
        return this.hasTranquilizerGun && this.tranquilizerCooldown <= 0;
    }

    /**
     * Session 8: Collect the tranquilizer gun item
     */
    collectTranquilizerGun() {
        this.hasTranquilizerGun = true;
        this.tranquilizerAmmo = CONSTANTS.TRANQUILIZER.GUN_PICKUP.AMMO_ON_PICKUP;

        eventBus.emit(EVENTS.TRANQ_GUN_COLLECTED, {
            ammo: this.tranquilizerAmmo
        });

        // Play pickup sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('KEY_PICKUP');
        }

    }

    /**
     * Session 8: Check if player has the tranquilizer gun
     * @returns {boolean}
     */
    hasTranqGun() {
        return this.hasTranquilizerGun;
    }

    // ==================== SESSION 8: DRAG SYSTEM ====================

    /**
     * Session 8: Start dragging an entity (sleeping Maduro)
     * @param {Object} target - The entity to drag
     * @returns {boolean} - True if drag started successfully
     */
    startDragging(target) {
        if (this.isDragging || !target || !target.canBeDragged()) {
            return false;
        }

        this.isDragging = true;
        this.dragTarget = target;
        target.startDrag();

        return true;
    }

    /**
     * Session 8: Stop dragging
     */
    stopDragging() {
        if (!this.isDragging) return;

        if (this.dragTarget && this.dragTarget.stopDrag) {
            this.dragTarget.stopDrag();
        }

        this.isDragging = false;
        this.dragTarget = null;

    }

    /**
     * Session 8: Get the position where dragged entity should be
     * (behind the player based on facing direction)
     * @returns {{x: number, y: number}}
     */
    getDragPosition() {
        const distance = CONSTANTS.MADURO_CAPTURE.DRAG_DISTANCE;
        let dragX = this.x;
        let dragY = this.y;

        // Position behind player based on facing
        switch (this.facing) {
            case 'up':
                dragY = this.y + distance;
                break;
            case 'down':
                dragY = this.y - distance;
                break;
            case 'left':
                dragX = this.x + distance;
                break;
            case 'right':
                dragX = this.x - distance;
                break;
        }

        return { x: dragX, y: dragY };
    }

    /**
     * Session 8: Check if player is currently dragging something
     * @returns {boolean}
     */
    isDraggingTarget() {
        return this.isDragging && this.dragTarget !== null;
    }

    /**
     * Session 8: Get the drag target
     * @returns {Object|null}
     */
    getDragTarget() {
        return this.dragTarget;
    }

    /**
     * Session 4: Get the attack hitbox based on facing direction
     * @returns {Object} - {x, y, width, height} of attack area
     */
    getAttackHitbox() {
        const range = CONSTANTS.COMBAT.PLAYER.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        const hitboxSize = CONSTANTS.PLAYER.SIZE;

        let hitbox = {
            x: this.x,
            y: this.y,
            width: hitboxSize,
            height: hitboxSize
        };

        // Position hitbox in front of player based on facing
        switch (this.facing) {
            case 'up':
                hitbox.y = this.y - range;
                break;
            case 'down':
                hitbox.y = this.y + range;
                break;
            case 'left':
                hitbox.x = this.x - range;
                break;
            case 'right':
                hitbox.x = this.x + range;
                break;
        }

        return hitbox;
    }

    /**
     * Session 4: Take damage from an attack
     * @param {number} amount - Amount of damage to take
     * @returns {boolean} - True if damage was taken (not invincible)
     */
    takeDamage(amount) {
        // Can't take damage while invincible
        if (this.invincibilityTimer > 0 || this.isDead) {
            return false;
        }

        this.health -= amount;
        this.invincibilityTimer = CONSTANTS.COMBAT.PLAYER.INVINCIBILITY_TIME;

        // Emit damage event
        eventBus.emit(EVENTS.PLAYER_DAMAGED, {
            health: this.health,
            maxHealth: this.maxHealth,
            damage: amount
        });

        // Check for death
        if (this.health <= 0) {
            this.health = 0;
            this.isDead = true;
            eventBus.emit(EVENTS.PLAYER_DIED, {
                x: this.x,
                y: this.y
            });
        }

        return true;
    }

    /**
     * Session 4: Heal the player
     * @param {number} amount - Amount to heal
     */
    heal(amount) {
        this.health = Math.min(this.health + amount, this.maxHealth);
        eventBus.emit(EVENTS.PLAYER_HEALED, {
            health: this.health,
            maxHealth: this.maxHealth
        });
    }

    /**
     * Session 4: Check if player is currently invincible
     * @returns {boolean}
     */
    isInvincible() {
        return this.invincibilityTimer > 0;
    }

    /**
     * Session 4: Get current health
     * @returns {number}
     */
    getHealth() {
        return this.health;
    }

    /**
     * Session 4: Get max health
     * @returns {number}
     */
    getMaxHealth() {
        return this.maxHealth;
    }

    /**
     * Session 4: Get the noise radius based on current movement mode
     * Session 6: Apply Silent Steps and Shadow Sprint upgrades
     * @returns {number} - Radius in tiles
     */
    getNoiseRadius() {
        if (!this.isMoving()) {
            return 0;
        }

        switch (this.movementMode) {
            case 'CROUCH':
                // Crouch noise is already very low, no upgrade needed
                return CONSTANTS.SOUND.RADIUS.CROUCH;
            case 'RUN':
                // Session 6: Apply Shadow Sprint upgrade
                return CONSTANTS.SOUND.RADIUS.RUN * this.upgradeEffects.runNoiseMultiplier;
            default:
                // Session 6: Apply Silent Steps upgrade
                return CONSTANTS.SOUND.RADIUS.WALK * this.upgradeEffects.walkNoiseMultiplier;
        }
    }
}

<script>
// Maduro Nights - Guard Entity
// Enemy guard with patrol and detection behavior
// Session 2: Vision cone detection and alert state machine
// Session 4: Combat, sound detection, chase and investigation AI
// Session 5: Cover-aware vision (cover blocks line of sight)
// Session 6: Upgrade effect modifiers for suspicion/vision

class Guard extends Entity {
    constructor(x, y, waypoints, collision) {
        super(x, y);

        this.collision = collision;

        // Guard-specific properties
        this.width = CONSTANTS.GUARD.SIZE * 0.6;
        this.height = CONSTANTS.GUARD.SIZE * 0.6;
        this.speed = CONSTANTS.GUARD.SPEED * CONSTANTS.TILE.SIZE;
        this.detectionRadius = CONSTANTS.GUARD.DETECTION_RADIUS * CONSTANTS.TILE.SIZE;

        // Patrol waypoints (in tile coordinates)
        this.waypoints = waypoints || [];
        this.currentWaypointIndex = 0;
        this.waitTimer = 0;
        this.waitDuration = CONSTANTS.GUARD.PATROL_WAIT / 1000; // Convert to seconds

        // Session 2: Enhanced state machine
        this.state = CONSTANTS.GUARD.STATES.UNAWARE;
        this.facing = 'down';
        this.facingAngle = Math.PI / 2; // Default facing down (radians)

        // Session 2: Suspicion system
        this.suspicion = 0; // 0 to 1
        this.alertTimer = 0; // Timer for alert state duration
        this.lastKnownPlayerPos = null; // Last known player position for investigation

        // Session 2: Vision parameters (in world units)
        this.visionAngle = CONSTANTS.GUARD.VISION.ANGLE;
        this.visionRange = CONSTANTS.GUARD.VISION.RANGE * CONSTANTS.TILE.SIZE;
        this.peripheralAngle = CONSTANTS.GUARD.VISION.PERIPHERAL_ANGLE;
        this.peripheralRange = CONSTANTS.GUARD.VISION.PERIPHERAL_RANGE * CONSTANTS.TILE.SIZE;

        // Session 4: Combat system
        this.maxHealth = CONSTANTS.COMBAT.GUARD.MAX_HEALTH;
        this.health = this.maxHealth;
        this.attackCooldown = 0;
        this.isEliminated = false;

        // Session 4: Investigation tracking
        this.investigationTimer = 0;
        this.investigationTarget = null;
        this.lastHeardSoundPos = null;

        // References for collision detection
        this.player = null;
        this.otherGuards = [];

        // Session 4: Chase target reference
        this.chaseTarget = null;

        // Session 6: Upgrade effect modifiers (set by Game.loadLevel)
        this.suspicionRateMultiplier = 1.0;     // From Nerves of Steel upgrade
        this.suspicionDecayMultiplier = 1.0;    // From Ghost Protocol upgrade
        this.gracePeriod = 0;                   // From Last Chance upgrade (seconds)
        this.graceTimer = 0;                    // Current grace period timer

        // Session 8: Knockback state
        this.knockbackVelX = 0;
        this.knockbackVelY = 0;
        this.knockbackTimer = 0;
        this.isKnockedBack = false;

        // Session 8: Sleep state (from tranquilizer)
        this.isSleeping = false;
        this.sleepTimer = 0;

        // Session 8: Stuck detection for patrol
        this.stuckTimer = 0;
        this.lastPatrolX = x;
        this.lastPatrolY = y;

        // Convert first waypoint to world coordinates if we have waypoints
        if (this.waypoints.length > 0) {
            this.targetX = this.waypoints[0].x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
            this.targetY = this.waypoints[0].y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
        } else {
            this.targetX = x;
            this.targetY = y;
        }
    }

    /**
     * Set references for collision detection
     * @param {Player} player
     * @param {Array} guards - All guards (will filter self)
     */
    setCollisionRefs(player, guards) {
        this.player = player;
        this.otherGuards = guards;
    }

    /**
     * Update guard
     * @param {number} dt - Delta time in seconds
     */
    update(dt) {
        super.update(dt);

        // Session 4: Don't update if eliminated
        if (this.isEliminated) return;

        // Session 8: Handle sleep state
        if (this.isSleeping) {
            this.sleepTimer -= dt;
            if (this.sleepTimer <= 0) {
                this.wakeUp();
            }
            return; // Skip normal behavior while sleeping
        }

        // Session 8: Handle knockback state
        if (this.isKnockedBack) {
            this.updateKnockback(dt);
            return; // Skip normal behavior while knocked back
        }

        // Session 4: Update attack cooldown
        if (this.attackCooldown > 0) {
            this.attackCooldown -= dt;
        }

        // Update facing angle based on direction
        this.updateFacingAngle();

        // State-based behavior
        switch (this.state) {
            case CONSTANTS.GUARD.STATES.UNAWARE:
                this.updatePatrol(dt);
                break;
            case CONSTANTS.GUARD.STATES.SUSPICIOUS:
                this.updateSuspicious(dt);
                break;
            case CONSTANTS.GUARD.STATES.ALERT:
                this.updateAlert(dt);
                break;
            case CONSTANTS.GUARD.STATES.INVESTIGATING:
                this.updateInvestigating(dt);
                break;
        }
    }

    /**
     * Session 8: Update knockback movement
     * @param {number} dt - Delta time in seconds
     */
    updateKnockback(dt) {
        this.knockbackTimer -= dt;

        if (this.knockbackTimer <= 0) {
            this.isKnockedBack = false;
            this.knockbackVelX = 0;
            this.knockbackVelY = 0;
            return;
        }

        // Apply knockback movement with collision
        const moveX = this.knockbackVelX * dt;
        const moveY = this.knockbackVelY * dt;

        if (this.collision) {
            const newPos = this.collision.resolveGuardCollision(
                this.x, this.y,
                this.x + moveX, this.y + moveY,
                this.width, this.height,
                this.player, this.otherGuards, this
            );
            this.x = newPos.x;
            this.y = newPos.y;
        } else {
            this.x += moveX;
            this.y += moveY;
        }

        // Decay knockback velocity
        const decay = 0.85;
        this.knockbackVelX *= decay;
        this.knockbackVelY *= decay;
    }

    /**
     * Session 8: Apply knockback force from player attack
     * @param {number} fromX - X position of attacker
     * @param {number} fromY - Y position of attacker
     * @param {number} force - Knockback force in tiles
     */
    applyKnockback(fromX, fromY, force) {
        const dx = this.x - fromX;
        const dy = this.y - fromY;
        const dist = Math.hypot(dx, dy);

        if (dist > 0) {
            const knockbackSpeed = force * CONSTANTS.TILE.SIZE / CONSTANTS.COMBAT.PLAYER.KNOCKBACK_DURATION;
            this.knockbackVelX = (dx / dist) * knockbackSpeed;
            this.knockbackVelY = (dy / dist) * knockbackSpeed;
            this.knockbackTimer = CONSTANTS.COMBAT.PLAYER.KNOCKBACK_DURATION;
            this.isKnockedBack = true;
        }
    }

    /**
     * Convert facing direction to angle in radians
     */
    updateFacingAngle() {
        switch (this.facing) {
            case 'right': this.facingAngle = 0; break;
            case 'down': this.facingAngle = Math.PI / 2; break;
            case 'left': this.facingAngle = Math.PI; break;
            case 'up': this.facingAngle = -Math.PI / 2; break;
        }
    }

    /**
     * Update patrol behavior
     * Session 8: Added stuck detection - guards skip to next waypoint if blocked
     * @param {number} dt
     */
    updatePatrol(dt) {
        if (this.waypoints.length === 0) return;

        // Wait at waypoint
        if (this.waitTimer > 0) {
            this.waitTimer -= dt;
            // Reset stuck detection while waiting
            this.stuckTimer = 0;
            this.lastPatrolX = this.x;
            this.lastPatrolY = this.y;
            return;
        }

        // Move towards current waypoint
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const distance = Math.hypot(dx, dy);

        if (distance < 4) { // Close enough to waypoint
            // Move to next waypoint
            this.advanceToNextWaypoint();
        } else {
            // Move towards waypoint
            const moveX = (dx / distance) * this.speed * dt;
            const moveY = (dy / distance) * this.speed * dt;

            // Update facing
            if (Math.abs(dx) > Math.abs(dy)) {
                this.facing = dx > 0 ? 'right' : 'left';
            } else {
                this.facing = dy > 0 ? 'down' : 'up';
            }

            // Apply movement with collision (including player and other guards)
            const newPos = this.collision.resolveGuardCollision(
                this.x, this.y,
                this.x + moveX, this.y + moveY,
                this.width, this.height,
                this.player, this.otherGuards, this
            );

            this.x = newPos.x;
            this.y = newPos.y;

            // Session 8: Stuck detection - if guard hasn't moved much, they're probably stuck
            const movedDistance = Math.hypot(this.x - this.lastPatrolX, this.y - this.lastPatrolY);
            if (movedDistance < 1) {
                // Guard is stuck
                this.stuckTimer += dt;

                // If stuck for more than 1 second, skip to next waypoint
                if (this.stuckTimer > 1.0) {
                    this.advanceToNextWaypoint();
                    this.stuckTimer = 0;
                }
            } else {
                // Guard is making progress, reset stuck timer
                this.stuckTimer = 0;
                this.lastPatrolX = this.x;
                this.lastPatrolY = this.y;
            }
        }
    }

    /**
     * Session 8: Advance to the next waypoint in the patrol route
     */
    advanceToNextWaypoint() {
        this.currentWaypointIndex = (this.currentWaypointIndex + 1) % this.waypoints.length;
        const nextWaypoint = this.waypoints[this.currentWaypointIndex];
        this.targetX = nextWaypoint.x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
        this.targetY = nextWaypoint.y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
        this.waitTimer = this.waitDuration;
        // Reset stuck detection
        this.stuckTimer = 0;
        this.lastPatrolX = this.x;
        this.lastPatrolY = this.y;
    }

    /**
     * Session 2: Update suspicious state behavior
     * Session 4: Now includes investigation behavior
     * Session 6: Apply Ghost Protocol upgrade to suspicion decay
     * @param {number} dt
     */
    updateSuspicious(dt) {
        // If we have a position to investigate (from sight or sound)
        if (this.lastKnownPlayerPos || this.lastHeardSoundPos) {
            // Transition to INVESTIGATING state
            this.investigationTarget = this.lastKnownPlayerPos || this.lastHeardSoundPos;
            this.investigationTimer = CONSTANTS.GUARD.ALERT.INVESTIGATION_DURATION;
            this.state = CONSTANTS.GUARD.STATES.INVESTIGATING;
            return;
        }

        // Guard stops and looks around when suspicious
        // Session 6: Apply Ghost Protocol upgrade to suspicion decay (faster decay = better for player)
        this.suspicion -= CONSTANTS.GUARD.ALERT.SUSPICION_DECAY * this.suspicionDecayMultiplier * dt;

        if (this.suspicion <= 0) {
            this.suspicion = 0;
            this.state = CONSTANTS.GUARD.STATES.UNAWARE;
            this.lastKnownPlayerPos = null;
            this.lastHeardSoundPos = null;
        }
    }

    /**
     * Session 4: Update investigating state behavior
     * Guard moves to last known player/sound position
     * @param {number} dt
     */
    updateInvestigating(dt) {
        if (!this.investigationTarget) {
            // No target, return to suspicious (which will decay to unaware)
            this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
            return;
        }

        const dx = this.investigationTarget.x - this.x;
        const dy = this.investigationTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // Reached investigation point
        if (distance < CONSTANTS.TILE.SIZE * 0.5) {
            this.investigationTimer -= dt;

            // Look around while investigating
            if (this.investigationTimer <= 0) {
                // Done investigating, return to patrol
                this.investigationTarget = null;
                this.lastKnownPlayerPos = null;
                this.lastHeardSoundPos = null;
                this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
                // Suspicion will decay naturally in SUSPICIOUS state
            }
        } else {
            // Move towards investigation target
            const moveX = (dx / distance) * this.speed * dt;
            const moveY = (dy / distance) * this.speed * dt;

            // Update facing towards target
            if (Math.abs(dx) > Math.abs(dy)) {
                this.facing = dx > 0 ? 'right' : 'left';
            } else {
                this.facing = dy > 0 ? 'down' : 'up';
            }

            // Apply movement with collision (including player and other guards)
            const newPos = this.collision.resolveGuardCollision(
                this.x, this.y,
                this.x + moveX, this.y + moveY,
                this.width, this.height,
                this.player, this.otherGuards, this
            );

            this.x = newPos.x;
            this.y = newPos.y;
        }

        // Still decay suspicion while investigating (slower)
        // Session 6: Apply Ghost Protocol upgrade to suspicion decay
        this.suspicion -= CONSTANTS.GUARD.ALERT.SUSPICION_DECAY * 0.5 * this.suspicionDecayMultiplier * dt;
        if (this.suspicion <= 0) {
            this.suspicion = 0;
            this.investigationTarget = null;
            this.state = CONSTANTS.GUARD.STATES.UNAWARE;
        }
    }

    /**
     * Session 2/4: Update alert state behavior
     * Session 4: Now includes chase and attack behavior
     * @param {number} dt
     */
    updateAlert(dt) {
        // In alert state, chase and attack the player
        if (this.chaseTarget) {
            this.updateChase(dt);
        }

        this.alertTimer -= dt;

        if (this.alertTimer <= 0 && !this.canCurrentlySeePlayer) {
            // Lost the player, go to investigating last known position
            if (this.lastKnownPlayerPos) {
                this.investigationTarget = { ...this.lastKnownPlayerPos };
                this.investigationTimer = CONSTANTS.GUARD.ALERT.INVESTIGATION_DURATION;
                this.state = CONSTANTS.GUARD.STATES.INVESTIGATING;
                this.suspicion = 0.7; // Still somewhat suspicious
            } else {
                this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
                this.suspicion = 0.5;
            }
            this.chaseTarget = null;
        }
    }

    /**
     * Session 4: Update chase behavior - move towards and attack player
     * @param {number} dt
     */
    updateChase(dt) {
        if (!this.chaseTarget) return;

        const dx = this.chaseTarget.x - this.x;
        const dy = this.chaseTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // Check if in attack range
        const attackRange = CONSTANTS.COMBAT.GUARD.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        if (distance <= attackRange) {
            this.tryAttack();
        }

        // Move towards player at chase speed
        const chaseSpeed = this.speed * CONSTANTS.COMBAT.GUARD.CHASE_SPEED_MULTIPLIER;
        const moveX = (dx / distance) * chaseSpeed * dt;
        const moveY = (dy / distance) * chaseSpeed * dt;

        // Update facing
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Apply movement with collision (including player and other guards)
        // During chase, guard should still collide with player, just not path around them
        const newPos = this.collision.resolveGuardCollision(
            this.x, this.y,
            this.x + moveX, this.y + moveY,
            this.width, this.height,
            this.player, this.otherGuards, this
        );

        this.x = newPos.x;
        this.y = newPos.y;

        // Update last known position
        this.lastKnownPlayerPos = { x: this.chaseTarget.x, y: this.chaseTarget.y };
    }

    /**
     * Session 2: Check if guard can see the player
     * Uses vision cone with wall occlusion
     * Session 5: Now also checks cover objects (crates, desks, closed doors)
     * @param {Player} player
     * @param {number} playerVisibility - Player's visibility multiplier (from movement mode)
     * @returns {{visible: boolean, visibilityLevel: number}}
     */
    canSee(player, playerVisibility = 1.0) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const distance = Math.hypot(dx, dy);
        const angleToPlayer = Math.atan2(dy, dx);

        // Calculate effective ranges based on player visibility
        const effectiveVisionRange = this.visionRange * playerVisibility;
        const effectivePeripheralRange = this.peripheralRange * playerVisibility;

        // Session 5: Use cover-aware line of sight check
        const checkLineOfSight = () => {
            // Use lineBlockedWithCover if available (Session 5+), fallback to lineBlocked
            if (this.collision.lineBlockedWithCover) {
                return !this.collision.lineBlockedWithCover(this.x, this.y, player.x, player.y);
            }
            return !this.collision.lineBlocked(this.x, this.y, player.x, player.y);
        };

        // Check peripheral vision (very close, wide angle)
        if (distance <= effectivePeripheralRange) {
            const angleDiff = this.normalizeAngle(angleToPlayer - this.facingAngle);
            if (Math.abs(angleDiff) <= this.peripheralAngle / 2) {
                // Check line of sight (including cover)
                if (checkLineOfSight()) {
                    return { visible: true, visibilityLevel: 1.0 }; // Full visibility at close range
                }
            }
        }

        // Check main vision cone
        if (distance <= effectiveVisionRange) {
            const angleDiff = this.normalizeAngle(angleToPlayer - this.facingAngle);
            if (Math.abs(angleDiff) <= this.visionAngle / 2) {
                // Check line of sight (including cover)
                if (checkLineOfSight()) {
                    // Visibility decreases with distance
                    const distanceFactor = 1 - (distance / effectiveVisionRange) * 0.5;
                    return { visible: true, visibilityLevel: distanceFactor * playerVisibility };
                }
            }
        }

        return { visible: false, visibilityLevel: 0 };
    }

    /**
     * Normalize angle to [-PI, PI] range
     * @param {number} angle
     * @returns {number}
     */
    normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
    }

    /**
     * Session 2: Process visibility and update suspicion/state
     * Session 6: Apply upgrade multipliers and grace period
     * Called from game.update() each frame
     * @param {Player} player
     * @param {number} dt - Delta time
     * @returns {boolean} True if fully detected (game over)
     */
    processDetection(player, dt) {
        // Session 8: Sleeping guards cannot detect players
        if (this.isSleeping) return false;

        const playerVisibility = player.getVisibilityMultiplier ? player.getVisibilityMultiplier() : 1.0;
        const result = this.canSee(player, playerVisibility);

        // Session 6: Update grace timer
        if (this.graceTimer > 0) {
            this.graceTimer -= dt;
        }

        if (result.visible) {
            // Player is visible - increase suspicion
            this.lastKnownPlayerPos = { x: player.x, y: player.y };
            this.canCurrentlySeePlayer = true;

            // Session 6: Apply Nerves of Steel upgrade to suspicion increase
            const suspicionIncrease = CONSTANTS.GUARD.ALERT.SUSPICION_RATE * result.visibilityLevel * dt * this.suspicionRateMultiplier;
            this.suspicion = Math.min(1.0, this.suspicion + suspicionIncrease);

            // State transitions
            if (this.state === CONSTANTS.GUARD.STATES.UNAWARE && this.suspicion > 0.1) {
                this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
                eventBus.emit(EVENTS.GUARD_SUSPICIOUS, { guard: this, state: 'SUSPICIOUS' });
            }

            if (this.suspicion >= CONSTANTS.GUARD.ALERT.SUSPICION_THRESHOLD) {
                // Session 6: Last Chance upgrade - start grace period instead of immediate alert
                if (this.gracePeriod > 0 && this.graceTimer <= 0 && this.state !== CONSTANTS.GUARD.STATES.ALERT) {
                    // Start grace period - player has a chance to break line of sight
                    this.graceTimer = this.gracePeriod;
                    return false; // Not yet fully detected
                }

                // If grace timer has expired or no grace period, go to alert
                if (this.graceTimer <= 0) {
                    this.state = CONSTANTS.GUARD.STATES.ALERT;
                    this.alertTimer = CONSTANTS.GUARD.ALERT.ALERT_DURATION;
                    eventBus.emit(EVENTS.GUARD_ALERT, { guard: this, state: 'ALERT' });
                    return true; // Fully detected!
                }
            }
        } else {
            this.canCurrentlySeePlayer = false;

            // Session 6: Reset grace timer if player breaks line of sight
            if (this.graceTimer > 0) {
                this.graceTimer = 0;
                // Player escaped during grace period - reduce suspicion slightly
                this.suspicion = Math.max(0.5, this.suspicion - 0.2);
            }

            // Not visible - decay suspicion (handled in state update methods)
            if (this.state === CONSTANTS.GUARD.STATES.SUSPICIOUS) {
                // Suspicion decays in updateSuspicious()
            }
        }

        return false;
    }

    /**
     * Legacy detection method (simple proximity)
     * Kept for backwards compatibility
     * @param {Player} player
     * @returns {boolean}
     */
    canDetect(player) {
        const distance = this.distanceTo(player);
        if (distance <= this.detectionRadius) {
            this.state = CONSTANTS.GUARD.STATES.ALERT;
            return true;
        }
        return false;
    }

    /**
     * Get facing direction
     * @returns {string}
     */
    getFacing() {
        return this.facing;
    }

    /**
     * Get facing angle in radians
     * @returns {number}
     */
    getFacingAngle() {
        return this.facingAngle;
    }

    /**
     * Get current state
     * @returns {string}
     */
    getState() {
        return this.state;
    }

    /**
     * Get current suspicion level (0-1)
     * @returns {number}
     */
    getSuspicion() {
        return this.suspicion;
    }

    /**
     * Get vision cone parameters for rendering
     * @returns {{angle: number, range: number, facingAngle: number}}
     */
    getVisionConeParams() {
        return {
            angle: this.visionAngle,
            range: this.visionRange,
            facingAngle: this.facingAngle
        };
    }

    /**
     * Set patrol waypoints
     * @param {Array<{x: number, y: number}>} waypoints - Waypoints in tile coordinates
     */
    setWaypoints(waypoints) {
        this.waypoints = waypoints;
        this.currentWaypointIndex = 0;
        if (waypoints.length > 0) {
            this.targetX = waypoints[0].x * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
            this.targetY = waypoints[0].y * CONSTANTS.TILE.SIZE + CONSTANTS.TILE.SIZE / 2;
        }
    }

    /**
     * Reset guard to initial state
     */
    reset() {
        this.state = CONSTANTS.GUARD.STATES.UNAWARE;
        this.suspicion = 0;
        this.alertTimer = 0;
        this.lastKnownPlayerPos = null;
        this.canCurrentlySeePlayer = false;
        this.currentWaypointIndex = 0;
        this.waitTimer = 0;
        // Session 4: Reset combat and investigation state
        this.health = this.maxHealth;
        this.attackCooldown = 0;
        this.isEliminated = false;
        this.investigationTimer = 0;
        this.investigationTarget = null;
        this.lastHeardSoundPos = null;
        this.chaseTarget = null;
        // Session 8: Reset stuck detection
        this.stuckTimer = 0;
        this.lastPatrolX = this.x;
        this.lastPatrolY = this.y;
    }

    // ==================== SESSION 4: COMBAT SYSTEM ====================

    /**
     * Session 4: Try to attack the player
     * @returns {boolean} - True if attack was performed
     */
    tryAttack() {
        // Session 8: Sleeping guards cannot attack
        if (this.attackCooldown > 0 || this.isEliminated || this.isSleeping) {
            return false;
        }

        this.attackCooldown = CONSTANTS.COMBAT.GUARD.ATTACK_COOLDOWN;

        // Emit attack event for combat resolution
        eventBus.emit(EVENTS.GUARD_ATTACK, {
            guard: this,
            x: this.x,
            y: this.y,
            facing: this.facing,
            damage: CONSTANTS.COMBAT.GUARD.ATTACK_DAMAGE
        });

        return true;
    }

    /**
     * Session 4: Take damage from an attack
     * @param {number} amount - Amount of damage to take
     * @returns {boolean} - True if guard was eliminated
     */
    takeDamage(amount) {
        if (this.isEliminated) return false;

        this.health -= amount;

        eventBus.emit(EVENTS.GUARD_DAMAGED, {
            guard: this,
            health: this.health,
            maxHealth: this.maxHealth,
            damage: amount
        });

        if (this.health <= 0) {
            this.health = 0;
            this.eliminate();
            return true;
        }

        return false;
    }

    /**
     * Session 4: Eliminate the guard
     */
    eliminate() {
        this.isEliminated = true;
        this.active = false;

        eventBus.emit(EVENTS.GUARD_ELIMINATED, {
            guard: this,
            x: this.x,
            y: this.y
        });
    }

    /**
     * Session 4: Set the chase target (usually the player)
     * @param {Entity} target - Entity to chase
     */
    setChaseTarget(target) {
        this.chaseTarget = target;
    }

    /**
     * Session 4: Process sound detection
     * Called when a sound is made near the guard
     * @param {number} soundX - X position of sound
     * @param {number} soundY - Y position of sound
     * @param {number} soundRadius - Radius of the sound in tiles
     */
    hearSound(soundX, soundY, soundRadius) {
        if (this.isEliminated) return;

        const dx = soundX - this.x;
        const dy = soundY - this.y;
        const distance = Math.hypot(dx, dy);
        const soundRadiusPixels = soundRadius * CONSTANTS.TILE.SIZE;

        // Only hear if within sound radius
        if (distance > soundRadiusPixels) return;

        // Don't react if already alert
        if (this.state === CONSTANTS.GUARD.STATES.ALERT) return;

        // Store sound position
        this.lastHeardSoundPos = { x: soundX, y: soundY };

        // Add suspicion based on proximity (closer = more suspicious)
        const proximityFactor = 1 - (distance / soundRadiusPixels);
        const suspicionIncrease = CONSTANTS.SOUND.SUSPICION_RATE * proximityFactor;
        this.suspicion = Math.min(1.0, this.suspicion + suspicionIncrease);

        // Transition to suspicious if not already
        if (this.state === CONSTANTS.GUARD.STATES.UNAWARE && this.suspicion > 0.1) {
            this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
            eventBus.emit(EVENTS.GUARD_ALERT, { guard: this, state: 'SUSPICIOUS', trigger: 'sound' });
        }
    }

    /**
     * Session 4: Check if guard is eliminated
     * @returns {boolean}
     */
    isGuardEliminated() {
        return this.isEliminated;
    }

    /**
     * Session 4: Get current health
     * @returns {number}
     */
    getHealth() {
        return this.health;
    }

    /**
     * Session 4: Get max health
     * @returns {number}
     */
    getMaxHealth() {
        return this.maxHealth;
    }

    // ==================== SESSION 8: SLEEP SYSTEM ====================

    /**
     * Session 8: Put guard to sleep (from tranquilizer hit)
     * @param {number} duration - Sleep duration in seconds
     */
    fallAsleep(duration = 60) {
        if (this.isEliminated || this.isSleeping) return;

        this.isSleeping = true;
        this.sleepTimer = duration;

        // Reset combat state
        this.chaseTarget = null;
        this.suspicion = 0;
        this.state = CONSTANTS.GUARD.STATES.UNAWARE;

        eventBus.emit(EVENTS.GUARD_ASLEEP, {
            guard: this,
            x: this.x,
            y: this.y,
            duration: duration
        });

    }

    /**
     * Session 8: Wake up from sleep
     */
    wakeUp() {
        if (!this.isSleeping) return;

        this.isSleeping = false;
        this.sleepTimer = 0;

        // Guard wakes up suspicious
        this.suspicion = 0.5;
        this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;

        eventBus.emit(EVENTS.GUARD_WOKE_UP, {
            guard: this,
            x: this.x,
            y: this.y
        });

    }

    /**
     * Session 8: Check if guard is sleeping
     * @returns {boolean}
     */
    isAsleep() {
        return this.isSleeping;
    }
}

<script>
// Maduro Nights - Camera Entity
// Session 7: Security camera with sweeping vision cone detection
// Cameras trigger instant alerts when they detect the player

class Camera extends Entity {
    constructor(x, y, facingAngle, collision, sweeping = true) {
        super(x, y);

        this.collision = collision;

        // Camera-specific properties
        this.width = CONSTANTS.CAMERA.SIZE;
        this.height = CONSTANTS.CAMERA.SIZE;

        // Vision parameters
        this.visionAngle = CONSTANTS.CAMERA.VISION.ANGLE;
        this.visionRange = CONSTANTS.CAMERA.VISION.RANGE * CONSTANTS.TILE.SIZE;

        // Sweeping behavior
        this.sweeping = sweeping;
        this.sweepSpeed = CONSTANTS.CAMERA.VISION.SWEEP_SPEED;
        this.sweepAngle = CONSTANTS.CAMERA.VISION.SWEEP_ANGLE;
        this.baseFacingAngle = facingAngle; // Center of sweep arc
        this.facingAngle = facingAngle;
        this.sweepDirection = 1; // 1 or -1

        // State
        this.state = CONSTANTS.CAMERA.STATES.ACTIVE;
        this.triggeredTimer = 0; // Visual flash when detecting

        // Detection tracking
        this.canCurrentlySeePlayer = false;
        this.detectionCooldown = 0; // Prevent rapid-fire alerts

        // Room association (for alarm panel linking)
        this.roomId = null;
    }

    /**
     * Set the room this camera belongs to
     * @param {number} roomId
     */
    setRoomId(roomId) {
        this.roomId = roomId;
    }

    /**
     * Update camera
     * @param {number} dt - Delta time in seconds
     */
    update(dt) {
        super.update(dt);

        // Don't update if disabled
        if (this.state === CONSTANTS.CAMERA.STATES.DISABLED) return;

        // Update detection cooldown
        if (this.detectionCooldown > 0) {
            this.detectionCooldown -= dt;
        }

        // Update triggered visual timer
        if (this.triggeredTimer > 0) {
            this.triggeredTimer -= dt;
            if (this.triggeredTimer <= 0) {
                this.state = CONSTANTS.CAMERA.STATES.ACTIVE;
            }
        }

        // Update sweep if sweeping camera
        if (this.sweeping && this.state === CONSTANTS.CAMERA.STATES.ACTIVE) {
            this.updateSweep(dt);
        }
    }

    /**
     * Update sweeping motion
     * @param {number} dt
     */
    updateSweep(dt) {
        // Oscillate facing angle within sweep arc
        this.facingAngle += this.sweepSpeed * this.sweepDirection * dt;

        // Calculate angle limits
        const minAngle = this.baseFacingAngle - this.sweepAngle / 2;
        const maxAngle = this.baseFacingAngle + this.sweepAngle / 2;

        // Reverse direction at limits
        if (this.facingAngle >= maxAngle) {
            this.facingAngle = maxAngle;
            this.sweepDirection = -1;
        } else if (this.facingAngle <= minAngle) {
            this.facingAngle = minAngle;
            this.sweepDirection = 1;
        }
    }

    /**
     * Check if camera can see a target
     * @param {Entity} target - Usually the player
     * @param {number} targetVisibility - Player visibility modifier
     * @returns {{visible: boolean, visibilityLevel: number}}
     */
    canSee(target, targetVisibility = 1.0) {
        // Disabled cameras can't see
        if (this.state === CONSTANTS.CAMERA.STATES.DISABLED) {
            return { visible: false, visibilityLevel: 0 };
        }

        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const distance = Math.hypot(dx, dy);
        const angleToTarget = Math.atan2(dy, dx);

        // Calculate effective range based on target visibility
        const effectiveRange = this.visionRange * targetVisibility;

        // Check if within range
        if (distance > effectiveRange) {
            return { visible: false, visibilityLevel: 0 };
        }

        // Check if within vision cone
        const angleDiff = this.normalizeAngle(angleToTarget - this.facingAngle);
        if (Math.abs(angleDiff) > this.visionAngle / 2) {
            return { visible: false, visibilityLevel: 0 };
        }

        // Check line of sight (cover blocks vision)
        if (this.collision.lineBlockedWithCover) {
            if (this.collision.lineBlockedWithCover(this.x, this.y, target.x, target.y)) {
                return { visible: false, visibilityLevel: 0 };
            }
        } else if (this.collision.lineBlocked(this.x, this.y, target.x, target.y)) {
            return { visible: false, visibilityLevel: 0 };
        }

        // Visibility decreases with distance
        const distanceFactor = 1 - (distance / effectiveRange) * 0.5;
        return { visible: true, visibilityLevel: distanceFactor * targetVisibility };
    }

    /**
     * Normalize angle to [-PI, PI] range
     * @param {number} angle
     * @returns {number}
     */
    normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
    }

    /**
     * Process detection of player
     * Called from game.update() each frame
     * @param {Player} player
     * @param {number} dt
     * @returns {boolean} True if camera detected player (triggers alert)
     */
    processDetection(player, dt) {
        // Can't detect if disabled or on cooldown
        if (this.state === CONSTANTS.CAMERA.STATES.DISABLED) {
            this.canCurrentlySeePlayer = false;
            return false;
        }

        const playerVisibility = player.getVisibilityMultiplier ? player.getVisibilityMultiplier() : 1.0;
        const result = this.canSee(player, playerVisibility);

        this.canCurrentlySeePlayer = result.visible;

        if (result.visible && this.detectionCooldown <= 0) {
            // Camera detected player - instant alert!
            this.state = CONSTANTS.CAMERA.STATES.TRIGGERED;
            this.triggeredTimer = 0.5; // Flash for half second
            this.detectionCooldown = 2.0; // Don't spam alerts

            eventBus.emit(EVENTS.CAMERA_DETECTED_PLAYER, {
                camera: this,
                playerX: player.x,
                playerY: player.y,
                alertRadius: CONSTANTS.CAMERA.DETECTION.ALERT_RADIUS * CONSTANTS.TILE.SIZE
            });

            return true;
        }

        return false;
    }

    /**
     * Disable this camera (from alarm panel or player attack)
     */
    disable() {
        if (this.state === CONSTANTS.CAMERA.STATES.DISABLED) return;

        this.state = CONSTANTS.CAMERA.STATES.DISABLED;
        this.canCurrentlySeePlayer = false;

        eventBus.emit(EVENTS.CAMERA_DISABLED, { camera: this });
    }

    /**
     * Destroy camera (from player attack)
     */
    destroy() {
        this.disable();
        eventBus.emit(EVENTS.CAMERA_DESTROYED, { camera: this });
    }

    /**
     * Take damage from player attack
     * @param {number} damage
     */
    takeDamage(damage) {
        // Cameras are destroyed in one hit
        this.destroy();
    }

    /**
     * Check if camera is active
     * @returns {boolean}
     */
    isActive() {
        return this.state === CONSTANTS.CAMERA.STATES.ACTIVE ||
               this.state === CONSTANTS.CAMERA.STATES.TRIGGERED;
    }

    /**
     * Check if camera is disabled
     * @returns {boolean}
     */
    isDisabled() {
        return this.state === CONSTANTS.CAMERA.STATES.DISABLED;
    }

    /**
     * Get vision cone data for rendering
     * @returns {{x: number, y: number, angle: number, range: number, coneAngle: number, state: string}}
     */
    getVisionConeData() {
        return {
            x: this.x,
            y: this.y,
            angle: this.facingAngle,
            range: this.visionRange,
            coneAngle: this.visionAngle,
            state: this.state
        };
    }
}

// Maduro Nights - Elite Guard Entity
// Session 8: Enhanced enemy type with better stats and abilities
// Elite Guards are tougher, faster, and more perceptive than regular guards

class EliteGuard extends Guard {
    constructor(x, y, waypoints, collision) {
        super(x, y, waypoints, collision);

        // Override with elite guard stats
        this.width = CONSTANTS.ELITE_GUARD.SIZE * 0.6;
        this.height = CONSTANTS.ELITE_GUARD.SIZE * 0.6;
        this.speed = CONSTANTS.ELITE_GUARD.SPEED * CONSTANTS.TILE.SIZE;

        // Enhanced combat stats
        this.maxHealth = CONSTANTS.ELITE_GUARD.MAX_HEALTH;
        this.health = this.maxHealth;

        // Enhanced vision
        this.visionAngle = CONSTANTS.ELITE_GUARD.VISION.ANGLE;
        this.visionRange = CONSTANTS.ELITE_GUARD.VISION.RANGE * CONSTANTS.TILE.SIZE;
        this.peripheralRange = CONSTANTS.ELITE_GUARD.VISION.PERIPHERAL_RANGE * CONSTANTS.TILE.SIZE;

        // Faster attack and chase
        this.baseAttackCooldown = CONSTANTS.ELITE_GUARD.ATTACK_COOLDOWN;
        this.chaseSpeedMultiplier = CONSTANTS.ELITE_GUARD.CHASE_SPEED_MULTIPLIER;

        // Elite guard identifier
        this.isElite = true;

        // Enhanced detection - elites are more alert
        this.baseSuspicionRate = CONSTANTS.GUARD.ALERT.SUSPICION_RATE * 1.3;
    }

    /**
     * Override chase behavior with faster speed
     * @param {number} dt
     */
    updateChase(dt) {
        if (!this.chaseTarget) return;

        const dx = this.chaseTarget.x - this.x;
        const dy = this.chaseTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // Check if in attack range
        const attackRange = CONSTANTS.COMBAT.GUARD.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        if (distance <= attackRange) {
            this.tryAttack();
        }

        // Move towards player at enhanced chase speed
        const chaseSpeed = this.speed * this.chaseSpeedMultiplier;
        const moveX = (dx / distance) * chaseSpeed * dt;
        const moveY = (dy / distance) * chaseSpeed * dt;

        // Update facing
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Apply movement with collision
        const newPos = this.collision.resolveGuardCollision(
            this.x, this.y,
            this.x + moveX, this.y + moveY,
            this.width, this.height,
            this.player, this.otherGuards, this
        );

        this.x = newPos.x;
        this.y = newPos.y;

        // Update last known position
        this.lastKnownPlayerPos = { x: this.chaseTarget.x, y: this.chaseTarget.y };
    }

    /**
     * Override detection processing with enhanced alertness
     * @param {Player} player
     * @param {number} dt
     * @returns {boolean}
     */
    processDetection(player, dt) {
        // Session 8: Sleeping elite guards cannot detect players
        if (this.isSleeping) return false;

        const playerVisibility = player.getVisibilityMultiplier ? player.getVisibilityMultiplier() : 1.0;
        const result = this.canSee(player, playerVisibility);

        // Update grace timer
        if (this.graceTimer > 0) {
            this.graceTimer -= dt;
        }

        if (result.visible) {
            this.lastKnownPlayerPos = { x: player.x, y: player.y };
            this.canCurrentlySeePlayer = true;

            // Elite guards detect faster (higher base rate)
            const suspicionIncrease = this.baseSuspicionRate * result.visibilityLevel * dt * this.suspicionRateMultiplier;
            this.suspicion = Math.min(1.0, this.suspicion + suspicionIncrease);

            // State transitions
            if (this.state === CONSTANTS.GUARD.STATES.UNAWARE && this.suspicion > 0.05) {
                // Elites become suspicious faster
                this.state = CONSTANTS.GUARD.STATES.SUSPICIOUS;
                eventBus.emit(EVENTS.GUARD_SUSPICIOUS, { guard: this, state: 'SUSPICIOUS', isElite: true });
            }

            if (this.suspicion >= CONSTANTS.GUARD.ALERT.SUSPICION_THRESHOLD) {
                if (this.gracePeriod > 0 && this.graceTimer <= 0 && this.state !== CONSTANTS.GUARD.STATES.ALERT) {
                    this.graceTimer = this.gracePeriod;
                    return false;
                }

                if (this.graceTimer <= 0) {
                    this.state = CONSTANTS.GUARD.STATES.ALERT;
                    this.alertTimer = CONSTANTS.GUARD.ALERT.ALERT_DURATION * 1.5; // Elites stay alert longer
                    eventBus.emit(EVENTS.GUARD_ALERT, { guard: this, state: 'ALERT', isElite: true });

                    // Play elite alert sound
                    if (typeof audioManager !== 'undefined') {
                        audioManager.playSFX('ELITE_GUARD_ALERT');
                    }

                    return true;
                }
            }
        } else {
            this.canCurrentlySeePlayer = false;

            if (this.graceTimer > 0) {
                this.graceTimer = 0;
                this.suspicion = Math.max(0.5, this.suspicion - 0.2);
            }
        }

        return false;
    }

    /**
     * Override tryAttack with faster cooldown
     * @returns {boolean}
     */
    tryAttack() {
        if (this.attackCooldown > 0 || this.isEliminated) {
            return false;
        }

        this.attackCooldown = this.baseAttackCooldown;

        eventBus.emit(EVENTS.GUARD_ATTACK, {
            guard: this,
            x: this.x,
            y: this.y,
            facing: this.facing,
            damage: CONSTANTS.COMBAT.GUARD.ATTACK_DAMAGE,
            isElite: true
        });

        return true;
    }

    /**
     * Check if this is an elite guard
     * @returns {boolean}
     */
    isEliteGuard() {
        return true;
    }
}

// Maduro Nights - Boss Base Class
// Session 8: Base class for boss enemies
// Bosses have multiple health, aggressive AI, and special attacks

class Boss extends Guard {
    constructor(x, y, waypoints, collision, config) {
        super(x, y, waypoints, collision);

        // Boss configuration (passed from subclass)
        this.config = config;

        // Override with boss stats
        this.width = config.SIZE * 0.7;
        this.height = config.SIZE * 0.7;
        this.speed = config.SPEED * CONSTANTS.TILE.SIZE;

        // Combat stats
        this.maxHealth = config.MAX_HEALTH;
        this.health = this.maxHealth;
        this.attackRange = config.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        this.attackDamage = config.ATTACK_DAMAGE;
        this.baseAttackCooldown = config.ATTACK_COOLDOWN;

        // Enhanced vision
        this.visionAngle = config.VISION.ANGLE;
        this.visionRange = config.VISION.RANGE * CONSTANTS.TILE.SIZE;

        // Chase speed
        this.chaseSpeedMultiplier = config.CHASE_SPEED_MULTIPLIER;

        // Boss identifier
        this.isBoss = true;
        this.bossType = 'GENERIC';

        // Boss state
        this.bossState = CONSTANTS.BOSS.STATES.PATROLLING;

        // Stun state (from tranquilizer)
        this.isStunned = false;
        this.stunTimer = 0;

        // Phase system (for multi-phase bosses)
        this.phase = 1;

        // Name for HUD display
        this.displayName = 'Boss';
    }

    /**
     * Main update loop
     * @param {number} dt
     */
    update(dt) {
        // Handle stun state
        if (this.isStunned) {
            this.stunTimer -= dt;
            if (this.stunTimer <= 0) {
                this.isStunned = false;
                this.stunTimer = 0;
            }
            // Store previous position but don't move
            this.prevX = this.x;
            this.prevY = this.y;
            return;
        }

        // Session 8: Handle knockback state (inherited from Guard)
        if (this.isKnockedBack) {
            this.updateKnockback(dt);
            this.prevX = this.x;
            this.prevY = this.y;
            return;
        }

        // Update attack cooldown
        if (this.attackCooldown > 0) {
            this.attackCooldown -= dt;
        }

        // Update facing angle
        this.updateFacingAngle();

        // State-based behavior
        switch (this.bossState) {
            case CONSTANTS.BOSS.STATES.PATROLLING:
                this.updatePatrol(dt);
                break;
            case CONSTANTS.BOSS.STATES.ALERT:
            case CONSTANTS.BOSS.STATES.ATTACKING:
                this.updateBossChase(dt);
                break;
            case CONSTANTS.BOSS.STATES.ENRAGED:
                this.updateEnraged(dt);
                break;
        }

        // Store previous position for interpolation
        this.prevX = this.x;
        this.prevY = this.y;
    }

    /**
     * Boss-specific chase behavior
     * @param {number} dt
     */
    updateBossChase(dt) {
        if (!this.chaseTarget) return;

        const dx = this.chaseTarget.x - this.x;
        const dy = this.chaseTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // Check if in attack range
        if (distance <= this.attackRange) {
            this.tryBossAttack();
        }

        // Move towards player
        const chaseSpeed = this.speed * this.chaseSpeedMultiplier;
        const moveX = (dx / distance) * chaseSpeed * dt;
        const moveY = (dy / distance) * chaseSpeed * dt;

        // Update facing
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Apply movement with collision
        const newPos = this.collision.resolveGuardCollision(
            this.x, this.y,
            this.x + moveX, this.y + moveY,
            this.width, this.height,
            this.player, this.otherGuards, this
        );

        this.x = newPos.x;
        this.y = newPos.y;

        // Update last known position
        this.lastKnownPlayerPos = { x: this.chaseTarget.x, y: this.chaseTarget.y };
    }

    /**
     * Enraged chase (faster, for phase 3 Maduro)
     * @param {number} dt
     */
    updateEnraged(dt) {
        // Default: same as chase but can be overridden
        this.updateBossChase(dt);
    }

    /**
     * Boss attack
     * @returns {boolean}
     */
    tryBossAttack() {
        // Session 8: Sleeping bosses cannot attack
        if (this.attackCooldown > 0 || this.isEliminated || this.isStunned || this.isSleeping) {
            return false;
        }

        this.attackCooldown = this.baseAttackCooldown;

        eventBus.emit(EVENTS.BOSS_ATTACK, {
            boss: this,
            x: this.x,
            y: this.y,
            facing: this.facing,
            damage: this.attackDamage,
            bossType: this.bossType
        });

        // Play boss attack sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_ATTACK');
        }

        return true;
    }

    /**
     * Process detection - bosses are always aggressive once they see player
     * @param {Player} player
     * @param {number} dt
     * @returns {boolean}
     */
    processDetection(player, dt) {
        // Session 8: Sleeping bosses cannot detect players
        if (this.isStunned || this.isEliminated || this.isSleeping) return false;

        const playerVisibility = player.getVisibilityMultiplier ? player.getVisibilityMultiplier() : 1.0;
        const result = this.canSee(player, playerVisibility);

        if (result.visible) {
            this.lastKnownPlayerPos = { x: player.x, y: player.y };
            this.canCurrentlySeePlayer = true;

            // Bosses go to alert immediately when they see player
            if (this.bossState === CONSTANTS.BOSS.STATES.PATROLLING) {
                this.bossState = CONSTANTS.BOSS.STATES.ALERT;
                this.alertTimer = CONSTANTS.GUARD.ALERT.ALERT_DURATION * 2; // Bosses stay alert longer
                this.setChaseTarget(player);

                eventBus.emit(EVENTS.BOSS_DETECTED_PLAYER, {
                    boss: this,
                    bossType: this.bossType,
                    x: this.x,
                    y: this.y
                });

                // Play boss alert sound
                if (typeof audioManager !== 'undefined') {
                    audioManager.playSFX('BOSS_ALERT');
                }

                return true;
            }
        } else {
            this.canCurrentlySeePlayer = false;

            // Bosses don't give up easily - only return to patrol after extended time
            if (this.bossState === CONSTANTS.BOSS.STATES.ALERT) {
                this.alertTimer -= dt;
                if (this.alertTimer <= 0) {
                    // Investigate last known position instead of returning to patrol
                    if (this.lastKnownPlayerPos) {
                        this.investigationTarget = { ...this.lastKnownPlayerPos };
                        this.investigationTimer = CONSTANTS.GUARD.ALERT.INVESTIGATION_DURATION * 2;
                        this.bossState = CONSTANTS.BOSS.STATES.PATROLLING; // Will investigate
                    }
                }
            }
        }

        return false;
    }

    /**
     * Take damage - bosses have more health and phase changes
     * @param {number} amount
     * @returns {boolean}
     */
    takeDamage(amount) {
        if (this.isEliminated) return false;

        this.health -= amount;

        eventBus.emit(EVENTS.BOSS_DAMAGED, {
            boss: this,
            bossType: this.bossType,
            health: this.health,
            maxHealth: this.maxHealth,
            damage: amount
        });

        // Play damage sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_DAMAGED');
        }

        // Check for phase change
        this.checkPhaseChange();

        // Check for defeat
        if (this.health <= 0) {
            this.health = 0;
            this.defeat();
            return true;
        }

        return false;
    }

    /**
     * Apply stun effect (from tranquilizer)
     * @param {number} duration
     */
    applyStun(duration) {
        this.isStunned = true;
        this.stunTimer = duration;
    }

    /**
     * Check and handle phase changes (override in subclasses)
     */
    checkPhaseChange() {
        // Base implementation does nothing
    }

    /**
     * Defeat the boss
     */
    defeat() {
        this.isEliminated = true;
        this.active = false;

        eventBus.emit(EVENTS.BOSS_DEFEATED, {
            boss: this,
            bossType: this.bossType,
            x: this.x,
            y: this.y
        });

        // Play defeat sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_DEFEATED');
        }
    }

    /**
     * Check if this is a boss
     * @returns {boolean}
     */
    isBossEntity() {
        return true;
    }

    /**
     * Get boss display name
     * @returns {string}
     */
    getDisplayName() {
        return this.displayName;
    }

    /**
     * Get current phase
     * @returns {number}
     */
    getPhase() {
        return this.phase;
    }
}

// Presidential Guard Captain - Level 4 Mid-Boss
class CaptainBoss extends Boss {
    constructor(x, y, waypoints, collision) {
        super(x, y, waypoints, collision, CONSTANTS.BOSS.CAPTAIN);

        this.bossType = 'CAPTAIN';
        this.displayName = 'Guard Captain';
        this.isFinalBoss = false;

        // Ranged attack properties
        this.rangedCooldown = 0;
        this.rangedConfig = CONSTANTS.BOSS.CAPTAIN.RANGED_ATTACK;
    }

    /**
     * Override update to include ranged attack
     * @param {number} dt
     */
    update(dt) {
        super.update(dt);

        // Update ranged cooldown
        if (this.rangedCooldown > 0) {
            this.rangedCooldown -= dt;
        }

        // Try ranged attack if in alert/attack state and can see player
        if ((this.bossState === CONSTANTS.BOSS.STATES.ALERT ||
             this.bossState === CONSTANTS.BOSS.STATES.ATTACKING) &&
            this.chaseTarget && this.canCurrentlySeePlayer) {
            this.tryRangedAttack();
        }
    }

    /**
     * Override chase to switch to attack state when in range
     * @param {number} dt
     */
    updateBossChase(dt) {
        if (!this.chaseTarget) return;

        const dx = this.chaseTarget.x - this.x;
        const dy = this.chaseTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // In melee range - switch to attacking
        if (distance <= this.attackRange) {
            this.bossState = CONSTANTS.BOSS.STATES.ATTACKING;
            this.tryBossAttack();
        } else {
            this.bossState = CONSTANTS.BOSS.STATES.ALERT;
        }

        // Move towards player
        const chaseSpeed = this.speed * this.chaseSpeedMultiplier;
        const moveX = (dx / distance) * chaseSpeed * dt;
        const moveY = (dy / distance) * chaseSpeed * dt;

        // Update facing
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Apply movement
        const newPos = this.collision.resolveGuardCollision(
            this.x, this.y,
            this.x + moveX, this.y + moveY,
            this.width, this.height,
            this.player, this.otherGuards, this
        );

        this.x = newPos.x;
        this.y = newPos.y;

        this.lastKnownPlayerPos = { x: this.chaseTarget.x, y: this.chaseTarget.y };
    }

    /**
     * Try to perform a ranged attack (throw knife)
     * @returns {boolean}
     */
    tryRangedAttack() {
        if (this.rangedCooldown > 0 || this.isEliminated || this.isStunned) {
            return false;
        }

        if (!this.chaseTarget) return false;

        const distance = this.distanceTo(this.chaseTarget);
        const rangedRange = this.rangedConfig.RANGE * CONSTANTS.TILE.SIZE;

        // Only use ranged attack at medium range (not too close, not too far)
        if (distance < this.attackRange || distance > rangedRange) {
            return false;
        }

        this.rangedCooldown = this.rangedConfig.COOLDOWN;

        // Emit projectile event for game to create the projectile
        eventBus.emit(EVENTS.BOSS_ATTACK, {
            boss: this,
            bossType: this.bossType,
            x: this.x,
            y: this.y,
            targetX: this.chaseTarget.x,
            targetY: this.chaseTarget.y,
            damage: this.rangedConfig.DAMAGE,
            isRanged: true,
            projectileSpeed: this.rangedConfig.PROJECTILE_SPEED
        });

        return true;
    }
}

// Maduro Nights - Maduro Final Boss
// Session 8: Multi-phase final boss
// Phase 1: Standard combat
// Phase 2: Summons guards when health drops below 5
// Phase 3: Enraged mode when health drops below 2
// Session 8 Update: Sleep/capture mechanic for final level extraction

class MaduroBoss extends Boss {
    constructor(x, y, waypoints, collision) {
        super(x, y, waypoints, collision, CONSTANTS.BOSS.MADURO);

        this.bossType = 'MADURO';
