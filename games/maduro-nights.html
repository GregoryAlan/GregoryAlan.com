    }

    /**
     * Session 8: Handle boss attack (melee or ranged)
     * @param {Object} data - { boss, damage, isRanged, ... }
     */
    onBossAttack(data) {
        if (!this.player || this.player.isDead) return;

        // Handle ranged attack (Captain's knife throw)
        if (data.isRanged && data.targetX !== undefined && data.targetY !== undefined) {
            const projectile = new Projectile(
                data.x,
                data.y,
                data.targetX,
                data.targetY,
                {
                    speed: data.projectileSpeed || CONSTANTS.BOSS.CAPTAIN.RANGED_ATTACK.PROJECTILE_SPEED,
                    damage: data.damage,
                    range: CONSTANTS.BOSS.CAPTAIN.RANGED_ATTACK.RANGE,
                    owner: 'boss',
                    type: 'knife'
                }
            );
            this.projectiles.push(projectile);
            return;
        }

        // Handle melee attack - check if player is in range
        const boss = data.boss;
        const dx = this.player.x - boss.x;
        const dy = this.player.y - boss.y;
        const distance = Math.hypot(dx, dy);

        // Use boss's attack range
        const attackRange = boss.attackRange || CONSTANTS.BOSS.CAPTAIN.ATTACK_RANGE * CONSTANTS.TILE.SIZE;
        if (distance < attackRange) {
            this.player.takeDamage(data.damage);

            // Play hit sound
            if (typeof audioManager !== 'undefined') {
                audioManager.playSFX('PLAYER_HIT');
            }
        }
    }

    /**
     * Session 8: Handle boss summoning guards (Maduro phase 2)
     * @param {Object} data - { boss, positions }
     */
    onBossSummon(data) {
        if (data.positions) {
            data.positions.forEach(pos => {
                this.spawnSummonedGuard(pos.x, pos.y);
            });
        }
    }

    /**
     * Session 8: Spawn a guard summoned by boss
     * @param {number} x - Spawn X in pixels
     * @param {number} y - Spawn Y in pixels
     */
    spawnSummonedGuard(x, y) {
        const tileSize = CONSTANTS.TILE.SIZE;
        const guardSize = CONSTANTS.GUARD.SIZE;

        // Find a valid spawn position where the guard can move
        const validSpawn = this.collision.findValidSpawnPosition(
            Math.floor(x / tileSize),
            Math.floor(y / tileSize),
            guardSize,
            guardSize
        );

        let spawnX, spawnY;
        if (validSpawn) {
            spawnX = validSpawn.x;
            spawnY = validSpawn.y;
        } else {
            // If no valid position near target, try to find one near the boss
            const bossValidSpawn = this.boss ? this.collision.findValidSpawnPosition(
                Math.floor(this.boss.x / tileSize),
                Math.floor(this.boss.y / tileSize),
                guardSize,
                guardSize
            ) : null;

            if (bossValidSpawn) {
                spawnX = bossValidSpawn.x;
                spawnY = bossValidSpawn.y;
            } else {
                // Last resort: use original position but might get stuck
                console.warn('Could not find valid spawn for summoned guard');
                spawnX = x;
                spawnY = y;
            }
        }

        // Create patrol waypoints around spawn point
        const spawnTileX = Math.floor(spawnX / tileSize);
        const spawnTileY = Math.floor(spawnY / tileSize);
        const waypoints = [
            { x: spawnTileX, y: spawnTileY },
            { x: spawnTileX + 2, y: spawnTileY }
        ];

        const guard = new Guard(spawnX, spawnY, waypoints, this.collision);
        guard.setCollisionRefs(this.player, this.guards);

        // Summoned guards start alert
        guard.state = CONSTANTS.GUARD.STATES.ALERT;
        guard.suspicion = 1.0;
        if (this.player) {
            guard.setChaseTarget(this.player);
        }

        this.guards.push(guard);

        // Update player's guard reference
        const allEnemies = [...this.guards, ...this.eliteGuards];
        if (this.boss) allEnemies.push(this.boss);
        this.player.setGuards(allEnemies);

        console.log('Guard summoned by boss at valid position!');
    }

    /**
     * Session 8: Handle boss defeated
     * @param {Object} data - { boss }
     */
    onBossDefeated(data) {
        console.log('Boss defeated!');

        // Session 8: If Maduro (final boss) is killed, mission fails - must extract alive
        if (this.boss && this.boss.isFinalBoss) {
            // Killing Maduro = mission failure (must extract alive)
            this.gameOverReason = 'TARGET_KILLED';
            this.menu.setGameOverReason('TARGET_KILLED');
            this.stateManager.setState(CONSTANTS.STATES.GAME_OVER);
            return;
        }

        // For non-final bosses (Captain on level 4), defeating them:
        // 1. Completes the intel objective (if not already done)
        // 2. Activates extraction so player can leave
        if (this.objectiveManager) {
            // Complete the intel/target objective to unlock extraction
            const targetObjective = this.objectiveManager.getObjectives().find(
                obj => obj.type === CONSTANTS.OBJECTIVES.TYPES.INTERACT_TARGET
            );
            if (targetObjective && targetObjective.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE) {
                this.objectiveManager.completeObjective(targetObjective.id);
            } else if (targetObjective && targetObjective.status === CONSTANTS.OBJECTIVES.STATUS.LOCKED) {
                // If target was locked, complete it anyway and activate extraction
                targetObjective.status = CONSTANTS.OBJECTIVES.STATUS.COMPLETE;
                // Manually activate extraction
                const extractionObj = this.objectiveManager.getObjectives().find(
                    obj => obj.type === CONSTANTS.OBJECTIVES.TYPES.REACH_EXTRACTION
                );
                if (extractionObj) {
                    extractionObj.status = CONSTANTS.OBJECTIVES.STATUS.ACTIVE;
                    eventBus.emit(EVENTS.OBJECTIVE_ACTIVATED, { objective: extractionObj });
                }
            }
        }
    }

    /**
     * Session 8: Handle tranquilizer fired
     * @param {Object} data - { player, x, y, direction }
     */
    onTranquilizerFired(data) {
        // Calculate target position from direction (project forward by max range)
        const range = CONSTANTS.TRANQUILIZER.RANGE * CONSTANTS.TILE.SIZE;
        const targetX = data.x + data.direction.dx * range;
        const targetY = data.y + data.direction.dy * range;

        const projectile = new Projectile(
            data.x,
            data.y,
            targetX,
            targetY,
            {
                speed: CONSTANTS.TRANQUILIZER.PROJECTILE_SPEED,
                damage: CONSTANTS.TRANQUILIZER.DAMAGE,
                range: CONSTANTS.TRANQUILIZER.RANGE,
                owner: 'player',
                type: 'tranquilizer'
            }
        );
        this.projectiles.push(projectile);

        // Play tranquilizer sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('TRANQUILIZER_FIRE');
        }
    }

    /**
     * Session 8: Handle shotgun fired
     * Damages all enemies in spread cone and ALERTS EVERYTHING on the map
     * @param {Object} data - { x, y, facing, facingAngle, pellets, range, damage }
     */
    onShotgunFired(data) {
        const tileSize = CONSTANTS.TILE.SIZE;
        const maxRange = data.range * tileSize;

        // Add pellet spread for visual rendering
        this.shotgunPellets.push({
            x: data.x,
            y: data.y,
            pellets: data.pellets,
            range: data.range,
            progress: 0,
            duration: 0.15  // How long the pellet animation lasts
        });

        // Check each pellet against all enemies
        data.pellets.forEach(pellet => {
            // Check along the pellet path for enemies
            for (let dist = 0; dist <= maxRange; dist += tileSize / 2) {
                const checkX = data.x + pellet.dx * dist;
                const checkY = data.y + pellet.dy * dist;

                // Check wall collision - pellet stops here
                const tileX = Math.floor(checkX / tileSize);
                const tileY = Math.floor(checkY / tileSize);
                if (this.tilemap && this.tilemap.isWall(tileX, tileY)) {
                    break;
                }

                // Check guards
                this.guards.forEach(guard => {
                    if (guard.isEliminated || guard.isSleeping) return;
                    const dx = guard.x - checkX;
                    const dy = guard.y - checkY;
                    const distance = Math.hypot(dx, dy);
                    if (distance < CONSTANTS.GUARD.SIZE) {
                        guard.takeDamage(data.damage);
                    }
                });

                // Check elite guards
                this.eliteGuards.forEach(elite => {
                    if (elite.isEliminated || elite.isSleeping) return;
                    const dx = elite.x - checkX;
                    const dy = elite.y - checkY;
                    const distance = Math.hypot(dx, dy);
                    if (distance < CONSTANTS.ELITE_GUARD.SIZE) {
                        elite.takeDamage(data.damage);
                    }
                });

                // Check boss
                if (this.boss && !this.boss.isEliminated && !this.boss.isSleeping) {
                    const bossSize = this.boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
                    const dx = this.boss.x - checkX;
                    const dy = this.boss.y - checkY;
                    const distance = Math.hypot(dx, dy);
                    if (distance < bossSize) {
                        this.boss.takeDamage(data.damage);
                    }
                }
            }
        });

        // ALERT EVERYTHING ON THE MAP - the shotgun is LOUD!
        this.alertAllEnemies();

        // Play shotgun sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('SHOTGUN_FIRE');
        }
    }

    /**
     * Session 8: Alert ALL enemies on the map (used when shotgun fires)
     * Every guard, elite guard, boss, and camera becomes fully alert
     */
    alertAllEnemies() {
        // Alert all regular guards
        this.guards.forEach(guard => {
            if (guard.isEliminated || guard.isSleeping) return;
            guard.suspicion = 1.0;
            guard.state = CONSTANTS.GUARD.STATES.ALERT;
            guard.alertTimer = CONSTANTS.GUARD.ALERT.ALERT_DURATION;
            if (this.player) {
                guard.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
                guard.setChaseTarget(this.player);
            }
        });

        // Alert all elite guards
        this.eliteGuards.forEach(elite => {
            if (elite.isEliminated || elite.isSleeping) return;
            elite.suspicion = 1.0;
            elite.state = CONSTANTS.GUARD.STATES.ALERT;
            elite.alertTimer = CONSTANTS.GUARD.ALERT.ALERT_DURATION;
            if (this.player) {
                elite.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
                elite.setChaseTarget(this.player);
            }
        });

        // Alert boss
        if (this.boss && !this.boss.isEliminated && !this.boss.isSleeping) {
            this.boss.suspicion = 1.0;
            this.boss.state = CONSTANTS.BOSS.STATES.ALERT;
            if (this.player) {
                this.boss.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
                this.boss.setChaseTarget(this.player);
            }
        }

        // Record alert in statistics
        if (this.statisticsManager) {
            this.statisticsManager.recordAlertTriggered();
        }

        console.log('SHOTGUN FIRED - All enemies alerted!');
    }

    /**
     * Session 8: Update shotgun pellet animations
     * @param {number} dt - Delta time
     */
    updateShotgunPellets(dt) {
        for (let i = this.shotgunPellets.length - 1; i >= 0; i--) {
            const pelletSpread = this.shotgunPellets[i];
            pelletSpread.progress += dt / pelletSpread.duration;

            if (pelletSpread.progress >= 1) {
                this.shotgunPellets.splice(i, 1);
            }
        }
    }

    /**
     * Session 4: Propagate sound to nearby guards
     * Session 8: Also propagate to elite guards and boss
     * @param {number} x - Sound origin X
     * @param {number} y - Sound origin Y
     * @param {number} radius - Sound radius in tiles
     */
    propagateSound(x, y, radius) {
        this.guards.forEach(guard => {
            guard.hearSound(x, y, radius);
        });

        // Session 8: Elite guards also hear sounds
        this.eliteGuards.forEach(elite => {
            if (!elite.isEliminated) {
                elite.hearSound(x, y, radius);
            }
        });

        // Session 8: Boss also hears sounds
        if (this.boss && !this.boss.isEliminated) {
            this.boss.hearSound(x, y, radius);
        }
    }

    /**
     * Session 8: Update all projectiles
     * @param {number} dt - Delta time
     */
    updateProjectiles(dt) {
        // Update each projectile and check for collisions
        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            const projectile = this.projectiles[i];
            projectile.update(dt);

            // Check if projectile is expired
            if (projectile.isExpired()) {
                this.projectiles.splice(i, 1);
                continue;
            }

            // Check for wall collision
            const tileX = Math.floor(projectile.x / CONSTANTS.TILE.SIZE);
            const tileY = Math.floor(projectile.y / CONSTANTS.TILE.SIZE);
            if (this.tilemap && this.tilemap.isWall(tileX, tileY)) {
                this.projectiles.splice(i, 1);
                continue;
            }

            // Check for entity collision based on projectile owner
            if (projectile.owner === 'player') {
                // Player projectile - check against guards, elite guards, boss
                const hitEnemy = this.checkProjectileHitEnemy(projectile);
                if (hitEnemy) {
                    this.projectiles.splice(i, 1);
                    continue;
                }
            } else if (projectile.owner === 'boss') {
                // Boss projectile - check against player
                if (this.player && !this.player.isDead) {
                    const dx = this.player.x - projectile.x;
                    const dy = this.player.y - projectile.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < CONSTANTS.PLAYER.SIZE / 2 + 4) {
                        this.player.takeDamage(projectile.damage);
                        this.projectiles.splice(i, 1);
                        continue;
                    }
                }
            }
        }
    }

    /**
     * Session 8: Check if player projectile hits an enemy
     * Tranquilizer puts enemies to sleep instead of damaging them
     * @param {Projectile} projectile
     * @returns {boolean} True if hit
     */
    checkProjectileHitEnemy(projectile) {
        const hitRadius = 12; // Pixel radius for hit detection

        // Check regular guards
        for (const guard of this.guards) {
            if (guard.isEliminated || guard.isSleeping) continue;

            const dx = guard.x - projectile.x;
            const dy = guard.y - projectile.y;
            const dist = Math.hypot(dx, dy);

            if (dist < hitRadius + CONSTANTS.GUARD.SIZE / 2) {
                // Tranquilizer puts guards to sleep instead of damaging them
                guard.fallAsleep(60); // 60 seconds sleep
                eventBus.emit(EVENTS.TRANQUILIZER_HIT, { target: guard, putToSleep: true });
                return true;
            }
        }

        // Check elite guards
        for (const elite of this.eliteGuards) {
            if (elite.isEliminated || elite.isSleeping) continue;

            const dx = elite.x - projectile.x;
            const dy = elite.y - projectile.y;
            const dist = Math.hypot(dx, dy);

            if (dist < hitRadius + CONSTANTS.ELITE_GUARD.SIZE / 2) {
                // Tranquilizer puts elite guards to sleep instead of damaging them
                elite.fallAsleep(60); // 60 seconds sleep
                eventBus.emit(EVENTS.TRANQUILIZER_HIT, { target: elite, putToSleep: true });
                return true;
            }
        }

        // Check boss
        if (this.boss && !this.boss.isEliminated && !this.boss.isSleeping) {
            const dx = this.boss.x - projectile.x;
            const dy = this.boss.y - projectile.y;
            const dist = Math.hypot(dx, dy);

            const bossSize = this.boss.isFinalBoss ? CONSTANTS.BOSS.MADURO.SIZE : CONSTANTS.BOSS.CAPTAIN.SIZE;
            if (dist < hitRadius + bossSize / 2) {
                // Tranquilizer puts bosses to sleep
                this.boss.fallAsleep();
                eventBus.emit(EVENTS.TRANQUILIZER_HIT, { target: this.boss, putToSleep: true });
                return true;
            }
        }

        return false;
    }

    /**
     * Session 7: Alert guards when camera detects player
     * @param {Camera} camera - The camera that detected the player
     */
    alertGuardsFromCamera(camera) {
        const alertRadius = CONSTANTS.CAMERA.DETECTION.ALERT_RADIUS * CONSTANTS.TILE.SIZE;

        this.guards.forEach(guard => {
            if (guard.isEliminated) return;

            const distance = Math.hypot(guard.x - camera.x, guard.y - camera.y);
            if (distance <= alertRadius) {
                // Set guard to alert state immediately
                guard.suspicion = 1.0;
                guard.state = CONSTANTS.GUARD.STATES.ALERT;
                guard.alertTimer = CONSTANTS.CAMERA.DETECTION.ALERT_DURATION;

                // Set last known player position to where camera saw them
                if (this.player) {
                    guard.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
                    guard.setChaseTarget(this.player);
                }
            }
        });

        // Play camera detection sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('CAMERA_DETECT');
        }

        // Increment statistics for alerts
        if (this.statisticsManager) {
            this.statisticsManager.recordAlertTriggered();
        }
    }

    /**
     * Session 7: Disable cameras linked to an alarm panel
     * @param {Object} panel - Alarm panel data { x, y, roomId, isDisabled }
     */
    disableCamerasInRoom(panel) {
        this.cameras.forEach(camera => {
            if (camera.roomId === panel.roomId && !camera.isDisabled()) {
                camera.disable();
            }
        });
    }

    /**
     * Handle menu interactions
     * Session 6: Added RUN_RESULTS and UPGRADE_SHOP states
     */
    handleMenuInteraction() {
        const state = this.stateManager.getState();
        console.log('handleMenuInteraction called, state:', state);

        if (state === CONSTANTS.STATES.MENU) {
            this.startGame();
        } else if (state === CONSTANTS.STATES.GAME_OVER) {
            // Legacy - should not hit this anymore since we use RUN_RESULTS
            this.stateManager.setState(CONSTANTS.STATES.MENU);
        } else if (state === CONSTANTS.STATES.LEVEL_TRANSITION) {
            // Session 5: Progress to next level
            this.startNextLevel();
        } else if (state === CONSTANTS.STATES.LEVEL_COMPLETE) {
            // Final victory - return to menu
            this.stateManager.setState(CONSTANTS.STATES.MENU);
        } else if (state === CONSTANTS.STATES.RUN_RESULTS) {
            // Session 6: Award credits and go to upgrade shop
            if (this.pendingCredits && this.pendingCredits.total > 0) {
                this.saveManager.addCredits(this.pendingCredits.total);
                eventBus.emit(EVENTS.CREDITS_EARNED, {
                    amount: this.pendingCredits.total,
                    breakdown: this.pendingCredits.breakdown
                });
            }
            this.pendingCredits = null;
            this.stateManager.setState(CONSTANTS.STATES.UPGRADE_SHOP);
        } else if (state === CONSTANTS.STATES.UPGRADE_SHOP) {
            // Session 6: Exit upgrade shop, return to menu
            this.stateManager.setState(CONSTANTS.STATES.MENU);
        }
    }

    /**
     * Session 5: Handle in-game interactions (E key / Y button)
     * Opens doors, completes objectives
     * Session 8: Also handles dragging sleeping Maduro
     */
    handleInteraction() {
        if (!this.player || !this.tilemap) return;

        // Session 8: Toggle dragging sleeping Maduro
        if (this.player.isDraggingTarget()) {
            // Already dragging - stop dragging
            this.player.stopDragging();
            return;
        }

        // Session 8: Check if player can start dragging sleeping Maduro
        if (this.boss && this.boss.isFinalBoss && this.boss.canBeDragged()) {
            // Check if player is close enough to Maduro
            const dx = this.player.x - this.boss.x;
            const dy = this.player.y - this.boss.y;
            const distance = Math.hypot(dx, dy);
            const interactRange = CONSTANTS.TILE.SIZE * 2; // 2 tiles range

            if (distance < interactRange) {
                this.player.startDragging(this.boss);
                return;
            }
        }

        const playerTileX = this.player.getTileX();
        const playerTileY = this.player.getTileY();

        // Check tiles around the player for interactables
        const directions = [
            { dx: 0, dy: 0 },   // Current tile
            { dx: 1, dy: 0 },   // Right
            { dx: -1, dy: 0 },  // Left
            { dx: 0, dy: 1 },   // Down
            { dx: 0, dy: -1 },  // Up
        ];

        for (const dir of directions) {
            const checkX = playerTileX + dir.dx;
            const checkY = playerTileY + dir.dy;

            // Session 7: Check for alarm panels
            if (this.tilemap.isAlarmPanel(checkX, checkY)) {
                // Find the alarm panel data
                const panel = this.findAlarmPanelAt(checkX, checkY);
                if (panel && !panel.isDisabled) {
                    // Disable the alarm panel
                    panel.isDisabled = true;
                    this.tilemap.disableAlarmPanel(checkX, checkY);

                    // Disable cameras linked to this panel's room
                    this.disableCamerasInRoom(panel);

                    // Play disable sound
                    if (typeof audioManager !== 'undefined') {
                        audioManager.playSFX('ALARM_DISABLE');
                    }

                    eventBus.emit(EVENTS.ALARM_PANEL_DISABLED, { x: checkX, y: checkY, roomId: panel.roomId });
                    console.log('Alarm panel disabled - cameras in this area are now offline!');
                    return;
                }
            }

            // Session 8: Check for gate keyslots
            if (this.tilemap.isGateKeyslot(checkX, checkY)) {
                // Find the gate this keyslot belongs to
                const gate = this.findGateByKeyslot(checkX, checkY);
                if (gate && !gate.isOpen) {
                    if (this.hasKey) {
                        // Open the gate
                        this.openGate(gate);
                        this.hasKey = false;
                        // Remove key from inventory
                        const keyIndex = this.inventory.findIndex(item => item.type === 'key');
                        if (keyIndex !== -1) {
                            this.inventory.splice(keyIndex, 1);
                        }
                        eventBus.emit(EVENTS.DOOR_OPENED, { x: checkX, y: checkY, wasLocked: true, isGate: true });
                        return;
                    } else {
                        // Gate is locked and player has no key
                        eventBus.emit(EVENTS.DOOR_LOCKED, { x: checkX, y: checkY, isGate: true });
                        console.log('Gate is locked - find a key!');
                        return;
                    }
                }
            }

            // Check for doors
            if (this.tilemap.isDoor(checkX, checkY)) {
                // Skip already open doors
                if (this.tilemap.isDoorOpen(checkX, checkY)) {
                    continue;
                }

                if (this.tilemap.isDoorLocked(checkX, checkY)) {
                    if (this.hasKey) {
                        // Unlock the door first, then open it
                        this.tilemap.unlockDoor(checkX, checkY);
                        this.tilemap.openDoor(checkX, checkY);
                        this.hasKey = false; // Use up the key
                        // Remove key from inventory
                        const keyIndex = this.inventory.findIndex(item => item.type === 'key');
                        if (keyIndex !== -1) {
                            this.inventory.splice(keyIndex, 1);
                        }
                        eventBus.emit(EVENTS.DOOR_OPENED, { x: checkX, y: checkY, wasLocked: true });
                        return;
                    } else {
                        // Door is locked and player has no key
                        eventBus.emit(EVENTS.DOOR_LOCKED, { x: checkX, y: checkY });
                        console.log('Door is locked - find a key!');
                        return;
                    }
                } else {
                    // Open unlocked door
                    if (this.tilemap.openDoor(checkX, checkY)) {
                        eventBus.emit(EVENTS.DOOR_OPENED, { x: checkX, y: checkY, wasLocked: false });
                        return;
                    }
                }
            }

            // Check for objective at this position
            const objective = this.objectiveManager.getObjectiveAtPosition(checkX, checkY);
            if (objective && objective.type === CONSTANTS.OBJECTIVES.TYPES.INTERACT_TARGET) {
                this.objectiveManager.completeObjective(objective.id);
                return;
            }
        }
    }

    /**
     * Session 5/6: Check for nearby items (keys, objectives) - proximity detection
     * Sets nearbyItem for HUD pickup prompt, requires interaction to collect
     */
    checkNearbyItems() {
        if (!this.player || !this.tilemap) return;

        this.nearbyItem = null; // Reset

        const playerTileX = this.player.getTileX();
        const playerTileY = this.player.getTileY();

        // Check current tile and adjacent tiles for items
        const checkPositions = [
            { x: playerTileX, y: playerTileY },
            { x: playerTileX - 1, y: playerTileY },
            { x: playerTileX + 1, y: playerTileY },
            { x: playerTileX, y: playerTileY - 1 },
            { x: playerTileX, y: playerTileY + 1 }
        ];

        for (const pos of checkPositions) {
            const item = this.tilemap.getInteractableItemAt(pos.x, pos.y);
            if (item) {
                // Skip keys if player already has one
                if (item.type === 'key' && this.hasKey) {
                    continue;
                }
                // Session 8: Skip tranq gun if player already has it
                if (item.type === 'tranq_gun' && this.player.hasTranqGun()) {
                    continue;
                }
                // Skip objectives that aren't active
                if (item.type === 'objective') {
                    const objective = this.objectiveManager.getObjectiveAtPosition(pos.x, pos.y);
                    if (!objective || objective.status !== CONSTANTS.OBJECTIVES.STATUS.ACTIVE) {
                        continue;
                    }
                }
                this.nearbyItem = item;
                return;
            }
        }
    }

    /**
     * Session 6: Pick up/interact with nearby item when player presses interact
     * Handles keys, objectives, and other interactable items
     * Session 8: Also handles tranquilizer gun pickup
     * Items are added to inventory and removed from the map
     */
    pickupNearbyItem() {
        if (!this.nearbyItem) return false;

        const item = this.nearbyItem;

        if (item.type === 'key' && !this.hasKey) {
            this.tilemap.collectItem(item.x, item.y, 'key');
            this.hasKey = true;
            // Add to inventory for HUD display
            this.inventory.push({
                type: 'key',
                name: 'Security Key',
                icon: 'key'
            });
            eventBus.emit(EVENTS.KEY_COLLECTED, { x: item.x, y: item.y });
            eventBus.emit(EVENTS.ITEM_COLLECTED, { item: { type: 'key', name: 'Security Key' } });
            this.nearbyItem = null;
            return true;
        }

        // Session 8: Handle tranquilizer gun pickup
        if (item.type === 'tranq_gun' && !this.player.hasTranqGun()) {
            // Remove from map and clear tranqGunPos
            this.tilemap.collectItem(item.x, item.y, 'tranq_gun');
            this.tranqGunPos = null;

            // Give player the tranquilizer gun
            this.player.collectTranquilizerGun();

            // Add to inventory for HUD display
            this.inventory.push({
                type: 'tranq_gun',
                name: 'Tranq Gun',
                icon: 'tranq_gun'
            });
            eventBus.emit(EVENTS.ITEM_COLLECTED, { item: { type: 'tranq_gun', name: 'Tranquilizer Gun' } });
            this.nearbyItem = null;
            return true;
        }

        if (item.type === 'objective') {
            const objective = this.objectiveManager.getObjectiveAtPosition(item.x, item.y);
            if (objective && objective.type === CONSTANTS.OBJECTIVES.TYPES.INTERACT_TARGET) {
                // Add intel to inventory before completing objective
                this.inventory.push({
                    type: 'intel',
                    name: 'Intel',
                    icon: 'intel'
                });
                // Remove from map
                this.tilemap.clearObjectiveTile(item.x, item.y);
                this.objectiveManager.completeObjective(objective.id);
                eventBus.emit(EVENTS.ITEM_COLLECTED, { item: { type: 'intel', name: 'Intel' } });
                this.nearbyItem = null;
                return true;
            }
        }

        return false;
    }

    /**
     * Session 8: Find a gate by its keyslot position
     * @param {number} x - Keyslot tile X
     * @param {number} y - Keyslot tile Y
     * @returns {Object|null} Gate data or null
     */
    findGateByKeyslot(x, y) {
        for (const gate of this.gates) {
            if (gate.keyslotPos && gate.keyslotPos.x === x && gate.keyslotPos.y === y) {
                return gate;
            }
        }
        return null;
    }

    /**
     * Session 7: Find alarm panel at position
     * @param {number} x - Tile X
     * @param {number} y - Tile Y
     * @returns {Object|null} Alarm panel data or null
     */
    findAlarmPanelAt(x, y) {
        for (const panel of this.alarmPanels) {
            if (panel.x === x && panel.y === y) {
                return panel;
            }
        }
        return null;
    }

    /**
     * Session 8: Check if player is near an active alarm panel (for interaction prompt)
     */
    checkNearbyAlarmPanel() {
        this.nearbyAlarmPanel = false;

        if (!this.player || !this.tilemap) return;

        const playerTileX = this.player.getTileX();
        const playerTileY = this.player.getTileY();

        // Check adjacent tiles for alarm panels
        const directions = [
            { dx: 0, dy: 0 },
            { dx: 1, dy: 0 },
            { dx: -1, dy: 0 },
            { dx: 0, dy: 1 },
            { dx: 0, dy: -1 },
        ];

        for (const dir of directions) {
            const checkX = playerTileX + dir.dx;
            const checkY = playerTileY + dir.dy;

            if (this.tilemap.isAlarmPanel(checkX, checkY)) {
                const panel = this.findAlarmPanelAt(checkX, checkY);
                if (panel && !panel.isDisabled) {
                    this.nearbyAlarmPanel = true;
                    return;
                }
            }
        }
    }

    /**
     * Session 8: Open a gate, converting all its tiles to GATE_OPEN
     * @param {Object} gate - Gate data with tiles array
     */
    openGate(gate) {
        if (!gate || gate.isOpen) return;

        // Convert all gate tiles to open state
        this.tilemap.openGate(gate.tiles);
        gate.isOpen = true;

        // Play sound effect
        audioManager.playSFX('DOOR_OPEN');

        console.log(`Gate ${gate.id} opened!`);
    }

    /**
     * Session 6: Debug skip level - instantly complete current level
     * Only works when debug mode is enabled and game is playing
     */
    debugSkipLevel() {
        // Only allow in debug mode while playing
        if (!this.debugEnabled || !this.stateManager.isPlaying()) {
            return;
        }

        console.log('[DEBUG] Skipping level', this.currentLevelNum);

        // Complete all objectives for the current level
        if (this.objectiveManager) {
            this.objectiveManager.completeAllObjectives();
        }

        // Trigger level complete
        eventBus.emit(EVENTS.PLAYER_REACHED_EXTRACTION);
    }

    /**
     * Toggle pause state
     */
    togglePause() {
        if (this.stateManager.isPlaying()) {
            this.stateManager.setState(CONSTANTS.STATES.PAUSED);
        } else if (this.stateManager.isPaused()) {
            this.stateManager.setState(CONSTANTS.STATES.PLAYING);
        }
    }

    /**
     * Main update loop
     * @param {number} dt - Delta time in seconds
     */
    update(dt) {
        // Session 8: Handle START button (mobile touch) for menu/pause
        if (this.input.isActionPressed(CONSTANTS.ACTIONS.START_PAUSE)) {
            const state = this.stateManager.getState();
            if (state === CONSTANTS.STATES.MENU) {
                this.startGame();
            } else if (state === CONSTANTS.STATES.PLAYING) {
                this.togglePause();
            } else if (state === CONSTANTS.STATES.PAUSED) {
                this.togglePause();
            } else if (state === CONSTANTS.STATES.LEVEL_TRANSITION) {
                this.startNextLevel();
            } else if (state === CONSTANTS.STATES.RUN_RESULTS) {
                this.handleMenuInteraction();
            } else if (state === CONSTANTS.STATES.UPGRADE_SHOP) {
                this.stateManager.setState(CONSTANTS.STATES.MENU);
            } else if (state === CONSTANTS.STATES.GAME_OVER) {
                this.stateManager.setState(CONSTANTS.STATES.MENU);
            } else if (state === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
                this.stateManager.setState(CONSTANTS.STATES.MENU);
            } else if (state === CONSTANTS.STATES.SETTINGS) {
                this.stateManager.setState(CONSTANTS.STATES.PAUSED);
            }
        }

        // Only update game entities when playing
        if (this.stateManager.isPlaying()) {
            // Update player
            if (this.player && !this.player.isDead) {
                this.player.update(dt, this.input);

                // Session 4: Process player sound/noise
                // Session 7: Play footstep audio
                if (this.player.isMoving()) {
                    const noiseRadius = this.player.getNoiseRadius();
                    if (noiseRadius > 0) {
                        this.propagateSound(this.player.x, this.player.y, noiseRadius);
                    }
                    // Session 7: Play footstep sound based on movement mode
                    const mode = this.player.getMovementMode();
                    audioManager.playFootstep(mode);
                }

                // Session 6: Check for nearby items (proximity detection for pickup prompt)
                this.checkNearbyItems();

                // Session 8: Check for nearby alarm panels (for prompt)
                this.checkNearbyAlarmPanel();

                // Session 5/6: Check for interaction (E key or Y button)
                if (this.input.isActionPressed(CONSTANTS.ACTIONS.INTERACT)) {
                    // Session 6: Try to pick up nearby item first, then handle other interactions
                    if (!this.pickupNearbyItem()) {
                        this.handleInteraction();
                    }
                }

                // Session 8: Check for weapon switch (Q key or L shoulder button)
                if (this.input.isActionPressed(CONSTANTS.ACTIONS.SWITCH_WEAPON)) {
                    this.player.switchWeapon();
                }

                // Session 5: Check for extraction zone (only when extraction is active)
                // Session 8: On level 5, must be dragging sleeping Maduro to extract
                const isInExtractionZone = this.tilemap && this.objectiveManager.isExtractionActive() &&
                    this.tilemap.isExtractionZone(
                        this.player.getTileX(),
                        this.player.getTileY()
                    );

                if (isInExtractionZone) {
                    // Check if this is level 5 (Maduro boss level)
                    if (this.currentLevelNum === 5 && this.boss && this.boss.isFinalBoss) {
                        // Must be dragging sleeping Maduro to complete level 5
                        if (this.player.isDraggingTarget() && this.boss.isSleeping) {
                            this.boss.markExtracted();
                            eventBus.emit(EVENTS.PLAYER_REACHED_EXTRACTION);
                        }
                        // If not dragging sleeping Maduro, don't allow extraction
                    } else {
                        // Normal extraction for other levels
                        eventBus.emit(EVENTS.PLAYER_REACHED_EXTRACTION);
                    }
                }

                // Session 8: Update Maduro interaction prompts
                this.nearSleepingMaduro = false;
                this.atExtractionWithoutMaduro = false;

                if (this.currentLevelNum === 5 && this.boss && this.boss.isFinalBoss && !this.boss.isEliminated) {
                    // Check if near sleeping Maduro (for drag prompt)
                    if (this.boss.canBeDragged() && !this.player.isDraggingTarget()) {
                        const dx = this.player.x - this.boss.x;
                        const dy = this.player.y - this.boss.y;
                        const distance = Math.hypot(dx, dy);
                        const interactRange = CONSTANTS.TILE.SIZE * 2;
                        this.nearSleepingMaduro = distance < interactRange;
                    }

                    // Check if at extraction without dragging Maduro
                    if (isInExtractionZone && this.objectiveManager.isExtractionActive()) {
                        if (!this.player.isDraggingTarget() || !this.boss.isSleeping) {
                            this.atExtractionWithoutMaduro = true;
                        }
                    }
                }

                // Session 8: Update drag position if player is dragging Maduro
                if (this.player.isDraggingTarget() && this.boss && this.boss.isBeingDragged) {
                    const dragPos = this.player.getDragPosition();
                    this.boss.updateDragPosition(dragPos.x, dragPos.y);
                }
            }

            // Update guards and process detection
            this.guards.forEach(guard => {
                // Session 4: Skip eliminated guards
                if (guard.isEliminated) return;

                guard.update(dt);

                // Session 2: Use vision cone detection with suspicion system
                // Session 4: Detection now triggers chase instead of immediate game over
                if (this.player && !this.player.isDead) {
                    const detected = guard.processDetection(this.player, dt);
                    if (detected) {
                        // Session 4: Set chase target instead of instant game over
                        guard.setChaseTarget(this.player);
                        // Note: Game over now happens when player dies from combat
                    }
                }
            });

            // Session 8: Update elite guards
            this.eliteGuards.forEach(elite => {
                if (elite.isEliminated) return;

                elite.update(dt);

                if (this.player && !this.player.isDead) {
                    const detected = elite.processDetection(this.player, dt);
                    if (detected) {
                        elite.setChaseTarget(this.player);
                    }
                }
            });

            // Session 8: Update boss
            if (this.boss && !this.boss.isEliminated) {
                this.boss.update(dt);

                if (this.player && !this.player.isDead) {
                    const detected = this.boss.processDetection(this.player, dt);
                    if (detected) {
                        this.boss.setChaseTarget(this.player);
                    }
                }
            }

            // Session 8: Update projectiles
            this.updateProjectiles(dt);

            // Session 8: Update shotgun pellet animations
            this.updateShotgunPellets(dt);

            // Session 7: Update cameras and process detection
            this.cameras.forEach(camera => {
                if (camera.isDisabled()) return;

                camera.update(dt);

                // Process camera detection
                if (this.player && !this.player.isDead) {
                    const detected = camera.processDetection(this.player, dt);
                    if (detected) {
                        // Camera detected player - alert nearby guards
                        this.alertGuardsFromCamera(camera);
                    }
                }
            });
        }

        // Session 4: Update input state at END of frame (clears "just pressed" flags)
        this.input.update();
    }

    /**
     * Main render loop
     * Session 6: Added RUN_RESULTS and UPGRADE_SHOP rendering
     * @param {number} alpha - Interpolation factor
     */
    render(alpha) {
        // Clear canvas
        this.renderer.clear();

        const state = this.stateManager.getState();

        if (state === CONSTANTS.STATES.MENU) {
            this.menu.renderTitle();
            // Session 3: Show touch controls on menu for mobile
            this.touchControls.render(this.ctx);
        } else if (state === CONSTANTS.STATES.PLAYING || state === CONSTANTS.STATES.PAUSED) {
            this.renderGame(alpha);

            if (state === CONSTANTS.STATES.PAUSED) {
                this.menu.renderPause();
            }
        } else if (state === CONSTANTS.STATES.GAME_OVER) {
            this.renderGame(alpha);
            this.menu.renderGameOver();
        } else if (state === CONSTANTS.STATES.LEVEL_TRANSITION) {
            // Session 5: Show level transition screen
            // Session 8: Pass credits earned and total credits to show on transition
            this.renderGame(alpha);
            this.menu.renderLevelTransition(
                this.currentLevelNum,
                this.currentLevelNum + 1,
                this.lastLevelCredits,
                this.saveManager.getCredits()
            );
        } else if (state === CONSTANTS.STATES.LEVEL_COMPLETE) {
            this.renderGame(alpha);
            this.menu.renderLevelComplete();
        } else if (state === CONSTANTS.STATES.RUN_RESULTS) {
            // Session 6: Show run results screen
            this.renderGame(alpha);
            this.menu.renderRunResults(
                this.statisticsManager.getRunStats(),
                this.pendingCredits
            );
        } else if (state === CONSTANTS.STATES.UPGRADE_SHOP) {
            // Session 6: Show upgrade shop
            this.menu.renderUpgradeShop();
        } else if (state === CONSTANTS.STATES.ACHIEVEMENT_GALLERY) {
            // Session 8: Show achievement gallery
            this.menu.renderAchievementGallery();
        } else if (state === CONSTANTS.STATES.SETTINGS) {
            // Session 8: Show settings screen
            this.menu.renderSettings();
        }

        // Debug overlay
        if (this.debugEnabled && (state === CONSTANTS.STATES.PLAYING || state === CONSTANTS.STATES.PAUSED)) {
            this.renderDebug();
        }
    }

    /**
     * Render the game world
     * @param {number} alpha - Interpolation factor
     */
    renderGame(alpha) {
        // Render tilemap - pass extraction active state for helipad visual
        if (this.tilemap) {
            const extractionActive = this.objectiveManager && this.objectiveManager.isExtractionActive();
            this.renderer.renderTilemap(this.tilemap, extractionActive);
        }

        // Session 5: Render objective markers
        if (this.objectiveManager) {
            const objectives = this.objectiveManager.getObjectives();
            objectives.forEach(obj => {
                if (obj.position && obj.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE) {
                    this.renderer.renderObjectiveMarker(obj.position.x, obj.position.y, obj.type);
                }
            });
        }

        // Session 4: Render noise radius in debug mode (behind everything)
        if (this.player) {
            this.renderer.renderNoiseRadius(this.player, this.debugEnabled);
        }

        // Session 2: Render vision cones first (behind entities)
        // Session 4: Skip eliminated guards
        this.guards.forEach(guard => {
            if (guard.isEliminated) return;
            // Always show vision cones when suspicious/alert, or in debug mode
            this.renderer.renderVisionCone(guard, this.debugEnabled);
        });

        // Session 8: Render elite guard vision cones
        this.eliteGuards.forEach(elite => {
            if (elite.isEliminated) return;
            this.renderer.renderVisionCone(elite, this.debugEnabled);
        });

        // Session 8: Render boss vision cone
        if (this.boss && !this.boss.isEliminated) {
            this.renderer.renderVisionCone(this.boss, this.debugEnabled);
        }

        // Session 7: Render camera vision cones
        this.cameras.forEach(camera => {
            this.renderer.renderCameraVisionCone(camera, this.debugEnabled);
        });

        // Session 8: Render facing indicators for Situational Awareness upgrade
        const situationalAwareness = this.upgradeManager.getEffect('situationalAwareness');
        if (situationalAwareness >= 1) {
            // Tier 1+: Show facing for regular guards
            this.guards.forEach(guard => {
                if (guard.isEliminated) return;
                const params = guard.getVisionConeParams();
                this.renderer.renderFacingIndicator(guard.x, guard.y, params.facingAngle, 'guard');
            });
        }
        if (situationalAwareness >= 2) {
            // Tier 2+: Also show facing for cameras
            this.cameras.forEach(camera => {
                this.renderer.renderCameraFacingIndicator(camera);
            });
        }
        if (situationalAwareness >= 3) {
            // Tier 3: Also show facing for elite guards and boss
            this.eliteGuards.forEach(elite => {
                if (elite.isEliminated) return;
                const params = elite.getVisionConeParams();
                this.renderer.renderFacingIndicator(elite.x, elite.y, params.facingAngle, 'elite');
            });
            if (this.boss && !this.boss.isEliminated) {
                const params = this.boss.getVisionConeParams();
                this.renderer.renderFacingIndicator(this.boss.x, this.boss.y, params.facingAngle, 'boss');
            }
        }

        // Session 7: Render cameras
        this.cameras.forEach(camera => {
            this.renderer.renderCamera(camera);
        });

        // Render guards
        // Session 4: Skip eliminated guards
        this.guards.forEach(guard => {
            if (guard.isEliminated) return;
            this.renderer.renderGuard(guard);
        });

        // Session 8: Render elite guards
        this.eliteGuards.forEach(elite => {
            if (elite.isEliminated) return;
            this.renderer.renderEliteGuard(elite);
        });

        // Session 8: Render boss
        if (this.boss && !this.boss.isEliminated) {
            this.renderer.renderBoss(this.boss);
        }

        // Session 8: Render projectiles
        this.projectiles.forEach(projectile => {
            this.renderer.renderProjectile(projectile);
        });

        // Session 8: Render shotgun pellets
        this.shotgunPellets.forEach(pelletSpread => {
            this.renderer.renderShotgunPellets(pelletSpread);
        });

        // Render player
        if (this.player) {
            this.renderer.renderPlayer(this.player);
        }

        // Render HUD
        this.hud.render(this.gameLoop.getFps(), this.debugEnabled);

        // Session 3: Render touch controls overlay
        this.touchControls.render(this.ctx);
    }

    /**
     * Render debug overlay
     */
    renderDebug() {
        const ctx = this.ctx;

        // FPS counter
        ctx.fillStyle = CONSTANTS.COLORS.UI_TEXT;
        ctx.font = '12px monospace';
        ctx.fillText(`FPS: ${this.gameLoop.getFps()}`, 10, 20);

        // Player position
        if (this.player) {
            ctx.fillText(
                `Player: (${this.player.getTileX()}, ${this.player.getTileY()})`,
                10, 35
            );
            // Session 2: Show movement mode and visibility
            ctx.fillText(
                `Mode: ${this.player.getMovementMode()} (${this.player.getVisibilityMultiplier().toFixed(1)}x vis)`,
                10, 50
            );
            // Session 4: Show health
            ctx.fillText(
                `Health: ${this.player.getHealth()}/${this.player.getMaxHealth()} ${this.player.isInvincible() ? '(INV)' : ''}`,
                10, 65
            );
        }

        // Session 2/4: Guard states
        let guardYOffset = 80;
        this.guards.forEach((guard, i) => {
            if (guard.isEliminated) {
                ctx.fillText(`Guard ${i + 1}: ELIMINATED`, 10, guardYOffset);
            } else {
                ctx.fillText(
                    `Guard ${i + 1}: ${guard.getState()} (${(guard.getSuspicion() * 100).toFixed(0)}%)`,
                    10, guardYOffset
                );
            }
            guardYOffset += 15;
        });

        // Session 6: Debug controls hint
        ctx.fillStyle = CONSTANTS.COLORS.UI_ACCENT;
        ctx.fillText('Press N to skip level', 10, guardYOffset + 10);
    }
}

</script>
