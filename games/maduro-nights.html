            // D-pad colors - premium matte look
            dpadBase: '#0d0d12',             // D-pad well (recessed)
            dpadButton: '#2a2a35',           // D-pad surface
            dpadPressed: '#4a7c59',          // Muted green when pressed
            dpadArrow: 'rgba(255, 255, 255, 0.25)',
            dpadArrowActive: '#e0e0e0',

            // SNES-style button colors (classic colored buttons)
            buttonA: '#c73e3e',              // Red (right) - Attack
            buttonB: '#d4a824',              // Yellow (bottom) - Crouch
            buttonX: '#2878c7',              // Blue (top) - Run
            buttonY: '#3aa84f',              // Green (left) - Interact
            // Session 8: SELECT/START button colors (Game Boy style - dark grey pill buttons)
            buttonSelect: '#4a4a55',         // Medium grey - Select
            buttonStart: '#4a4a55',          // Medium grey - Start

            // Button states
            buttonPressed: 'rgba(255, 255, 255, 0.3)',  // Overlay when pressed
            buttonShadow: 'rgba(0, 0, 0, 0.4)',         // Button shadow
            buttonHighlight: 'rgba(255, 255, 255, 0.15)', // Top shine

            // Text and UI
            labelColor: '#ffffff',
            labelShadow: 'rgba(0, 0, 0, 0.5)',

            // Decorative elements
            accentLine: '#3a3a48',           // Subtle line accents
            ventColor: '#0a0a0f',            // Speaker/vent holes
            logoColor: 'rgba(255, 255, 255, 0.06)'  // Subtle branding area
        };

        // Control layout
        this.updateLayout();

        // Setup touch event listeners
        this.setupTouchEvents();
    }

    /**
     * Enable/disable touch controls
     * @param {boolean} enabled
     */
    setEnabled(enabled) {
        this.enabled = enabled;
    }

    /**
     * Check if touch controls are enabled
     * @returns {boolean}
     */
    isEnabled() {
        return this.enabled;
    }

    /**
     * Update control positions based on canvas size and orientation
     * Session 5: SNES-style 4-button diamond layout
     * @param {boolean} isPortraitMode - Whether device is in portrait orientation
     * @param {number} controlAreaHeight - Height of the control area below canvas
     */
    updateLayout(isPortraitMode = false, controlAreaHeight = 0) {
        this.isPortraitMode = isPortraitMode;
        this.controlAreaHeight = controlAreaHeight;

        if (isPortraitMode && this.controlCanvas) {
            // Modern retro handheld style: Controls rendered on separate canvas below game
            const screenWidth = this.controlCanvas.width;
            const controlHeight = this.controlCanvas.height;

            // D-pad on left side - positioned for comfortable thumb reach
            this.dpadCenter = {
                x: screenWidth * 0.20,
                y: controlHeight * 0.52
            };

            // Scale controls based on available space
            this.dpadRadius = Math.min(52, screenWidth * 0.105, controlHeight * 0.26);
            this.buttonRadius = Math.min(24, screenWidth * 0.052, controlHeight * 0.13);
            this.dpadInnerRadius = this.dpadRadius * 0.25;

            // SNES-style 4-button diamond layout on right side
            // Diamond center point
            const diamondCenterX = screenWidth * 0.80;
            const diamondCenterY = controlHeight * 0.52;
            const diamondSpacing = this.buttonRadius * 1.85; // Space between buttons

            this.buttons = [
                {
                    id: 'buttonA',
                    x: diamondCenterX + diamondSpacing,  // Right position
                    y: diamondCenterY,
                    label: 'A',
                    action: CONSTANTS.ACTIONS.ATTACK,
                    color: this.colors.buttonA
                },
                {
                    id: 'buttonB',
                    x: diamondCenterX,
                    y: diamondCenterY + diamondSpacing,  // Bottom position
                    label: 'B',
                    action: CONSTANTS.ACTIONS.CROUCH,
                    color: this.colors.buttonB
                },
                {
                    id: 'buttonX',
                    x: diamondCenterX,
                    y: diamondCenterY - diamondSpacing,  // Top position
                    label: 'X',
                    action: CONSTANTS.ACTIONS.RUN,
                    color: this.colors.buttonX
                },
                {
                    id: 'buttonY',
                    x: diamondCenterX - diamondSpacing,  // Left position
                    y: diamondCenterY,
                    label: 'Y',
                    action: CONSTANTS.ACTIONS.INTERACT,
                    color: this.colors.buttonY
                }
            ];

            // Session 8: SELECT and START buttons (Game Boy style - between D-pad and action buttons)
            const centerX = screenWidth * 0.5;
            const centerButtonY = controlHeight * 0.52;  // Same vertical level as D-pad and ABXY
            const centerButtonSpacing = screenWidth * 0.08;  // Closer together in the center
            // Use fixed size for pill buttons that's proportional to screen, not buttonRadius
            const pillWidth = Math.max(55, screenWidth * 0.12);
            const pillHeight = Math.max(18, controlHeight * 0.09);

            this.selectButton = {
                id: 'buttonSelect',
                x: centerX - centerButtonSpacing,
                y: centerButtonY,
                width: pillWidth,
                height: pillHeight,
                label: 'SELECT',
                action: CONSTANTS.ACTIONS.SWITCH_WEAPON,
                color: this.colors.buttonSelect
            };

            this.startButton = {
                id: 'buttonStart',
                x: centerX + centerButtonSpacing,
                y: centerButtonY,
                width: pillWidth,
                height: pillHeight,
                label: 'START',
                action: CONSTANTS.ACTIONS.START_PAUSE,
                color: this.colors.buttonStart
            };

        } else {
            // Landscape mode: Controls overlay on game canvas
            const canvasRect = this.canvas.getBoundingClientRect();

            this.dpadCenter = {
                x: 100,
                y: this.canvas.height - 100
            };

            this.dpadRadius = Math.max(60, Math.min(80, canvasRect.width * 0.12));
            this.buttonRadius = Math.max(25, Math.min(32, canvasRect.width * 0.05));
            this.dpadInnerRadius = 20;

            // SNES-style 4-button diamond in landscape mode
            const diamondCenterX = this.canvas.width - 100;
            const diamondCenterY = this.canvas.height - 100;
            const diamondSpacing = this.buttonRadius * 1.7;

            this.buttons = [
                {
                    id: 'buttonA',
                    x: diamondCenterX + diamondSpacing,
                    y: diamondCenterY,
                    label: 'A',
                    action: CONSTANTS.ACTIONS.ATTACK,
                    color: this.colors.buttonA
                },
                {
                    id: 'buttonB',
                    x: diamondCenterX,
                    y: diamondCenterY + diamondSpacing,
                    label: 'B',
                    action: CONSTANTS.ACTIONS.CROUCH,
                    color: this.colors.buttonB
                },
                {
                    id: 'buttonX',
                    x: diamondCenterX,
                    y: diamondCenterY - diamondSpacing,
                    label: 'X',
                    action: CONSTANTS.ACTIONS.RUN,
                    color: this.colors.buttonX
                },
                {
                    id: 'buttonY',
                    x: diamondCenterX - diamondSpacing,
                    y: diamondCenterY,
                    label: 'Y',
                    action: CONSTANTS.ACTIONS.INTERACT,
                    color: this.colors.buttonY
                }
            ];

            // Session 8: SELECT and START buttons (Game Boy style - center bottom)
            const centerX = this.canvas.width / 2;
            const centerButtonY = this.canvas.height - 40;
            const centerButtonSpacing = 70;
            // Use fixed size for pill buttons
            const pillWidth = Math.max(70, this.buttonRadius * 2.8);
            const pillHeight = Math.max(22, this.buttonRadius * 0.85);

            this.selectButton = {
                id: 'buttonSelect',
                x: centerX - centerButtonSpacing,
                y: centerButtonY,
                width: pillWidth,
                height: pillHeight,
                label: 'SELECT',
                action: CONSTANTS.ACTIONS.SWITCH_WEAPON,
                color: this.colors.buttonSelect
            };

            this.startButton = {
                id: 'buttonStart',
                x: centerX + centerButtonSpacing,
                y: centerButtonY,
                width: pillWidth,
                height: pillHeight,
                label: 'START',
                action: CONSTANTS.ACTIONS.START_PAUSE,
                color: this.colors.buttonStart
            };
        }
    }

    /**
     * Setup touch event listeners
     */
    setupTouchEvents() {
        // Use document for touch events to capture touches on both canvases
        document.addEventListener('touchstart', (e) => this.onTouchStart(e), { passive: false });
        document.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
        document.addEventListener('touchend', (e) => this.onTouchEnd(e), { passive: false });
        document.addEventListener('touchcancel', (e) => this.onTouchEnd(e), { passive: false });
    }

    /**
     * Convert touch coordinates to control canvas coordinates
     * @param {Touch} touch
     * @returns {{x: number, y: number, canvasX: number, canvasY: number}}
     */
    getTouchPosition(touch) {
        if (this.isPortraitMode && this.controlCanvas) {
            // Portrait mode: check if touch is on control canvas
            const controlRect = this.controlCanvas.getBoundingClientRect();
            const x = touch.clientX - controlRect.left;
            const y = touch.clientY - controlRect.top;

            // Scale to control canvas coordinates
            const scaleX = this.controlCanvas.width / controlRect.width;
            const scaleY = this.controlCanvas.height / controlRect.height;

            return {
                x: x * scaleX,
                y: y * scaleY,
                isOnControlCanvas: touch.clientY >= controlRect.top
            };
        } else {
            // Landscape mode: use game canvas coordinates
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;

            return {
                x: (touch.clientX - rect.left) * scaleX,
                y: (touch.clientY - rect.top) * scaleY,
                isOnControlCanvas: true
            };
        }
    }

    /**
     * Handle touch start
     * @param {TouchEvent} e
     */
    onTouchStart(e) {
        if (!this.enabled) return;

        for (const touch of e.changedTouches) {
            const pos = this.getTouchPosition(touch);

            // Only process touches on the control area
            if (!pos.isOnControlCanvas && this.isPortraitMode) continue;

            const control = this.hitTest(pos);

            if (control) {
                e.preventDefault();
                this.activeTouches.set(touch.identifier, {
                    control: control,
                    pos: pos
                });
                this.updateControlState(control, pos, true);
            }
        }
    }

    /**
     * Handle touch move
     * @param {TouchEvent} e
     */
    onTouchMove(e) {
        if (!this.enabled) return;

        for (const touch of e.changedTouches) {
            const touchData = this.activeTouches.get(touch.identifier);
            if (touchData) {
                e.preventDefault();
                const pos = this.getTouchPosition(touch);
                touchData.pos = pos;

                // If on dpad, update direction based on position
                if (touchData.control === 'dpad') {
                    this.updateDpadState(pos);
                }
            }
        }
    }

    /**
     * Handle touch end
     * @param {TouchEvent} e
     */
    onTouchEnd(e) {
        if (!this.enabled) return;

        for (const touch of e.changedTouches) {
            const touchData = this.activeTouches.get(touch.identifier);
            if (touchData) {
                e.preventDefault();
                this.updateControlState(touchData.control, touchData.pos, false);
                this.activeTouches.delete(touch.identifier);
            }
        }
    }

    /**
     * Hit test to determine which control was touched
     * @param {{x: number, y: number}} pos
     * @returns {string|null}
     */
    hitTest(pos) {
        // Session 8: Check SELECT and START buttons (rectangular hit area)
        const centerButtons = [this.selectButton, this.startButton];
        for (const btn of centerButtons) {
            if (btn) {
                if (pos.x >= btn.x - btn.width / 2 - 10 &&
                    pos.x <= btn.x + btn.width / 2 + 10 &&
                    pos.y >= btn.y - btn.height / 2 - 10 &&
                    pos.y <= btn.y + btn.height / 2 + 10) {
                    return btn.id;
                }
            }
        }

        // Check D-pad (with generous hit area)
        const dpadDist = Math.sqrt(
            Math.pow(pos.x - this.dpadCenter.x, 2) +
            Math.pow(pos.y - this.dpadCenter.y, 2)
        );
        if (dpadDist <= this.dpadRadius * 1.5) {
            return 'dpad';
        }

        // Check action buttons
        for (const button of this.buttons) {
            const buttonDist = Math.sqrt(
                Math.pow(pos.x - button.x, 2) +
                Math.pow(pos.y - button.y, 2)
            );
            if (buttonDist <= this.buttonRadius * 1.5) {
                return button.id;
            }
        }

        return null;
    }

    /**
     * Update control state based on touch
     * Session 5: Updated for SNES-style button layout
     * @param {string} control
     * @param {{x: number, y: number}} pos
     * @param {boolean} pressed
     */
    updateControlState(control, pos, pressed) {
        if (control === 'dpad') {
            if (pressed) {
                this.updateDpadState(pos);
            } else {
                // Release all directions
                this.touchState.up = false;
                this.touchState.down = false;
                this.touchState.left = false;
                this.touchState.right = false;
            }
        } else if (control === 'buttonA') {
            // A button (right) - Attack
            this.touchState.buttonA = pressed;
            this.touchState.attack = pressed;  // Legacy compatibility
        } else if (control === 'buttonB') {
            // B button (bottom) - Crouch/Sneak
            this.touchState.buttonB = pressed;
            this.touchState.crouch = pressed;  // Legacy compatibility
        } else if (control === 'buttonX') {
            // X button (top) - Run/Sprint (currently no dedicated action, uses RUN)
            this.touchState.buttonX = pressed;
        } else if (control === 'buttonY') {
            // Y button (left) - Interact
            this.touchState.buttonY = pressed;
            this.touchState.interact = pressed;  // Legacy compatibility
        } else if (control === 'buttonSelect') {
            // Session 8: SELECT button - Switch Weapon
            this.touchState.buttonSelect = pressed;
        } else if (control === 'buttonStart') {
            // Session 8: START button - Start game / Pause
            this.touchState.buttonStart = pressed;
        }
        // Legacy button IDs for backwards compatibility
        else if (control === 'crouch') {
            this.touchState.crouch = pressed;
            this.touchState.buttonB = pressed;
        } else if (control === 'attack') {
            this.touchState.attack = pressed;
            this.touchState.buttonA = pressed;
        } else if (control === 'interact') {
            this.touchState.interact = pressed;
            this.touchState.buttonY = pressed;
        }
    }

    /**
     * Update D-pad state based on touch position
     * @param {{x: number, y: number}} pos
     */
    updateDpadState(pos) {
        const dx = pos.x - this.dpadCenter.x;
        const dy = pos.y - this.dpadCenter.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // Dead zone in center
        if (distance < this.dpadInnerRadius) {
            this.touchState.up = false;
            this.touchState.down = false;
            this.touchState.left = false;
            this.touchState.right = false;
            return;
        }

        // Calculate angle and determine direction
        const angle = Math.atan2(dy, dx);

        // 8-way direction with 45 degree sectors
        const threshold = Math.PI / 8; // 22.5 degrees

        this.touchState.right = angle > -Math.PI/4 - threshold && angle < Math.PI/4 + threshold;
        this.touchState.left = angle > Math.PI*3/4 - threshold || angle < -Math.PI*3/4 + threshold;
        this.touchState.down = angle > Math.PI/4 - threshold && angle < Math.PI*3/4 + threshold;
        this.touchState.up = angle < -Math.PI/4 + threshold && angle > -Math.PI*3/4 - threshold;
    }

    /**
     * Get current touch state for an action
     * Session 5: Updated for SNES-style button layout
     * Session 8: Added SELECT/START buttons for weapon switch and pause
     * @param {string} action
     * @returns {boolean}
     */
    isActionHeld(action) {
        switch (action) {
            case CONSTANTS.ACTIONS.MOVE_UP:
                return this.touchState.up;
            case CONSTANTS.ACTIONS.MOVE_DOWN:
                return this.touchState.down;
            case CONSTANTS.ACTIONS.MOVE_LEFT:
                return this.touchState.left;
            case CONSTANTS.ACTIONS.MOVE_RIGHT:
                return this.touchState.right;
            case CONSTANTS.ACTIONS.CROUCH:
                return this.touchState.crouch || this.touchState.buttonB;
            case CONSTANTS.ACTIONS.RUN:
                return this.touchState.buttonX;
            case CONSTANTS.ACTIONS.ATTACK:
                return this.touchState.attack || this.touchState.buttonA;
            case CONSTANTS.ACTIONS.INTERACT:
                return this.touchState.interact || this.touchState.buttonY;
            case CONSTANTS.ACTIONS.SWITCH_WEAPON:
                return this.touchState.buttonSelect;
            case CONSTANTS.ACTIONS.START_PAUSE:
                return this.touchState.buttonStart;
            default:
                return false;
        }
    }

    /**
     * Render touch controls
     * @param {CanvasRenderingContext2D} ctx - Game canvas context (for landscape mode overlay)
     */
    render(ctx) {
        if (!this.enabled) return;

        if (this.isPortraitMode && this.controlCtx) {
            // Portrait mode: Render to separate control canvas
            this.renderPortraitControls();
        } else {
            // Landscape mode: Semi-transparent overlay on game canvas
            ctx.save();
            ctx.globalAlpha = 0.5;
            this.renderDpad(ctx);
            this.buttons.forEach(button => this.renderButton(ctx, button));
            // Session 8: Render SELECT and START buttons in landscape mode
            if (this.selectButton) {
                this.renderPillButton(ctx, this.selectButton);
            }
            if (this.startButton) {
                this.renderPillButton(ctx, this.startButton);
            }
            ctx.restore();
        }
    }

    /**
     * Render modern retro handheld controls for portrait mode
     * Session 5: Updated with premium handheld aesthetic
     */
    renderPortraitControls() {
        const ctx = this.controlCtx;
        const width = this.controlCanvas.width;
        const height = this.controlCanvas.height;

        // Clear canvas
        ctx.clearRect(0, 0, width, height);

        // Main shell background with subtle gradient
        const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
        bgGradient.addColorStop(0, this.colors.shellMid);
        bgGradient.addColorStop(0.5, this.colors.shellBg);
        bgGradient.addColorStop(1, this.colors.shellDark);
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, width, height);

        // Top edge highlight (subtle light reflection)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.fillRect(0, 0, width, 2);

        // Subtle horizontal accent line across top
        ctx.fillStyle = this.colors.accentLine;
        ctx.fillRect(0, 4, width, 1);

        // Render D-pad with modern styling
        this.renderModernDpad(ctx);

        // Render SNES-style button diamond
        this.renderButtonDiamond(ctx);

        // Session 8: Render SELECT and START buttons (Game Boy style)
        if (this.selectButton) {
            this.renderPillButton(ctx, this.selectButton);
        }
        if (this.startButton) {
            this.renderPillButton(ctx, this.startButton);
        }

        // Subtle bottom edge shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, height - 2, width, 2);
    }

    /**
     * Render decorative speaker grille
     * @param {CanvasRenderingContext2D} ctx
     * @param {number} cx - Center X
     * @param {number} cy - Center Y
     * @param {number} width - Grille width
     */
    renderSpeakerGrille(ctx, cx, cy, width) {
        const holeSpacing = 6;
        const holeRadius = 1.5;
        const rows = 2;
        const cols = Math.floor(width / holeSpacing);

        ctx.fillStyle = this.colors.ventColor;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x = cx - (cols * holeSpacing) / 2 + col * holeSpacing + holeSpacing / 2;
                const y = cy + row * holeSpacing - (rows * holeSpacing) / 2 + holeSpacing / 2;
                ctx.beginPath();
                ctx.arc(x, y, holeRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    /**
     * Render modern D-pad with premium look
     * Session 5: Updated for modern retro handheld aesthetic
     * @param {CanvasRenderingContext2D} ctx
     */
    renderModernDpad(ctx) {
        const cx = this.dpadCenter.x;
        const cy = this.dpadCenter.y;
        const r = this.dpadRadius;

        // D-pad recess/well with inner shadow effect
        ctx.fillStyle = this.colors.shellDark;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
        ctx.fill();

        // Inner gradient for depth
        const wellGradient = ctx.createRadialGradient(cx, cy - r * 0.3, 0, cx, cy, r * 1.15);
        wellGradient.addColorStop(0, this.colors.dpadBase);
        wellGradient.addColorStop(1, this.colors.shellDark);
        ctx.fillStyle = wellGradient;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 1.12, 0, Math.PI * 2);
        ctx.fill();

        // D-pad cross dimensions
        const armWidth = r * 0.52;
        const armLength = r * 0.95;
        const cornerRadius = 4;

        // D-pad base shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        this.roundRect(ctx, cx - armLength + 2, cy - armWidth/2 + 2, armLength * 2, armWidth, cornerRadius);
        ctx.fill();
        this.roundRect(ctx, cx - armWidth/2 + 2, cy - armLength + 2, armWidth, armLength * 2, cornerRadius);
        ctx.fill();

        // D-pad cross surface
        const dpadGradient = ctx.createLinearGradient(cx - armLength, cy - armLength, cx + armLength, cy + armLength);
        dpadGradient.addColorStop(0, this.colors.dpadButton);
        dpadGradient.addColorStop(0.5, this.colors.shellLight);
        dpadGradient.addColorStop(1, this.colors.dpadButton);
        ctx.fillStyle = dpadGradient;

        // Horizontal arm
        this.roundRect(ctx, cx - armLength, cy - armWidth/2, armLength * 2, armWidth, cornerRadius);
        ctx.fill();

        // Vertical arm
        this.roundRect(ctx, cx - armWidth/2, cy - armLength, armWidth, armLength * 2, cornerRadius);
        ctx.fill();

        // Direction indicators with pressed states
        const directions = [
            { dx: 0, dy: -1, active: this.touchState.up },
            { dx: 0, dy: 1, active: this.touchState.down },
            { dx: -1, dy: 0, active: this.touchState.left },
            { dx: 1, dy: 0, active: this.touchState.right }
        ];

        directions.forEach(dir => {
            const bx = cx + dir.dx * (armLength * 0.55);
            const by = cy + dir.dy * (armLength * 0.55);
            const indicatorSize = armWidth * 0.35;

            if (dir.active) {
                // Pressed state - glowing indicator
                ctx.fillStyle = this.colors.dpadPressed;
                ctx.beginPath();
                ctx.arc(bx, by, indicatorSize, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect
                ctx.fillStyle = 'rgba(74, 124, 89, 0.4)';
                ctx.beginPath();
                ctx.arc(bx, by, indicatorSize * 1.5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Subtle direction dot
                ctx.fillStyle = this.colors.dpadArrow;
                ctx.beginPath();
                ctx.arc(bx, by, indicatorSize * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // Center pivot circle
        ctx.fillStyle = this.colors.dpadBase;
        ctx.beginPath();
        ctx.arc(cx, cy, armWidth * 0.25, 0, Math.PI * 2);
        ctx.fill();

        // Center highlight dot
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.beginPath();
        ctx.arc(cx, cy - 1, armWidth * 0.12, 0, Math.PI * 2);
        ctx.fill();
    }

    /**
     * Render SNES-style button diamond
     * Session 5: Four colored buttons in diamond formation
     * @param {CanvasRenderingContext2D} ctx
     */
    renderButtonDiamond(ctx) {
        // Render each button with SNES styling
        this.buttons.forEach(button => {
            this.renderSNESButton(ctx, button);
        });
    }

    /**
     * Render a single SNES-style button
     * @param {CanvasRenderingContext2D} ctx
     * @param {Object} button
     */
    renderSNESButton(ctx, button) {
        const x = button.x;
        const y = button.y;
        const r = this.buttonRadius;
        const pressed = this.touchState[button.id];
        const baseColor = button.color;

        // Button well/recess
        ctx.fillStyle = this.colors.shellDark;
        ctx.beginPath();
        ctx.arc(x, y, r + 4, 0, Math.PI * 2);
        ctx.fill();

        // Button shadow (offset down)
        if (!pressed) {
            ctx.fillStyle = this.colors.buttonShadow;
            ctx.beginPath();
            ctx.arc(x, y + 3, r + 1, 0, Math.PI * 2);
            ctx.fill();
        }

        // Button surface with gradient
        const btnGradient = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
        if (pressed) {
            // Brighter when pressed
            btnGradient.addColorStop(0, this.lightenColor(baseColor, 0.25));
            btnGradient.addColorStop(1, baseColor);
        } else {
            btnGradient.addColorStop(0, this.lightenColor(baseColor, 0.1));
            btnGradient.addColorStop(1, this.darkenColor(baseColor, 0.15));
        }
        ctx.fillStyle = btnGradient;
        ctx.beginPath();
        ctx.arc(x, y + (pressed ? 2 : 0), r, 0, Math.PI * 2);
        ctx.fill();

        // Top highlight arc (when not pressed)
        if (!pressed) {
            ctx.strokeStyle = this.colors.buttonHighlight;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, r - 2, -Math.PI * 0.8, -Math.PI * 0.2);
            ctx.stroke();
        }

        // Button label
        ctx.fillStyle = this.colors.labelColor;
        ctx.font = `bold ${r * 0.7}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Label shadow
        ctx.fillStyle = this.colors.labelShadow;
        ctx.fillText(button.label, x + 1, y + (pressed ? 3 : 1));

        // Label
        ctx.fillStyle = this.colors.labelColor;
        ctx.fillText(button.label, x, y + (pressed ? 2 : 0));
    }

    /**
     * Session 8: Render a pill-shaped button (SELECT/START style)
     * @param {CanvasRenderingContext2D} ctx
     * @param {Object} button
     */
    renderPillButton(ctx, button) {
        const x = button.x;
        const y = button.y;
        const w = button.width;
        const h = button.height;
        const pressed = this.touchState[button.id];
        const baseColor = button.color;
        const cornerRadius = h / 2;

        // Button well/recess
        ctx.fillStyle = this.colors.shellDark;
        this.roundRect(ctx, x - w / 2 - 2, y - h / 2 - 2, w + 4, h + 4, cornerRadius + 2);
        ctx.fill();

        // Button shadow (offset down)
        if (!pressed) {
            ctx.fillStyle = this.colors.buttonShadow;
            this.roundRect(ctx, x - w / 2, y - h / 2 + 2, w, h, cornerRadius);
            ctx.fill();
        }

        // Button surface
        ctx.fillStyle = pressed ? this.lightenColor(baseColor, 0.2) : baseColor;
        this.roundRect(ctx, x - w / 2, y - h / 2 + (pressed ? 1 : 0), w, h, cornerRadius);
        ctx.fill();

        // Button label
        ctx.fillStyle = 'rgba(200, 200, 200, 0.9)';
        ctx.font = `bold ${Math.max(10, h * 0.5)}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(button.label, x, y + (pressed ? 1 : 0));
    }

    /**
     * Darken a hex color
     * @param {string} color - Hex color
     * @param {number} amount - Amount to darken (0-1)
     * @returns {string}
     */
    darkenColor(color, amount) {
        const hex = color.replace('#', '');
        const r = Math.max(0, parseInt(hex.substr(0, 2), 16) - Math.floor(255 * amount));
        const g = Math.max(0, parseInt(hex.substr(2, 2), 16) - Math.floor(255 * amount));
        const b = Math.max(0, parseInt(hex.substr(4, 2), 16) - Math.floor(255 * amount));
        return `rgb(${r}, ${g}, ${b})`;
    }

    /**
     * Legacy render method - kept for compatibility
     * @param {CanvasRenderingContext2D} ctx
     */
    renderGameBoyDpad(ctx) {
        this.renderModernDpad(ctx);
    }

    /**
     * Helper to draw rounded rectangles
     */
    roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    /**
     * Render Game Boy style action button
     * Session 5: Now uses SNES button styling
     * @param {CanvasRenderingContext2D} ctx
     * @param {Object} button
     */
    renderGameBoyButton(ctx, button) {
        // Redirect to SNES button renderer
        this.renderSNESButton(ctx, button);
    }

    /**
     * Session 4: Helper to lighten a color
     * @param {string} color - Hex color
     * @param {number} amount - Amount to lighten (0-1)
     * @returns {string}
     */
    lightenColor(color, amount) {
        // Simple hex color lighten
        const hex = color.replace('#', '');
        const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + Math.floor(255 * amount));
        const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + Math.floor(255 * amount));
        const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + Math.floor(255 * amount));
        return `rgb(${r}, ${g}, ${b})`;
    }

    /**
     * Render D-pad (landscape mode overlay)
     * @param {CanvasRenderingContext2D} ctx
     */
    renderDpad(ctx) {
        const cx = this.dpadCenter.x;
        const cy = this.dpadCenter.y;
        const r = this.dpadRadius;
        const btnSize = r * 0.45;

        // Base circle
        ctx.fillStyle = 'rgba(50, 50, 50, 0.6)';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Direction buttons
        const directions = [
            { dx: 0, dy: -1, active: this.touchState.up },
            { dx: 0, dy: 1, active: this.touchState.down },
            { dx: -1, dy: 0, active: this.touchState.left },
            { dx: 1, dy: 0, active: this.touchState.right }
        ];

        directions.forEach(dir => {
            const bx = cx + dir.dx * (r * 0.5);
            const by = cy + dir.dy * (r * 0.5);

            // Button highlight
            ctx.fillStyle = dir.active ? 'rgba(100, 200, 100, 0.8)' : 'rgba(80, 80, 80, 0.6)';
            ctx.fillRect(bx - btnSize/2, by - btnSize/2, btnSize, btnSize);

            // Arrow
            ctx.fillStyle = dir.active ? '#fff' : 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            if (dir.dy === -1) {
                ctx.moveTo(bx, by - btnSize * 0.3);
                ctx.lineTo(bx + btnSize * 0.25, by + btnSize * 0.15);
                ctx.lineTo(bx - btnSize * 0.25, by + btnSize * 0.15);
            } else if (dir.dy === 1) {
                ctx.moveTo(bx, by + btnSize * 0.3);
                ctx.lineTo(bx + btnSize * 0.25, by - btnSize * 0.15);
                ctx.lineTo(bx - btnSize * 0.25, by - btnSize * 0.15);
            } else if (dir.dx === -1) {
                ctx.moveTo(bx - btnSize * 0.3, by);
                ctx.lineTo(bx + btnSize * 0.15, by - btnSize * 0.25);
                ctx.lineTo(bx + btnSize * 0.15, by + btnSize * 0.25);
            } else if (dir.dx === 1) {
                ctx.moveTo(bx + btnSize * 0.3, by);
                ctx.lineTo(bx - btnSize * 0.15, by - btnSize * 0.25);
                ctx.lineTo(bx - btnSize * 0.15, by + btnSize * 0.25);
            }
            ctx.closePath();
            ctx.fill();
        });
    }

    /**
     * Render action button (landscape mode overlay)
     * Session 5: Updated for SNES-style colored buttons
     * @param {CanvasRenderingContext2D} ctx
     * @param {Object} button
     */
    renderButton(ctx, button) {
        const isActive = this.touchState[button.id];
        const baseColor = button.color || '#888888';
        const r = this.buttonRadius;

        // Button shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        ctx.arc(button.x, button.y + 2, r + 1, 0, Math.PI * 2);
        ctx.fill();

        // Button circle with gradient
        const btnGradient = ctx.createRadialGradient(
            button.x - r * 0.3, button.y - r * 0.3, 0,
            button.x, button.y, r
        );
        if (isActive) {
            btnGradient.addColorStop(0, this.lightenColor(baseColor, 0.3));
            btnGradient.addColorStop(1, baseColor);
        } else {
            // Parse hex for semi-transparent version
            const hex = baseColor.replace('#', '');
            const red = parseInt(hex.substr(0, 2), 16);
            const green = parseInt(hex.substr(2, 2), 16);
            const blue = parseInt(hex.substr(4, 2), 16);
            btnGradient.addColorStop(0, `rgba(${Math.min(255, red + 25)}, ${Math.min(255, green + 25)}, ${Math.min(255, blue + 25)}, 0.8)`);
            btnGradient.addColorStop(1, `rgba(${red}, ${green}, ${blue}, 0.7)`);
        }
        ctx.fillStyle = btnGradient;
        ctx.beginPath();
        ctx.arc(button.x, button.y, r, 0, Math.PI * 2);
        ctx.fill();

        // Highlight arc
        if (!isActive) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(button.x, button.y, r - 2, -Math.PI * 0.8, -Math.PI * 0.2);
            ctx.stroke();
        }

        // Button label
        ctx.fillStyle = isActive ? '#fff' : 'rgba(255, 255, 255, 0.95)';
        ctx.font = `bold ${r * 0.6}px -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(button.label, button.x, button.y);
    }

    /**
     * Add a new button (for future sessions)
     * @param {string} id
     * @param {string} label
     * @param {string} action
     * @param {number} x
     * @param {number} y
     */
    addButton(id, label, action, x, y) {
        this.buttons.push({ id, label, action, x, y });
        this.touchState[id] = false;
    }
}

</script>
<script>
// Maduro Nights - Tilemap System
// Grid-based map data structure

class Tilemap {
    constructor(mapData, doors = [], cover = [], keys = []) {
        this.map = mapData.map(row => [...row]); // Deep copy to allow modifications
        this.height = mapData.length;
        this.width = mapData[0].length;
        this.tileSize = CONSTANTS.TILE.SIZE;

        // Session 5: Environmental objects
        this.doors = new Map();     // key: "x,y", value: door state
        this.coverObjects = new Map();
        this.keys = new Map();

        this.initDoors(doors);
        this.initCover(cover);
        this.initKeys(keys);
    }

    /**
     * Initialize doors from level data
     * Also auto-detects doors from the map tiles if not specified in level data
     * @param {Array} doors - Array of door definitions
     */
    initDoors(doors) {
        // First, process explicitly defined doors from level data
        doors.forEach(door => {
            const key = `${door.x},${door.y}`;
            this.doors.set(key, {
                x: door.x,
                y: door.y,
                isOpen: false,
                isLocked: door.locked || false
            });
            // Update map tile
            this.map[door.y][door.x] = door.locked ?
                CONSTANTS.TILE.TYPES.DOOR_LOCKED :
                CONSTANTS.TILE.TYPES.DOOR_CLOSED;
        });

        // Session 6: Auto-detect doors from map tiles that aren't already tracked
        // This ensures doors placed directly in the map array work properly
        for (let y = 0; y < this.height; y++) {
            for (let x = 0; x < this.width; x++) {
                const tile = this.map[y][x];
                const key = `${x},${y}`;

                // Skip if door already registered
                if (this.doors.has(key)) continue;

                if (tile === CONSTANTS.TILE.TYPES.DOOR_CLOSED) {
                    this.doors.set(key, {
                        x: x,
                        y: y,
                        isOpen: false,
                        isLocked: false
                    });
                } else if (tile === CONSTANTS.TILE.TYPES.DOOR_LOCKED) {
                    this.doors.set(key, {
                        x: x,
                        y: y,
                        isOpen: false,
                        isLocked: true
                    });
                } else if (tile === CONSTANTS.TILE.TYPES.DOOR_OPEN) {
                    this.doors.set(key, {
                        x: x,
                        y: y,
                        isOpen: true,
                        isLocked: false
                    });
                }
            }
        }
    }

    /**
     * Initialize cover objects from level data
     * @param {Array} cover - Array of cover definitions
     */
    initCover(cover) {
        cover.forEach(obj => {
            const key = `${obj.x},${obj.y}`;
            this.coverObjects.set(key, {
                x: obj.x,
                y: obj.y,
                type: obj.type
            });
            this.map[obj.y][obj.x] = CONSTANTS.TILE.TYPES[obj.type];
        });
    }

    /**
     * Initialize keys from level data
     * @param {Array} keys - Array of key definitions
     */
    initKeys(keys) {
        keys.forEach(keyObj => {
            const key = `${keyObj.x},${keyObj.y}`;
            this.keys.set(key, {
                x: keyObj.x,
                y: keyObj.y,
                collected: false
            });
            this.map[keyObj.y][keyObj.x] = CONSTANTS.TILE.TYPES.KEY_ITEM;
        });
    }

    /**
     * Get the map data
     * @returns {number[][]}
     */
    getMap() {
        return this.map;
    }

    /**
     * Get tile at grid position
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {number} Tile type
     */
    getTile(x, y) {
        if (x < 0 || x >= this.width || y < 0 || y >= this.height) {
            return CONSTANTS.TILE.TYPES.WALL; // Out of bounds = wall
        }
        return this.map[y][x];
    }

    /**
     * Check if tile is walkable
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isWalkable(x, y) {
        const tile = this.getTile(x, y);
        // Walls are never walkable
        if (tile === CONSTANTS.TILE.TYPES.WALL) return false;
        // Closed/locked doors are not walkable
        if (tile === CONSTANTS.TILE.TYPES.DOOR_CLOSED) return false;
        if (tile === CONSTANTS.TILE.TYPES.DOOR_LOCKED) return false;
        // Cover objects block movement (crates, desks)
        if (tile === CONSTANTS.TILE.TYPES.COVER_CRATE) return false;
        if (tile === CONSTANTS.TILE.TYPES.COVER_DESK) return false;
        // Session 8: Gate bars and keyslots block movement (until opened)
        if (tile === CONSTANTS.TILE.TYPES.GATE_BAR) return false;
        if (tile === CONSTANTS.TILE.TYPES.GATE_KEYSLOT) return false;
        // Gate open tiles are walkable (retracted)
        // Keys, floors, open doors, extraction zones are all walkable
        return true;
    }

    /**
     * Check if tile is a wall
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isWall(x, y) {
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.WALL;
    }

    /**
     * Check if tile blocks movement (walls, closed doors, cover objects)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    blocksMovement(x, y) {
        return !this.isWalkable(x, y);
    }

    /**
     * Check if tile is extraction zone
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isExtractionZone(x, y) {
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.EXTRACTION_ZONE;
    }

    // Session 5: Door methods

    /**
     * Check if tile is any type of door
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isDoor(x, y) {
        const tile = this.getTile(x, y);
        return tile === CONSTANTS.TILE.TYPES.DOOR_CLOSED ||
               tile === CONSTANTS.TILE.TYPES.DOOR_OPEN ||
               tile === CONSTANTS.TILE.TYPES.DOOR_LOCKED;
    }

    /**
     * Check if door is open
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isDoorOpen(x, y) {
        const key = `${x},${y}`;
        const door = this.doors.get(key);
        return door ? door.isOpen : false;
    }

    /**
     * Check if door is locked
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isDoorLocked(x, y) {
        const key = `${x},${y}`;
        const door = this.doors.get(key);
        return door ? door.isLocked : false;
    }

    /**
     * Open a door (if unlocked)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean} Whether door was opened
     */
    openDoor(x, y) {
        const key = `${x},${y}`;
        const door = this.doors.get(key);

        // If door doesn't exist in Map but tile is a door, create entry
        // (fallback for edge cases)
        if (!door && this.isDoor(x, y)) {
            const tile = this.getTile(x, y);
            const isLocked = tile === CONSTANTS.TILE.TYPES.DOOR_LOCKED;
            const isOpen = tile === CONSTANTS.TILE.TYPES.DOOR_OPEN;

            if (isOpen) return false; // Already open

            this.doors.set(key, {
                x: x,
                y: y,
                isOpen: false,
                isLocked: isLocked
            });

            // If locked, can't open without key (caller should check isDoorLocked first)
            if (isLocked) return false;
        }

        const doorEntry = this.doors.get(key);
        if (!doorEntry || doorEntry.isOpen) return false;

        // Don't open locked doors (caller handles key logic)
        if (doorEntry.isLocked) return false;

        doorEntry.isOpen = true;
        doorEntry.isLocked = false;
        this.map[y][x] = CONSTANTS.TILE.TYPES.DOOR_OPEN;
        // Note: Event emission handled by game.js to avoid duplicates
        return true;
    }

    /**
     * Unlock a door (used when player has a key)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean} Whether door was unlocked
     */
    unlockDoor(x, y) {
        const key = `${x},${y}`;
        const door = this.doors.get(key);
        if (!door || !door.isLocked) return false;

        door.isLocked = false;
        // Don't change tile type yet - door is still closed, just unlocked
        return true;
    }

    // Session 5: Cover methods

    /**
     * Check if tile is a cover object
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isCover(x, y) {
        const tile = this.getTile(x, y);
        return tile === CONSTANTS.TILE.TYPES.COVER_CRATE ||
               tile === CONSTANTS.TILE.TYPES.COVER_DESK;
    }

    // Session 5: Key methods

    /**
     * Check if tile has a key
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isKey(x, y) {
        // First check the keys Map (for keys defined in level data)
        const key = `${x},${y}`;
        const keyObj = this.keys.get(key);
        if (keyObj && !keyObj.collected) {
            return true;
        }
        // Also check the tile type directly (for keys placed in map array)
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.KEY_ITEM;
    }

    /**
     * Collect a key at position
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean} Whether a key was collected
     */
    collectKey(x, y) {
        const key = `${x},${y}`;
        const keyObj = this.keys.get(key);

        // Handle keys defined in level data
        if (keyObj && !keyObj.collected) {
            keyObj.collected = true;
            this.map[y][x] = CONSTANTS.TILE.TYPES.FLOOR;
            return true;
        }

        // Handle keys placed directly in map array (not in keys Map)
        if (this.getTile(x, y) === CONSTANTS.TILE.TYPES.KEY_ITEM) {
            this.map[y][x] = CONSTANTS.TILE.TYPES.FLOOR;
            return true;
        }

        return false;
    }

    // Session 6: Generic interactable item methods

    /**
     * Check if tile has any interactable/pickable item
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isInteractableItem(x, y) {
        const tile = this.getTile(x, y);
        return tile === CONSTANTS.TILE.TYPES.KEY_ITEM ||
               tile === CONSTANTS.TILE.TYPES.OBJECTIVE_TARGET;
    }

    /**
     * Get interactable item info at position
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {Object|null} Item info { type: string, x, y } or null
     */
    getInteractableItemAt(x, y) {
        const tile = this.getTile(x, y);

        if (tile === CONSTANTS.TILE.TYPES.KEY_ITEM) {
            // Check if key was already collected via keys Map
            const key = `${x},${y}`;
            const keyObj = this.keys.get(key);
            if (keyObj && keyObj.collected) {
                return null;
            }
            return { type: 'key', x, y, name: 'Key' };
        }

        if (tile === CONSTANTS.TILE.TYPES.OBJECTIVE_TARGET) {
            return { type: 'objective', x, y, name: 'Intel' };
        }

        // Session 8: Tranquilizer gun pickup
        if (tile === CONSTANTS.TILE.TYPES.TRANQ_GUN_ITEM) {
            return { type: 'tranq_gun', x, y, name: 'Tranquilizer Gun' };
        }

        return null;
    }

    /**
     * Collect/interact with an item at position
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @param {string} itemType - Type of item ('key', 'objective', 'tranq_gun')
     * @returns {boolean} Whether item was collected
     */
    collectItem(x, y, itemType) {
        if (itemType === 'key') {
            return this.collectKey(x, y);
        }

        if (itemType === 'objective') {
            // Objective targets are handled by objectiveManager
            // Just return true to indicate it's interactable
            return true;
        }

        // Session 8: Tranquilizer gun collection
        if (itemType === 'tranq_gun') {
            if (this.getTile(x, y) === CONSTANTS.TILE.TYPES.TRANQ_GUN_ITEM) {
                this.map[y][x] = CONSTANTS.TILE.TYPES.FLOOR;
                return true;
            }
        }

        return false;
    }

    /**
     * Session 6: Clear objective tile from map (when collected)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     */
    clearObjectiveTile(x, y) {
        if (this.getTile(x, y) === CONSTANTS.TILE.TYPES.OBJECTIVE_TARGET) {
            this.map[y][x] = CONSTANTS.TILE.TYPES.FLOOR;
        }
    }

    /**
     * Check if line of sight is blocked (for vision)
     * Includes walls, closed doors, cover objects, and closed gates
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    blocksVision(x, y) {
        const tile = this.getTile(x, y);
        if (tile === CONSTANTS.TILE.TYPES.WALL) return true;
        if (tile === CONSTANTS.TILE.TYPES.DOOR_CLOSED) return true;
        if (tile === CONSTANTS.TILE.TYPES.DOOR_LOCKED) return true;
        if (this.isCover(x, y)) return true;
        // Session 8: Gates block vision (bars obstruct view)
        if (tile === CONSTANTS.TILE.TYPES.GATE_BAR) return true;
        if (tile === CONSTANTS.TILE.TYPES.GATE_KEYSLOT) return true;
        return false;
    }

    // Session 8: Gate methods

    /**
     * Check if tile is part of a gate (bar or keyslot)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isGate(x, y) {
        const tile = this.getTile(x, y);
        return tile === CONSTANTS.TILE.TYPES.GATE_BAR ||
               tile === CONSTANTS.TILE.TYPES.GATE_KEYSLOT;
    }

    /**
     * Check if tile is a gate keyslot
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isGateKeyslot(x, y) {
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.GATE_KEYSLOT;
    }

    /**
     * Open a gate by converting all its tiles to GATE_OPEN
     * @param {Array} gateTiles - Array of {x, y} positions
     */
    openGate(gateTiles) {
        for (const tile of gateTiles) {
            if (this.inBounds(tile.x, tile.y)) {
                this.map[tile.y][tile.x] = CONSTANTS.TILE.TYPES.GATE_OPEN;
            }
        }
    }

    // Session 7: Alarm panel methods

    /**
     * Check if tile is an alarm panel (active)
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isAlarmPanel(x, y) {
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.ALARM_PANEL;
    }

    /**
     * Check if tile is a disabled alarm panel
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    isAlarmPanelDisabled(x, y) {
        return this.getTile(x, y) === CONSTANTS.TILE.TYPES.ALARM_PANEL_DISABLED;
    }

    /**
     * Disable an alarm panel
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean} Whether panel was disabled
     */
    disableAlarmPanel(x, y) {
        if (!this.isAlarmPanel(x, y)) return false;
        this.map[y][x] = CONSTANTS.TILE.TYPES.ALARM_PANEL_DISABLED;
        return true;
    }

    /**
     * Check if coordinates are within map bounds
     * @param {number} x - Grid X
     * @param {number} y - Grid Y
     * @returns {boolean}
     */
    inBounds(x, y) {
        return x >= 0 && x < this.width && y >= 0 && y < this.height;
    }

    /**
     * Convert world position to tile position
     * @param {number} worldX
     * @param {number} worldY
     * @returns {{x: number, y: number}}
     */
    worldToTile(worldX, worldY) {
        return {
            x: Math.floor(worldX / this.tileSize),
            y: Math.floor(worldY / this.tileSize)
        };
    }

    /**
     * Convert tile position to world position (center of tile)
     * @param {number} tileX
     * @param {number} tileY
     * @returns {{x: number, y: number}}
     */
    tileToWorld(tileX, tileY) {
        return {
            x: tileX * this.tileSize + this.tileSize / 2,
            y: tileY * this.tileSize + this.tileSize / 2
        };
    }

    /**
     * Get map dimensions
     * @returns {{width: number, height: number}}
     */
    getDimensions() {
        return {
            width: this.width,
            height: this.height
        };
    }

    /**
     * Get pixel dimensions
     * @returns {{width: number, height: number}}
     */
    getPixelDimensions() {
        return {
            width: this.width * this.tileSize,
            height: this.height * this.tileSize
        };
    }

}

<script>
// Maduro Nights - Collision System
// Grid-based collision detection

class Collision {
    constructor(tilemap) {
        this.tilemap = tilemap;
        this.tileSize = CONSTANTS.TILE.SIZE;
    }

    /**
     * Check if a point collides with a blocking tile (wall, cover, closed door)
     * @param {number} x - World X
     * @param {number} y - World Y
     * @returns {boolean}
     */
    pointCollides(x, y) {
        const tilePos = this.tilemap.worldToTile(x, y);
        return this.tilemap.blocksMovement(tilePos.x, tilePos.y);
    }

    /**
     * Check if a rectangle collides with walls
     * @param {number} x - Center X
     * @param {number} y - Center Y
     * @param {number} width - Rectangle width
     * @param {number} height - Rectangle height
     * @returns {boolean}
     */
    rectCollides(x, y, width, height) {
        const halfW = width / 2;
        const halfH = height / 2;

        // Check all four corners
        return this.pointCollides(x - halfW, y - halfH) ||
               this.pointCollides(x + halfW, y - halfH) ||
               this.pointCollides(x - halfW, y + halfH) ||
               this.pointCollides(x + halfW, y + halfH);
    }

    /**
     * Resolve collision and return valid position
     * Implements slide collision for smooth movement along walls
     * @param {number} oldX - Previous X
     * @param {number} oldY - Previous Y
     * @param {number} newX - Desired X
     * @param {number} newY - Desired Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @returns {{x: number, y: number}} Resolved position
     */
    resolveCollision(oldX, oldY, newX, newY, width, height) {
        let resolvedX = newX;
        let resolvedY = newY;

        // Try moving to new position
        if (this.rectCollides(newX, newY, width, height)) {
            // Try horizontal movement only
            if (!this.rectCollides(newX, oldY, width, height)) {
                resolvedY = oldY;
            }
            // Try vertical movement only
            else if (!this.rectCollides(oldX, newY, width, height)) {
                resolvedX = oldX;
            }
            // No movement possible
            else {
                resolvedX = oldX;
                resolvedY = oldY;
            }
        }

        return { x: resolvedX, y: resolvedY };
    }

    /**
     * Check if two rectangles overlap (AABB collision)
     * @param {number} x1 - Center X of first rect
     * @param {number} y1 - Center Y of first rect
     * @param {number} w1 - Width of first rect
     * @param {number} h1 - Height of first rect
     * @param {number} x2 - Center X of second rect
     * @param {number} y2 - Center Y of second rect
     * @param {number} w2 - Width of second rect
     * @param {number} h2 - Height of second rect
     * @returns {boolean}
     */
    rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
        const halfW1 = w1 / 2;
        const halfH1 = h1 / 2;
        const halfW2 = w2 / 2;
        const halfH2 = h2 / 2;

        return x1 - halfW1 < x2 + halfW2 &&
               x1 + halfW1 > x2 - halfW2 &&
               y1 - halfH1 < y2 + halfH2 &&
               y1 + halfH1 > y2 - halfH2;
    }

    /**
     * Check if entity collides with any guards
     * @param {number} x - Entity center X
     * @param {number} y - Entity center Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @param {Array} guards - Array of guard entities
     * @param {Object} excludeEntity - Entity to exclude from check (optional)
     * @returns {boolean}
     */
    collidesWithGuards(x, y, width, height, guards, excludeEntity = null) {
        for (const guard of guards) {
            if (guard === excludeEntity) continue;
            if (guard.isEliminated) continue;
            // Session 8: Sleeping enemies are on the ground and don't block movement
            if (guard.isSleeping) continue;

            if (this.rectsOverlap(
                x, y, width, height,
                guard.x, guard.y, guard.width, guard.height
            )) {
                return true;
            }
        }
        return false;
    }

    /**
     * Resolve collision including guards
     * @param {number} oldX - Previous X
     * @param {number} oldY - Previous Y
     * @param {number} newX - Desired X
     * @param {number} newY - Desired Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @param {Array} guards - Array of guard entities
     * @param {Object} excludeEntity - Entity to exclude (optional)
     * @returns {{x: number, y: number}} Resolved position
     */
    resolveCollisionWithEntities(oldX, oldY, newX, newY, width, height, guards, excludeEntity = null) {
        let resolvedX = newX;
        let resolvedY = newY;

        const collidesAtPosition = (x, y) => {
            return this.rectCollides(x, y, width, height) ||
                   this.collidesWithGuards(x, y, width, height, guards, excludeEntity);
        };

        // Try moving to new position
        if (collidesAtPosition(newX, newY)) {
            // Try horizontal movement only
            if (!collidesAtPosition(newX, oldY)) {
                resolvedY = oldY;
            }
            // Try vertical movement only
            else if (!collidesAtPosition(oldX, newY)) {
                resolvedX = oldX;
            }
            // No movement possible
            else {
                resolvedX = oldX;
                resolvedY = oldY;
            }
        }

        return { x: resolvedX, y: resolvedY };
    }

    /**
     * Check if entity collides with player
     * @param {number} x - Entity center X
     * @param {number} y - Entity center Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @param {Object} player - Player entity
     * @returns {boolean}
     */
    collidesWithPlayer(x, y, width, height, player) {
        if (!player || player.isDead) return false;

        return this.rectsOverlap(
            x, y, width, height,
            player.x, player.y, player.width, player.height
        );
    }

    /**
     * Resolve collision for guards (includes player and other guards)
     * @param {number} oldX - Previous X
     * @param {number} oldY - Previous Y
     * @param {number} newX - Desired X
     * @param {number} newY - Desired Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @param {Object} player - Player entity
     * @param {Array} guards - Array of guard entities
     * @param {Object} self - The guard itself (to exclude)
     * @returns {{x: number, y: number}} Resolved position
     */
    resolveGuardCollision(oldX, oldY, newX, newY, width, height, player, guards, self) {
        let resolvedX = newX;
        let resolvedY = newY;

        const collidesAtPosition = (x, y) => {
            return this.rectCollides(x, y, width, height) ||
                   this.collidesWithPlayer(x, y, width, height, player) ||
                   this.collidesWithGuards(x, y, width, height, guards, self);
        };

        // Try moving to new position
        if (collidesAtPosition(newX, newY)) {
            // Try horizontal movement only
            if (!collidesAtPosition(newX, oldY)) {
                resolvedY = oldY;
            }
            // Try vertical movement only
            else if (!collidesAtPosition(oldX, newY)) {
                resolvedX = oldX;
            }
            // No movement possible
            else {
                resolvedX = oldX;
                resolvedY = oldY;
            }
        }

        return { x: resolvedX, y: resolvedY };
    }

    /**
     * Check if a line from point A to point B is blocked by walls
     * Used for line of sight calculations
     * @param {number} x1
     * @param {number} y1
     * @param {number} x2
     * @param {number} y2
     * @returns {boolean} True if line is blocked
     */
    lineBlocked(x1, y1, x2, y2) {
        // Bresenham-style line check
        const dx = Math.abs(x2 - x1);
        const dy = Math.abs(y2 - y1);
        const steps = Math.max(dx, dy) / (this.tileSize / 2);

        for (let i = 0; i <= steps; i++) {
            const t = steps === 0 ? 0 : i / steps;
            const x = x1 + (x2 - x1) * t;
            const y = y1 + (y2 - y1) * t;

            if (this.pointCollides(x, y)) {
                return true;
            }
        }

        return false;
    }

    /**
     * Session 5: Check if line is blocked by walls, cover, or closed doors
     * Used for guard vision that accounts for cover objects
     * @param {number} x1
     * @param {number} y1
     * @param {number} x2
     * @param {number} y2
     * @returns {boolean} True if line is blocked
     */
    lineBlockedWithCover(x1, y1, x2, y2) {
        const dx = Math.abs(x2 - x1);
        const dy = Math.abs(y2 - y1);
        const steps = Math.max(dx, dy) / (this.tileSize / 2);

        for (let i = 0; i <= steps; i++) {
            const t = steps === 0 ? 0 : i / steps;
            const x = x1 + (x2 - x1) * t;
            const y = y1 + (y2 - y1) * t;

            const tilePos = this.tilemap.worldToTile(x, y);

            // Use tilemap's blocksVision method which includes cover
            if (this.tilemap.blocksVision(tilePos.x, tilePos.y)) {
                return true;
            }
        }

        return false;
    }

    /**
     * Session 5: Get interactable objects near a position
     * @param {number} x - World X
     * @param {number} y - World Y
     * @param {number} range - Range in tiles
     * @returns {Array} Array of interactable objects
     */
    getInteractablesNear(x, y, range = 1.5) {
        const interactables = [];
        const tileX = Math.floor(x / this.tileSize);
        const tileY = Math.floor(y / this.tileSize);

        // Check surrounding tiles
        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const checkX = tileX + dx;
                const checkY = tileY + dy;

                // Check for doors
                if (this.tilemap.isDoor(checkX, checkY)) {
                    const worldX = checkX * this.tileSize + this.tileSize / 2;
                    const worldY = checkY * this.tileSize + this.tileSize / 2;
                    const distance = Math.hypot(x - worldX, y - worldY);

                    if (distance <= range * this.tileSize) {
                        interactables.push({
                            type: 'door',
                            x: checkX,
                            y: checkY,
                            isOpen: this.tilemap.isDoorOpen(checkX, checkY),
                            isLocked: this.tilemap.isDoorLocked(checkX, checkY)
                        });
                    }
                }
            }
        }

        return interactables;
    }

    /**
     * Get all tiles within a radius (for area effects)
     * @param {number} centerX - World X
     * @param {number} centerY - World Y
     * @param {number} radius - Radius in pixels
     * @returns {Array<{x: number, y: number}>} Array of tile positions
     */
    getTilesInRadius(centerX, centerY, radius) {
        const tiles = [];
        const centerTile = this.tilemap.worldToTile(centerX, centerY);
        const tileRadius = Math.ceil(radius / this.tileSize);

        for (let dy = -tileRadius; dy <= tileRadius; dy++) {
            for (let dx = -tileRadius; dx <= tileRadius; dx++) {
                const tileX = centerTile.x + dx;
                const tileY = centerTile.y + dy;

                // Check if tile center is within radius
                const tileWorld = this.tilemap.tileToWorld(tileX, tileY);
                const dist = Math.hypot(tileWorld.x - centerX, tileWorld.y - centerY);

                if (dist <= radius) {
                    tiles.push({ x: tileX, y: tileY });
                }
            }
        }

        return tiles;
    }

    /**
     * Check if a position is valid for spawning an entity
     * Ensures entity won't collide with walls or blocking tiles
     * @param {number} worldX - World X position (center of entity)
     * @param {number} worldY - World Y position (center of entity)
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @returns {boolean} True if position is safe for spawning
     */
    isSpawnPositionValid(worldX, worldY, width, height) {
        // Check if entity rectangle collides with any walls
        if (this.rectCollides(worldX, worldY, width, height)) {
            return false;
        }

        // Additional check: ensure the center tile is walkable
        const tilePos = this.tilemap.worldToTile(worldX, worldY);
        if (!this.tilemap.isWalkable(tilePos.x, tilePos.y)) {
            return false;
        }

        return true;
    }

    /**
     * Find a valid spawn position starting from the desired position
     * Searches in expanding squares around the original position
     * @param {number} desiredTileX - Desired spawn tile X
     * @param {number} desiredTileY - Desired spawn tile Y
     * @param {number} width - Entity width
     * @param {number} height - Entity height
     * @param {number} maxSearchRadius - Maximum tiles to search (default 5)
     * @returns {{x: number, y: number}|null} Valid world position or null if none found
     */
    findValidSpawnPosition(desiredTileX, desiredTileY, width, height, maxSearchRadius = 5) {
        // Convert tile to world position (center of tile)
        const worldPos = this.tilemap.tileToWorld(desiredTileX, desiredTileY);

        // Check if desired position is already valid
        if (this.isSpawnPositionValid(worldPos.x, worldPos.y, width, height)) {
            return worldPos;
        }

        console.warn(`Spawn position (${desiredTileX}, ${desiredTileY}) is invalid, searching nearby...`);

        // Search in expanding squares around the desired position
        for (let radius = 1; radius <= maxSearchRadius; radius++) {
            // Check all positions at this radius (forming a square perimeter)
            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    // Only check perimeter of the square (not interior, we already checked those)
                    if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) continue;

                    const checkTileX = desiredTileX + dx;
                    const checkTileY = desiredTileY + dy;
                    const checkPos = this.tilemap.tileToWorld(checkTileX, checkTileY);

                    if (this.isSpawnPositionValid(checkPos.x, checkPos.y, width, height)) {
                        console.log(`Found valid spawn at (${checkTileX}, ${checkTileY})`);
                        return checkPos;
                    }
                }
            }
        }

        // No valid position found within search radius
        console.error(`Could not find valid spawn position within ${maxSearchRadius} tiles of (${desiredTileX}, ${desiredTileY})`);
        return null;
    }
}
