        this.isFinalBoss = true;

        // Phase tracking
        this.phase = 1;
        this.phaseThresholds = CONSTANTS.BOSS.MADURO.PHASES;

        // Phase 2: Summon system
        this.summonCooldown = 0;
        this.summonedGuards = []; // Track summoned guards
        this.onSummonCallback = null; // Callback to spawn guards (set by Game)

        // Phase 3: Enraged stats
        this.enragedSpeedMultiplier = CONSTANTS.BOSS.MADURO.ENRAGED_SPEED_MULTIPLIER;
        this.enragedAttackCooldown = CONSTANTS.BOSS.MADURO.ENRAGED_ATTACK_COOLDOWN;

        // Store base values for phase changes
        this.baseSpeed = this.speed;
        this.baseChaseSpeedMultiplier = this.chaseSpeedMultiplier;

        // Session 8: Sleep/capture state (for tranquilizer gun mechanic)
        this.isSleeping = false;
        this.sleepTimer = 0;
        this.isBeingDragged = false;
        this.wasExtracted = false;  // Track if successfully extracted
        this.tranquilizeCount = 0;  // Track how many times tranquilized (3 = permanent sleep)
    }

    /**
     * Set callback for summoning guards
     * @param {Function} callback - Function(x, y) that spawns a guard
     */
    setSummonCallback(callback) {
        this.onSummonCallback = callback;
    }

    /**
     * Override update with phase-specific logic
     * @param {number} dt
     */
    update(dt) {
        // Session 8: Handle sleep state (tranquilized - doesn't wake up unless timer expires)
        if (this.isSleeping) {
            this.sleepTimer -= dt;
            if (this.sleepTimer <= 0) {
                this.wakeUp();
            }

            // Session 8 Fix: Continue summoning guards during Phase 2+ while sleeping
            // This makes the fight more dynamic - Maduro calls for backup even while asleep
            if (this.phase >= 2 && this.summonCooldown > 0) {
                this.summonCooldown -= dt;
            }
            if (this.phase >= 2 && this.onSummonCallback && this.summonCooldown <= 0) {
                this.trySummonGuardsWhileSleeping();
            }

            this.prevX = this.x;
            this.prevY = this.y;
            return;
        }

        // Handle stun state
        if (this.isStunned) {
            this.stunTimer -= dt;
            if (this.stunTimer <= 0) {
                this.isStunned = false;
                this.stunTimer = 0;
            }
            this.prevX = this.x;
            this.prevY = this.y;
            return;
        }

        // Update attack cooldown
        if (this.attackCooldown > 0) {
            this.attackCooldown -= dt;
        }

        // Update summon cooldown (Phase 2)
        if (this.phase >= 2 && this.summonCooldown > 0) {
            this.summonCooldown -= dt;
        }

        // Update facing angle
        this.updateFacingAngle();

        // Phase-specific behavior
        switch (this.bossState) {
            case CONSTANTS.BOSS.STATES.PATROLLING:
                this.updatePatrol(dt);
                break;
            case CONSTANTS.BOSS.STATES.ALERT:
            case CONSTANTS.BOSS.STATES.ATTACKING:
                this.updateBossChase(dt);
                // Phase 2: Try to summon guards
                if (this.phase >= 2) {
                    this.trySummonGuards();
                }
                break;
            case CONSTANTS.BOSS.STATES.SUMMONING:
                // Brief pause while summoning
                this.summonTimer -= dt;
                if (this.summonTimer <= 0) {
                    this.bossState = CONSTANTS.BOSS.STATES.ALERT;
                }
                break;
            case CONSTANTS.BOSS.STATES.ENRAGED:
                this.updateEnraged(dt);
                break;
        }

        // Store previous position
        this.prevX = this.x;
        this.prevY = this.y;
    }

    /**
     * Enraged chase behavior - faster and more aggressive
     * @param {number} dt
     */
    updateEnraged(dt) {
        if (!this.chaseTarget) return;

        const dx = this.chaseTarget.x - this.x;
        const dy = this.chaseTarget.y - this.y;
        const distance = Math.hypot(dx, dy);

        // In melee range - attack faster
        if (distance <= this.attackRange) {
            this.tryBossAttack();
        }

        // Move faster when enraged
        const enragedSpeed = this.baseSpeed * this.baseChaseSpeedMultiplier * this.enragedSpeedMultiplier;
        const moveX = (dx / distance) * enragedSpeed * dt;
        const moveY = (dy / distance) * enragedSpeed * dt;

        // Update facing
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Apply movement
        const newPos = this.collision.resolveGuardCollision(
            this.x, this.y,
            this.x + moveX, this.y + moveY,
            this.width, this.height,
            this.player, this.otherGuards, this
        );

        this.x = newPos.x;
        this.y = newPos.y;

        this.lastKnownPlayerPos = { x: this.chaseTarget.x, y: this.chaseTarget.y };
    }

    /**
     * Override boss attack - faster when enraged
     * @returns {boolean}
     */
    tryBossAttack() {
        // Session 8: Sleeping bosses cannot attack
        if (this.attackCooldown > 0 || this.isEliminated || this.isStunned || this.isSleeping) {
            return false;
        }

        // Use enraged cooldown in phase 3
        this.attackCooldown = this.phase >= 3 ? this.enragedAttackCooldown : this.baseAttackCooldown;

        eventBus.emit(EVENTS.BOSS_ATTACK, {
            boss: this,
            bossType: this.bossType,
            x: this.x,
            y: this.y,
            facing: this.facing,
            damage: this.attackDamage,
            phase: this.phase
        });

        // Play boss attack sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_ATTACK');
        }

        return true;
    }

    /**
     * Try to summon guards (Phase 2+)
     */
    trySummonGuards() {
        if (this.summonCooldown > 0 || !this.onSummonCallback) {
            return false;
        }

        // Only summon if actively fighting
        if (this.bossState !== CONSTANTS.BOSS.STATES.ALERT &&
            this.bossState !== CONSTANTS.BOSS.STATES.ATTACKING &&
            this.bossState !== CONSTANTS.BOSS.STATES.ENRAGED) {
            return false;
        }

        this.summonCooldown = CONSTANTS.BOSS.MADURO.SUMMON_COOLDOWN;

        // Enter summoning state briefly
        this.bossState = CONSTANTS.BOSS.STATES.SUMMONING;
        this.summonTimer = 1.0; // 1 second summon animation

        // Summon guards around the boss
        const summonCount = CONSTANTS.BOSS.MADURO.SUMMON_COUNT;
        const summonRadius = CONSTANTS.TILE.SIZE * 3;

        for (let i = 0; i < summonCount; i++) {
            const angle = (Math.PI * 2 / summonCount) * i + Math.random() * 0.5;
            const spawnX = this.x + Math.cos(angle) * summonRadius;
            const spawnY = this.y + Math.sin(angle) * summonRadius;

            // Call the callback to spawn guard
            this.onSummonCallback(spawnX, spawnY);
        }

        eventBus.emit(EVENTS.BOSS_SUMMON, {
            boss: this,
            count: summonCount,
            x: this.x,
            y: this.y
        });

        // Play summon sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_SUMMON');
        }

        return true;
    }

    /**
     * Session 8 Fix: Summon guards while sleeping (Phase 2+)
     * Simplified version that doesn't require ALERT state
     */
    trySummonGuardsWhileSleeping() {
        if (this.summonCooldown > 0 || !this.onSummonCallback) {
            return false;
        }

        this.summonCooldown = CONSTANTS.BOSS.MADURO.SUMMON_COOLDOWN;

        // Summon guards around the boss (even while sleeping)
        const summonCount = CONSTANTS.BOSS.MADURO.SUMMON_COUNT;
        const summonRadius = CONSTANTS.TILE.SIZE * 3;

        for (let i = 0; i < summonCount; i++) {
            const angle = (Math.PI * 2 / summonCount) * i + Math.random() * 0.5;
            const spawnX = this.x + Math.cos(angle) * summonRadius;
            const spawnY = this.y + Math.sin(angle) * summonRadius;

            // Call the callback to spawn guard
            this.onSummonCallback(spawnX, spawnY);
        }

        eventBus.emit(EVENTS.BOSS_SUMMON, {
            boss: this,
            count: summonCount,
            x: this.x,
            y: this.y,
            whileSleeping: true
        });

        // Play summon sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_SUMMON');
        }

        return true;
    }

    /**
     * Check and handle phase transitions
     */
    checkPhaseChange() {
        const oldPhase = this.phase;

        // Check for phase 2
        if (this.phase === 1 && this.health <= this.phaseThresholds[2]) {
            this.phase = 2;
            this.summonCooldown = 0; // Can summon immediately
        }

        // Check for phase 3
        if (this.phase === 2 && this.health <= this.phaseThresholds[3]) {
            this.phase = 3;
            this.bossState = CONSTANTS.BOSS.STATES.ENRAGED;
        }

        // Emit phase change event if phase changed
        if (this.phase !== oldPhase) {
            eventBus.emit(EVENTS.BOSS_PHASE_CHANGE, {
                boss: this,
                bossType: this.bossType,
                oldPhase: oldPhase,
                newPhase: this.phase,
                health: this.health,
                maxHealth: this.maxHealth
            });

            // Visual/audio feedback for phase change
            if (typeof audioManager !== 'undefined') {
                audioManager.playSFX('BOSS_ALERT');
            }
        }
    }

    /**
     * Override defeat to trigger special victory
     */
    defeat() {
        this.isEliminated = true;
        this.active = false;

        eventBus.emit(EVENTS.BOSS_DEFEATED, {
            boss: this,
            bossType: this.bossType,
            isFinalBoss: true,
            x: this.x,
            y: this.y
        });

        // Play special victory sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_DEFEATED');
        }

    }

    /**
     * Get phase-specific status text
     * @returns {string}
     */
    getPhaseStatus() {
        if (this.isSleeping) {
            return 'SLEEPING';
        }
        switch (this.phase) {
            case 1:
                return 'Phase 1';
            case 2:
                return 'Phase 2 - Summoning';
            case 3:
                return 'Phase 3 - ENRAGED';
            default:
                return `Phase ${this.phase}`;
        }
    }

    // ==================== SESSION 8: SLEEP/CAPTURE SYSTEM ====================

    /**
     * Session 8: Put Maduro to sleep (tranquilizer gun hit)
     * First two hits: sleep for 5-10 seconds then wake up
     * Third hit: permanent sleep, can be dragged to extraction
     * Each tranquilize progresses Maduro to the next phase
     */
    fallAsleep() {
        if (this.isSleeping || this.wasExtracted) return;

        this.tranquilizeCount++;
        this.isSleeping = true;
        this.isStunned = false;
        this.stunTimer = 0;

        // Determine sleep duration based on tranquilize count
        if (this.tranquilizeCount >= 3) {
            // Third hit: permanent sleep (can be dragged)
            this.sleepTimer = CONSTANTS.MADURO_CAPTURE.SLEEP_DURATION;
        } else {
            // First two hits: temporary sleep (5-10 seconds)
            this.sleepTimer = 5 + Math.random() * 5;
        }

        // Stop all combat behavior
        this.bossState = CONSTANTS.BOSS.STATES.PATROLLING;
        this.chaseTarget = null;

        // Progress to next phase when put to sleep
        const oldPhase = this.phase;
        if (this.phase < 3) {
            this.phase++;

            eventBus.emit(EVENTS.BOSS_PHASE_CHANGE, {
                boss: this,
                bossType: this.bossType,
                oldPhase: oldPhase,
                newPhase: this.phase,
                health: this.health,
                maxHealth: this.maxHealth,
                reason: 'tranquilized'
            });

            // If entering phase 2, reset summon cooldown so he can summon when he wakes
            if (this.phase === 2) {
                this.summonCooldown = 0;
            }
        }

        eventBus.emit(EVENTS.MADURO_TRANQUILIZED, {
            boss: this,
            x: this.x,
            y: this.y,
            phase: this.phase,
            tranquilizeCount: this.tranquilizeCount,
            isPermanent: this.tranquilizeCount >= 3
        });

        // Play sleep sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_DEFEATED'); // Reuse as tranquilize sound
        }
    }

    /**
     * Session 8: Wake up from sleep (if timer expires - very unlikely given duration)
     */
    wakeUp() {
        if (!this.isSleeping) return;

        this.isSleeping = false;
        this.sleepTimer = 0;
        this.isBeingDragged = false;

        // Wake up enraged!
        this.phase = 3;
        this.bossState = CONSTANTS.BOSS.STATES.ENRAGED;

        // Session 8 Fix: Restore chase target to player so Maduro can attack after waking
        if (this.player) {
            this.chaseTarget = this.player;
            this.lastKnownPlayerPos = { x: this.player.x, y: this.player.y };
        }

        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('BOSS_ALERT');
        }
    }

    /**
     * Session 8: Start being dragged by player
     */
    startDrag() {
        if (!this.isSleeping) return false;

        this.isBeingDragged = true;

        eventBus.emit(EVENTS.MADURO_DRAG_START, {
            boss: this
        });

        return true;
    }

    /**
     * Session 8: Stop being dragged
     */
    stopDrag() {
        if (!this.isBeingDragged) return;

        this.isBeingDragged = false;

        eventBus.emit(EVENTS.MADURO_DRAG_END, {
            boss: this,
            x: this.x,
            y: this.y
        });

    }

    /**
     * Session 8: Update position when being dragged
     * Called by Game to keep Maduro behind the player
     * @param {number} targetX - Where Maduro should be dragged to
     * @param {number} targetY - Where Maduro should be dragged to
     */
    updateDragPosition(targetX, targetY) {
        if (!this.isBeingDragged || !this.isSleeping) return;

        this.prevX = this.x;
        this.prevY = this.y;
        this.x = targetX;
        this.y = targetY;
    }

    /**
     * Session 8: Check if Maduro can be dragged (permanently sleeping after 3 tranquilizes)
     * @returns {boolean}
     */
    canBeDragged() {
        return this.isSleeping && !this.wasExtracted && this.tranquilizeCount >= 3;
    }

    /**
     * Session 8: Mark as extracted (level complete)
     */
    markExtracted() {
        this.wasExtracted = true;
        this.isBeingDragged = false;

        eventBus.emit(EVENTS.MADURO_EXTRACTED, {
            boss: this
        });

    }
}

// Maduro Nights - Projectile Entity
// Session 8: Projectiles for tranquilizer darts and boss ranged attacks

class Projectile extends Entity {
    constructor(x, y, targetX, targetY, config) {
        super(x, y);

        // Projectile configuration
        this.config = config || {};
        this.damage = config.damage || 1;
        this.speed = (config.speed || CONSTANTS.TRANQUILIZER.PROJECTILE_SPEED) * CONSTANTS.TILE.SIZE;
        this.maxRange = (config.range || CONSTANTS.TRANQUILIZER.RANGE) * CONSTANTS.TILE.SIZE;
        this.projectileType = config.type || 'tranquilizer'; // 'tranquilizer', 'knife', etc.

        // Owner tracking (to avoid hitting self)
        this.owner = config.owner || null; // 'player' or 'boss'
        this.ownerId = config.ownerId || null;

        // Size for collision
        this.width = CONSTANTS.TRANQUILIZER.PROJECTILE_SIZE;
        this.height = CONSTANTS.TRANQUILIZER.PROJECTILE_SIZE;

        // Calculate direction
        const dx = targetX - x;
        const dy = targetY - y;
        const distance = Math.hypot(dx, dy);

        this.dirX = dx / distance;
        this.dirY = dy / distance;

        // Calculate facing direction for rendering
        if (Math.abs(dx) > Math.abs(dy)) {
            this.facing = dx > 0 ? 'right' : 'left';
        } else {
            this.facing = dy > 0 ? 'down' : 'up';
        }

        // Track distance traveled
        this.distanceTraveled = 0;

        // Start position for range calculation
        this.startX = x;
        this.startY = y;

        // Active state
        this.active = true;
        this.hasHit = false;
    }

    /**
     * Update projectile position
     * @param {number} dt - Delta time in seconds
     */
    update(dt) {
        if (!this.active) return;

        // Store previous position
        this.prevX = this.x;
        this.prevY = this.y;

        // Move projectile
        const moveX = this.dirX * this.speed * dt;
        const moveY = this.dirY * this.speed * dt;

        this.x += moveX;
        this.y += moveY;

        // Update distance traveled
        this.distanceTraveled = Math.hypot(this.x - this.startX, this.y - this.startY);

        // Check if max range reached
        if (this.distanceTraveled >= this.maxRange) {
            this.deactivate();
        }
    }

    /**
     * Check collision with entities
     * @param {Array} guards - Array of guards to check
     * @param {Array} bosses - Array of bosses to check
     * @param {Player} player - Player to check (for boss projectiles)
     * @param {Collision} collision - Collision system for wall checks
     * @returns {Object|null} - Hit entity or null
     */
    checkCollisions(guards, bosses, player, collision) {
        if (!this.active || this.hasHit) return null;

        // Check wall collision
        if (collision) {
            const tileX = Math.floor(this.x / CONSTANTS.TILE.SIZE);
            const tileY = Math.floor(this.y / CONSTANTS.TILE.SIZE);

            if (collision.isTileBlocked(tileX, tileY)) {
                this.deactivate();
                return null;
            }
        }

        // Player projectiles check guards and bosses
        if (this.owner === 'player') {
            // Check guards
            for (const guard of guards) {
                if (guard.isEliminated) continue;

                if (this.checkEntityCollision(guard)) {
                    this.onHit(guard);
                    return guard;
                }
            }

            // Check bosses
            for (const boss of bosses) {
                if (boss.isEliminated) continue;

                if (this.checkEntityCollision(boss)) {
                    this.onHit(boss);
                    return boss;
                }
            }
        }

        // Boss projectiles check player
        if (this.owner === 'boss' && player && !player.isDead) {
            if (this.checkEntityCollision(player)) {
                this.onHit(player);
                return player;
            }
        }

        return null;
    }

    /**
     * Check collision with a single entity
     * @param {Entity} entity
     * @returns {boolean}
     */
    checkEntityCollision(entity) {
        const dx = Math.abs(this.x - entity.x);
        const dy = Math.abs(this.y - entity.y);
        const hitRadius = (this.width + entity.width) / 2;

        return dx < hitRadius && dy < hitRadius;
    }

    /**
     * Handle hit on entity
     * @param {Entity} target
     */
    onHit(target) {
        this.hasHit = true;
        this.active = false;

        // Emit hit event
        eventBus.emit(EVENTS.TRANQUILIZER_HIT, {
            projectile: this,
            target: target,
            x: this.x,
            y: this.y,
            damage: this.damage,
            projectileType: this.projectileType
        });

        // Play hit sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('TRANQUILIZER_HIT');
        }
    }

    /**
     * Get the facing direction
     * @returns {string}
     */
    getFacing() {
        return this.facing;
    }

    /**
     * Check if projectile is active
     * @returns {boolean}
     */
    isActive() {
        return this.active;
    }

    /**
     * Check if projectile has expired (inactive or hit something)
     * @returns {boolean}
     */
    isExpired() {
        return !this.active || this.hasHit;
    }

    /**
     * Deactivate the projectile
     */
    deactivate() {
        this.active = false;
    }

    /**
     * Get projectile type
     * @returns {string}
     */
    getType() {
        return this.projectileType;
    }
}

        }

        if (!this.levelGenerator) {
            this.levelGenerator = new LevelGenerator();

        this.generatedLevels.set(levelNum, level);

<script>
// Maduro Nights - State Manager
// Manages game state transitions

class StateManager {
    constructor() {
        this.currentState = CONSTANTS.STATES.MENU;
        this.previousState = null;
    }

    /**
     * Get the current game state
     * @returns {string} Current state
     */
    getState() {
        return this.currentState;
    }

    /**
     * Set the game state
     * @param {string} newState - New state to transition to
     */
    setState(newState) {
        if (this.currentState === newState) return;

        this.previousState = this.currentState;
        this.currentState = newState;

        eventBus.emit(EVENTS.STATE_CHANGE, {
            from: this.previousState,
            to: this.currentState
        });
    }

    /**
     * Check if in a specific state
     * @param {string} state - State to check
     * @returns {boolean}
     */
    isState(state) {
        return this.currentState === state;
    }

    /**
     * Check if game is actively playing
     * @returns {boolean}
     */
    isPlaying() {
        return this.currentState === CONSTANTS.STATES.PLAYING;
    }

    /**
     * Check if game is paused
     * @returns {boolean}
     */
    isPaused() {
        return this.currentState === CONSTANTS.STATES.PAUSED;
    }

    /**
     * Restore previous state (useful for unpausing)
     */
    restorePrevious() {
        if (this.previousState) {
            this.setState(this.previousState);
        }
    }
}

// Session 6: Save Manager - localStorage persistence for rogue-lite progression
// Session 8: Added achievements and settings persistence
// Handles saving and loading player progress, credits, and upgrades

class SaveManager {
    constructor() {
        this.STORAGE_KEY = 'maduroNights_save';
        this.VERSION = 2; // Incremented for Session 8 additions

        // Default save data structure
        this.defaultData = {
            version: this.VERSION,
            credits: 0,
            totalCreditsEarned: 0,
            upgrades: {},           // { upgradeId: tierLevel }
            statistics: {
                totalRuns: 0,
                successfulRuns: 0,
                totalGuardsEliminated: 0,
                totalAlertsTriggered: 0,
                ghostRuns: 0,       // Runs with 0 alerts
                pacifistRuns: 0,    // Runs with 0 kills
                fastestLevel1: null,
                fastestLevel2: null,
                fastestLevel3: null,
                fastestLevel4: null, // Session 8: Added levels 4-5
                fastestLevel5: null,
                bossesDefeated: 0,   // Session 8: Boss tracking
                totalTranquilizerHits: 0 // Session 8
            },
            // Session 8: Achievements
            achievements: [],       // Array of unlocked achievement IDs
            // Session 8: Settings
            settings: {
                masterVolume: 0.7,
                sfxVolume: 0.8,
                musicVolume: 0.5,
                difficulty: 'NORMAL'
            },
            lastPlayed: null
        };

        // Current data in memory
        this.data = null;

        // Load existing save on construction
        this.load();
    }

    // Load save data from localStorage
    load() {
        try {
            const saved = localStorage.getItem(this.STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);

                // Handle version migration if needed
                if (parsed.version !== this.VERSION) {
                    this.data = this.migrate(parsed);
                } else {
                    // Merge with defaults to handle new fields
                    this.data = this.mergeWithDefaults(parsed);
                }
            } else {
                this.data = { ...this.defaultData };
            }
        } catch (e) {
            console.warn('SaveManager: Failed to load save data, using defaults', e);
            this.data = { ...this.defaultData };
        }

        return this.data;
    }

    // Save current data to localStorage
    save() {
        try {
            this.data.lastPlayed = Date.now();
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data));
            return true;
        } catch (e) {
            console.error('SaveManager: Failed to save data', e);
            return false;
        }
    }

    // Merge loaded data with defaults (handles new fields added in updates)
    mergeWithDefaults(loaded) {
        const merged = { ...this.defaultData };

        // Copy over existing values
        merged.credits = loaded.credits ?? merged.credits;
        merged.totalCreditsEarned = loaded.totalCreditsEarned ?? merged.totalCreditsEarned;
        merged.upgrades = loaded.upgrades ?? merged.upgrades;
        merged.lastPlayed = loaded.lastPlayed ?? merged.lastPlayed;

        // Merge statistics
        if (loaded.statistics) {
            merged.statistics = {
                ...merged.statistics,
                ...loaded.statistics
            };
        }

        // Session 8: Merge achievements
        merged.achievements = loaded.achievements ?? merged.achievements;

        // Session 8: Merge settings
        if (loaded.settings) {
            merged.settings = {
                ...merged.settings,
                ...loaded.settings
            };
        }

        return merged;
    }

    // Handle save version migrations
    migrate(oldData) {
        // Future migrations go here
        // For now, just merge with defaults
        console.log('SaveManager: Migrating save data from version', oldData.version);
        const migrated = this.mergeWithDefaults(oldData);
        migrated.version = this.VERSION;
        return migrated;
    }

    // Credit operations
    getCredits() {
        return this.data.credits;
    }

    addCredits(amount) {
        this.data.credits += amount;
        this.data.totalCreditsEarned += amount;
        this.save();
        return this.data.credits;
    }

    spendCredits(amount) {
        if (this.data.credits >= amount) {
            this.data.credits -= amount;
            this.save();
            return true;
        }
        return false;
    }

    // Upgrade operations
    getUpgradeTier(upgradeId) {
        return this.data.upgrades[upgradeId] || 0;
    }

    setUpgradeTier(upgradeId, tier) {
        this.data.upgrades[upgradeId] = tier;
        this.save();
    }

    getAllUpgrades() {
        return { ...this.data.upgrades };
    }

    // Statistics operations
    getStatistics() {
        return { ...this.data.statistics };
    }

    updateStatistics(stats) {
        this.data.statistics = {
            ...this.data.statistics,
            ...stats
        };
        this.save();
    }

    incrementStat(statName, amount = 1) {
        if (this.data.statistics.hasOwnProperty(statName)) {
            this.data.statistics[statName] += amount;
            this.save();
        }
    }

    // Record a completed run
    recordRun(runData) {
        const stats = this.data.statistics;

        stats.totalRuns++;

        if (runData.success) {
            stats.successfulRuns++;
        }

        stats.totalGuardsEliminated += runData.guardsEliminated || 0;
        stats.totalAlertsTriggered += runData.alertsTriggered || 0;

        if (runData.alertsTriggered === 0 && runData.success) {
            stats.ghostRuns++;
        }

        if (runData.guardsEliminated === 0 && runData.success) {
            stats.pacifistRuns++;
        }

        // Update fastest times
        if (runData.levelTimes) {
            for (let level = 1; level <= 5; level++) {
                const timeKey = `fastestLevel${level}`;
                const time = runData.levelTimes[level];
                if (time && (stats[timeKey] === null || time < stats[timeKey])) {
                    stats[timeKey] = time;
                }
            }
        }

        // Session 8: Boss and tranquilizer lifetime stats
        stats.bossesDefeated = (stats.bossesDefeated || 0) + (runData.bossesDefeated || 0);
        stats.totalTranquilizerHits = (stats.totalTranquilizerHits || 0) + (runData.tranquilizerHits || 0);

        this.save();
    }

    // Reset all progress (for debugging or new game+)
    reset() {
        this.data = { ...this.defaultData };
        this.data.statistics = { ...this.defaultData.statistics };
        this.save();
    }

    // Check if this is a first-time player
    isNewPlayer() {
        return this.data.statistics.totalRuns === 0;
    }

    // Export save data (for backup)
    exportSave() {
        return JSON.stringify(this.data);
    }

    // Import save data (for restore)
    importSave(jsonString) {
        try {
            const imported = JSON.parse(jsonString);
            this.data = this.mergeWithDefaults(imported);
            this.save();
            return true;
        } catch (e) {
            console.error('SaveManager: Failed to import save', e);
            return false;
        }
    }

    // ==================== SESSION 8: ACHIEVEMENTS ====================

    /**
     * Session 8: Get all unlocked achievement IDs
     * @returns {Array}
     */
    getUnlockedAchievements() {
        return [...this.data.achievements];
    }

    /**
     * Session 8: Unlock an achievement
     * @param {string} achievementId
     */
    unlockAchievement(achievementId) {
        if (!this.data.achievements.includes(achievementId)) {
            this.data.achievements.push(achievementId);
            this.save();
        }
    }

    /**
     * Session 8: Check if achievement is unlocked
     * @param {string} achievementId
     * @returns {boolean}
     */
    isAchievementUnlocked(achievementId) {
        return this.data.achievements.includes(achievementId);
    }

    // ==================== SESSION 8: SETTINGS ====================

    /**
     * Session 8: Get all settings
     * @returns {Object}
     */
    getSettings() {
        return { ...this.data.settings };
    }

    /**
     * Session 8: Update a setting
     * @param {string} key - Setting key
     * @param {any} value - New value
     */
    setSetting(key, value) {
        if (this.data.settings.hasOwnProperty(key)) {
            this.data.settings[key] = value;
            this.save();

            // Emit settings changed event
            if (typeof eventBus !== 'undefined') {
                eventBus.emit(EVENTS.SETTINGS_CHANGED, {
                    key: key,
                    value: value
                });
            }
        }
    }

    /**
     * Session 8: Get a specific setting
     * @param {string} key
     * @returns {any}
     */
    getSetting(key) {
        return this.data.settings[key];
    }

    /**
     * Session 8: Get difficulty setting
     * @returns {string}
     */
    getDifficulty() {
        return this.data.settings.difficulty;
    }

    /**
     * Session 8: Set difficulty
     * @param {string} difficulty - 'EASY', 'NORMAL', or 'HARD'
     */
    setDifficulty(difficulty) {
        this.setSetting('difficulty', difficulty);

        // Emit difficulty changed event
        if (typeof eventBus !== 'undefined') {
            eventBus.emit(EVENTS.DIFFICULTY_CHANGED, {
                difficulty: difficulty
            });
        }
    }
}

<script>
// Session 6: Upgrade Manager - Handles upgrade purchasing and effect calculation
// Works with SaveManager to persist upgrades and applies modifiers to gameplay

class UpgradeManager {
    constructor(saveManager) {
        this.saveManager = saveManager;

        // Cached active effects for quick lookup during gameplay
        this.activeEffects = {};

        // Calculate active effects from saved upgrades
        this.recalculateEffects();
    }

    // Get all upgrade definitions
    getUpgradeDefinitions() {
        return CONSTANTS.UPGRADES.LIST;
    }

    // Get a specific upgrade definition
    getUpgradeDefinition(upgradeId) {
        return CONSTANTS.UPGRADES.LIST[upgradeId];
    }

    // Get current tier for an upgrade (0 = not purchased)
    getCurrentTier(upgradeId) {
        return this.saveManager.getUpgradeTier(upgradeId);
    }

    // Get cost to purchase next tier of an upgrade
    getNextTierCost(upgradeId) {
        const currentTier = this.getCurrentTier(upgradeId);
        const upgrade = this.getUpgradeDefinition(upgradeId);

        if (!upgrade || currentTier >= upgrade.maxTier) {
            return null; // Already maxed
        }

        // Session 8: Support custom cost for special upgrades like Stealth Shotgun
        if (upgrade.customCost !== undefined) {
            return upgrade.customCost;
        }

        const nextTier = currentTier + 1;
        return CONSTANTS.UPGRADES.TIER_COSTS[nextTier];
    }

    // Check if an upgrade can be purchased
    canPurchase(upgradeId) {
        const cost = this.getNextTierCost(upgradeId);
        if (cost === null) return false;

        return this.saveManager.getCredits() >= cost;
    }

    // Purchase next tier of an upgrade
    purchase(upgradeId) {
        const cost = this.getNextTierCost(upgradeId);
        if (cost === null) {
            console.warn('UpgradeManager: Cannot purchase - upgrade maxed or invalid');
            return false;
        }

        if (!this.saveManager.spendCredits(cost)) {
            console.warn('UpgradeManager: Cannot purchase - insufficient credits');
            return false;
        }

        const currentTier = this.getCurrentTier(upgradeId);
        const newTier = currentTier + 1;
        this.saveManager.setUpgradeTier(upgradeId, newTier);

        // Recalculate active effects
        this.recalculateEffects();

        // Emit event
        if (typeof eventBus !== 'undefined') {
            eventBus.emit(EVENTS.UPGRADE_PURCHASED, {
                upgradeId,
                tier: newTier,
                cost
            });
        }

        return true;
    }

    // Recalculate all active effects from owned upgrades
    recalculateEffects() {
        this.activeEffects = {
            // Movement effects
            walkNoiseMultiplier: 1.0,
            runNoiseMultiplier: 1.0,
            crouchSpeedMultiplier: 1.0,
            attackCooldownMultiplier: 1.0,

            // Detection effects
            visionRangeMultiplier: 1.0,
            suspicionRateMultiplier: 1.0,
            suspicionDecayMultiplier: 1.0,
            gracePeriod: 0,
            situationalAwareness: 0,  // Session 8: 0=off, 1=guards, 2=+cameras, 3=+elites/boss
            hasShotgun: false          // Session 8: Stealth Shotgun upgrade
        };

        const upgrades = CONSTANTS.UPGRADES.LIST;
        for (const upgradeId in upgrades) {
            const tier = this.getCurrentTier(upgradeId);
            if (tier > 0) {
                const upgrade = upgrades[upgradeId];
                const effects = upgrade.effects[tier];

                // Apply each effect
                for (const effectKey in effects) {
                    if (effectKey === 'graceperiod') {
                        // Grace period is additive
                        this.activeEffects.gracePeriod = effects[effectKey];
                    } else if (effectKey === 'situationalAwareness') {
                        // Session 8: Situational awareness is a tier level (1, 2, or 3)
                        this.activeEffects.situationalAwareness = effects[effectKey];
                    } else if (effectKey === 'hasShotgun') {
                        // Session 8: Boolean effect for shotgun
                        this.activeEffects.hasShotgun = effects[effectKey];
                    } else if (this.activeEffects.hasOwnProperty(effectKey)) {
                        // Multipliers replace (take most recent tier's value)
                        this.activeEffects[effectKey] = effects[effectKey];
                    }
                }
            }
        }
    }

    // Get all active effects (for applying to gameplay)
    getActiveEffects() {
        return { ...this.activeEffects };
    }

    // Get a specific effect value
    getEffect(effectName) {
        return this.activeEffects[effectName] ?? 1.0;
    }

    // Get upgrade status for UI display
    getUpgradeStatus(upgradeId) {
        const upgrade = this.getUpgradeDefinition(upgradeId);
        if (!upgrade) return null;

        const currentTier = this.getCurrentTier(upgradeId);
        const nextCost = this.getNextTierCost(upgradeId);
        const canPurchase = this.canPurchase(upgradeId);
        const isMaxed = currentTier >= upgrade.maxTier;

        // Get current and next tier effects for display
        let currentEffect = null;
        let nextEffect = null;

        if (currentTier > 0) {
            currentEffect = upgrade.effects[currentTier];
        }
        if (!isMaxed) {
            nextEffect = upgrade.effects[currentTier + 1];
        }

        return {
            id: upgradeId,
            name: upgrade.name,
            description: upgrade.description,
            category: upgrade.category,
            currentTier,
            maxTier: upgrade.maxTier,
            nextCost,
            canPurchase,
            isMaxed,
            currentEffect,
            nextEffect
        };
    }

    // Get all upgrades organized by category for UI
    getUpgradesByCategory() {
        const byCategory = {
            MOVEMENT: [],
            DETECTION: []
        };

        const upgrades = CONSTANTS.UPGRADES.LIST;
        for (const upgradeId in upgrades) {
            const status = this.getUpgradeStatus(upgradeId);
            byCategory[status.category].push(status);
        }

        return byCategory;
    }

    // Get total spent on upgrades
    getTotalSpent() {
        let total = 0;
        const upgrades = CONSTANTS.UPGRADES.LIST;

        for (const upgradeId in upgrades) {
            const tier = this.getCurrentTier(upgradeId);
            for (let t = 1; t <= tier; t++) {
                total += CONSTANTS.UPGRADES.TIER_COSTS[t];
            }
        }

        return total;
    }

    // Get progress towards full upgrade tree
    getProgress() {
        const upgrades = CONSTANTS.UPGRADES.LIST;
        let totalTiers = 0;
        let ownedTiers = 0;

        for (const upgradeId in upgrades) {
            totalTiers += upgrades[upgradeId].maxTier;
            ownedTiers += this.getCurrentTier(upgradeId);
        }

        return {
            owned: ownedTiers,
            total: totalTiers,
            percentage: Math.round((ownedTiers / totalTiers) * 100)
        };
    }

    // Format effect for display (e.g., "0.85" -> "-15%")
    formatEffect(effectKey, value) {
        if (effectKey === 'graceperiod') {
            return `${value}s`;
        }

        // Session 8: Situational awareness tier descriptions
        if (effectKey === 'situationalAwareness') {
            if (value === 1) return 'Guards';
            if (value === 2) return '+ Cameras';
            if (value === 3) return '+ Elites/Boss';
            return 'Off';
        }

        // Session 8: Shotgun is a boolean unlock
        if (effectKey === 'hasShotgun') {
            return value ? 'Unlocked' : 'Locked';
        }

        // Multipliers: show as percentage change
        const percentChange = Math.round((value - 1) * 100);
        if (percentChange > 0) {
            return `+${percentChange}%`;
        } else {
            return `${percentChange}%`;
        }
    }
}

<script>
// Session 6: Statistics Manager - Tracks per-run stats and calculates credits
// Session 8: Added achievement system
// Listens to game events and aggregates data for the run results screen

class StatisticsManager {
    constructor(saveManager) {
        this.saveManager = saveManager;

        // Current run data (reset each run)
        this.currentRun = null;

        // Session 8: Achievement definitions
        this.achievements = CONSTANTS.ACHIEVEMENTS.LIST;

        // Bind event handlers
        this.setupEventListeners();
    }

    // Start tracking a new run
    startRun() {
        this.currentRun = {
            startTime: Date.now(),
            levelTimes: {},         // { levelNum: timeInSeconds }
            levelStartTime: null,

            // Per-level tracking
            currentLevel: 1,

            // Aggregated stats
            guardsEliminated: 0,
            alertsTriggered: 0,
            timesSpotted: 0,
            damagesTaken: 0,

            // Per-level stats for breakdown
            levelStats: {},

            // Final status
            success: false,
            failedAtLevel: null,

            // Session 8: Achievement tracking
            bossesDefeated: 0,
            tranquilizerHits: 0,
            achievementsUnlocked: []
        };

        this.startLevelTimer();
    }

    // Start timer for current level
    startLevelTimer() {
        if (this.currentRun) {
            this.currentRun.levelStartTime = Date.now();
        }
    }

    // Record level completion
    completeLevel(levelNum) {
        if (!this.currentRun) return;

        const levelTime = (Date.now() - this.currentRun.levelStartTime) / 1000;
        this.currentRun.levelTimes[levelNum] = levelTime;

        // Store level-specific stats
        this.currentRun.levelStats[levelNum] = {
            time: levelTime,
            guardsEliminated: this.currentRun.guardsEliminated,
            alertsTriggered: this.currentRun.alertsTriggered
        };
    }

    // Advance to next level
    advanceLevel(newLevel) {
        if (!this.currentRun) return;

        this.currentRun.currentLevel = newLevel;
        this.startLevelTimer();
    }

    // Record guard elimination
    recordGuardEliminated() {
        if (this.currentRun) {
            this.currentRun.guardsEliminated++;
        }
    }

    // Record alert triggered
    recordAlertTriggered() {
        if (this.currentRun) {
            this.currentRun.alertsTriggered++;
        }
    }

    // Record player spotted (suspicion reached 100%)
    recordSpotted() {
        if (this.currentRun) {
            this.currentRun.timesSpotted++;
        }
    }

    // Record damage taken
    recordDamageTaken() {
        if (this.currentRun) {
            this.currentRun.damagesTaken++;
        }
    }

    // End run successfully
    endRunSuccess() {
        if (this.currentRun) {
            this.currentRun.success = true;
            this.finalizeRun();
        }
    }

    // End run with failure
    endRunFailure(levelNum) {
        if (this.currentRun) {
            this.currentRun.success = false;
            this.currentRun.failedAtLevel = levelNum;
            this.finalizeRun();
        }
    }

    // Finalize run and persist to save
    finalizeRun() {
        if (!this.currentRun) return;

        this.currentRun.endTime = Date.now();
        this.currentRun.totalTime = (this.currentRun.endTime - this.currentRun.startTime) / 1000;

        // Session 8: Check achievements before persisting
        this.checkAchievements();

        // Record to persistent storage
        this.saveManager.recordRun(this.currentRun);
    }

    // Calculate credits earned for the run
    // Session 8: Base credits are now awarded per-level, this only calculates bonuses
    calculateCredits() {
        if (!this.currentRun) return null;

        const credits = {
            base: 0,
            bonuses: {},
            total: 0,
            breakdown: []
        };

        // Only give credits if run was successful
        if (!this.currentRun.success) {
            credits.breakdown.push({ label: 'Mission Failed', value: 0 });
            return credits;
        }

        // Session 8: Base credits already awarded per-level, just calculate base total for bonus calculations
        for (const levelNum in this.currentRun.levelTimes) {
            const levelCredit = CONSTANTS.CREDITS.LEVEL_COMPLETE[levelNum] || 0;
            credits.base += levelCredit;
            // Show in breakdown as "already earned"
            credits.breakdown.push({
                label: `Level ${levelNum} (already earned)`,
                value: levelCredit,
                alreadyEarned: true
            });
        }

        // Ghost bonus (0 alerts)
        if (this.currentRun.alertsTriggered === 0) {
            const ghostBonus = Math.floor(credits.base * CONSTANTS.CREDITS.BONUSES.GHOST);
            credits.bonuses.ghost = ghostBonus;
            credits.breakdown.push({
                label: 'Ghost Bonus (+100%)',
                value: ghostBonus,
                isBonus: true
            });
        }

        // Pacifist bonus (0 kills)
        if (this.currentRun.guardsEliminated === 0) {
            const pacifistBonus = Math.floor(credits.base * CONSTANTS.CREDITS.BONUSES.PACIFIST);
            credits.bonuses.pacifist = pacifistBonus;
            credits.breakdown.push({
                label: 'Pacifist Bonus (+50%)',
                value: pacifistBonus,
                isBonus: true
            });
        }

        // Speedrun bonus (check each level)
        let speedrunBonus = 0;
        let hasSpeedrunBonus = true;
        for (const levelNum in this.currentRun.levelTimes) {
            const time = this.currentRun.levelTimes[levelNum];
            const limit = CONSTANTS.CREDITS.SPEEDRUN_TIMES[levelNum];
            if (time > limit) {
                hasSpeedrunBonus = false;
                break;
            }
        }

        if (hasSpeedrunBonus && Object.keys(this.currentRun.levelTimes).length === 3) {
            speedrunBonus = Math.floor(credits.base * CONSTANTS.CREDITS.BONUSES.SPEEDRUN);
            credits.bonuses.speedrun = speedrunBonus;
            credits.breakdown.push({
                label: 'Speed Bonus (+25%)',
                value: speedrunBonus,
                isBonus: true
            });
        }

        // Calculate total - Session 8: Only bonuses, base credits already awarded per-level
        credits.total =
            (credits.bonuses.ghost || 0) +
            (credits.bonuses.pacifist || 0) +
            (credits.bonuses.speedrun || 0);

        return credits;
    }

    // Get current run stats for display
    // Session 8: Include bossesDefeated and tranquilizerHits for achievement checking
    getRunStats() {
        if (!this.currentRun) return null;

        return {
            success: this.currentRun.success,
            failedAtLevel: this.currentRun.failedAtLevel,
            totalTime: this.currentRun.totalTime,
            levelTimes: { ...this.currentRun.levelTimes },
            guardsEliminated: this.currentRun.guardsEliminated,
            alertsTriggered: this.currentRun.alertsTriggered,
            timesSpotted: this.currentRun.timesSpotted,
            damagesTaken: this.currentRun.damagesTaken,
            isGhost: this.currentRun.alertsTriggered === 0,
            isPacifist: this.currentRun.guardsEliminated === 0,
            // Session 8: Achievement-related stats
            bossesDefeated: this.currentRun.bossesDefeated || 0,
            tranquilizerHits: this.currentRun.tranquilizerHits || 0
        };
    }

    // Format time for display (seconds -> "2:34")
    formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Set up event listeners
    setupEventListeners() {
        if (typeof eventBus === 'undefined') return;

        // Guard eliminated
        eventBus.on(EVENTS.GUARD_ELIMINATED, () => {
            this.recordGuardEliminated();
        });

        // Guard alert (only count once per guard going alert)
        eventBus.on(EVENTS.GUARD_ALERT, () => {
            this.recordAlertTriggered();
        });

        // Player damaged
        eventBus.on(EVENTS.PLAYER_DAMAGED, () => {
            this.recordDamageTaken();
        });

        // Level start
        eventBus.on(EVENTS.LEVEL_START, (data) => {
            if (data && data.levelNum === 1) {
                this.startRun();
            } else if (data && data.levelNum > 1) {
                this.advanceLevel(data.levelNum);
            }
        });

        // Level complete
        eventBus.on(EVENTS.LEVEL_COMPLETE, (data) => {
            if (data && data.levelNum) {
                this.completeLevel(data.levelNum);
            }
        });

        // Run complete (all levels)
        eventBus.on(EVENTS.RUN_COMPLETE, (data) => {
            if (data && data.success) {
                this.endRunSuccess();
            } else {
                this.endRunFailure(data ? data.levelNum : null);
            }
        });

        // Player died
        eventBus.on(EVENTS.PLAYER_DIED, () => {
            if (this.currentRun) {
                this.endRunFailure(this.currentRun.currentLevel);
            }
        });

        // Session 8: Boss defeated
        eventBus.on(EVENTS.BOSS_DEFEATED, () => {
            this.recordBossDefeated();
        });

        // Session 8: Tranquilizer hit
        eventBus.on(EVENTS.TRANQUILIZER_HIT, () => {
            this.recordTranquilizerHit();
        });
    }

    // Get lifetime statistics from save
    getLifetimeStats() {
        return this.saveManager.getStatistics();
    }

    // ==================== SESSION 8: ACHIEVEMENT SYSTEM ====================

    /**
     * Session 8: Record boss defeated
     */
    recordBossDefeated() {
        if (this.currentRun) {
            this.currentRun.bossesDefeated++;
        }
    }

    /**
     * Session 8: Record tranquilizer hit
     */
    recordTranquilizerHit() {
        if (this.currentRun) {
            this.currentRun.tranquilizerHits++;
            // Check sharpshooter achievement progress
            if (this.currentRun.tranquilizerHits >= 10) {
                this.checkAndUnlockAchievement('SHARPSHOOTER');
            }
        }
    }

    /**
     * Session 8: Check all achievements at end of run
     * @returns {Array} Array of newly unlocked achievements
     */
    checkAchievements() {
        if (!this.currentRun) return [];

        const newlyUnlocked = [];
        const stats = this.getRunStats();
        const unlockedIds = this.saveManager.getUnlockedAchievements() || [];

        // Check each achievement
        for (const [id, achievement] of Object.entries(this.achievements)) {
            // Skip if already unlocked
            if (unlockedIds.includes(id)) continue;

            // Check requirements
            if (this.checkAchievementRequirement(achievement, stats)) {
                newlyUnlocked.push(achievement);
                this.unlockAchievement(id);
            }
        }

        return newlyUnlocked;
    }

    /**
     * Session 8: Check if achievement requirement is met
     * @param {Object} achievement - Achievement definition
     * @param {Object} stats - Current run stats
     * @returns {boolean}
     */
    checkAchievementRequirement(achievement, stats) {
        const req = achievement.requirement;

        // Success requirement
        if (req.success && !stats.success) return false;

        // Alerts triggered
        if (req.alertsTriggered !== undefined && stats.alertsTriggered !== req.alertsTriggered) {
            return false;
        }

        // Guards eliminated
        if (req.guardsEliminated !== undefined && stats.guardsEliminated !== req.guardsEliminated) {
            return false;
        }

        // Damages taken
        if (req.damagesTaken !== undefined && stats.damagesTaken !== req.damagesTaken) {
            return false;
        }

        // Bosses defeated
        if (req.bossesDefeated !== undefined && stats.bossesDefeated < req.bossesDefeated) {
            return false;
        }

        // Tranquilizer hits
        if (req.tranquilizerHits !== undefined && stats.tranquilizerHits < req.tranquilizerHits) {
            return false;
        }

        // Speedrunner - all levels under time
        if (req.allLevelsUnderTime) {
            let allUnderTime = true;
            for (const levelNum in stats.levelTimes) {
                const time = stats.levelTimes[levelNum];
                const limit = CONSTANTS.CREDITS.SPEEDRUN_TIMES[levelNum];
                if (time > limit) {
                    allUnderTime = false;
                    break;
                }
            }
            // Must complete all 5 levels
            if (!allUnderTime || Object.keys(stats.levelTimes).length < 5) {
                return false;
            }
        }

        return true;
    }

    /**
     * Session 8: Unlock an achievement
     * @param {string} achievementId
     */
    unlockAchievement(achievementId) {
        if (!this.currentRun) return;

        // Add to current run's unlocked list
        if (!this.currentRun.achievementsUnlocked.includes(achievementId)) {
            this.currentRun.achievementsUnlocked.push(achievementId);
        }

        // Persist to save
        this.saveManager.unlockAchievement(achievementId);

        // Emit event
        const achievement = this.achievements[achievementId];
        eventBus.emit(EVENTS.ACHIEVEMENT_UNLOCKED, {
            id: achievementId,
            achievement: achievement
        });

        // Play achievement sound
        if (typeof audioManager !== 'undefined') {
            audioManager.playSFX('ACHIEVEMENT_UNLOCK');
        }

        console.log(`Achievement unlocked: ${achievement.name}`);
    }

    /**
     * Session 8: Check and unlock a specific achievement (for progress-based ones)
     * @param {string} achievementId
     */
    checkAndUnlockAchievement(achievementId) {
        const unlockedIds = this.saveManager.getUnlockedAchievements() || [];
        if (unlockedIds.includes(achievementId)) return;

        this.unlockAchievement(achievementId);
    }

    /**
     * Session 8: Get all achievements with unlock status
     * @returns {Array} Array of {achievement, isUnlocked}
     */
    getAllAchievements() {
        const unlockedIds = this.saveManager.getUnlockedAchievements() || [];
        const result = [];

        for (const [id, achievement] of Object.entries(this.achievements)) {
            result.push({
                ...achievement,
                isUnlocked: unlockedIds.includes(id)
            });
        }

        return result;
    }

    /**
     * Session 8: Get count of unlocked achievements
     * @returns {number}
     */
    getUnlockedCount() {
        const unlockedIds = this.saveManager.getUnlockedAchievements() || [];
        return unlockedIds.length;
    }

    /**
     * Session 8: Get total achievement count
     * @returns {number}
     */
    getTotalAchievementCount() {
        return Object.keys(this.achievements).length;
    }

    /**
     * Session 8: Get run stats including Session 8 additions
     */
    getRunStatsExtended() {
        if (!this.currentRun) return null;

        const baseStats = this.getRunStats();
        return {
            ...baseStats,
            bossesDefeated: this.currentRun.bossesDefeated,
            tranquilizerHits: this.currentRun.tranquilizerHits,
            achievementsUnlocked: [...this.currentRun.achievementsUnlocked]
        };
    }
}

</script>
<script>
// Maduro Nights - Objective Manager
// Session 5: Tracks objective completion and progression

class ObjectiveManager {
    constructor() {
        this.objectives = [];
        this.allComplete = false;
    }

    /**
     * Load objectives from level data
     * @param {Array} objectiveData - Array of objective definitions
     */
    loadObjectives(objectiveData) {
        this.objectives = objectiveData.map(obj => ({
            id: obj.id,
            type: obj.type,
            position: obj.position,
            description: obj.description,
            prerequisite: obj.prerequisite || null,
            status: obj.isActive ? CONSTANTS.OBJECTIVES.STATUS.ACTIVE : CONSTANTS.OBJECTIVES.STATUS.LOCKED
        }));
        this.allComplete = false;
    }

    /**
     * Get the current active objective
     * @returns {Object|null} Current objective or null
     */
    getCurrentObjective() {
        return this.objectives.find(obj => obj.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE);
    }

    /**
     * Get all objectives
     * @returns {Array} All objectives
     */
    getObjectives() {
        return this.objectives;
    }

    /**
     * Complete an objective by ID
     * @param {string} objectiveId - Objective ID to complete
     * @returns {boolean} Whether completion was successful
     */
    completeObjective(objectiveId) {
        const objective = this.objectives.find(obj => obj.id === objectiveId);
        if (!objective || objective.status !== CONSTANTS.OBJECTIVES.STATUS.ACTIVE) {
            return false;
        }

        objective.status = CONSTANTS.OBJECTIVES.STATUS.COMPLETE;
        eventBus.emit(EVENTS.OBJECTIVE_COMPLETE, { objective });

        // Activate next objective if prerequisite met
        this.objectives.forEach(obj => {
            if (obj.prerequisite === objectiveId && obj.status === CONSTANTS.OBJECTIVES.STATUS.LOCKED) {
                obj.status = CONSTANTS.OBJECTIVES.STATUS.ACTIVE;
                eventBus.emit(EVENTS.OBJECTIVE_ACTIVATED, { objective: obj });
            }
        });

        // Check if all complete
        this.allComplete = this.objectives.every(
            obj => obj.status === CONSTANTS.OBJECTIVES.STATUS.COMPLETE
        );
        if (this.allComplete) {
            eventBus.emit(EVENTS.ALL_OBJECTIVES_COMPLETE);
        }

        return true;
    }

    /**
     * Check if extraction objective is active
     * @returns {boolean} Whether extraction is available
     */
    isExtractionActive() {
        const extraction = this.objectives.find(
            obj => obj.type === CONSTANTS.OBJECTIVES.TYPES.REACH_EXTRACTION
        );
        return extraction && extraction.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE;
    }

    /**
     * Check if all objectives are complete
     * @returns {boolean} All objectives complete
     */
    isAllComplete() {
        return this.allComplete;
    }

    /**
     * Get objective by position (tile coordinates)
     * @param {number} tileX - Tile X coordinate
     * @param {number} tileY - Tile Y coordinate
     * @returns {Object|null} Objective at position or null
     */
    getObjectiveAtPosition(tileX, tileY) {
        return this.objectives.find(obj =>
            obj.position &&
            obj.position.x === tileX &&
            obj.position.y === tileY &&
            obj.status === CONSTANTS.OBJECTIVES.STATUS.ACTIVE
        );
    }

    /**
     * Reset objectives
     */
    reset() {
        this.objectives = [];
        this.allComplete = false;
    }

    /**
     * Session 6: Complete all objectives (for debug skip level)
     */
    completeAllObjectives() {
        this.objectives.forEach(obj => {
            if (obj.status !== CONSTANTS.OBJECTIVES.STATUS.COMPLETE) {
                obj.status = CONSTANTS.OBJECTIVES.STATUS.COMPLETE;
                eventBus.emit(EVENTS.OBJECTIVE_COMPLETE, { objective: obj });
            }
        });
        this.allComplete = true;
        eventBus.emit(EVENTS.ALL_OBJECTIVES_COMPLETE);
    }
}
