    <style>
*{margin:0;padding:0;box-sizing:border-box}body{background-color:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}#game-container{position:relative;width:800px;height:600px;border:4px solid #e94560;box-shadow:0 0 20px rgba(233,69,96,0.5)}#game-canvas{display:block;background-color:#16213e;image-rendering:pixelated;image-rendering:crisp-edges}#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}#ui-overlay>div{pointer-events:auto}.hidden{display:none!important}#hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;color:#fff;font-size:16px;text-shadow:2px 2px 0 #000;pointer-events:none}#distance,#coins{background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:4px}#boost-meter,#health-meter{width:120px;height:16px;background:rgba(0,0,0,0.6);border:2px solid #fff;border-radius:4px;overflow:hidden}#boost-fill{height:100%;width:100%;background:linear-gradient(90deg,#4ecdc4,#44a08d);transition:width 0.1s}#health-fill{height:100%;width:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);transition:width 0.2s}#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(22,33,62,0.95)}#start-screen h1{font-size:64px;color:#e94560;text-shadow:4px 4px 0 #0f3460;margin-bottom:10px;letter-spacing:8px}.subtitle{font-size:20px;color:#4ecdc4;margin-bottom:30px}#high-score{font-size:18px;color:#ffd93d;margin-bottom:30px}button{font-family:'Courier New',monospace;font-size:20px;padding:15px 40px;margin:10px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.2s;box-shadow:0 4px 0 #a31545}button:hover{background:#ff6b6b;transform:translateY(-2px);box-shadow:0 6px 0 #a31545}button:active{transform:translateY(2px);box-shadow:0 2px 0 #a31545}.controls-hint{margin-top:40px;color:#888;font-size:14px;text-align:center}.controls-hint p{margin:5px 0}#shop-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:30px;background:rgba(22,33,62,0.98);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain}#shop-screen h2{font-size:36px;color:#ffd93d;margin-bottom:10px}#freedom-points{font-size:20px;color:#4ecdc4;margin-bottom:20px}#upgrades-list{display:flex;flex-direction:column;gap:12px;width:100%;max-width:500px;margin-bottom:20px}.upgrade-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.1);padding:12px 16px;border-radius:8px;border:2px solid transparent;transition:all 0.2s}.upgrade-item:hover{border-color:#4ecdc4}.upgrade-item.maxed{opacity:0.6}.upgrade-info{flex:1}.upgrade-name{font-size:16px;color:#fff;margin-bottom:4px}.upgrade-desc{font-size:12px;color:#888}.upgrade-level{display:flex;gap:4px;margin-top:6px}.level-pip{width:12px;height:12px;background:#333;border-radius:2px}.level-pip.filled{background:#4ecdc4}.upgrade-cost{font-size:16px;color:#ffd93d;margin-left:20px}.upgrade-btn{padding:8px 16px;font-size:14px;margin-left:10px}.upgrade-btn:disabled{background:#555;box-shadow:0 4px 0 #333;cursor:not-allowed}#back-btn{background:#0f3460;box-shadow:0 4px 0 #0a2040}#back-btn:hover{background:#1a4a80}.danger-button{background:#7f1d1d;box-shadow:0 4px 0 #5c1515}.danger-button:hover{background:#991b1b}#reset-btn{margin-top:20px;font-size:14px;padding:10px 20px}#reset-confirm{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}.reset-modal{background:#16213e;border:3px solid #e94560;border-radius:8px;padding:30px;text-align:center;max-width:320px}.reset-modal p{color:#fff;font-size:18px;margin-bottom:20px;line-height:1.4}.reset-modal-buttons{display:flex;gap:10px;justify-content:center}.reset-modal-buttons button{font-size:14px;padding:10px 20px}#game-over-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(22,33,62,0.95)}#game-over-screen h2{font-size:48px;color:#e94560;text-shadow:4px 4px 0 #0f3460;margin-bottom:20px}#run-stats{font-size:20px;color:#fff;margin-bottom:10px}#points-earned{font-size:24px;color:#ffd93d;margin-bottom:30px}@keyframes warning-flash{0%,100%{background-color:transparent}50%{background-color:rgba(233,69,96,0.3)}}.warning{animation:warning-flash 0.5s ease-in-out infinite}#mobile-controls{position:absolute;bottom:0;left:0;right:0;height:180px;display:flex;justify-content:space-between;align-items:center;padding:0 20px 20px 20px;pointer-events:none;z-index:200}#mobile-controls>*{pointer-events:auto}#dpad-container{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:4px;touch-action:none}#dpad-up{grid-column:2;grid-row:1}#dpad-left{grid-column:1;grid-row:2}#dpad-center{grid-column:2;grid-row:2}#dpad-right{grid-column:3;grid-row:2}#dpad-down{grid-column:2;grid-row:3}.dpad-btn{width:60px;height:60px;background:rgba(233,69,96,0.4);border:3px solid rgba(233,69,96,0.7);border-radius:8px;display:flex;justify-content:center;align-items:center;touch-action:none;-webkit-tap-highlight-color:transparent;transition:all 0.1s}.dpad-btn:active,.dpad-btn.active{background:rgba(233,69,96,0.8);border-color:#e94560;transform:scale(0.92)}#dpad-center{width:60px;height:60px;background:rgba(100,100,100,0.3);border:2px solid rgba(150,150,150,0.4);border-radius:50%}.dpad-arrow{width:0;height:0;border-style:solid}.up-arrow{border-width:0 12px 18px 12px;border-color:transparent transparent rgba(255,255,255,0.9) transparent}.down-arrow{border-width:18px 12px 0 12px;border-color:rgba(255,255,255,0.9) transparent transparent transparent}.left-arrow{border-width:12px 18px 12px 0;border-color:transparent rgba(255,255,255,0.9) transparent transparent}.right-arrow{border-width:12px 0 12px 18px;border-color:transparent transparent transparent rgba(255,255,255,0.9)}#boost-btn-container{display:flex;align-items:center;justify-content:center}#boost-btn{width:100px;height:100px;background:linear-gradient(145deg,rgba(78,205,196,0.5),rgba(68,160,141,0.5));border:4px solid rgba(78,205,196,0.8);border-radius:50%;display:flex;justify-content:center;align-items:center;touch-action:none;-webkit-tap-highlight-color:transparent;transition:all 0.1s;box-shadow:0 4px 15px rgba(78,205,196,0.3)}#boost-btn span{color:#fff;font-size:14px;font-weight:bold;text-shadow:1px 1px 2px rgba(0,0,0,0.5);letter-spacing:1px}#boost-btn:active,#boost-btn.active{background:linear-gradient(145deg,rgba(78,205,196,0.9),rgba(68,160,141,0.9));border-color:#4ecdc4;transform:scale(0.92);box-shadow:0 2px 10px rgba(78,205,196,0.5)}#speed-indicator{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);padding:6px 16px;background:rgba(0,0,0,0.8);border-radius:4px;white-space:nowrap}#speed-text{font-size:12px;color:#4ecdc4;font-weight:bold;text-transform:uppercase;letter-spacing:1px}#speed-text.slow{color:#e94560}#speed-text.off-road{color:#f39c12;animation:pulse-speed 0.5s ease-in-out infinite}@keyframes pulse-speed{0%,100%{opacity:1}50%{opacity:0.5}}@media (max-width:820px){body{padding:0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}#game-container{width:100vw;height:calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));max-height:none;border-width:2px}#game-canvas{width:100%;height:100%}#start-screen h1{font-size:36px;letter-spacing:4px}.subtitle{font-size:16px}button{padding:12px 24px;font-size:16px}.controls-hint{margin-top:20px;font-size:12px}#hud{font-size:14px;flex-wrap:wrap;gap:8px}#distance,#coins{padding:6px 10px}#boost-meter,#health-meter{width:80px;height:12px}#mobile-controls{height:200px;padding:0 15px 15px 15px}#dpad-container{grid-template-columns:55px 55px 55px;grid-template-rows:55px 55px 55px;gap:3px}.dpad-btn{width:55px;height:55px}#dpad-center{width:55px;height:55px}#boost-btn{width:90px;height:90px}#boost-btn span{font-size:12px}#shop-screen{padding:20px 15px}#shop-screen h2{font-size:28px}.upgrade-item{padding:10px 12px;flex-wrap:wrap}.upgrade-name{font-size:14px}.upgrade-desc{font-size:11px}.upgrade-btn{padding:6px 12px;font-size:12px}#game-over-screen h2{font-size:36px}#run-stats{font-size:16px}#points-earned{font-size:20px}}@media (max-height:500px) and (orientation:landscape){#mobile-controls{height:140px;padding:0 10px 10px 10px}#dpad-container{grid-template-columns:40px 40px 40px;grid-template-rows:40px 40px 40px;gap:2px}.dpad-btn{width:40px;height:40px}#dpad-center{width:40px;height:40px}.up-arrow{border-width:0 8px 12px 8px}.down-arrow{border-width:12px 8px 0 8px}.left-arrow{border-width:8px 12px 8px 0}.right-arrow{border-width:8px 0 8px 12px}#boost-btn{width:70px;height:70px}#boost-btn span{font-size:10px}#speed-indicator{bottom:5px}#speed-text{font-size:10px}}@media (pointer:coarse){.controls-hint{display:none}}

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <div id="hud" class="hidden">
                <div id="distance">Distance: 0m</div>
                <div id="coins">Coins: 0</div>
                <div id="boost-meter">
                    <div id="boost-fill"></div>
                </div>
                <div id="health-meter">
                    <div id="health-fill"></div>
                </div>
            </div>
            <div id="start-screen">
                <h1>ICE RUNNER</h1>
                <p class="subtitle">Escape to Freedom</p>
                <div id="high-score"></div>
                <button id="start-btn">START RUN</button>
                <button id="shop-btn">UPGRADE SHOP</button>
                <div class="controls-hint">
                    <p>Arrow Keys / WASD to steer</p>
                    <p>SPACE for boost</p>
                </div>
            </div>
            <div id="shop-screen" class="hidden">
                <h2>UPGRADE SHOP</h2>
                <div id="freedom-points">Freedom Points: 0</div>
                <div id="upgrades-list"></div>
                <button id="back-btn">BACK</button>
                <button id="reset-btn" class="danger-button">RESET PROGRESS</button>
            </div>
            <div id="reset-confirm" class="hidden">
                <div class="reset-modal">
                    <p>Are you sure? This will erase ALL progress!</p>
                    <div class="reset-modal-buttons">
                        <button id="reset-confirm-yes" class="danger-button">YES, RESET</button>
                        <button id="reset-confirm-no">CANCEL</button>
                    </div>
                </div>
            </div>
            <div id="game-over-screen" class="hidden">
                <h2>CAUGHT!</h2>
                <div id="run-stats"></div>
                <div id="points-earned"></div>
                <button id="retry-btn">TRY AGAIN</button>
                <button id="shop-btn-go">UPGRADE SHOP</button>
            </div>
            <div id="mobile-controls" class="hidden">
                <div id="dpad-container">
                    <div id="dpad-up" class="dpad-btn">
                        <div class="dpad-arrow up-arrow"></div>
                    </div>
                    <div id="dpad-left" class="dpad-btn">
                        <div class="dpad-arrow left-arrow"></div>
                    </div>
                    <div id="dpad-center"></div>
                    <div id="dpad-right" class="dpad-btn">
                        <div class="dpad-arrow right-arrow"></div>
                    </div>
                    <div id="dpad-down" class="dpad-btn">
                        <div class="dpad-arrow down-arrow"></div>
                    </div>
                </div>
                <div id="boost-btn-container">
                    <div id="boost-btn" class="action-btn">
                        <span>BOOST</span>
                    </div>
                </div>
                <div id="speed-indicator">
                    <span id="speed-text">FULL SPEED</span>
                </div>
            </div>
        </div>
    </div>
    <script>
// Seeded random number generator
class SeededRandom{constructor(seed=Date.now()){this.seed=seed;this.state=seed}setSeed(seed){this.seed=seed;this.state=seed}reset(){this.state=this.seed}next(){let t=this.state+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}nextInt(min,max){return Math.floor(this.next()*(max-min))+min}nextFloat(min,max){return this.next()*(max-min)+min}nextBool(probability=0.5){return this.next()<probability}pick(array){return array[this.nextInt(0,array.length)]}shuffle(array){for(let i=array.length-1;i>0;i--){const j=this.nextInt(0,i+1);[array[i],array[j]]=[array[j],array[i]]}return array}}
const gameRandom=new SeededRandom();

// Biome definitions
const BIOMES={desert:{name:'Desert',sky:{top:'#1a1a2e',bottom:'#16213e'},terrain:'#3d2817',shoulder:'#5d4e37',road:{asphalt:'#2c2c2c',texture:'#333'},dust:{onRoad:'#8b7355',offRoad:'#c4a574'},decorations:['cactus','rock','tumbleweed']},city:{name:'City',sky:{top:'#2c3e50',bottom:'#34495e'},terrain:'#1c1c1c',shoulder:'#3a3a3a',road:{asphalt:'#222222',texture:'#2a2a2a'},dust:{onRoad:'#444444',offRoad:'#555555'},decorations:['streetlight','trashcan','barrier']},forest:{name:'Forest',sky:{top:'#0d1b2a',bottom:'#1b263b'},terrain:'#2d4a2d',shoulder:'#3d5c3d',road:{asphalt:'#2c2c2c',texture:'#333'},dust:{onRoad:'#5a4a3a',offRoad:'#4a6741'},decorations:['pine','rock','bush']}};
const BIOME_LIST=['desert','city','forest'];

// Sprites class
class Sprites{constructor(){this.cache=new Map();this.generateAllSprites()}generateAllSprites(){this.cache.set('truck_center_0',this.createTruckSprite(0,0));this.cache.set('truck_center_1',this.createTruckSprite(0,1));this.cache.set('truck_left_0',this.createTruckSprite(-1,0));this.cache.set('truck_left_1',this.createTruckSprite(-1,1));this.cache.set('truck_right_0',this.createTruckSprite(1,0));this.cache.set('truck_right_1',this.createTruckSprite(1,1));this.cache.set('ice_van',this.createIceVanSprite());this.cache.set('ice_suv',this.createIceSuvSprite());for(let i=0;i<4;i++){this.cache.set(`ice_agent_${i}`,this.createIceAgentSprite(i))}for(let i=0;i<6;i++){this.cache.set(`pursuer_${i}`,this.createPursuerSprite(i))}this.cache.set('barrier',this.createBarrierSprite());this.cache.set('cone',this.createConeSprite());this.cache.set('coin',this.createCoinSprite());this.cache.set('fuel',this.createFuelSprite());this.cache.set('speedBoost',this.createSpeedBoostSprite());this.cache.set('repair',this.createRepairSprite())}createCanvas(width,height){const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;return canvas}createTruckSprite(tilt,frame){const canvas=this.createCanvas(48,64);const ctx=canvas.getContext('2d');const tiltOffset=tilt*3;const bodyColor='#c9a66b';const bodyDark='#a67c4e';const cabColor='#8b6914';const windowColor='#5dade2';const wheelColor='#2c3e50';const metalColor='#7f8c8d';ctx.fillStyle=bodyColor;ctx.fillRect(6+tiltOffset,24,36,36);ctx.fillStyle=bodyDark;ctx.fillRect(6+tiltOffset,24,4,36);ctx.fillRect(38+tiltOffset,24,4,36);ctx.fillStyle=metalColor;for(let i=0;i<4;i++){ctx.fillRect(10+tiltOffset,28+i*8,28,2)}ctx.fillStyle=cabColor;ctx.fillRect(8+tiltOffset,4,32,22);ctx.fillStyle=bodyDark;ctx.fillRect(10+tiltOffset,2,28,4);ctx.fillStyle=windowColor;ctx.fillRect(12+tiltOffset,6,24,10);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(14+tiltOffset,8,8,6);ctx.fillStyle=windowColor;ctx.fillRect(14+tiltOffset,18,20,6);ctx.fill class Game{constructor(canvas){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.width=800;this.height=600;this.canvas.width=this.width;this.canvas.height=this.height;this.state=GameState.MENU;this.lastTime=0;this.deltaTime=0;this.accumulator=0;this.fixedTimeStep=1000/60;this.distance=0;this.coins=0;this.runTime=0;this.player=null;this.obstacles=null;this.collectibles=null;this.pursuer=null;this.renderer=null;this.input=null;this.ui=null;this.progression=null;this.baseScrollSpeed=3;this.scrollSpeed=this.baseScrollSpeed;this.difficultyMultiplier=1;this.pursuerSpawnTime=45;this.pursuerWarningTime=5;this.pursuerSpawned=false;this.pursuerWarning=false;this.gameLoopBound=this.gameLoop.bind(this)}init(systems){this.player=systems.player;this.obstacles=systems.obstacles;this.collectibles=systems.collectibles;this.pursuer=systems.pursuer;this.renderer=systems.renderer;this.input=systems.input;this.ui=systems.ui;this.progression=systems.progression;this.applyUpgrades()}applyUpgrades(){const upgrades=this.progression.getUpgrades();this.baseScrollSpeed=3+(upgrades.engine*0.15);this.pursuerSpawnTime=45+(upgrades.headStart*8);if(this.player){this.player.applyUpgrades(upgrades)}}startGame(){console.log('Starting game...');this.state=GameState.PLAYING;this.distance=0;this.coins=0;this.runTime=0;this.scrollSpeed=this.baseScrollSpeed;this.difficultyMultiplier=1;this.pursuerSpawned=false;this.pursuerWarning=false;const runSeed=Date.now();gameRandom.setSeed(runSeed);console.log('Run seed:',runSeed);const biomeIndex=gameRandom.nextInt(0,BIOME_LIST.length);const biomeName=BIOME_LIST[biomeIndex];this.currentBiome=BIOMES[biomeName];this.renderer.setBiome(this.currentBiome);console.log('Biome:',this.currentBiome.name);this.player.reset();this.obstacles.reset();this.collectibles.reset();this.pursuer.reset();this.renderer.reset();this.applyUpgrades();this.ui.showHUD();this.lastTime=performance.now();this.accumulator=0;requestAnimationFrame(this.gameLoopBound);console.log('Game loop started')}gameLoop(currentTime){if(this.state!==GameState.PLAYING){return}try{this.deltaTime=currentTime-this.lastTime;this.lastTime=currentTime;if(this.deltaTime>100){this.deltaTime=100}this.accumulator+=this.deltaTime;while(this.accumulator>=this.fixedTimeStep){this.fixedUpdate(this.fixedTimeStep/1000);this.accumulator-=this.fixedTimeStep}this.render();requestAnimationFrame(this.gameLoopBound)}catch(error){console.error('Game loop error:',error)}}fixedUpdate(dt){this.runTime+=dt;this.distance+=this.scrollSpeed*dt*10;this.difficultyMultiplier=1+(this.runTime/120);this.scrollSpeed=this.baseScrollSpeed*Math.min(this.difficultyMultiplier,2);if(!this.pursuerWarning&&this.runTime>=this.pursuerSpawnTime-this.pursuerWarningTime){this.pursuerWarning=true;this.ui.showWarning()}if(!this.pursuerSpawned&&this.runTime>=this.pursuerSpawnTime){this.pursuerSpawned=true;this.pursuer.spawn();this.ui.hideWarning()}const pursuerProgress=Math.min(1,this.runTime/this.pursuerSpawnTime);this.renderer.update(dt,this.scrollSpeed,this.difficultyMultiplier,pursuerProgress);const roadBounds=this.renderer.getRoadBounds();this.player.update(dt,this.input.getState(),this.scrollSpeed,roadBounds);this.obstacles.update(dt,this.scrollSpeed,this.difficultyMultiplier);this.collectibles.update(dt,this.scrollSpeed,this.progression.getUpgrades().luckyFind);if(this.player.isOffRoad&&Math.random()<0.3){this.renderer.addDustTrail(this.player.x+this.player.width/2,this.player.y+this.player.height,true);this.renderer.triggerOffRoadEffect()}if(this.pursuerSpawned){this.pursuer.update(dt,this.player,this.scrollSpeed)}this.checkCollisions();this.ui.updateHUD(this.distance,this.coins,this.player.boost,this.player.maxBoost,this.player.health,this.player.maxHealth,this.player.isOffRoad,this.player.currentSpeedMultiplier)}checkCollisions(){const playerBounds=this.player.getBounds();const magnetRadius=30+(this.progression.getUpgrades().coinMagnet*20);const obstacleHit=this.obstacles.checkCollision(playerBounds);if(obstacleHit){this.handleObstacleCollision(obstacleHit)}const collected=this.collectibles.checkCollision(playerBounds,magnetRadius);for(const item of collected){this.handleCollectible(item)}if(this.pursuerSpawned&&this.pursuer.checkCollision(playerBounds)){this.gameOver()}}handleObstacleCollision(obstacle){if(this.player.isInvincible){return}switch(obstacle.type){case'van':case'suv':case'agent':this.gameOver();break;case'barrier':case'cone':const damage=obstacle.type==='barrier'?25:10;this.player.takeDamage(damage);this.player.slowDown(0.5,1);if(this.player.health<=0){this.gameOver()}break}}handleCollectible(item){switch(item.type){case'coin':this.coins++;break;case'fuel':this.player.refuelBoost(30);break;case'speedBoost':this.player.activateSpeedBoost(3);break;case'repair':this.player.repair(25);break}}gameOver(){this.state=GameState.GAME_OVER;const distancePoints=Math.floor(this.distance/10);const coinPoints=this.coins*5;const totalPoints=distancePoints+coinPoints;this.progression.addPoints(totalPoints);this.progression.updateHighScore(Math.floor(this.distance));this.ui.showGameOver(Math.floor(this.distance),this.coins,totalPoints)}render(){this.ctx.fillStyle='#16213e';this.ctx.fillRect(0,0,this.width,this.height);this.renderer.renderBackground(this.ctx,this.scrollSpeed);this.collectibles.render(this.ctx);this.obstacles.render(this.ctx);this.player.render(this.ctx);if(this.pursuerSpawned){this.pursuer.render(this.ctx)}this.renderer.renderEffects(this.ctx)}showMenu(){this.state=GameState.MENU;this.ui.showMenu()}showShop(){this.state=GameState.SHOP;this.ui.showShop()}getState(){return this.state}}

// Initialize game
document.addEventListener('DOMContentLoaded',()=>{initGame()});

function initGame(){const canvas=document.getElementById('game-canvas');if(!canvas){console.error('Canvas element not found!');return}const GAME_WIDTH=800;const GAME_HEIGHT=600;const sprites=new Sprites();const renderer=new Renderer(GAME_WIDTH,GAME_HEIGHT);const input=new Input();const progression=new Progression();const game=new Game(canvas);const player=new Player(GAME_WIDTH,GAME_HEIGHT,sprites);const obstacles=new Obstacles(GAME_WIDTH,GAME_HEIGHT,sprites,renderer);const collectibles=new Collectibles(GAME_WIDTH,GAME_HEIGHT,sprites,renderer);const pursuer=new Pursuer(GAME_WIDTH,GAME_HEIGHT,sprites,renderer);const lanePositions=renderer.getLanePositions();obstacles.setLanePositions(lanePositions);collectibles.setLanePositions(lanePositions);const ui=new UI(game,progression);game.init({player,obstacles,collectibles,pursuer,renderer,input,ui,progression});game.showMenu();let debugMode=false;window.addEventListener('keydown',(e)=>{if(e.code==='KeyP'){debugMode=!debugMode;if(debugMode){console.log('Debug mode enabled');showDebugOverlay(game,player,pursuer)}else{console.log('Debug mode disabled');hideDebugOverlay()}}if(e.code==='KeyC'&&e.shiftKey){progression.addBonusPoints(100);console.log('Added 100 freedom points!');ui.updateShopDisplay()}if(e.code==='KeyR'&&e.shiftKey){if(confirm('Reset all progress?')){progression.resetProgress();location.reload()}}});console.log('ICE Runner initialized!');console.log('Press P for debug mode, Shift+C for free points')}

let debugOverlay=null;let debugInterval=null;
function showDebugOverlay(game,player,pursuer){debugOverlay=document.createElement('div');debugOverlay.id='debug-overlay';debugOverlay.style.cssText=`position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);color:#0f0;font-family:monospace;font-size:12px;padding:10px;border-radius:4px;z-index:9999;pointer-events:none;`;document.body.appendChild(debugOverlay);debugInterval=setInterval(()=>{if(!debugOverlay)return;debugOverlay.innerHTML=`<strong>DEBUG INFO</strong><br>State: ${game.getState()}<br>Distance: ${Math.floor(game.distance)}m<br>Speed: ${game.scrollSpeed.toFixed(2)}<br>Difficulty: ${game.difficultyMultiplier.toFixed(2)}x<br><br>Player X: ${Math.floor(player.x)}<br>Player Y: ${Math.floor(player.y)}<br>Health: ${player.health}<br>Boost: ${player.boost.toFixed(0)}<br>Invincible: ${player.isInvincible}<br><br>Pursuer Active: ${pursuer.active}<br>Pursuer Y: ${Math.floor(pursuer.y)}<br>Chase Time: ${pursuer.chaseTime.toFixed(1)}s<br>`},100)}
function hideDebugOverlay(){if(debugOverlay){debugOverlay.remove();debugOverlay=null}if(debugInterval){clearInterval(debugInterval);debugInterval=null}}
    </script>
</body>
</html>
