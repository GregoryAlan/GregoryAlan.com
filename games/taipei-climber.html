<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Scale Taipei 101 in this arcade climbing game inspired by Crazy Climber 2. Use dual-hand controls to climb while avoiding falling objects.">
  <meta name="theme-color" content="#0a0a1a">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Taipei Climber">
  <meta property="og:description" content="Scale Taipei 101 in this arcade climbing game inspired by Crazy Climber 2">
  <meta property="og:type" content="website">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%231a1a2e' width='32' height='32'/><rect fill='%2300ffff' x='8' y='4' width='16' height='24' rx='2'/><rect fill='%23ffffff' x='12' y='8' width='3' height='3'/><rect fill='%23ffffff' x='17' y='8' width='3' height='3'/><rect fill='%23ffffff' x='12' y='14' width='3' height='3'/><rect fill='%23ffffff' x='17' y='14' width='3' height='3'/><rect fill='%23ff4444' x='13' y='20' width='6' height='6'/></svg>">

  <title>Taipei Climber</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      background-color: #0a0a1a;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    /* Prevent pull-to-refresh */
    body {
      overscroll-behavior: none;
    }
  </style>
  <script type="module" crossorigin src="./assets/taipei-climber.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/phaser.js">
</head>
<body>
  <div id="game-container"></div>
</body>
</html>
